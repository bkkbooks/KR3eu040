body:
  text: 卷四運氣原證按內經運氣目眥瘍有二一曰熱經云少陰司天之政三之氣大火行寒氣時至民病目赤眥瘍治以寒劑是也二曰燥經云歲金太過民病目赤眥瘍又云陽明司天燥淫所勝民病目眯眥瘍治以溫劑是也目瘍內經曰諸痛癢瘡瘍皆屬心火火鬱內發致有斯疾蓋心主乎血血熱生風郁內甚遞相傳襲故火能生土血注陽明主肌肉風熱與血熱相搏發見皮膚其名不一有黃濃而白者土生金母歸子也始生微癢而熱輕腫痛爛為熱極血凝化水氣滯成膿甚至寒熱作而飲食減尤為可慮宜泄風毒涼心經解胃熱按目瘡疣皆因君火司令燥火熱邪所致宜溫宜涼隨證施治可也實熱生瘡論瘡之生也輕重不等痛癢不同重則堆積高厚紫血凝爛以致腥臭者此乃氣血不和火實之邪血分之熱尤重如瘀滯之症膏混水濁每每流於睥眥而成瘡瘀血散而瘡自愈勤勞濕熱之人每患睥眥成瘡別無腫痛者亦輕而無妨若火盛瘡生而帶腫痛者又當急治恐濁氣沿於目內而病及於烏珠若先有目病後生瘡者必是熱沿他證凡見此候當分部位以別何原而來因其輕重治之治法無腫痛者服加減四物湯或芎歸湯火盛腫痛者服四順清涼飲子先病後瘡者則必因其經絡下方如發於心脾則從心脾而治發於肝膽肺腎則因肝膽肺腎施方此則隨時變通不可執滯也是在醫者運用之妙云證治歌實熱生瘡證若何重輕痛癢本殊科重堆高厚血凝爛氣血由來已不和火實尤兼血熱重瘀留睥眥致瘡多勤勞濕熱多斯疾腫痛俱無自易瘥火盛瘡生兼腫痛烏珠恐害莫蹉跎倘沿目病瘡旋發此必熱沿他證羅當從部位分輕重如非腫痛藥無他湯投四物宜加減或進芎歸湯起坎坷火過盛兮成腫痛四順清涼飲子病不虛先病後瘡尚細審須分五臟免差訛方加減四物湯生地苦參薄荷川芎黍黏子連翹天花粉防風赤芍當歸荊芥穗各等分上水煎食後服芎歸湯川芎當歸赤芍防風羌活上水煎去滓頻洗則血活風亦去矣搽藥方治眼皮外滿瞼生瘡潰爛血竭乳香沒藥輕粉他僧各等分上為極細末壓之瘡處又一方青黛一錢二分黃柏末潮腦輕粉松香各一錢上為細末用舊青布捲藥在內麻油濕透燒灰俟灰油滴於茶杯內蘸搽四順清涼飲子見銀星獨見椒瘡論附粟瘡椒瘡生於睥內纍纍如瘡紅而堅者是也其候內如沙擦之難開且多淚而痛今人皆指為粟瘡誤矣夫粟瘡固亦生在睥內然色黃軟而易散此則紅堅而難散醫者率以龍鬚燈心等物出血取效不知目以血為榮血損而光華有衰弱之患故遇此候只宜善治縱至於瘰瘰連片趷磕高低不平及血瘀滯者不得已而開導之亦必中病即止猶恐過而損血傷水混膏大概治此總宜平尉之法若退而復來此乃內有瘀滯方可量病漸導初治斷宜慎之治方以歸芍紅花散主之甚為平穩粟瘡若粟瘡一證其生同在兩睥然細顆黃而軟因濕熱蒸於土分而生與椒瘡之紅堅有異且與玉粒之淡黃色堅有別證既不可誤認施治亦不可概執治法以除風清脾飲縱無速效其無害也證治歌椒瘡證發紅而堅睥內宛如沙擦然多淚而疼粟瘡異醫宜善治其慎施治此宜遵平尉法內多瘀滯必難痊此時漸導宜量病歸芍紅花散最妍粟瘡一證黃而軟濕熱蒸脾是病緣治法除風清脾飲修方因證自無愆方歸芍紅花散治眼胞腫硬內生疙瘩當歸大黃梔仁黃芩紅花俱酒洗微炒赤芍甘草白芷防風生地連翹上為末每服三錢水煎食遠服除風清脾飲陳皮連翹防風知母元明粉黃芩元參黃連荊芥穗大黃桔梗生地上水煎食遠服目疣此證或眼皮上下生出一小核是也乃脾胃痰氣所致上瞼屬脾經下瞼屬胃經若結成小核紅而自破不藥而愈若堅白不破久則如杯如拳而成瘤矣若初起小核時即先用細艾如粟米狀放用紫背天葵子連葉二兩煮酒酻一壺半皂角子二三粒炮熱研細飲酒時搽疣上自消睥生痰核論睥生痰核者睥外皮內生顆如豆堅而不痛火重於痰者皮或色紅紫乃痰因火滯而結此生於上睥者多屢有不治自愈若初起劫治頃刻平復通治宜服防風散結湯然雖易治而在恣食辛辣熱毒之物酒色不節素自斫喪之人亦有難治久而變為癭漏重疾者矣治此者又宜詳慎治法系飲酒過多好食辛辣炙煿之味所致宜服清胃湯系色過傷所致則病又發於腎矣治法又當辨別虛實實用瀉腎湯虛用補腎丸或六味地黃湯如此審治庶幾無失證治歌睥生痰核可推尋火重於痰色紫紅顆生如豆堅不痛火滯痰凝病厥躬病自上睥生者衆初時即治並無凶防風散結湯宜進亦有難治不相蒙肆欲縱情多斫喪陰漏變成術幾窮飲酒過多貪辛辣宜投清胃湯最工傷於色欲病由腎虛實分明貴折衷實宜瀉腎湯虛補腎丸六味地黃湯同奏功方防風散結湯元參一錢前胡赤芍黃芩桔梗防風土貝母蒼朮白芷陳皮天花粉各八分上水煎食後熱服清胃湯治眼胞紅硬此陽明經積熱素飲酒過多好食辣煿所致梔仁炒黑枳殼蘇子各六分石膏煅黃連炒陳皮連翹歸尾荊芥穗黃芩防風各八分生甘草三分上水煎服瀉腎湯治與上同枸杞一錢二分生地黃柏酒洗炒知母酒洗炒麥冬去心棗皮去核白芍歸尾各一錢五味七粒白茯苓獨活各八分上水煎熱服六味地黃湯熟地淮藥茯苓棗皮丹皮澤瀉上水煎服補腎丸見黑翳如珠木疳論木疳之證生於風輪者多其色藍緑青碧有虛實二證虛者大而昏花實者小而痛澀非比蟹睛因破而出乃自然生出者大小不一亦隨其證若變尖長者亦有之其源發於肝經治法實者以羚羊角飲子主之虛者以平肝清火湯主之切勿混沌施治也證治歌木疳多起自風輪碧緑青藍色不均虛者昏花實痛澀蟹睛一證漫相倫肝經病發分大小或變尖長候亦真實者羚羊角飲子宜進虛用平肝清火湯神方平肝清火湯治黑睛脹大虛者服之車前子連翹各一錢枸杞柴胡夏枯草白芍生地當歸各錢半上水煎溫羚羊角飲子見花翳白陷火疳論火疳之證生於睥眥氣輪然在氣輪者為害尤急蓋心經火之實邪今在金部火剋金鬼賊相侵故害最急其候初起如粟瘡榴子一顆小而圓或帶橫長而圓狀儼如豆次後漸大痛者多不痛者少不可誤認為輪上一顆如赤豆之證因瘀積在外易消者之比蓋此從內而生也治之亦宜分虛實實者以洗心散主之虛者以補心丹主之虛實分明經絡原因不紊豈尚有誤治哉證治歌睥眥氣輪生火疳氣輪所起更為殃金因火克相侵害初起如榴與粟瘡狀如豆類隨長大圓小更或帶橫長痛者多兮不痛少莫將他證誤相商治法宜分虛與實實邪宜用洗心方虛者補心丹最妙自然火退目生光方洗心散大黃赤芍桔梗元參黃連荊芥穗知母防風黃芩歸尾各等分上為細末每服三錢食後茶清調下補心丹生地四兩人參元參炒丹參炒遠志炒桔梗白茯苓各五錢五味炒當歸酒洗麥冬炒天冬炒柏子仁炒棗仁炒各一兩上為細末蜜丸臨臥燈心湯下土疳論土疳者謂睥上生瘡俗呼偷針眼是也其候有一目生而傳兩目者有隻生一目者有微邪不出膿血而愈者有犯觸辛熱燥膩風沙煙火為漏為吊敗者有竅未實因風乘虛而入頭腦俱腫目亦赤痛者為病不一總無非脾客燥熱瘀滯積於眥間熱搏於津液所成治宜服清脾散外用南星生地為膏貼之無不即效或問俗呼偷針何也嘗聞初生小兒皰視其背上即有細細紅點以針刺破其患即瘥故號曰偷針也證治歌土疳俗號是偷針兩目相傳或不同或為吊敗或為漏或感微邪病匪凶或為赤痛頭俱腫竅本虛兮更受風燥熱客脾瘀滯積因之津液熱相攻治宜內服清脾散外貼南星生地工方清脾散薄荷升麻甘草減半梔仁炒赤芍枳殼黃芩陳皮藿香石膏防風各等分上為細末每服二錢五分水煎服南星生地膏生南星三錢生地五錢上共搗爛為膏貼太陽穴其腫即消金疳論金疳之證初起與玉粒相似至大方變生禍患其候生於睥內必礙珠澀痛以生翳障生於氣輪者則有珠痛淚流之苦子後午前陽分氣升之時尤重午後時入陰分痛略清靜其源由於肺客鬱熱積滯不行所成治亦宜速倘久而失治違戒反觸則有變漏之患治法宜服瀉肺湯肺熱平而患自除矣證治歌金疳長大禍難除初與玉粒本相如其候睥內生翳障更兼澀痛礙睛珠氣輪起者痛多淚午前更甚後稍舒病由肺熱多瘀滯速治須防變證殊瀉肺湯佳宜急進肺熱平兮病自驅方瀉肺湯桑白皮黃芩地骨皮知母麥冬去心桔梗上水煎食後服水疳論水疳者忽然一珠生於睥眥氣輪之間者多若在風輪目必損破有虛實大小二證實者小而痛甚虛者大而痛緩狀如黑豆亦有橫長而圓者與木疳相似但部分稍異色亦不同黑者屬水青緑藍碧者屬木久而失治必變為漏頭風人每有此患夫風屬木繫於肝部何以病反屬水蓋風行水動理之自然頭風病目每傷瞳神瞳神之精膏被風氣鬱久則火勝其精液為火擊散是隨其所傷之絡滯結為疳也疳因火滯火兼水化水因邪勝不為之清潤而反為之濕熱相搏變為漏矣故水疳屬腎與膽也治宜蠲毒飲庶有濟焉證治歌水疳忽爾一珠萌多自氣輪睥眥生若在風輪目必損小而痛甚為實徵大而痛緩虛堪驗圓且橫長如豆形證類木疳部分異色亦相殊宜細心緑碧青藍原屬木黑為水屬不相蒙風行水動為常理損及瞳神肝病成匪為清潤必成漏蠲毒飲投始奏功方蠲毒飲防風赤芍川芎連翹甘草牛蒡子炒研各八分上水煎服漏睛按此證由眥頭結聚生瘡流出膿汁或如涎水黏睛上下不痛仍無翳膜此因心氣不平乃小腸邪熱逆行之故並風熱停留在瞼中膿水或出於瘡口或在大小眥孔竅者出多流出不止是也通治宜五花丸白薇丸倪仲賢論熱積必潰之病即漏睛眼者是也宜竹葉瀉經湯主之大便不硬者減大黃用蜜劑解毒湯不然藥誤病久終為禍害識者慎之大眥漏論附小眥漏陰漏陽漏夫人之目各有眥而眥分大小為病各別甚不可混治也試以漏之一證而明辨之嘗稽大眥漏證大眥之間生一漏時流血水其色紫暈此病在心部火之濕毒所致治法當補腎以瀉心火以燥濕湯主之若因停風熱於胞中者則以五花丸主之小眥漏若小眥漏證則於小眥之間生一漏亦時流血水但其色鮮紅此病由心絡而來下焦相火橫行之候治法當於腎中補而抑之始進瀉濕湯繼進白薇丸若肝腎不足者則以益陰腎氣丸誠如是也漏睛之證不幾無遺治哉然而未也不猶有所謂陰漏陽漏之患哉陰漏陰漏者何其證不論何部生漏但從黃昏時至天曉則痛脹而流水作青黑色或腥臭難聞至於日間病則稍平非若他漏之長流此乃幽陰中有伏隱之火隨氣升降故入夜間陰分則病重治法當從溫而清宜以黃耆湯主之陽漏何以謂之陽漏此證亦不論何部分生漏但日間脹痛流水其色黃赤至夜則止亦非若他證之長流不息也其病在陽部故隨陽氣之升而作治法當補正氣而兼清金火之燥濕宜服保光散及補漏生肌散與夫小牛黃丸噫大小陰陽之漏為病各異辨證調治亦別醫者誠慎而行之豈不稱補天妙手哉證治歌眥漏須將大小分試將大眥漏先論漏成大眥常流血紫暈色形病在心是宜補腎瀉心火燥濕湯投可建功若因風熱胞中滯五花散進風熱平小眥漏證亦流血其血鮮紅色不同此病亦由心絡起下焦相火復橫行治宜補腎投瀉濕湯繼進白薇丸最靈若腎與肝同不足宜以益陰腎氣丸工漏證更有陰陽別陰漏證生或臭腥脹疼流水色青黑日稍平兮夜復臨此係幽陰多伏火每隨天氣降還升溫清宜用黃耆湯進陽漏相殊更引伸不拘部分頻為害日重夜輕漫比倫病在陽部隨陽氣正氣宜扶燥宜清藥投補漏生肌散小牛黃丸與保光散神大小陰陽明且悉良工從此用金針方燥濕湯黃連炒一錢蒼朮米泔制白朮土炒陳皮各八分白茯苓半夏枳殼梔仁炒黑各七分甘草三分上水煎熱服瀉濕湯車前子黃芩木通陳皮各一錢淡竹葉二十片茯苓枳殼核仁炒黑荊芥穗蒼朮各八分甘草二分上水煎熱服黃耆湯治眼膿漏不止黃耆麥冬去心白茯苓防風人參地骨皮漏蘆知母遠志去心熟地上水煎熱服保光散膽草酒洗白芷白芍防風牛子炒研黃芩山梔炒川芎生地大黃炒減半歸身羌活荊芥穗甘草減半上各等分共為細末每服四錢白水調食後服或煎服亦可補漏生肌散以上諸症皆可治枯礬輕粉血蠍乳香上為極細末對漏處吹點外用鹽花明礬少許煎水洗之小牛黃丸治一切眼漏及諸惡毒瘡等漏皆可治之神效牛黃珍珠母丁香乳香去油沒藥去油沉香銼末明雄黃硃砂均要透明者人參各一錢琥珀八分要真的麝香二分滴乳石一錢半真者煅白芷歸尾各二錢半上為細末老米飲糊丸如粟米大每服一分空心並臨臥各一服淡淡土茯苓湯送下五花丸治漏睛膿出目停風熱在胞中結聚膿汁和淚相雜常流涎水久而不治至烏珠墜落金佛草二兩砂仁炒川椒皮各七錢炙草四錢白菊花黃柏酒製枸杞各兩半巴戟八錢上為細末蜜丸如梧子大每服二十丸空心或鹽湯或溫酒下白薇丸白薇五錢石榴皮防風白蒺藜杵去刺羌活各三錢上為細末米粉糊丸如梧子大每服二十丸白滾湯下益陰腎氣丸見總論外加羌活防風以補肝腎不足正漏論附偏漏外漏竅漏前言四漏之證治詳矣以言治漏豈尚有遺漏哉詎知民病不一大小陰陽既有漏待彌縫而偏正外竅更有漏須補葺原集遺漏吾豈容坐視罅漏哉用不揣固陋遍採而補益之若夫正漏之為證也有漏生於風輪或正中或略偏或流青黑水或但漏無流病至此目幾危矣究厥病源發於肝腎蓋肝竅於目目主於腎故曰正漏治法當瀉肝養腎初宜服瀉濕合燥濕湯繼進益陰腎氣丸偏漏若偏漏其淚漏生於氣輪金堅而位旁或流白水或無水流皆是此證為害較正漏為稍遲其原由於火克肺金積熱而成故曰偏漏久而失治則有水泄膏枯目損喪明之患治法當瀉心火以清肺熱宜以洗心散清肺飲主之外漏何為外漏其候漏生於兩睥之外或流膿或流稠臭水脹痛則流不脹則不流其源由於脾胃燥熱而成失治則有脾壞氣虛目損之患治法當清脾調胃宜以調脾清毒飲或清脾散主之竅漏復有謂竅漏者何其候目傍竅中流出薄稠水如膿腥臭拭之即有久則同亦模糊也此病凡嗜燥耽酒痰火濕熱人多患之久而不治亦有暗傷神水耗澀神膏之害治法須當清胃宜以清胃湯主之籲治漏之法於茲詳矣盡矣故曰能補前人之罅漏而世之患漏者宜從此獲小補云證治歌前言漏症已條陳再將正漏細詳論起自風輪水青黑或略偏兮或正中或漏無流目幾殆病總由於肝腎經肝竅於目目主腎瀉肝養腎是章程初宜瀉濕合燥濕湯繼進益陰腎氣丸工偏漏則自氣輪起熱自火生克肺金積熱而成流白水心火當瀉肺當清洗心散與清肺飲清金瀉火有奇功外漏生於兩睥外或流臭水或流膿脹痛則流否則止病由脾胃燥熱成倘教失治目難保調脾清胃治法明調脾清毒飲原善或進清脾散亦靈竅漏旁漏亦流水拭之即有似膿腥病由嗜燥兼痰火久而不治恐傷神治宜清胃湯為主醫師從此可精詢方調睥清毒飲天花粉連翹荊芥穗甘草黍黏子桔梗白茯苓白朮薄荷防風陳皮上水煎食前溫服瀉濕湯燥濕湯均見大眥漏益陰腎氣丸見總論洗心散見火疳清肺飲見肺瘀清脾散見土疳清胃湯見睥生痰核脾病按脾喜燥惡濕若內多濕熱外傷風邪津液耗澀膏血枯乾或內急外弛以致生諸病陽虛則為倒睫等證陰虛則為散大等證大要濕熱所侵者以和解為要陰陽偏勝者滋營調衛為先倒睫拳毛論倒睫拳毛者謂眼睫毛倒捲入眼中頻頻出淚拭擦不已便自羞明毛漸侵睛掃成雲翳是也證由目病妄稱火眼不自介意縱欲尋酒不避風霜勞苦致受風邪皮鬆弦緊而成此疾久而不治則赤爛而毛刺於內神水不清以致障結澀淚之苦而損目者有之矣人有拔去翦除者有翳以挾扳去腐上睥者雖獲速效不知內病不除未幾復倒譬之草木枯瘦則枝葉萎垂即朝摘黃葉莫去枯枝徒傷其木不若滋調水土本得培養則向之黃者翠而垂者聳矣治法用法夾之夾定以藥敷之然仍必內服石膏羌活散或流氣飲繼敷以緊皮膏或五灰膏或起睫膏依次治之庶乃本清流絶永無此患矣證治歌目中拳睫苦拳毛淚出頻頻拭不休漸至羞明睛受損掃成雲翳最堪憂證因目病不求治酒色風霜致病由神水不清貽後患障澀傷明甚可愁拔去剪除雖取效不除內病總難瘳夾之有法後敷藥內服石膏羌活散流氣飲投緊皮膏起睫膏五灰膏並均為敷藥毛自收方夾法用薄筆竹管破開做夾寸許將當歸汁浸一周時再用龜板一個開了連皮裹之煮夾皮爛取出陰乾以麝香拌之夾眼則靈夾時先翻轉上睛看過倘有瘀滯即導平血盡方可行夾然夾不可高大只在重弦仔細看定睫毛毫無倒入者方著力扯緊其夾外之肉用少艾丸灸三壯不可多灸恐潰候乾夾脫下用光粉調香油逐早搽抹痕處久則肉色如舊石膏羌活散治目久病失明遠近內外氣障風熱上攻昏暗拳毛倒睫之證蒼朮米泔浸炒羌活密蒙花白芷石膏煅麻子木賊藁本黃連酒製細辛家菊花荊芥川芎甘草上為細末每服二錢臨臥蜜湯或茶清調服流氣飲治兩目羞明眵淚隱澀睛赤疼痛或生翳障眼稜緊急以致倒睫拳毛瞼弦赤爛荊芥山梔牛子蔓荊子細辛防風木賊白蒺藜元參人參真川芎上水煎食後服青黛散治眼倒睫神效棗樹上黃直棘針刺蝟皮炒焦白芷青黛各等分上為細末口噙水左眼倒睫左鼻㗜之右眼倒睫右鼻㗜之四退散蟬蛻蛇蛻酒煮豬蹄退蠶退荊芥各二錢半川烏炮穿山甲燒粉草各五錢上為細末每服一錢淡鹽湯調下又方加防風石決明草決明各五錢緊皮膏石燕一對煅末石榴皮五倍子各三錢黃連明礬各一錢刮銅緑五分阿膠寸香四六各三分上除膠六味共為末用水三五碗並膠末入大銅杓內文武火煎熬以槐柳枝不住手攪為濃糊將成膏方入冰麝攪勻用磁器收貯將新筆塗上下眼皮每日三五次毛自出矣涼天可行此法輕者三十日全出重者五十日向外矣五灰膏蕎麥燒灰一升淋水石灰風化者二兩青桑柴燒灰一升淋水一碗同風化灰共熬干為末白砒三錢煅研末白明礬一兩煅盡煙為度研上先將白砒白礬共研用水十碗熬至一碗方入風化灰攪勻用新筆掃眼睫上數次毛即落勿入眼內起睫膏木鱉子去殼一錢自然銅制五錢上為搗爛為條子㗜鼻一方用石燕末入片腦少許研末水調敷眼弦上一方用蝨子血點入眼中數次即愈黃耆防風飲子無比蔓荊子湯均見內急外弛睥急緊小論睥急緊小謂眼楞緊急縮小乃倒睫拳毛之漸也若不治而漸自縮小者乃膏血精液澀耗筋脈緊急之故究其由多倒睫用夾失法過甚或不當割而割損傷津液所致治法宜神效黃耆湯有翳用撥雲散小角偏小用連翹飲子婁全善云陽虛則眼楞緊小陰虛則瞳子散大故東垣治眼楞緊小用參耆補氣為君佐以辛味疏散之忌芍藥五味酸收治瞳子散大地黃補血為君佐以酸味收斂之忌茺蔚子青葙子之類此又善明治意之要言也故並之以備參閲證治歌目楞緊小亦危哉倒睫拳毛由此來未經醫治漸自縮病有由生可細推精膏血液多耗澀筋脈緊急是禍胎總由夾法致多誤或因鉤割釀成災神效黃耆湯最善翳遮宜遣撥雲散開小角偏小連翹飲子陰陽各別更須裁陽虛緊小參耆主疏散宜將辛味陪陰虛瞳散地黃主佐以酸味以扶禿方神效黃耆湯黃耆二兩人參炙草白芍各一兩陳皮去白五錢蔓荊子二錢上每服四錢水煎臨臥稍熱服如小便淋加澤瀉五分大熱加黃柏三錢酒炒四次如麻木不仁雖有熱不用黃柏再加黃耆一兩如眼緊小去芍藥忌酒醋面蔥蒜韭及淡滲生冷硬物連翹飲子連翹當歸紅葵花蔓荊子人參生甘草生地各三分柴胡一分黃芩酒製黃耆防風羌活各五分升麻一錢上為末每服五錢水煎食後稍熱服撥雲散川芎膽草楮實薄荷羌活荊芥穗石決明草決明蒼朮大黃甘草木賊密蒙花連翹川椒菊花桔梗石膏白芷地骨皮白蒺藜檳榔各一兩石燕一對上攪篩細末每服三錢溫茶清下食後日三服忌雜魚烏豬肉睥翻黏瞼論附睥輪振跳睥翻黏瞼者謂睥翻轉貼在外瞼之上如舌舐唇之狀乃氣滯血湧於內皮急牽吊於外故不能復轉其源有自病壅翻而轉者有因翻睥看病風熱搏滯不能返轉者大抵此證多風濕之滯故風疾人患者多治亦難愈非風者易治治法宜外用劆剔開導之內服排風散若赤爛成瘡宜服龍膽丸睥輪振跳第此言乎睥之翻黏而更有睥輪振跳者何也其證謂目睥不待人之開合而自牽拽振跳也此乃氣分之病屬肝脾二經絡之患人皆呼為風不知血虛而氣不順非純屬也若有赤爛及頭風病者方是風邪之故久而不治恐為牽吊敗壞之病治法宜服當歸活血飲子審系風邪則服驅風散熱飲子因病下方甚勿拘滯貽誤也證治歌睥翻黏瞼證堪形轉貼無殊由氣滯兼血湧皮急牽吊外證成或病壅翻因致轉翻睥看病風熱侵患者每多風濕滯倘非風者病常輕開導外宜劆剔法內服排風散最工赤爛成瘡何藥妙好投龍膽丸奏功更有睥輪振跳證睥常跳動不由人病生氣分宜詳辨患發原由肝膽經此蓋血虛氣不順莫將淺見誤為風倘是真風必赤爛兼有頭風證可徵久病恐成牽吊患當歸活血飲子堪陳審系真風當別治驅風散熱飲子能平方排風湯桔梗天麻防風各五錢五味焙乾蠍去勾焙乾烏風蛇焙乾細辛赤芍各一兩上為細末每服錢五分食遠米飲調下當歸活血飲蒼朮制當歸身川芎薄荷黃耆熟地防風羌活甘草減半白芍各等分上水煎食後服驅風散熱飲子連翹牛子炒研羌活薄荷大黃酒浸赤芍防風歸尾甘草少許山梔炒川芎各等分上水煎食遠熱服於少陽經加柴胡少陰經加黃連龍膽丸見癢如蟲行睥虛如球論睥虛如球者謂目睥浮腫虛起如球狀也目上無別病久則始有赤絲虯脈之患火甚重皮或紅目不痛濕痰與火夾搏者則有淚有眥爛之候此乃火在氣分之虛證不可認如杯覆血分之實病以兩手掌擦熱拭之少平頃復如故可見其血不足而虛火壅於氣也治宜先服調脾清毒飲繼進廣大重明湯則外邪散而虛者補庶無誤治之誚焉證治歌睥虛浮腫竟如球火盛血虧顯病由目上初時無別病久之始有赤絲憂或見紅兮目不痛痰與火搏淚交流更或眥爛俱為害火在氣分證宜求試將兩掌憑相驗擦熱拭之可稍休先服調脾清毒飲繼將廣大重明湯投方調脾清毒飲見正漏廣大重明湯見癢如蟲行睥肉黏輪論附胞肉膠黏睥肉黏輪者謂目內睥之肉與氣輪相黏不開故曰黏輪也其候有熱燥血湧者目必赤痛有熱退血滯失於治療者其狀雖黏必白珠赤痛止須用劆割之治若赤痛生黏者必有瘀滯宜漸導漸劆仍防熱血復黏治法雖有取於割究難離於藥治熱燥血湧者用酒調洗肝散若便赤澀癃閉用加減八正散或宣明丸熱已退而血滯者用分珠散或墜血明目飲赤痛生黏者同治然此言治乎內之黏輪未言乎外之胞肉膠黏也胞肉膠黏夫胞肉膠黏者兩睥膩沫黏合難開夜臥尤甚輕則如膠黏重則結硬必得潤而後可開其病由於脾肺濕熱之故當以清涼滋潤為主雖有障在珠亦是水不清而內滯之故治法宜用抱膽丸瀉肺湯兼進清脾飲使內外之黏滯平而目自無他患矣證治歌睥肉何為黏氣輪熱燥血湧目赤疼或為熱退血猶滯白珠赤痛用鉤針赤痛生黏必多滯漸導漸防免相循總之劆割雖能效用藥尤當仔細尋熱燥血湧宜何藥酒調洗肝散最神若便赤澀兼癃閉治宜加減八正散為工或用宣明丸最善熱退血滯分珠散靈墜血明目飲堪期效赤痛生黏治亦同胞肉膠黏當辨別兩睥膩沫並黏凝寢時尤甚分輕重輕則膠黏重結成病由濕熱留脾肺清涼滋潤是章程治宜瀉肺湯清脾飲抱膽丸投目自明方抱膽丸治眼兩胞黏睛赤爛成瘡苦參膽草牛子各五錢上為細末蜜丸如梧子大每服二十丸食後米泔下墜血明目飲細辛人參各一錢芍藥五味草粒川芎酒洗炒生地牛膝酒洗炒石決明醋炒山藥知母鹽水炒白蒺藜研去刺歸尾防風各八分上水煎溫服酒調洗肝散見赤痛如邪加減八正散見痛如針刺宣明丸見瘀血灌睛分珠丸見遊風清脾飲見土疳瀉肺湯見白澀血瘀睥泛論附氣壅如痰血瘀睥泛謂睥內之肉紫瘀浮泛如臭血壞泛之狀其色紫暈泛起甚則細細如泡無數相連此蓋睥絡血滯又不忌火毒燥熱致積而不散此血也治當以活血為上甚者方以劫治輕者只用殺伐之治治法宜服當歸活血飲或加減四物湯甚則進以分珠散或墜血明目飲此言血瘀泛於睥氣壅如痰不更有痰壅於脾氣壅如痰之一證乎其候睥內如痰白沫穢膩甚多拭之即有者是此證乃痰火上壅脾肺濕熱所致故好酒嗜燥停郁者每每患此治法宜服清胃湯加枳桔香附如是而治無不瘳矣證治歌血瘀睥泛證何如紫暈縱橫亦可虞無數相連如泡小血凝睥絡病雖除火毒所傷兼燥膩治惟活血其庶乎輕宜殺伐重宜劫治法當歸活血飲符四物湯宜加減進倘逢病甚用分珠散或投墜血明目飲氣壅如痰又回殊睥內如痰生白沫拭之穢膩即沾濡病由脾肺多痰火濕熱皆因失起居清胃湯投加枳桔並加香附病旋驅方當歸活血飲見睥翻黏臉加減四物湯見實熱生瘡分珠散見遊風墜血明目飲見睥肉黏輪清胃湯見睥生痰核驚搐子和曰諸風掉眩皆屬肝木掉搖眩運目喎筋急手搐瘛瘲皆厥陰肝木之用也經曰風淫所勝平以辛涼世何以熱藥治風邪乎轆轤轉關論目病六氣不和或有風邪所繫腦筋如拽神珠不待人轉而自驀然察上驀然察下上之不能下下之不能上或左或右倏易無時蓋氣轉動撥激不定筋脈振惕緩急無常被其牽拽而為害輕則氣定脈偏而珠歪如珠將反之狀甚則翻轉而為瞳神反背矣治法通宜鉤藤飲子薜氏云凡卒然驚悸轆轤轉關之證人皆指為風而不知實由蘊熱內蓄混濁肝道專以治風之藥恐無效也豫謂宜瀉熱清肝縱為風證風亦因熱鬱而生熱瀉肝清風自息矣治宜天門冬飲子繼進元參瀉肝湯麥門冬湯乃為得路愚按治風者治其標瀉熱者清其本經云急則治標緩則清本標本之治兩不可遺是則薜氏治本之論固為得法而原論治風亦所必用也但在醫者審而用之耳證治歌轆轤轉關證何如六氣不和病厥軀風邪所繫腦如拽神珠自轉無定拘輕則偏歪惟氣定重則翻轉甚堪虞治法通用鉤藤飲子昔人明論有成書蘊熱內蓄成混濁若將風治已拘虛瀉熱清肝為上策天門冬飲子正相符繼進麥門冬湯最好元參瀉肝湯與俱治風為標熱為本緩急攸分其慎諸方鉤藤飲子治卒然驚悸眼目翻騰鉤藤炙五分麻黃去節炙草各三分天麻川芎防風人參各七分全蠍炒一錢殭蠶炒一錢二分上每生薑三片水煎不拘時服天門冬飲子天冬茺蔚子知母各二兩五味防風各一兩人參茯苓羌活各一兩半上每服五錢水煎食遠溫服元參瀉肝湯麥冬二兩大黃黃芩細辛芒硝各一兩桔梗元參各一兩半上水煎食後服麥門冬湯治肝實熱毒氣上熏於目赤腫痛癢麥冬去心秦皮去粗皮赤茯苓去皮葳蕤各一兩大黃生用升麻各一兩上每服五錢入竹葉十片煎好去滓入芒硝一錢再煎沸空心溫服雙目睛通論人有自幼時目珠偏斜而視亦不正至長未能愈者患非一端有因脆嫩之時目疾風熱攻損腦筋急縮者有因驚風天吊帶轉經絡失於散治遂至風熱凝滯經絡而定者有因小兒眠於窗下亮處側視久之遂致經脈滯定而偏者凡有此病宜乘病嫩血氣未定治之至長已定不復愈矣治宜服牛黃膏當歸補血湯總之小兒之有病無病全視父母之支持勤否勤於保護終身無災失於調養懷中生疾豈特目之為患哉人之為父母者尚其慎之毋貽以疾可也證治歌雙目睛通起幼時偏斜及長尚如斯所因不一須詳審總宜早治莫徘徊妊娠按胎前産後多因氣血失和以致燥火上攻陰陽澀滯或風邪乘虛邪火侵淫七情抑鬱六氣引邪不必拘泥其翳膜紅痛胎前惟用安胎清火産後惟用養榮散郁二證須分有餘不足在氣分者宜調之散之在血分者宜補之行之審定虛實以修方自無變證之患矣妊娠目病論孕娠目病者其病多有餘但要分在血分氣分氣分則有如旋螺泛起瞳神散大等證血分則有如瘀血凝脂等病蓋其否隔陰陽澀滯與常人目病不同為病亦危急人不知慮屢見臨重而措手不及者內伐則恐傷胎泄氣不伐則源不清而病不去惟能知其胎系固否善施內服外卻之治則百發百中矣治法不厭疏利但避硝黃墜損破血峻藥及泄小腸之劑勿用經云有故無殞故無殞也或以白朮黃芩固胎之藥監製之藥佐之則無礙矣通法宜以保胎清火湯心脾壅熱目赤咽膈渴苦煩悶多驚者則以簡易知母飲若蘊熱忽然兩目失明則以天門冬飲子若因外感風寒渾身壯熱眼花頭昏如旋者則以芎蘇散若因胎氣有傷熱毒上攻頭旋目昏視物不見腮頂腫核太陽沉痛背項拘急更加痰壅危急者則以消風散若或孕將分娩忽而目不明頭昏腮腫者此蓋因多居暖閣烘火過熱衣被過厚鬱熱存內或服補藥及熱物過多肝臟壅極致令胎熱而成此病治宜天冬飲子總之治胎目病保胎固為上著而尋源察故尤所甚重醫者甚毋草草也證治歌妊娠目病多有餘須從氣分血分區氣分旋螺瞳散大瘀血凝脂血分如陰陽滯澀非常病庸醫臨證多疏虞內伐惟恐傷胎氣不伐又恐病難除須知內護而外卻藥有宜忌莫朦糊疏利不嫌尋古法保胎清火湯不迂心脾壅熱成目赤多驚煩悶氣不舒咽膈渴苦須求治易簡知母飲一盂蘊熱忽然目無見天門冬飲子熱自驅渾身壯熱因外感眼花頭昏用芎蘇散胎氣有傷熱攻上頭昏視暗病厥軀腮頂腫核太陽痛背項強急勢如拘更加痰壅勢危急消風散進自愈愈孕將分娩目忽暗頭昏腮腫勢危乎此因胎熱服藥誤或因不慎在起居天冬飲子能奏效醫師臨證其慎諸方保胎清火湯黃芩一錢二分砂仁荊芥穗當歸白芍連翹生地陳皮各一錢川芎八分甘草三分上水煎食後溫服簡易知母飲赤茯苓黃芩麥冬肉知母桑白皮黃耆細甘草上水煎入竹瀝一小盅沖服芎蘇散紫蘇川芎麥冬去心白朮陳皮乾薑炒黑白芍各一兩甘草五錢上每服五錢加姜三片蔥頭三段水煎溫服消風散石膏防風甘菊花羌活川芎荊芥羚羊角當歸白芷甘草大豆黃卷炒上研細末每服三錢食後茶清調下天冬飲子天冬知母茺蔚子防風五味茯苓熟地羌活荊芥穗川芎白芍當歸上㕮咀入生薑三片水煎食後服天門冬飲子見轆轤轉關産後目病論産後而有病目者何也蓋産則百脈皆動氣血俱傷大虛而不足故邪得易乘人肝部發生之氣甚弱血少而膽失滋養精汁不盛則目中精膏氣液皆失化源所以目病者多然輕重內外不同有勞瞻竭視悲傷哭泣而為無時冷熱淚流內障昏渺等證有竅不密引入風邪為濕爛頭風者有因虛沐發濕氣歸腦而為內障諸病者有因虛勞役恣辛嗜熱及患熱病傷目血而為外障者皆因內之不足所致若知愛護者疾微而不變不知保養反縱斷喪則變證不一大抵産後病宜早治久則氣血定而病深人難治其外證之易知者人能知害而早治其內證之害隱緩而人不知慮遭其害而悔亦遲矣總之産後無有餘之血治須穩護肝氣不可輕用薄肝之劑為主藥也而要不離乎對證下方者近是治法産後眼昏頭暈咽渴口乾氣少腳軟者以熟地黃湯主之有午後至夜眼昏花不明者則以四物補肝散主之若崩漏亡血過度致睛珠疼痛及經不調者則以四制香附丸主之甚有虛寒之候怯冷畏寒或肌熱夜熱眼目昏花者此更為氣血大虛之證則宜以千金大補湯八珍湯桂附八味丸之屬主之要之治病如治兵只可因陳破陳不可以我架他武穆云運用之妙存乎一心其斯之謂歟證治歌産後氣血已多虧那堪目病更難支蓋以體虛邪易入氣弱血虧膽失滋精汁不盛目病作輕重內外各分岐內障昏渺冷熱淚病因竭視與傷悲濕爛頭風原有故竅不密兮風邪隨因虛沐發濕歸腦內障諸病起於斯或因勞役食不節患熱傷目外證垂諸證總由內不足罔知護惜必多危外證稍輕內更重總宜早治勿遲遲眼昏頭暈干而渴氣少腳軟熟地黃湯宜昏花不明午至夜四物補肝散可醫崩漏亡血致睛痛四制香附丸主之畏寒或在虛寒後肌熱夜熱眼昏迷此為氣血大虛候十全大補服奚疑附桂八味丸八珍湯進運用之妙在心思方熟地黃湯熟地酒洗曬乾八分人參一錢麥冬去心一錢五分炙草五分花粉三錢上加生薑一片棗二枚糯米一撮水煎溫服四制香附丸香附杵去皮毛淨子八兩分作四分酒醋童便鹽水曬炒黃柏酒炒熟地另搗各一兩澤蘭淨葉川芎酒洗炒白芍酒洗炒當歸炒各兩半益母草四兩忌鐵器上為細末蜜丸每服二三錢空心白湯送下八珍湯人參白朮茯苓川芎當歸白芍熟地炙草上加薑棗水煎服附桂八味丸即六味地黃湯加附子肉桂見睥生痰核四物補肝散見凝脂翳十全大補湯滋陰地黃湯均見總論當歸補血湯見雙目睛通當歸養榮湯見七情五賊除風益損湯見為物所傷痘疹痘疹害眼多因胎毒或前或後積熱蘊深或餘毒攻侵自臟達外致成星翳膜朦宜分虛實但以活血解毒而已活血不致於熱解毒不致於涼俟後治之雖有目翳切不可用點藥只宜活血解毒俟五臟平和翳當自去若誤點藥則非徒無益而反害之即用丸散須小劑調服如眼無光過百日後血氣完復則目自明矣海藏云東垣先生治癍後風熱毒翳膜氣障遮睛以瀉青丸治之大效初覺易治保命集云非癍後翳膜亦能治之瀉青丸減大黃一半用之濁害清和論痘瘡為毒最重古稱百歲瘡謂人生百歲之中不能免其一發夫痘疹發則諸經百脈清純之氣皆為所擾亂正氣大虛則邪得以乘之各因所犯而為疾況目又屬清純之最者通於肝膽肝膽為清淨之府邪正理不並立今受濁邪熏灼則目有失發生長養之源而病亦易侵皆由乎人不能保而且害之之故也究其源或於病中食物發之太過懷藏太暖誤投熱藥多食甘酸而致病者或病後之虛弱未復恣食辛辣燥膩竭視勞瞻炙衣烘火沖冒風沙煙障而致病者其候有為昏蒙流淚成內障者有為赤爛星障成外證者有餘邪蘊積蒸燥肝膽熱鬱之極清氣受傷延及瞳神而成凝脂黃膜花翳蟹睛等證之重而目米厭凸者有餘邪流為赤絲羞明微星薄翳等症之輕而病自消者輕重淺深各隨人之所受所患不一業斯道者宜致思明辨以免不用刃而殺人取罪冥冥禍延孫子之根當細驗其證審其經而投治甚不可一概論治恐有激變之禍蓋痘疹之後正氣虛而血脈傷邪得易乘非常人可比大凡痘疹目病最畏損破瞳神未損者不妨但宜早治則易退而無變亂之患遲則氣凝血定雖無變亂其退亦遲治法入手宜穀精草湯若成翳者以退翳散痘入眼數生翳膜者用望月丸痘後患目珠不紅眼皮弦生一小顆數日有膿者則用疏風湯有生星翳者則以通竅散若黑珠凸出膜翳滿睛紅赤腫痛眵淚交作者則用胎兔丸早服清解散晚服補元散腎虛水虧而成內證者則服加味地黃丸外翳不退須點退雲散如此而治其無害矣然倪仲賢則又有論云癍證餘毒所害者與風熱不制之病相同而異總以羚羊角散主之便不硬者減硝黃未滿二十一日而病作者消毒化癍湯主之東垣治癍後風熱毒翳膜氣暈遮睛以瀉青丸子瀉之大效初覺易治此亦治痘目之一法茲並録之以備覽證治歌濁害清和目病生痘瘡餘毒害相侵目通肝腎屬清淨衛氣偏虛邪氣熏或以過發兼過暖熱藥慎投食不精或以病中元氣損起居飲食失調停赤爛星障外證現流淚昏蒙內障成重則瞳神俱受害輕則薄翳或羞明此蓋元虧血氣弱須防毒害破瞳神未損瞳神宜早治久而凝定變多凶初治湯用穀精草散成翳散投退翳工痘如入眼生翳膜望月丸投目自清病生痘後珠不赤小顆膿生用疏風湯倘生星翳宜通竅散翳膜凸出更須詢滿睛紅腫淚交作胎兔丸兮可奏功晨投清解散為妙晚服補元散亦靈腎弱水虧成內證加味地黃丸可陳外翳不退退雲散古人明論可重申癍疹餘毒釀成害羚羊角散治可通便不硬者硝黃減未滿三七消毒化癍湯攻癍後風熱生翳膜氣暈遮睛宜瀉青丸子治法周詳宜審慎修方好向古篇訪方穀精草湯穀精草六分白芍荊芥穗元參牛子連翹草決明菊花膽草各五分桔梗三分上入燈心十莖煎不拘時服退翳散真蛤粉另研穀精草生研為末各一兩上研勻每服二錢用豬肝三指大一片批開摻藥在上捲定再用麻線扎之濃米泔水一碗煮肝熟為度取出放冷臨臥細嚼用原汁送下忌一切毒物如齊素用白柿同煎令乾去藥食柿望月丸望月砂焙乾四兩石決明醋煅防風白芍穀精草草決明木賊各一兩當歸五錢上為末蜜丸量兒大小或一錢或五分一丸荊芥湯下疏風湯荊芥穗蟬蛻桔梗歸尾甘草梢各五分防風白芷各四分石膏煅一錢二分白芍七分連翹蒼朮米泔水制茯苓各六分上入蔥白一段大米一撮水煎食後熱服通竅散辰砂一錢珍珠琥珀各二錢麝香一錢瑪瑙一錢半冰片五分上研細粉若翳在左目吹左耳右吹右耳兩目有翳吹兩耳胎兔丸胎兔去毛洗淨用陰陽瓦焙乾為末每用一兩二錢蔓荊子去膜曬乾為末一兩菊花曬乾為末一兩上和勻煉蜜為丸量兒大小不拘錢分白滾湯下清解散穀精草一兩石決明煅八錢白菊花去蒂酒洗七錢緑豆殼六錢上為細末每服二錢用大陳柿餅一個去蒂核米泔水煎空心食柿餅原汁並服補元散夜明砂淘淨真蛤粉五錢上為末每服二錢用公豬肝一大片將肝披開搽藥在內米泔水煮熱任意食之以原汁嚼下每日早晚服過七日再服加味地黃丸生地酒洗焙乾四兩山萸肉酒洗焙山藥白茯苓各二兩澤瀉丹皮各兩半菊花去根葉麥冬肉焙乾當歸焙各一兩五味五錢上為細末蜜丸空心淡鹽湯下量兒大小為丸如少年火旺加黃柏知母各五錢俱用鹽水制退雲散紅珊瑚珍珠辰砂硼砂各等分上俱生用共研極細無聲每日點二次羚羊角散羚羊角黃芩黃耆草決明車前升麻防風大黃芒硝上水煎稍熱服消毒化癍湯羌活升麻防風麻黃各五分黃連當歸黃柏酒炒連翹各三分藁本黃芩酒炒生地蒼朮米泔浸川芎柴胡各二分細辛白朮生芩陳皮生甘草蘇木葛根各一分吳茱萸紅花各半分上水煎稍熱服密蒙散治小兒痘疹並諸毒入眼密蒙花二錢半青葙子車前子各五分上為細末用羊肝一片切作兩三片摻藥合作一片濕紙裹於火中煨熟空心食蛇皮散治小兒痘疹入眼成翳蛇皮炙黃天花粉各等分上為細末小兒三歲摻一錢於羊肝內米泔水煮食之一方用蟬蛻為末米泔湯調下瀉青丸見暴風客熱小兒目病諸證之治一也小兒豈有獨異哉蓋目之為病幼時恆少冠壯恆多即有發於幼者其候多與壯冠之證不同證既異治則不可概論矣故另列小兒目病證治疳傷論疳證皆因飲食失節飢飽失調以致腹大而黃重則傷命輕則害目患此者須勿治其目竟治其疳目病自愈一切油麵炙煿之物最忌與食按小兒疳眼無論肥瘦但見白珠光帶黃兼白色皺起後微紅生眵怕亮不睜上下眼睥頻頻劄動不定黑珠上有白膜黑圈堆起白暈暈內一黑一白雖有肥瘦不同疳眼無疑也但肥疳大便如豆腐渣糟粕相似瘦疳大便小如粟硬結燥乃疳積入眼攻致肝經亦難治矣治法通宜消疳退雲散若生白膜白翳則用雞肺散若系齦毒成疳肝經積熱眼目生翳齒蝕爛齦或透頰腮則用九味蘆薈丸肝脾疳熱核結耳內生瘡出水或小便出津胸中結核大便不調肢體消瘦等證並以此方主之若眼生白膜遮睛目緊閉不開羞明怕日合面而臥肉色青黃發豎筋青壯熱羸瘦此係肝疳宜生熟地黃丸或天麻丸而風肝亦同此治抑或不赤不腫不痛但開畏明此係脾疳治宜雞肝散又或三焦及肝膽二經風熱積染以致目生雲翳者宜服龍膽蘆苓丸若疳積攻目眼生翳膜遮睛則用消疳散更有小兒暴發兩目紅腫疼痛寒熱相爭者治宜升麻乾葛湯又有肝經積熱上攻眼中形為逆順生翳血灌瞳神羞明多眵者治宜車前子散抑有肝血不足形為眼目昏花或生眵淚久視無力者治宜養肝丸若或小兒腦熱枕骨疼痛閉目不開或頭風痛攢眉啼哭目赤者則以通頂散吹之即愈此上專言小兒疳積攻目之治也而連及他證者則亦撮其要云證治歌小兒疳疾實為殃輕則損目重則傷所貴治疳毋治目油丐炙煿最宜防白珠帶黃兼白色微紅生眵怕亮光白珠生暈黑復白疳分肥瘦治同行通用消肝退雲散膜翳半白雞肺散良齒毒成疳肝積熱眼目翳生因受戕齒蝕爛齦頰腮透九味蘆薈丸可嘗肝脾疳熱瘡生耳發為諸證並同方眼生白膜睛遮閉發豎筋青肉色青黃怕日羞明合面臥壯熱羸瘦是肝疳生熟地黃湯天麻丸進風肝同治有成章若但畏明無赤痛脾疳證合用雞肝散肝膽三焦風熱積目因生翳龍膽蘆薈丸將疳積攻目眼生翳消疳散進效非常暴發紅腫兼疼痛升麻乾葛湯莫忘肝熱上攻諸證備車前子散勝瓊漿肝虛眼眥或多淚丸進養肝罔不臧枕骨疼痛因腦熱更多頭風痛不堪目閉或赤兼啼哭通頂散吹獨擅長方消疳退雲散陳皮厚朴薑汁炒蒼朮米泔制萊蔔子炒研碎少許柴胡甘草炙少許枳殼酒炒草決明炒研碎桔梗青皮黃連酒炒密蒙花梔子炒黑黃芩酒炒神麯炒家菊花各等分上加姜皮燈心水煎服雞肺散雄雞一隻一斤三四兩者取挨脊血一塊即名雞肺將肺同後藥共研爛辰砂三分研細冰片二釐研細上共研如膏用無灰酒燉滾攪勻服九味蘆薈丸蘆薈木香胡黃連宣黃連炒青皮鶴蝨白雷丸白蕪荑炒各一兩麝香三錢另研末上為細末並麝末神麯糊丸麻子大每服五分空心米湯送下生熟地黃丸生地熟地各五錢川芎杏仁泡去皮尖赤茯苓胡黃連微炒半夏炮製天麻地骨皮當歸枳殼酒炒甘草各一錢五分大黑豆四十五粒煮熟去皮再煮爛同汁搗膏上為細末蜜丸如龍眼大空心滾湯化下天麻丸青黛天麻夜明砂微炒五靈脂川芎蘆薈黃連炒各三錢膽草蟬蛻去頭足防風各一錢半乾蟾頭炙焦三錢全蠍二枚焙麝香少許上為細末豬膽汁浸膏成丸麻子大每服十丸薄荷湯送下或化下雞肝散大川烏一枚去皮生用好坯子二分半上為細末小兒五歲用一錢將雄雞肝一具洗淨去筋膜竹刀薄切片莫切斷摻藥片內箬葉包裹用麻扎定入磁器中米泔水煮熟空心臨臥冷食之原汁送下龍膽蘆薈丸蘆薈胡黃連炒膽草各一兩川芎蕪荑六錢當歸白芍各一兩木香八錢甘草炙五錢上為細末蜜丸每兩分作十丸量兒大小服白滾湯下消疳散使君子用白者去油雷丸去皮用白者紅者殺人以米泔水浸蒼朮少許合雷丸煮之取出去蒼朮用雷丸焙上各等分研細每一歲用一分男用雌女雄雞肝淨洗去筋膜煮汁調末食煮忌鐵器重者不過三四服自效若翳厚加木賊燒灰雄黃珍珠各一錢另研極細入前末服升麻乾葛湯升麻桔梗各五分羌活川芎防風各一錢乾葛一錢五分麻黃白芷各三分蟬蛻七個陳皮甘草各四分上入生薑一片蔥白一段水煎食後熱服取汗為度車前子散密蒙花羌活車前子炒粉草炒白蒺藜黃芩炒草決明菊花膽草洗淨炒上為末每服二錢食後飯湯調下通頂散川芎薄荷各五錢茵陳甘草各四錢朴硝三錢上為細末用少許吹鼻即效如要嚏噴加躑躅花一錢只用朴硝吹鼻亦可養肝丸見凝脂翳目閉不開論足太陽經為目上綱足陽明經為目下綱二經熱則筋縱而為目閉不開治宜助陽活血湯而有小兒初生眼閉不開此由産母過食辛辣熱物而成治宜以熊膽少許蒸水洗眼一日七次如三日不開則服生地黃散抑有小兒氣血不足為頭暈目眩自覺地屋俱轉目不敢開者治宜人參湯尋源審證分虛辨實而後下方病豈有不治者哉證治歌兩目胡為閉不開自有二綱可細猜下綱自足陽明出上綱從足太陽來熱則筋縱目斯閉助陽活血湯是良材小兒初生目即閉母貪口腹是禍胎熊膽水洗日七次不效地黃散可培氣血不足成暈眩湯用人參可挽回方生地黃散乾地黃赤芍川芎甘草當歸天花粉上等分共為細末量兒大小燈心湯調搽入口人參湯人參麥冬去心當歸酒製白朮防風各八分白芍獨活黃耆各一錢二分官桂去皮七分上水煎食遠服助陽活血湯見總論睊目直視論附仰視集成謂直視者視物而目睛不轉動者是也若目睛動者非直視也傷寒直視者邪氣壅盛冒其正氣使神氣不慧臟腑之氣不榮於目則目為之直視傷寒至於直視則邪已極證候已逆多難治經曰衄家不可發汗汗則額上陷脈緊急直視不能眗不能眠蓋肝受血而能視亡血肝氣已虛目氣已弱又發汗亡陽則陰陽俱虛所致此雖錯逆猶未甚也逮狂言而反目直視又為腎絶直視搖頭則又為心絶皆臟腑氣脫絶也直視譫語喘滿視下逆者皆死又劇若發狂而不識人循衣摸床惕而不安微喘直視脈弦澀者亦死皆邪氣盛而正氣脫也素問曰少陽經者其百節縱目睘絶系王注云睘謂直視如驚貌目系絶故目不動而直視經曰瞳子高者太陽不足戴眼者太陽已絶蓋太陽之脈其終也戴眼反折瘛瘲總之直視一證十九難治惟因肝臟之熱形為手循頷亂捻物目直視不搐身反折強直目內青者以瀉青丸治之可以獲效外此而為虛絶之候此方斷不可用用之反以促死斯時也只宜急從標治陽絶者用六味回陽飲附子助陽湯右歸飲之類陰絶者用八珍湯右歸丸益陰煎之屬陰陽俱絶者用十全大補湯合六味回陽飲如此而治庶幾救人於萬一焉若和大師之牛黃丸則又卒暴中風暈眩倒僕精神昏塞不省人事牙關緊急目睛直視胸膈喉中痰涎壅塞及諸發手足瘛瘲口眼相引項皆強直之證者也不在此例而究必體素強壯者乃可用之若虛者用之則又促死之方也可不慎哉仰視有目仰視者何小兒瘛瘲不定翻眼抬睛狀若神崇頭目仰視名為天鉤亦驚風之候治宜服九龍控涎散或碧霞丹然此均在體素肥強者可用若虛弱者斷不可用須辨明寒熱寒用麻黃附子細辛湯虛用姜附六君湯加桂熱用人參白虎湯虛用生熟地黃湯甚不可執一而概治以收殺人之罪也證治歌睊目直視證宜思傷寒至此已垂危臟腑之氣難榮目邪氣盛兮正氣虧成書備晰宜參考總之此證實難醫倘因肝熱成直視致生諸證瀉青丸宜外此則為虛絶候此方禁用最宜知急從標治陰陽別陽絶附子助陽湯持六味回陽飲俱妙藥右歸飲進莫遲遲陰絶八珍湯右歸丸妙益陰煎進庶能追陰陽俱絶十全大補湯六味回陽飲可並施亦有仰視若神崇此候驚風可類推治用九龍控涎散碧霞丹進古方垂體素肥強方可用若拘古法咎難辭宜從寒熱分虛實寒用麻附細辛湯治虛則姜附六君子湯加桂熱證人參白虎湯期虛實生熟地黃湯進辨證切勿爽毫釐方六味回陽飲人參二錢半製附子二三錢炮乾薑二三錢甘草炙一錢熟地五錢或一兩當歸三錢上水煎溫服附子助陽湯製附子升麻白朮桔梗柴胡甘草上加薑棗水煎服右歸飲熟地二三錢或一兩山藥炒二錢山茱萸一錢枸杞二錢甘草炙一二錢杜仲薑製二錢肉桂一二錢製附子二三錢上水煎食遠溫服右歸丸熟地八兩山藥炒四兩棗皮枸杞各微炒各四兩鹿膠炒珠菟絲子制杜仲薑汁炒各四兩當歸三兩便溏者勿用肉桂二兩或至四兩製附子二兩可加至五六兩上為細末先將熟地搗膏煉蜜和末為丸如彈子大每嚼服二三丸白滾湯下益陰煎生地二錢熟地三五錢芍藥二錢麥冬二錢甘草一錢牛膝錢半丹參二錢上水煎食遠溫服和大師牛黃丸石燕蛇黃均火煅醋淬九次飛過研石緑研飛各一兩輕粉牛黃粉霜均細研麝香研各五錢金銀箔各一面為衣上末酒煮麵糊丸雞頭大每服一丸或薄荷湯或酒磨下老可服半丸小兒十歲以下分為四服蜜水磨下未滿一歲可分為七服如牙關緊急以物乾開灌之九龍控涎散赤腳蜈蚣一錢去頭足尾酒塗炙荊芥穗炒白礬煅一錢滴乳香另研天竺黃另研各一錢甘草炙錢半肥緑豆百粒半生半炒臘茶二錢半雄黃另研二錢上共為細末每服五分量兒大小人參薄荷湯調下碧雲丹石緑火煅醋淬九次研飛十兩附子尖烏頭均去皮蠍梢各七十個上將三味為末入石緑令勻丐糊丸如雞頭大每服一丸薄荷湯化下再入酒少許溫服須臾吐出涎痰然後隨證治之姜附六君湯人參白朮茯苓甘草炙陳皮法夏炮姜附子制上加薑棗煎服人參白虎湯人參石膏知母甘草上入糯米一撮水煎溫服麻黃附子細辛湯即此三味作湯生地黃湯見陰邪風八珍湯見産後目病十全大補湯見總論瀉青丸見暴風客熱目睛瞤動論附目劄目者肝膽之竅屬風木二經兼為相火所統夫肝藏血血不足則風火內生故目睛為之潤動經曰曲直動搖風之象也遇此證者宜用四物湯以益其血加柴胡山梔以清其肝陰血內榮則虛風自消矣目劄有所謂目劄者何按目劄者因有風也風入於目上下左右如風吹不輕不重而不能任故目連劄也此恙有四兩目連劄或色赤或時拭眉此膽經風熱欲作肝疳也治宜四味肥兒丸加龍膽草有雀目眼劄者治宜煮肝飲兼四味肥兒丸有發搐目劄者此屬肝膽經風熱治宜先用柴胡清肝散兼進六味地黃丸以補其腎有因受驚眼劄而兼搐者治宜先用加味小柴胡湯加蕪荑黃連以清肝熱兼進六味地黃丸以滋腎而生肝如此而治所謂虛實兼治也醫者推類以求思過半矣證治歌目睛劄動豈無由風虛風火內生憂四物湯投能益血柴胡加與山梔侔更有因風成目劄病分四證可羅搜連劄色赤眉時拭風熱原自膽經流肝疳欲作四味肥兒丸好龍膽草加庶免愁劄如雀目煮肝飲四味肥兒丸可並投肝膽風熱兼發搐目劄並作古方修柴胡清肝散先進六味地黃湯奏猷受驚眼劄還兼搐清肝先向小柴胡湯求蕪荑加與黃連合繼進六味地黃丸休方四味肥兒丸黃連炒蕪荑神麯麥芽炒各等分上為末水糊丸如梧子大每服一二十丸空心白滾湯下柴胡清肝飲柴胡一錢半黃芩人參川芎各一錢梔仁炒一錢連翹甘草各五分桔梗八分上水煎熱服六味地黃丸即脾生痰核內六味地黃湯加分作丸煮肝飲即羊肝丸見浮翳四物湯小柴胡湯均見赤痛如邪卷四終
