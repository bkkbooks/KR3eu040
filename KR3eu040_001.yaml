body:
  text: 卷一目為至寶論大哉目之為體乃先天之空竅肇始之元明經絡之精華榮衛之膏液故有金珠玉液之稱幽戶神門之號究其源實陰陽蘊氣之始二五凝精之際神哉空竅列分左右妙合先天大玄既備神物漸凝精明共聚普照無窮稽諸古論則曰肺之精騰結而為氣輪肝之精騰結而為風輪心之精騰結而為血輪脾之精騰結而為肉輪腎之精騰結而為水輪氣輪者白睛是也內應乎肺肺為華蓋部位至高主氣之升降少有怫鬱諸病生焉血隨氣行氣若怫鬱則火盛而血燥火盛血燥則病變不測火剋金金在木外故氣輪先赤金又剋木是以其病漸及於風輪也金色宜白故白而光澤者順也風輪者白睛內之青睛是也內應乎肝肝在時為春春生萬卉而肝開竅於目肝木主風故曰風輪此輪清脆內包膏汁有涵養瞳神之功其色宜青故青瑩者順也世人黃濁者乃濕熱之害唯小兒之色最正及長食乎厚味則瀉其氣而色亦異矣血輪者兩目角大小紅眥是也內應乎心心主血故曰血輪夫火在目為神光火衰則有昏瞑之患火盛則有焚燥之殃雖有兩心而無正輪心君主也通於大眥故大眥赤者實火也命門為小心小心者相火也相火行君之令通於小眥小眥赤者虛火也若心君之主拱默則相火自然清寧矣火色宜赤惟紅活為順也肉輪者脾土是也脾主肉故曰肉輪夫土為五行之主故四輪皆脾之包含土性主靜其色宜黃得血為潤故黃澤為順也華他云目形類丸瞳神居中而獨前如日月之麗東南而晦西北也內有大絡者五乃心肝脾肺腎各主一絡中絡者六膀胱大小腸三焦膽包絡各主一絡外有旁枝細絡莫知其數皆懸貫於腦下達臟腑通乎血氣往來以滋於目故凡病發則目中有形色絲絡一一顯見而可驗方知何臟何腑之受病外有二竅以通其氣內包諸液液出則為淚中有神膏神水神光真血真氣真精皆滋目之液也神膏者目內包涵之膏液膏液如破則黑稠水出是也此膏由膽中滲潤精汁升發於上積而成者方能涵養瞳神此膏一衰則瞳神有損神水者由三焦而發源先天真一之氣所化在目之內雖不可見若被物觸損傷則見黑膏之外有似稠痰出者是也即目上潤澤之水水衰則有火盛躁暴之患水竭則有目輪大小之疾耗澀則有昏渺之危虧者多盈者少是以世無全精之目神光者謂目中自然能視之精華也夫神光原於命門通於膽發於心皆火之用事神之在人也大矣在足能行在手能握在舌能言在鼻能嗅在耳能聽在目能見有莫知其所以然而然者夫神源舍乎心故發於心焉神如遊龍變化不測人能靜之抱元守一豈獨目之無病哉真血者即肝中升運於目輕清之血乃滋目經絡之血也此血非比肌肉間混濁易行之血因其脈絡深高難得故謂之真也真氣者即目經絡往來生用之氣乃先天真一發生之元陽也大宜和暢少有鬱滯諸病生焉真精者乃先後二天元氣所化之精汁先起於腎次施於膽而後及乎瞳神也凡此數者一有所損目病生矣大概目圓而長外有堅殼數重中則清脆內包黑稠神膏一函膏外則有白稠神水水以滋膏水外則皆血血以滋水膏中一點黑瑩乃是腎膽所聚之精華惟此一點燭照鑑視空闊無窮者是曰瞳神此水輪也其妙有三膽汁腎氣心神也五輪之中四輪不能視物惟瞳神乃照物者風輪則有包衛含養之功故凡風輪有損瞳神不久留矣此即唇亡齒寒輔車相依之意也或曰瞳神水乎氣乎血乎膏乎曰非血非氣非水非膏乃先天之氣所生後天之氣所成陰陽之妙蘊水火之精華血養水水養膏膏護瞳神氣為運用神則維持喻以日月其理相同而午前則小午後則大亦隨天地陰陽之運用也大抵目竅於肝生於腎用於心潤於肺藏於脾有大有小有圓有長皆由人稟受之異也男子右目不如左目之精華女子左目不如右目之光彩此各得其陰陽之定理也然賢愚佞直剛柔壽夭皆驗目而知之物之絲髮差別可以辨物之毫忽輕重可以定遇物即知遠射無遺豈不為神哉之至寶乎故古人曰天無二曜一物無所生人無兩目一物無所見誠哉是言也思之甚可驚畏夫人之精血有限豈可妄自斫喪真元一旦疾成始悔究其因皆從耽酒戀色嗜欲無窮或痰火頭風哭泣太傷思慮過度風沙煙障不知避戒竭視勞瞻而不知養息或五味四氣六欲七情不節之所致也由微至著而人不知省及疾已成矣仍仗血氣之盛而不醫或泥巫禱靈而不治遂成痼疾悔悵無由雖有金谷之富臺鼎之榮即盧扁復生亦不能療吁嗟堂堂之軀同於木之偶耳經云欲無其患先制其微蓋言疾之初起即當療治也制之之法豈獨藥哉內則清心寡欲外則惜視緘光蓋心清則火息欲寡則水生惜視則目不勞緘光則膏常潤臟腑之疾不起眼目之患即不生何目疾之有哉孔子曰目不視邪色戒顏子曰非禮勿視皆以正其視養心神也而孟夫子亦曰胸中不正則眸子眊焉又曰物交物則引之而已矣豈非目由心之所使心為目之所誘乎故老子又曰含眼光緘真氣還真子曰目不著於物則心無所用心無所用則神不馳神不馳兮心自固豈非心不正由目之妄視乎故古之聖賢保之有方守之有道緘舌含光清心塞聽以養天真則存德養身不但目之無病而壽亦延紀矣太極陰陽動靜經云瞳子眼黑法於陰白眼赤脈法於陽故陰陽合轉而睛明此則眼具陰陽也又曰五臟六腑之精氣皆上注於目而為之睛睛之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨氣血之精而與脈併為系上屬於腦後屬於項中此則眼具五臟六腑也後世五輪八廓之説盡本諸此臟腑主目有二一曰肝經云東方青色入通於肝開竅於目藏精於肝又云人臥血歸於肝肝受血而能視又云肝氣通於目肝和則目能辨五色矣二曰心經云心合脈諸脈皆屬於目是也至東垣又推之而及於脾如下文所云東垣曰五臟生成篇云諸脈皆屬於目目得血而能視針經九卷大惑論云心事煩冗飲食失節勞役過度故脾胃虛弱心火太盛則百脈沸騰血脈逆行邪害空竅如天明則日月不明也夫五臟六腑之精氣皆稟受於脾土而上貫於目脾者諸陰之首也目者血氣之宗也故脾虛則五臟之精氣皆失所司不能歸明於目矣心者君火也主人之神宜靜而安相火代行其令相火者胞絡也主百脈皆榮於目既勞役運動勢乃妄行及陰邪氣並損其血脈諸病生焉凡醫者不理脾胃及養血安神治標不治本不明正理也張子和曰聖人雖言目得血而能視然血亦有太過不及也太過則目壅塞而發痛不及則目耗竭而失明故少年之人太過多老年之人不及多但年老之人其間獨有太過者不可不察也夫目之內眥太陽經之所起血多氣少目之鋭眥少陽經也血少氣多目之上綱太陽經也亦血多氣少目之下綱陽明經也血氣俱多然陽明經起於兩目交頞之中與太陽少陽俱會於目惟足厥陰經連於目系而已故血太過者太陽陽明之實也血不及者厥陰之虛也故出血者宜太陽陽明蓋此二經血多故也少陽一經不宜血少故也刺太陽陽明出血則目愈明刺少陽出血則目愈昏要知無使太過不及以養血脈而已凡血太多則溢太少則枯人熱則血行疾而多寒則血行遲而少此常理也目者肝之外候也肝藏血在五行屬木雖木之為物太茂則蔽密太衰則枯瘁矣夫目五輪乃五臟六腑之精華宗脈之所聚其白睛屬肺金肉輪屬脾土赤脈屬心火黑水神光屬腎水兼屬肝木此世俗皆知之矣及有目疾則不知病之理豈知目不因火則不病何以言之白輪變赤火乘肺也肉輪赤腫火乘脾也黑水神光被翳火乘肝與腎也赤脈貫目火益熾也能治火者一句可了故內經云熱勝則腫凡目暴赤腫痛羞明隱澀淚出不止暴寒目滿者皆太熱之所為也今列五輪所屬八廓主病以令施治者指南焉五臟所司兼五行所屬動功六字延壽訣春噓明目本持肝夏至呵心火自間秋呬定知金肺潤冬吹惟要坎中安三焦嘻卻除煩熱四季長呼脾化餐切忌出聲聞口耳其功尤甚保神丹心呵頂上連叉手舉手則呵反手則吸呵則通於心去心家一切熱氣或上攻眼目或面色紅舌上瘡或口瘡故心為一身五官之主發號施令能使五官故上古恬淡虛無真氣從之精神內守病安從來良以志間而少欲心安而不懼形勞而不倦也秋冬時當暖其湧泉不傷於心君素書云足寒傷心是也澄其心則神自清火自降是火降由於神之清也心通舌為舌之官舌乃心之苗為神之舍又為血之海故血少則心神恍惚夢寐不寧也冬面紅受克故鹽多傷心血冬七十二日省鹽增苦以養其心也肝若噓時目睜睛噓則通肝去肝家一切熱聚之氣故膽生於肝而膽氣不清因肝之積熱故上攻眼目大噓三十噓一補一瀉則眼增光不生眼眵故目通肝肝乃魂之宅夜睡眼閉則魂歸宅肝為目之官秋面青受克辛多傷肝秋七十二日省辛增酸以養肝氣腎吹抱取膝頭平吹則通腎去腎中一切虛熱之氣或目昏耳聾補瀉得宜則腎氣自調矣故腎通耳為耳之官耳聽走精不可聽於淫聲大吹三十吹熱擦腎堂四季十八日面黑受克甘多傷腎故季月各十八日省甘增鹽以養腎氣肺病呬氣手雙擎呬則通肺去肺家一切所積之氣或感風寒咳嗽或鼻流涕或鼻熱生瘡大呬幾呬一補一瀉則肺氣自然升降肺為心之華蓋最好清故肺清則不生疾也肺通鼻為鼻之官肺為魂之舍也夏面白則受克苦屬火夏七十二日省苦增辛以養肺氣脾病呼時須撮口呼則通脾去脾家一切濁氣故口臭四肢生瘡或面黃脾家有積或食冷物積聚不能化故脾為倉稟之官又為血之用故飲食不調則不生血四肢不動則脾困故夜則少食睡時脾不動以致宿食則病生矣脾四季之官為意之宅故意不可以妄動動則浩然之氣不能清也春面黃則受克春七十二日省酸增甘以養脾氣三焦客熱臥嘻嘻嘻則通膽去膽中一切客熱之氣故臥時常嘻能去一身之客熱補瀉得當膽氣自清目不生眵膽怕熱四時飲食熱者少食上膈無積使膽氣清爽也五輪定位之圖左南出順惟操造既右元其吞毋守二既目方入則一之次靜目陽色吐勞之五寧陽有無明惟則弗既陰之玄日毋如合既經物時靈中存離清精靈蒼月搖瓶一定蛇其變逆是舍明覆龜坎其納一乃防目象形化則為之視云象水性彼為可之何火虯莫炎之則可何水之和虛準長如不贊赤測赫則失必疾贊英平盈繩生城明五輪所屬論夫目有五輪屬乎五臟五輪者皆五臟之精華所發名之曰輪其像如車輪圓轉運動之意也上下眼胞屬乎脾土應中央戊己辰戌丑未也脾主肉故曰肉輪脾土主乎運動磨化水穀外應目之兩胞動靜相應開則萬用如陽動之發生閉則萬寂如陰靜之收斂象土能藏萬物而主靜故脾一合則萬有寂然而思睡藏納歸靜之應也目又有兩鋭角為目大小眥屬心火應南方丙丁己午也心主血故曰血輪人臟有大小二心故目眥亦有大小二輪之別其內白睛則屬肺金應西方庚辛申酉也金為五行中之最堅故白睛亦堅於四輪肺主氣故曰氣輪白睛內之青睛則屬肝木應東方甲乙寅卯也木在四時為春春生萬卉其色青瑩目能鑑視故目為肝木之竅肝木主風故曰風輪青睛之內一點黑瑩者則為瞳神屬乎腎水應北方壬癸亥子也腎主水故曰水輪五輪之中四輪不能視物惟水輪普照無遺神妙莫測乃先天之精液肇始之元靈人身之至實猶夫天之日月也是以人之瞳神損者不能治矣五輪歌括肝有風輪是木形肉輪屬土是脾經水輪腎水瞳神屬肺屬金方號氣輪兩眥血輪心屬火五輪原屬五行分能知生克分虛實燮理陰陽血氣平五臟主病勞神赤澀心家損恚怨多傷肝氣衰寒暑不調傷臟腑色欲無時致腎虛飢飽不勻傷脾胃風邪觸犯可推詳腸中熱結緣何故解熱須將虛實量盛時眼內熱火煎熱時白翳眼中連衰時眼淚頻頻下迎風淚下又頭旋五輪不可忽論夫目之有輪各應乎臟臟有所病必現於輪勢必然也肝有病則發於風輪肺有病則發於氣輪心有病則發於血輪腎有病則發於水輪脾有病則發於肉輪此五輪之易知者木青金白水黑火赤土黃此五色之易知者輪也色也已灼然而現證醫猶不知為目病之驗又況亢則乘勝則侮並病合病自病傳病生剋制化變通之妙豈能知之乎大約輪標也臟本也輪之有證由臟之不平所致未有標現證而本不病者今不知輪之證則不知乎臟矣夫輪臟相應既不知輪則是標本俱不明標本既不明何以知孰宜緩孰宜急而能治人之疾哉間有知輪臟標本而不知其中生此克此自病傳病或並或合之不同則乘侮制化變通之妙又不能知又有知標本緩急自傳併合等症而又不知人之強者弱者在血在氣所受所與當補當瀉之不同則順逆反正攻守之治必不能知如此之醫豈能治人之疾乎是患目者多而治目者少咎無良方而嗟華他之不再生陋矣他即再生而人不能精明他之道耳八廓定位之圖八廓所屬論夫八廓應乎八卦脈絡經緯於腦貫通臟腑以達血氣往來滋養於目廓者如城廓之謂各有門路往來即匡廓衛御之意也故乾居西北絡通大腸之腑臟屬於肺肺與大腸相為臟腑上連清純下輸糟粕為傳送之官故曰傳送廓坎正北方絡通膀胱之腑臟屬於腎腎與膀胱相為臟腑主水為化源以輸津液故曰津液廓艮位東北絡通三焦臟配命門命門與三焦相為臟腑會合諸陰分輸百脈故曰會陰廓震主東方絡通膽之腑臟屬於肝肝膽相為臟腑皆主清淨不受穢濁故曰清淨廓巽位東南絡通中焦之腑臟死肝絡肝與中焦相為臟腑肝絡通血以滋養中焦分氣以化生故曰養化廓離屬正南絡通小腸之腑臟屬於心心與小腸相為臟腑為諸陰受盛之胞故曰胞陽廓坤位西南絡通於胃之腑臟屬於脾脾胃相為臟腑土納水穀以養生故曰水穀廓兌正西方絡通下焦之腑臟配腎絡腎與下焦相為臟腑主陰精化生之源故曰關泉廓臟腑之相配古聖內經已有定法而三焦獨重肝腎二絡者此目之配法蓋目專竅於肝而主於腎故有二絡之專主也左目屬陽陽道順行故廓之經絡法象亦以順行右目屬陰陰道逆行故廓之經絡法象亦以逆行察乎二目兩眥之分則昭然可明陰陽順逆之道矣八廓歌括乾肺大腸傳送廓坎腎膀胱津液場命門上焦會陰艮膽肝清淨震之方肝絡中焦巽養化小腸離火心胞陽腎絡下焦泉關兌坤脾水穀胃為強合沖生克分虛實對症投醫病始康八廓主病傳送原因是本經肺家壅滯熱傷睛大腸若順應須治閉塞之時翳相侵視物如看雲霧多抬頭怕日病如何急宜補腎禁房室免得昏蒙不可過視物依稀似霧中時時手拭兩睛瞳要知冷淚頻頻出此是肝虛膽氣攻小腸腑屬關泉廓受病先從心裡傳兩角俱赤心癢痛但調經脈自然痊昏矇眼疾豈無由酒色過時更帶憂莫道睛昏無大故那堪障霧裹雙眸內抱真陽是命門眼前花發色難分不能補腎調虛氣睛瞳縱橫似有根飲食相傷在胃中更加積熱兩相攻瞼胞漸腫睛生赤不解中宮熱不通膀胱屬水腎為天冷淚相形本臟愆赤脈縱橫輪廓內不逢妙手豈能痊勿以八廓為無用論五輪為病間有知者至於八廓之病位且不知況欲求其知經絡之妙用乎故古人云經絡不明盲子夜行夫八廓之經絡乃驗病之要領業斯道者豈可忽哉蓋驗廓之病與輪不同輪以通部形色為證而廓惟以輪上血脈絲絡為憑或粗細連斷或亂直赤紫起於何位侵犯何部以辨何臟何腑之受病淺深輕重血氣虛實衰旺邪正之不同察其自病傳病經絡之生克逆順而調治之耳人有謂此八廓如三焦之有名無實以為無用者此謬之甚者也愚觀內經黃帝少俞論士勇怯言勇士剛急三焦肉橫怯士柔緩三焦肉縱夫肉則有狀此難經之頗誤也今八廓有位有形故如三焦之此八廓絲絡比之三焦更為有據三焦雖然有據三焦在內而不見尚有膈上膈下之分八廓則明見於外病發則有絲絡之可驗者安得謂為無用哉臟腑表裡三陰三陽輪廓貫通手少陰心經足少陰腎經手太陰肺經足太陰脾經手厥陰命門足厥陰肝經手少陽三焦足少陽膽經手太陽小腸足太陽膀胱手陽明大腸足陽明胃經三焦與心包絡為表裡按目附命門目者肝之官也脈色東方生風在竅為目其精陽氣上走於目而為睛藏象敷和之紀其主目運氣足太陽脈通項入腦者正屬目本名眼系陰蹻陽蹻陰陽相交陽出陰陰出陽交於目鋭眥陽氣盛則瞋目陰氣勝則瞑目俱針刺蹻脈屬目內眥氣不營則目不合任脈入目督脈與太陽起於目內眥其少腹直上者上系兩目之下足太陽入於目內眥足太陽之筋支者為目上綱足陽明之筋上合於太陽為目下綱足少陽之筋支者結於目眥為外維足陽明遠系目系足少陽起目鋭眥至鋭眥後手太陽至目鋭眥支者至目內眥手少陽至目鋭眥手少陰系目系足厥陰連目系手少陰合目內眥手少陽系目系合少陽於外眥平旦陰盡陽氣出於目目張則氣上行於頭夜則氣行於陰而復合於目俱經絡目者心之使也目者五臟六腑之精也營衛魂魄之所常營也神氣所生也五臟六腑之津液盡上升滲於目俱疾病命門太陽結於命門命門者目也亦經絡五運之圖甲己之年為土運土愛暖而不愛寒宜加溫劑以助之乙庚之年為金運金宜清而不宜燥宜加平劑以清之丙辛之年為水運水欲暖而寒則凝宜加熱劑以溫之丁壬之年為木運木惡寒而又怕燥宜加和劑以平之戊癸之年為火運火宜寒而不宜熱宜加涼劑以解之六氣之圖子午卯酉年少陰君火陽明燥金司天在泉宜清之辰戌丑未年太陰濕土太陽寒水司天在泉宜溫之寅申巳亥年少陽相火厥陰風木司天在泉宜涼劑以和之然又當察病以調治而不可執一也逐年六氣總論復慧子曰天有四時歲有六氣此即外因是也四時者春夏秋冬也六氣者風寒暑濕燥火也且初之氣自年十二月大寒節起至立春雨水驚蟄前終止乃厥陰風水用事二之氣自二月春分節起至清明穀雨立夏終止乃少陰君火用事三之氣自四月小滿節起至芒種夏至小暑終止乃少陽相火用事四之氣自六月大暑節起至立秋處暑白露終止乃太陰濕土用事五之氣自八月秋分節起至寒露霜降立冬終止乃陽明燥金用事六之氣自十月小雪節起至大雪冬至小寒終止乃太陽寒水用事春溫夏熱秋涼冬寒四時序而六氣調病安生焉過則為災未有不致目病者至於細分六氣已詳列於後之諸卷中矣眼不醫必瞎辨論世俗俚言有眼不醫不瞎之説而愚人往往信之蒙其害者亦多矣夫神農嘗百草慮生民之病夭華他立眼科憂後世之盲瞽有是病必有是藥藥而猶難於即愈未有不藥而愈者也夫人疾病皆由不能愛養真元及至所喪真元之後邪氣乘虛而入一旦疾發而又不能調治反惑於愚人之言豈愛身之人哉譬如火發而不能急救委之於數者夫不救有不盡焚者乎救之少遲僅免其半倘不救未有全不焚者患目者治之少遲即醫治雖無全功亦可免枯凸之害豈有不醫不瞎之理乎發此言者皆系愚人之疾陷於沉疴之地其立心也不仁聽此言者亦謂愚而不智甚矣蓋眼不醫不瞎者乃眼不醫必瞎也不必二字音語相近之誤且目為竅至高火性上炎最易從竅而出脈道幽深經絡微細少犯禁戒則必患之且今人能知保護者少損耗者多是目之感病最易而治之則難故深言警惕之曰眼不醫必瞎必之一字意最重實欲使人防微杜漸之意也謂人目病若不早醫病必日深而眼必瞎也此理之最易明智者不待辨而自知也其曰不醫不瞎者愚人之妄言也安可聽諸識病辨證詳明金玉賦論目之病各有其症識症之法不可不詳故曰症候不明愚人迷路經絡不明盲子夜行可不慎乎凡觀人目而無光華神色者定是昏矇男子必酒色勞役氣怒女子鬱結風多氣血虛損則目疾昏花因之而起故宜先察部分形色次辨虛實陰陽更別浮沉當知滑澀看形色之難易詳根腳之淺深經云陽勝陰者暴陰勝陽者盲虛則多淚而癢實則多腫而痛此乃大意然也夫血化為真水在臟腑而為津液升於目而為膏汁得之則真水足而光明眼目無疾失之則火邪盛而昏矇翳障即生是以肝膽虧弱目始病臟腑火盛珠方痛赤而且痛火邪實赤昏不痛火邪虛故腫痛澀而目紅紫邪氣之實不腫不痛而目微紅血氣之虛大眥赤者心之實小眥赤者心之虛眵多熱結肺之實眵多不結肺之虛黑花茫茫腎氣虛冷淚紛紛腎精弱赤膜侵睛火鬱肝白膜侵睛金凌木迎風極癢肝之虛迎風刺痛肝邪實陽虛頭風夜間暗陰虛腦熱早晨昏日間痛者是陽邪夜間痛者是陰毒肺盛兮白膜腫起肝盛兮風輪泛高赤絲繚亂火為殃癍翳結成五氣滯氣實則痛而燥悶氣虛則痛而惡寒風痰濕熱恐有瞳神散大喪明之患耗神損腎必主瞳神細小昏盲之殃眸子低陷傷乎血胞臚突出損乎精左傳右兮陽邪盛右傳左兮陰邪興濕熱盛而目睛黃色風熱盛而眼沿赤爛近視乃火少遠視因水虛脾肺液損倒睫拳毛肝盛邪熱突起睛高故睛突出眶者火極氣盛筋牽胞動者血虛風多陽盛陰虛赤星滿目神勞精損黑霧遮睛水少血虛多痛澀頭眩眼轉屬陰虛目昏流淚色欲傷乎腎氣目出虛血邪火鬱在肝經大病後昏氣血未足小兒初害營衛之虛久視傷睛成近覷因虛胞濕變殘風六欲過多成內障七情太傷定昏盲暴躁者外多紫脈虛淫者內多黑花隱隱珠疼只為精虛火動繃繃皮急皆因筋急氣壅迎風淚出分清分濁天行赤熱有實有虛目赤痛而寒熱似瘧小便澀乃熱結膀胱腦脹痛而澀痛如針大便閉乃火居臟腑三焦火盛口渴瘡生六腑火炎舌乾唇燥目紅似火絲脈忌紫如虯淚熱如湯濁水怕稠如眵腦脹痛此是極凶之症連眶腫莫言輕緩之災腦筋如拽若偏視當慮乎珠翻之患珠疼似擊若鶻眼須憂乎眸突之凶鼻塞生瘡熱鬱於腦當和肝而瀉肺耳鳴頭暈火盛於水宜滋腎以清心嗜酒之人濕熱熏蒸精氣弱多赤黃而瘀肉貪淫之輩血少精虛氣血虧每黑暗以昏矇孕中目痛非有餘乃血氣之虧耗産後目疾為不足因營衛之衰虛水少元虛或痰火則天行赤熱燥急風熱並勞苦則暴風客熱瘀血滯而貫睛速宜開導血紫赤而侵瞳輕亦喪明瞼硬睛疼肝風熱而肝血少胞脹如杯木剋土而肝火盛黃膜上衝云生膜內蓋因火瘀邪實赤膜下垂火鬱絡中故此血滯睛疼凝脂翳生肥浮嫩而易長名為火鬱肝膽花翳白陷火爍絡而中低號為金來剋木雞冠蜆內火土燥瘀魚子石榴血少凝滯胞虛如球血不足而虛火壅皮急緊小膏血耗而筋膜縮實熱生瘡心火熾而有瘀滯迎風赤爛肝火赤而脾淚濕迎風冷熱淚流肝腎虛而精血弱無時冷熱淚下肝膽衰而腎氣虛大小眥漏血水瀉其南而補其北陰陽漏分黃黑黑則溫之黃則涼神水將枯火逼蒸而神膏竭神光外現孤陽飛而精氣虧視定為動木虛火盛來攻擊皮翻黏瞼氣聚血壅風濕滯色似胭脂血熱妄侵白睛赤白珠俱青肝邪蒸逼氣輪藍火鬱風輪則旋臚泛起血瘀火熾則旋臚尖生精虧血少虛損則起坐生花竭視酒色思慮則昏朦乾澀暴盲似祟痰火思慮並頭風赤痛如邪肝膽虧損營衛弱棗花障起痰火色酒怒勞瞻瑩星滿目辛燥火痰勞酒色眼若蟲行因酒欲悲思驚恐怒所傷雲霧移睛見旗旆蠅蛇異形虛所致淫欲多而邪氣侵則膜入乎水輪肝心熱而痛流淚則睛出乎珠外或血少而或哭泣津液枯而目澀痛或酒欲而或食毒脾腎傷而眼赤黃風熱邪侵眉稜骨重而痛風熱邪盛眼胞睛眶硬腫風木克乎脾絡故迎風即作赤爛血虛不潤乎肌故無風常作爛赤血少神勞精氣衰則瞻視昏渺火邪有餘在心經則痛如針刺五臟毒而赤膜遮睛脾積毒而胬肉侵睛水晶障翳瘀滯涼劑片腦所因魚鱗形異歪斜氣結膏凝難愈逆順生翳內有瘀滯白星亂飛血弱精虛火脹大頭須分風熱濕熱風熱脹痛而濕熱淚羞明怕熱要辨血虛火燥血虛羞明而火燥怕熱羞明不痛是脾虛怕熱澀痛知脾實目昏乃血少腎虧多昏暗積年目赤號風熱兩目赤腫名風毒粟瘡濕熱椒風熱椒瘡紅硬粟黃軟肝經有邪故玉翳浮睛腎臟風熱亦羞明生花聚開之障時圓缺而時隱見症因於痰火濕熱聚星之障或圍聚而或連絡疾發多見於痰火青眼膏損皆因火熾瘀血貫睛總由凝滯故房欲煩躁辛熱多則火炙神膏缺損久視勞瞻郁風煙則瘀滯赤絲脈亂胎風兮小兒赤爛胎毒兮小兒癍瘡血氣滯兮星上火邪實兮障遮痘症多損目濁氣來損清和之氣疳病亦傷睛生源而失化養之源小兒青盲肝血虛小兒白膜肺實熱小兒雀目肝不足小兒目瘡胎汙穢肝盲內障肝風熱二目赤腫熱沖腦每年必發是天行時常害眼火心盛痰火併燥熱傷睛之本頭風兼烘灸損目之宗為怒傷睛怒傷真氣因哭損目哭損神膏酸辣食多損目火煙冒久傷瞳勞瞻竭視能致病而損光華過慮多思因亂真而傷神志目中障色不正急宜早治睛內神水將枯速圖早醫原夫目之害起於微睛之損者由於漸欲無其患先制其微大抵紅障凹凸怕如血積肉堆白障難除喜似水清脂嫩瞳神若損有藥難醫眸子若傷無方可救外障珠不損何必多憂內障瞳雖在其實可畏勿以障薄而為喜勿以翳厚而為憂與其薄而沉損不若厚而浮嫩紅者畏紫筋爬住白者怕光滑如瓷故沉澀光滑者醫必難愈輕浮脆嫩者治必易除顏色不正詳經絡之合病並病形狀稀奇別輪廓之或克或生漏有正形風無定體血實亦痛血虛亦痛須當細辨形狀稀奇決要參詳識經絡之通塞辨形勢之進退當補當瀉或止或行內王外霸既瞭然於胸中攻守常韌其無誤於指下知病症之虛實陰陽熟藥性之溫涼寒熱症的治當百發百中吾輩能以藥代刀針則技之精妙更入乎神以上關節備陳奧妙盡載當熟讀而深詳宜潛思而博覽則症之微曲皆為子識目之安危盡繫於君矣名曰散金碎玉不亦宜乎診視脈經曰左寸脈洪數心火上炎也左關脈弦而洪乃肝火盛也左尺脈微弱乃腎水不升而火在上也右寸關脈俱弦洪乃肝木挾相火之勢來侮所不勝之金而戕已所勝之土也右尺脈洪數為相火邪火上炎挾肝之邪而爍目也按六脈浮緊有力者為寒沉數有力者為熱微細而弱者為虛洪大而滑者為實夫五臟常欲相順相生如心見緩肝見洪肺見沉脾見澀腎見弦此五臟相合相生之理稟太和之氣其疾何以生焉是為疾者五臟必相剋相反如心見沉細肝見短澀腎見遲緩肺見洪大脾見弦長此五臟相刑相剋遞相互變之機其疾再無不作者萬物生克一定之理豈止於病目而言哉經謂五臟不和則六腑不通六腑不通則九竅疲癃九竅疲癃則氣血壅滯亦令人憎寒發熱惡風自汗胸膈痞滿有類傷寒似瘧但目紅赤而頭不痛項不強身發寒不致戰傈發熱不致悶亂為異而為外障或頭眩目昏頭痛而目不紅為內障由人於六淫七情飲食色欲過度運動失宜豈能一一中節而無所乖亂臟腑關竅不得宣通而痰內漬也豫特敘痰飲之脈皆弦微沉滑或云左右關脈大者或伏而大者皆痰也眼皮及眼或如灰煙黑者亦痰也然治法痰因火動降火為先火因氣逆順氣為要亢則害承乃制者寒極則生熱熱極則生寒木極而似金火極而似水土極而似木金極而似火水極而似土也左手寸口心與小腸之脈所出君火也左手關部肝與膽之脈所出風木也左手尺部腎與膀胱之脈所出寒水也右手寸口肺與大腸之脈所出燥金也右手關部脾與胃之脈所出濕土也右手尺部命門與三焦之脈所出相火也六脈者浮沉遲數滑澀也浮者為陽在表為風為虛也沉者為陰在裡為濕為實也沉遲者為陰寒在臟也浮數者為陽熱在腑也滑者血多氣盛也澀者氣滯血枯也八要者表裡虛實寒熱邪正也表者病不在裡也里者病不在表也虛者五虛也脈細皮寒氣少泄利飲食不入也漿粥入胃瀉止則生實者五實也脈盛皮熱腹脹前後不通瞀悶也大小便通利而得汗者生寒者臟腑積寒也熱者臟腑積熱也邪者外邪相干也正者臟腑自病也內經謂目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病從內走外者少陰病太陽病宜溫之散之陽明病宜下之寒之少陽病宜和之少陰病宜清之保命集云眼之為病在腑則為表當除風散熱在臟則為里當養血安神暴發者為表易治久病者為里難了按此論表裡之不同明矣用以治病如鼓應桴也靈樞癲狂篇云目眥外決於面者為鋭眥在內近鼻者為內眥上為外眥下為內眥凡看目疾者男子多患左目女子多患右目此陰陽氣血不同故也或有左右無常者乃邪熱攻迫故也如男先傷左目而右目屢發定不可保女先傷右目而左目屢發亦不能救必須觀人老少壯弱為主少而壯者易治老而弱者難治易治者用藥溫和難治者用藥滋補隨症用藥不可執一目症雖有多端然看者先將分數預定其初不致有誤如瞳神凸凹者不治青緑白色者不治純黑者不治睛少光彩者不治此老人血衰之症若翳障如半月之狀俱難治之若睛圓不損不論星多少翳厚薄悉皆治之翳怕光滑星怕在瞳神總翳膜輕薄星點細小難退翳障未盡切不可用刀割目得血而能視刀割則傷血亦不可用火灸翳膜生自肝火又以火攻之是以火濟火豈是良法惟服藥於先必兼點藥則病漸退根除而不復發也按目病有外感有內傷外感者風寒暑濕燥火此標症也患者致目暴發疼痛白睛紅腫眵淚赤爛其勢雖急易治內傷者喜怒思悲恐驚此七情也患者致黑珠下陷或起蟹睛翳膜障朦或白珠不紅瞳神大小視物昏花內障不一其勢雖緩難治又有不內不外而飲食不節飢飽勞役所致當理脾胃為主目症雖多不外風熱虛實之候治亦不離散清補瀉之法然補不可過用參朮以助其火惟用清和滋潤之類瀉不可過用硝黃龍膽以凝其血惟用發散消滯之類藥用當則目自愈今人治目往往非大補則驟用大寒多致受傷治目毋投寒劑固是要法又當省其致病之源以治之如貪酒者徐徐戒其酒好色者緩緩戒其色暴怒者異言戒其暴怒不聽則難療也然心生血脾統血肝藏血血得熱則行得寒則凝凝則生翳生膜目斯患矣不可不慎凡病目後宜滋腎水何也目以肝為主肝開竅於目目得血而能視若滋腎水則水能生木木能生火火能生土土能生金金能生水生生不已其益無窮若腎水虧耗則水不能生木木不能生火火不能生土土不能生金金不能生水肝血虧而火妄熾其害可勝言哉目不專重診脈説夫曰有是病即有是脈者此亦大概言之其微渺未必皆可恃乎脈也如目病必視其目為內障為外障內障有內障之症外障有外障之症必辨其為何症所中所傷之淺深果在何輪何廓辨之明而後治之當今閨閣處子暨夫貴介之族但舒手於帷幔之外診其脈即欲治其病且責其用藥當而效之速不知即方脈之專重乎脈者尤望聞問居其先而切脈居於後蓋切而知之僅謂之巧耳況症之重者關乎性命而惟恃巧以中之何輕視乎性命耶必精詳審辨而後治之可也重性命者當必以是言為然也矧目為五官之最要者哉假令一瞽目隱身於帷幔之中舒其手於帷幔之外其六味未嘗不與有目者相同也切脈者從何脈辨知其為瞽耶恐神於脈者亦未易知後學豈能臻此之妙定其殘好必猜度疑議之摘出其弊必於診脈之外更加詳視始不致有誤矣目病有三因陳無擇曰喜怒不節憂思兼併以致臟腑氣不平鬱而生涎隨氣上厥乘腦之虛浸淫目系蔭注於目輕則昏澀重則障翳眵淚胬肉白膜遮睛皆內因如數冒風寒不避暑濕邪中於項乘虛循系以入於腦侵於目而生目病者皆外因若嗜欲無節飲食不時頻食五辛過啖炙煿馳騁田獵冒涉煙塵勞動外情皆喪明之本此內外因也徐彥純曰人之眼目借臟腑五行相資而神明故能視內障乃瞳神黑小神光昏昧也外障則有翳膜可見內障有因於痰熱氣鬱血熱陷陽陷陰虛脫榮衛所致種種不同外障有起於內眥睛上睛下睛中視其翳色從何經來惟宜分治目之為病肝熱則昏暗心熱則煩痛風濕血少則澀癢腎虛則不禁固甚則陷突緩則翳暗矣內外二障論醫門一十三科惟眼科最難而常人無不易之也豈惟常人易之即專是科者亦易之也由於燭理不明究心不到或不知儒書或暗於醫學甚至有一字不諳者或得一方及得一法試之稍驗輒自誇耀以為眼科無出其右便出治人而世之愚夫蒙其害者屢屢亦各不自知也若爾人者是誠以管窺天所見者不廣也然自古迄今軒岐之後明醫世出如傷寒則有張長沙雜症則有李東垣治火則有劉河間補陰則有朱丹溪四家之外名手甚多然於雜病則糜不著論立方以傳後世以開來學故後之學者有所依歸是以察脈驗症即論視病按方用藥苟用之當靡不通神乘時奮發馳名遐邇皆賴古人所定之方耳惟眼科豈獨今人見易吾意張李朱劉亦略於是皆未見其精詳垂論焉使後世無所本也但云血少也神勞也腎虛也風熱也苟執是四者而治其不陷於一偏者亦鮮矣且夫內障之症不紅不紫非痛非癢惟覺昏朦有如薄紗籠者有如霧露中者有如見黑花者有如見蠅飛者有如見蛛懸者有眉稜骨痛者有頭旋眼黑者皆為內障障者遮也如物遮隔故云障也內外障者一百零八症之總名也其外障者乃睛外為雲翳所遮故云外障然外障可治者有下手處也內障難治者外不見症無下手處也且內障之人二目光明同於無病者最難分別惟目珠不動微可辨耳先賢俱言腦脂下垂遮隔瞳神故爾失明惟有金針可以撥之墜其翳膜於下能使頃刻復明豫因深思眼乃五臟六腑之精華上注於目而為明如屋之有天窗也皆從肝膽發源內有脈道孔竅上通於目而為光明如地中泉脈流通一有瘀塞則水不通矣夫目屬肝肝主怒怒則火動痰生痰火阻隔肝膽脈道則通光之竅遂蔽是以二目昏朦如煙如霧目一昏花愈生鬱悶故云久病生郁久郁生病今之治者不達此理俱執一偏之論惟言肝腎之虛止以補肝補腎之劑投之其肝膽脈道之邪氣一得其補愈盛愈蔽至目日昏藥之無效良由通光脈道之瘀塞耳余故譬之井泉脈道塞而水不流同一理也如執定以為肝腎之虛余思再無甚於勞瘵者人雖將危亦能辨察秋毫由此推之因知肝腎無邪則目決不病專是科者必究其肝腎果無邪而虛耶則以補劑投之倘正氣虛而邪氣有餘必先驅其邪氣而後補其正氣斯無助邪害正之弊則內障雖云難治亦可以少盡病情矣至於外障必據五輪而驗症方知五臟之虛實而五臟之中惟腎水神光深居於中最靈最貴辨析萬物明察秋毫但一腎水而配五臟之火是火太有餘水甚不足腎水再虛諸火益熾因而為云為翳為攀睛為瘀肉然此症雖重尚可下手施治非如內障之無可下手也然今之業是科者煎劑多用寒涼以伐火暫圖取效點藥皆用砒硇以取翳只顧目前豫觀兩者皆非適中之治亦非仁術之所宜也故治火雖云苦寒能折如專用寒涼不得其當則胃氣受傷失其溫養之道是以目久病而不愈也至於藥之峻利夫豈知眼乃至清至虛之府以酷烈之藥攻之翳雖即去日後有無窮之遺害焉良可慨也豫業岐黃朝夕承先大人庭訓附以管見遂忘固陋訂製煎劑點藥雖非適中之治然亦不越於規矩準繩之外也所用煎劑惟以寬中開鬱順氣消痰滋陰降火補腎疏風為主點藥專以去翳明目為先然點藥惟用氣而不用質去翳雖不神速決無後患其製藥之玄妙誠非世俗所得知也但藥得於家傳兼以苦心思索有年幸得其妙至於目疾危急萬不得已間用砒硇亦必用藥監製其毒分兩之中十用其一毫不敢多也此豫治人之目必抱兢業之心至病目者愈當小心禁戒即如勞神酒色忿怒諸事並宜捐棄否則目愈之後不能久視久視則目珠隱隱作痛日後決傷於目是以勞神諸事俱宜忌也蓋心藏乎神運光於目凡讀書作字與夫婦女描刺匠作雕鑾凡此皆以目不轉睛而視又必留心內營心主火內營不息則心火動心火一動則眼珠隱隱作痛諸疾之所由起也且人未有不虧腎者夫腎屬水水能剋火若腎無虧則水能上升可以制火水上升火下降是為水火既濟故雖神勞元氣充足亦無大害惟腎水虧弱之人難以調治若再加以勞神水不上升此目之所以終見損也今吾輩治目務宜先審其邪正之虛實首當驅其有餘之邪氣而後補其不足之正氣治斯當而疾斯愈矣此治目之次第至於臨症圓機神而明之又在乎人專是業者宜究心焉鉤割針烙宜戒慎論原夫鉤割針烙之法肇自華他今人效之不識病症之輕重不辨部位之當否盲醫瞎治妄加痛楚於人此等亂為定遭天譴為子孫殃今豫將部位病症之當否鉤割針絡之所宜者請備言之以為後學規矩準繩庶無妄治之愆或於陰功諒有小補云夫鉤鉤起也割割去也針非砭針之針乃針撥瞳神之針烙即尉烙之烙此四者猶夫刑之戮凶強剪除橫逆之法也要在審察明而詳奪定然後加刑先滅巨魁以及從惡則情真罪當而良善無枉屈侵擾之害強暴無激變作亂之禍若論治法實開泄鬱滯除瘀積之一法也惟要症候明而部分當始可施治先伐標而後治本則氣血寧而精膏無耗澀枯傷之患輪廓無誤失損害之過如鉤先須認定何處皮肉筋脈浮淺可鉤不可鉤酌量治之即手力亦隨病之輕重行之如針必須內障即症候可針必俟年月已足血氣已定者方可針之庶無差謬不可妄為使病人受無辜之痛楚致同道之恥笑針後當照病用藥內治其本或補或瀉或溫或涼各隨症之所宜若只治其標不治其本則氣不定不久復為患矣如割在氣血肉三輪者可割而大眥一塊紅肉乃血之英心之華決不可割誤割則目盲若神在此而傷之必死有割傷因而惹風及元氣虛弱之人煩躁濕盛者必為潰爛為漏為目枯凡障如攀睛胬肉雞冠蜆肉魚子石榴赤脈虯筋胞肉黏輪等症可割若在風輪之淺者誤割之則珠破而目損至於烙只能治殘風潰眩瘡爛濕熱重而久不愈者輕者亦不必烙服藥自愈若紅障血分之病割之必用烙以斷之否則不久復生若在氣分白珠不可用烙若在烏珠針烙皆不可犯不惟珠破亦且甚痛凡烏珠有惡障厚蔽者鉤割亦宜淺淺割外邊赤絲瘀肉其內貼珠翳障只宜緩緩點藥服藥耐心治之久而自消不可性急而取快也若鐮割風毒流毒瘀血等症當以活法審視不可拘於一定必須口傳親授臨症親見非筆下之可形容大抵鉤割針烙之治功效最速雖有撥亂反正之功乃乘險救危之法亦不得已而用之全在心細而膽大必症候明而部分當又兼服藥內治方為兩盡其美若只治外症而不治內雖有今日之功恐為後日之害也業斯道者甚無忽焉棄邪歸正論治病猶治亂破敵綜理無錯攻守得宜少失機權變症先矣夫有諸中然後形諸外病既發者必有形色部位之可驗始知何臟何腑某經某絡所患虛實輕重然後對症醫治則綜理清而攻守當矣夫何變症之有今人治目不知形症部位輒亂投藥每受其害間有饒而愈則往往引以為例蒙害者甚多亦不能盡具略舉數節以為後戒且如人之患目者皆曰服菊花洗心散龍膽四物湯三黃湯明目流氣飲羊肝丸補陰丸之類不見效則反歸怨於藥殊不知病不對藥非藥之過耳有以黃連湯薄荷湯泥漿井水雞子清水晶金銀等物取其涼氣以之尉洗爽快一時反致血凝變症日增亦不知悟及疾成而始悔有人飲燒酒食辛辣烘火向日謬云以熱攻熱若爾人者譬如蜉蝣泛火乃火將息之時被其一激而散偶爾僥幸遂以為常比比誇以示人籲倘遇炎熾之病是齎敵以糧授賊以刃也此理之甚明而人何不悟可謂愚矣有以舌舔目而珠破不知其害者不知舌乃心之苗為心火之用且又腥膻燥炙無不皆嘗以之舔輕清脆嫩之目焉得不作破哉或曰古人舔目而復明非舔之功乎豈知古之舔目不過一二人而已此實偶然巧合所致豈可以此為例又有信巫祝而明燈向日摘草掄絲謂之劫眼決無此理外臺祕要亦無此法屢有痕捩爪傷俱由此致蓋努力強掙勞瞻以耗弱之精華而敵赫赫之陽光安得無損間有客熱天行銀星微火自退之症偶然僥幸愈者則以為巫祝之靈愈信鬼神而棄醫彼此誇援為例而愚者遂以為信因成痼疾而悔之遲矣籲士大夫尚蒙其蔽又況愚人乎或有因將草汁點洗誤中其毒者有將毒草貼於曲池合谷太陽等穴而致目珠損凸者有刮指甲金玉骨血等屑點目而擦破其珠者如此妄治皆愚人自取其禍若醫者為之則不才之甚也又有庸醫圖利證尚不明濫治人疾或不當點而強點不當尉割而強尉割當開導而失於開導至於用藥當補者而反瀉當瀉者而反補寒其寒而熱其熱損不足而益有餘凡此皆醫害之也故人有信巫而不信醫決不可強之醫此下愚之甚者雖強之醫而終無全功反為所鄙大抵目病由肝腎之本虛而後標病始發於目未有本實而標病者然人有氣血表裡虛實遠近男婦老幼緩急之異病藥有寒熱溫涼君臣佐使補瀉逆從反正之異治要驗症而辨其臟腑經絡察遠近而審其寒熱虛實認症的當病真理明然後投之以清心寡欲耐久醫治又何目病之不除哉目症相同所治用藥不同並戒慎問答復慧子曰昔有客問先大人云均一病也其症不異子何以治之不同用藥各異其效有速有遲有愈有不愈者有治之者有辭而不治者其故何也大人聞而應之曰夫古之善醫先精造乎學業次通達乎人事見機而作圓融變通不拘一隅不執一方子謂豫同病而異治不知人事有種種不同者也或男子婦人嬰兒處女鰥寡老弱師尼婢妾兼之胎前産後與夫情性之溫暴飲食之多寡二便之通塞四時之寒暑溫涼病症之虛實冷熱歲月之遠近淺深有能節戒不能節戒者服藥曾傷元氣未傷元氣者千態萬狀不可勝計治之安可同於一轍乎況富貴貧賤之殊途蓋富貴之人其志樂其性驕或酒色之不戒家務之勞心暴怒之傷肝以致五火俱動且藥餌委諸童僕火候或失宜故取其效也不易至於貧賤者其志苦其形勞或因薪谷之憂忿怒之傷或藥餌力乏不繼欲愈其疾也更難豫之症同而治異者盡為此也今就先大人之論思之誠不可拘一隅不可執一方也但他恙之戒人酒色勞怒猶易獨目病之戒人則難他病身體無力四肢疲倦而念難起惟病目者身體強健而念易動動則精出竅矣夫天地以日為陽雨為陰人以火為陽水為陰人靜則生陰動則生陽陽生豈不為火乎至於怒又為七情之一最易傷肝肝傷則目必損肝竅於目故也恣酒助陽動濕熱而爍陰縱色又為傷腎之要人身臟腑皆火單有腎水一點以制之豈可輕忽不慎丹溪先生言人心君火一動相火即起雖不交而精亦暗流矣又有愚夫愚婦病目不知自愛俱言假此以泄其火愚謂此非去火實乃抱薪救火也將見火未熄而焰愈熾矣病目者不知乎此則輕症變重重症變為不治之症者靡不由乎此耳業是科者善為詞以深戒之可也用藥寒熱論用藥如用兵補瀉寒熱之間安危生死之所繫也可不慎歟雖云目病非熱不發非寒不止此言夫火之大概耳內有陰虛冷淚昏眇脫陽等症豈可獨言是火而用寒涼也今之庸醫但見目病不識症之虛實寒熱辨別氣血惟用寒涼治之殊不知寒藥傷胃損血是標未退而本先傷至胃壞而噁心血敗而拘攣尚不知省再投再服遂令元氣大傷而變症日增必虛寒之症已的始可投以溫和之藥否則有抱薪救火之患設是火症投以熱藥其害猶速不可不慎大抵燥赤者清涼之炎祕者寒涼之陽虛者溫補之脫陽者溫熱之然熱藥乃回陽之法寒藥乃救火之方皆非可以常用者外障者養血去障內障者滋膽開鬱故治火雖用芩連知柏之類制之必以酒炒庶免寒潤泄瀉之患而寒熱補瀉之間又宜諒人稟受之厚薄年力之盛衰受病之輕重年月之遠近毋使太過不及當於意中消息如珠之走盤如權之走稱不可拘執是為良醫用藥生熟各宜論藥之生熟補瀉在焉劑之補瀉利害存焉蓋生者性悍而味重其攻也急其性也剛主乎瀉熟者性淳而味輕其攻也緩其性也柔主乎補補瀉一差毫釐千里則藥之利人害人判然明矣補藥之用制熟者欲得其淳厚所以成其資助之功瀉藥制熟者欲去其悍烈所以成其攻伐之力用生用熟各有其宜實取其補瀉得中毋損於正氣耳豈為悅觀美聽而已哉何今之庸醫專以生藥餌人夫藥宜熟而用生生則性烈臟腑清純中和之氣服之寧無損傷故藥生則性瀉性瀉則耗損正氣宜熟豈可用生又有以生藥為嫌專尚炮製稱奇夫藥宜生而用熟殊不知補湯宜用熟瀉藥不嫌生夫藥之用生猶夫亂世之賊寇非強兵猛將何以成摧堅破敵之功藥之用熟猶夫治世之黎庶非禮樂教化何以成雍熙揖讓之風故天下亂則演武天下治則修文醫者效此用藥則治病皆得其宜庶不致誤人之疾也噫審諸開導之後宜補論夫目之有血為養目之源充和則有發生長養之功而目不病少有虧滯目病生矣猶水為生物之澤雨霧中和則滋生之得宜而草木秀亢旱淫潦則草林壞矣皆一氣之失中使然也是故天之六氣不和則陰陽偏盛旱潦乘之水之盈虧不一物之秀稿不齊雨暘失時而為物之害也譬之山崩水湧滂沛妄行不循河道而流不得已而疏塞決堤以泄其泛濫使無淹溢害物之患人之六氣不和水火乖違淫亢乘之血之衰旺不一氣之升降不齊榮衛失調而為人害也蓋由其陰虛火盛炎熾錯亂不遵經絡而來鬱滯不能通暢不得已而開滯導郁以泄其瘀使無脹潰損目之害其理與戰法同而開導之要穴有六謂迎香內睥上星耳際左右太陽穴也內睥乃破賊正隊之前鋒也其功雖遲漸可收而平順兩太陽擊其左右翼也其功次之上星絶其糧道也迎香攻賊之巢穴也成功雖速乘險而徵也耳際乃擊其遊騎耳道遠功卑智者所不取此六穴者皆拯危之良術挫敵之要機與其閉門捉賊不若開門待去之一法也夫盜人豈所欲遇乎倘不幸而遇之若盜寡而勢弱我強而勢盛賊成擒矣設或群盜猖獗又不若開門逐之為愈也資財雖損竭力經營猶可補其損也若一閉門必有激變焚殺之勢目人豈所欲患乎倘不幸而患之病淺而邪不勝者攻其內而邪自退目自明矣若六陽熾盛不若開導以通之則膏液雖損隨以藥補之猶無損也不然火邪鬱滯之極目必有潰爛枯凸之害雖然但開導之一法其中有利害二者存焉有大功於目而人不知有隱禍於目而人亦不知若論其摧鋒挫鋭拯禍勘亂則其功之大者也至於耗液傷膏弱光華而損滋生又其禍之隱者也醫人若能識病之輕重察病之虛實宜開導而開導之既導之後隨即補之使病目者氣血無傷害之弊庶可稱通權達變之良醫矣用片得效後宜少用勿用論有病目者問曰片腦之功治目何多豫聞而哂之曰君知其功亦知其害乎病者愕然曰舉世之人由稚及老雖愚夫愚婦皆知片腦為治眼之藥眼科無不以此為先今君獨言害者何也莫非駭俗乎曰豫非穿鑿而好嘵舌亦非絶棄而不用但用之得其當耳子既病目亦曾點否曰點曰子既點且以此試為子問有點片腦初覺涼快少頃煩熱而悶躁者有點片腦而目愈昏有點而障愈厚病愈篤者有之乎病者曰皆有之且人之目病無有不點片腦者子之目既點片腦今何為而不愈而乃矜羡其功之多也客愀然而起曰誠愚之所未聞敢請教曰片腦利害兼有功過相半然利害雖在片腦之性味而功過則由醫者用之當不當耳我以此語子子靜聽而以理揆之且目非熱不發非寒不止此指大意而言也若夫血見熱則行見寒則凝寒甚則傷血熱甚則傷精此理之自然今遍考諸家所論片腦有稱為寒有稱為熱有稱為常有稱為劫皆不知眼科心法之故夫片腦寒熱兼有陰中之陽味涼而性熱實眼科之劫藥也味有形也性無形也血有形也氣無形也今片腦味涼性熱味不能退無形之火性不能行有形之血是以血雖得熱而欲行而寒又為之絆火雖得寒而欲退而熱又為之助故寒反傷其血熱反傷其精古人有曰寒非純寒熱非純熱寒熱夾攻反傷精血而目之為竅至高火性炎上最易攻犯今內火熾已怫鬱極矣況其脈道幽深經絡高遠而內治之藥未能便達於目故用外劫之藥反攻之法假其性以引夫邪火從竅而出假其味以潤之舒其澀痛且香能通竅不過暫用其劫而不可常也如凝脂赤腫天行暴風蟹睛赤虯風爛澀痛等症是其所治之病也其他俱不可用耳如若火息不赤痛澀爛之症皆宜減去片腦片腦之功只能散赤劫火潤澀定痛其害則耗散陽光而昏眇不明凝結膏汁而為白障難除為其熱極生寒火兼水化也屢見患凝脂赤膜花翳蟹睛皆片腦凝結成大白片而不得去方見片腦生寒火兼水化之害大抵目病用片腦如以賊攻賊其功亦速賊敗則我勝若不奪其權而再縱之則矯肆生禍亂作矣故凡用片腦劫病既退之後再復多用則膏汁凝而目之光華弱矣必減片腦用之方妙而內仍須服補養調治之藥庶不損於瞳神耳點服之藥各有不同問答論問曰點服之治俱各不同有點而不服藥者有服藥而不點者有點服並行者何謂乎曰病有內外治各不同內疾已成外症若無不必點之點之無益惟以服藥內治為主若外有紅絲赤脈如系初發不過微邪邪退之後又為餘邪點固可消服藥夾攻猶愈倘內疾始發而不服藥內治只泥外點者不惟徒點無益恐反激發其邪必生變證之害若內病即成外症又見必須內外並治故宜點服俱行但人之性愚拗不同有執己之偏性喜於服藥而惡點者有喜於點而惡服者是皆見之偏也殊不知內病即發非服藥不除古云止其流者莫若塞其源伐其枝者莫若治其根揚湯止沸不如灶底抽薪此皆治本之謂也若內有病不服藥而愈者吾未之信也至於外若有翳不點不去古云物穢當洗鏡暗須磨脂膏之釜不經滌洗焉能潔淨此皆治標之謂也若外障既成不點而退者吾亦未之信也凡內障不服藥而點者反激其火耗散氣血徒損無益反生變症又有內病成而外症無形雖亦服藥而又加之以點此恐點之反生他變至於外症有翳單服藥而不點如病初起浮嫩不定之翳服藥亦或可退若翳已結成者服藥雖不發不長但恐不點翳必難除必須內外兼治兩盡其妙庶病可愈矣故曰伐標兼治本伐本兼治標治內失外是為愚治外失內是為癡內外兼治是為良醫眼科針灸要穴圖像正頭風及腦痛此症針後或一二日再發如前痛甚但頭為諸陽會首宜先補後瀉又宜瀉多補少或錯補瀉再發愈重當再針百會合谷上星三穴瀉之無不效也舉發另刺上星太陽正頭痛旦發夕死夕發旦死醫用心刺療如不然難治也端的正頭風十死之症又名腎厥頭痛口眼喎斜此症皆因醉後睡臥當風竄入經絡痰飲灌注或因怒氣傷肝房事不節宜先刺頰車合谷地倉人中如不愈再刺地倉合谷承漿瞳子髎頭頂痛此症乃陰陽不分風邪竄入腦戶故刺不效先去其痰後去其風自然效也宜先刺百會後頂合谷不效再刺風池合谷三里頭風目眩此症多因醉飽行房未避風寒而臥賊風入於經絡宜刺解溪合谷豐隆再發後刺風池上星三里外障眼此乃頭風灌注瞳人血氣湧溢上盛下虛故得此疾宜刺太陽睛明合谷小骨空不效再刺臨泣攢竹三里眼生翳膜此症受病既深未可一時便能針愈先刺睛明合谷不效須是三次針之方可如發再刺太陽光明迎風冷淚此症乃醉後當風或暴赤眼痛不忌房事恣食熱物婦人多因産後當風坐視賊風竄入眼中或行經與男子交感穢氣衝於頭目故成此疾宜刺攢竹合谷大骨空小骨空如未愈全再刺小骨空暴赤腫痛眼此症乃時氣所作血氣壅滯當風睡臥飢飽勞役宜先刺合谷三里太陽睛明不效後再刺攢竹太陽絲竹空紅腫澀爛沿眼此症乃醉飽行房氣血凝滯用手揩摸賊風竄入故有此症宜先刺合谷二間不效再刺睛明三里內障眼此症乃怒氣傷肝血不就舍腎水枯竭血氣耗散初病不謹恣貪房事用心過多故得難治先宜刺臨位睛明合谷瞳子髎如不效刺光明風池羞明怕日眼此症乃暴痛在路迎風竄入眼中血不就舍肝不藏血觀燈則淚出見日則酸澀痛疼難開宜刺攢竹合谷小骨空二間不愈再刺睛明行間偏正頭風此症乃痰飲停滯胸膈賊風竄入腦戶偏正頭風發來連半邊皮肉疼痛或手足沉冷久而不治變為癱患亦分陰陽針之或針力未到故不效也此症宜先針風池合谷絲竹空後可針三里瀉之以去其風針後穴前穴絲竹空鞋帶紅腫疼痛眼此症因傷寒未解卻有房事上盛下虛氣血壅上或頭風不早治則血灌瞳人或暴赤腫痛或怒氣傷肝房事觸毒心肝二經飲食不節飢飽醉勞皆有此症心火炎上故不散及婦人産後怒氣傷肝産期未滿非一時可療漸而為之無不效也宜先刺睛明臨泣合谷不愈再刺風池太陽行間百會名三陽五會一名巔上一名天滿在前頂後一寸五分頂中央旋毛心容豆許直兩耳尖上對是穴督脈足太陽之會手足少陽足厥陰俱會於此刺二分灸五壯甲乙經曰刺三分灸三壯一曰灸頭頂不得過七壯主治頭風頭痛合谷一名虎口在手大指次指歧骨間陷中手陽明所過為原刺三分留六呼灸三壯主治偏正頭痛面腫目翳神農經云治鼻衄目痛不明席弘賦云睛明治眼若未效合谷光明不可缺千金十一穴云曲池兼合谷可徹頭痛馬丹陽天星十二穴云療頭疼並面腫體熱身汗出目暗視茫然上星一名神堂在鼻直上入髮際一寸陷者中可容豆刺三分留六呼灸五壯一云宜三稜針出血以瀉諸陽熱氣主治頭風頭痛鼻塞目眩睛痛不能遠視三稜針刺之即宜泄諸陽熱氣無令上衝頭目神庭直鼻上入髮際五分發高者髮際是穴發低者加二三分督脈足太陽陽明之會灸三壯禁刺刺之令人癲狂目失明一日灸七壯至三七壯止主治發狂登高妄走風癇癲疾角弓反張目上視不識人頭風鼻淵流涕不止頭痛目淚煩滿喘渴悸不得安寢瞳子髎一名太陽一名前關在目外去眥五分手太陽手足少陽三脈之會刺三分灸三壯主治頭痛目癢外眥赤痛翳膜青盲遠視䀮䀮淚出多眵頰車一名機關一名曲牙在耳下齒頰端近前陷中倒臥開口取之刺三分灸三壯一日灸七壯至七七壯炷如小麥主治中風牙關不開失音不語口眼歪斜頰腫牙痛不可嚼物頸強不得回顧凡口眼喎斜者喎則左瀉右補斜則左補右瀉玉龍賦云兼地倉療口歪地倉一名會維夾口吻旁四分外如近下微有動脈若久患風其脈亦有不動者手足陽明任脈陽蹺之會刺三分留五呼灸七壯或二七壯重者七七壯病左治右病右治左艾炷宜小如粗叉腳若過大口反喎卻灸承漿即愈主治偏風口眼喎斜牙關不開齒痛頰腫目不得閉失音不語飲食不收水漿漏落眼動遠視䀮䀮昏夜無見後頂一名交沖在百會後一寸五分枕骨上刺二分灸五壯主治頸項強急額顱上痛偏頭痛惡風目眩不明臨泣在目上直入髮際五分陷中正睛取之太陽少陽陽維三脈之會刺三分留七呼主治鼻塞目眩生翳多眵流冷淚眼目諸疾驚癇反視百證賦云兼頭維可治目中出淚足三里即下陵出本輸篇在膝下三寸胻骨外廉大筋內宛宛中坐而豎膝低跗取之極重按之則跗上動脈止矣足陽明所入為合刺五分留六呼灸三壯千金云灸二百壯至五百壯一云小兒忌灸三里三十外方可灸不爾則生疾秋月不宜出血恐土虛主治瀉胃中脘熱與氣衝巨虛上下廉同秦承祖曰膝胻痠痛目不明外臺明堂云人年三十以外若不灸三里令氣上衝目使眼無光蓋以三里能下氣也風池在耳後顳顬後腦空下髮際陷中按之引耳一云耳後陷中後髮際大筋外廉足少陽陽維之會刺四分灸三壯至七壯炷不用大主治中風偏正頭痛頸項如拔痛不得回目眩赤痛淚出通玄賦云頭暈目眩覓風池絲竹空一名目髎在眉後陷中甲乙經曰足少陽脈氣所發刺三分留三呼禁灸灸不幸令人目小及盲主治頭痛目赤目眩視物䀮䀮拳毛倒睫風癇戴眼發狂吐涎沫偏正頭風通玄賦云治偏頭痛難忍一傳主眼赤痛針一分出血人中一名水溝在鼻下人中陷中督脈手足陽明之會刺三分留六呼得氣即瀉灸三壯至七壯炷如小麥然灸不及針主治中風口噤牙關不開口眼喎斜承漿一名天池一名懸漿在頤前下唇稜下陷中足陽明任脈之會刺三分留五呼灸三壯日可七次至七七壯止即血脈宣通其風應時立愈艾炷不必大但令當脈即能愈疾主治偏風半身不遂口眼喎斜口噤不開一云療偏風口喎面腫迎香一名衝陽在禾髎上一寸鼻孔旁五分手足陽明之會刺三分禁灸主治鼻塞不聞香臭喘息不利偏風口眼喎斜浮腫風動滿面作癢狀如蟲行玉龍賦云能消眼熱之紅客主人一名上關在耳前起骨上廉門口有空側臥張口取之手足少陽足陽明三脈之會本輸篇曰刺之則呿不能欠者即此穴刺一分留七呼灸三壯甲乙經曰刺上關不得深下關不得久主治口眼喎斜耳聾耳鳴聤耳目眩齒痛瘛瘲角孫在耳廓中間上髮際下開口有空手太陽手足少陽三脈之會甲乙經曰主治三陽寒熱之病又曰足太陽有入頄偏齒者名曰角孫則足太陽脈亦會於此刺三分灸三壯主治目生翳齒齦腫不能嚼唇吻燥頸項強光明在外踝上五寸足少陽絡別走厥陰刺六分留七呼灸五壯主治熱病席弘賦云睛明治眼未效時合谷光明不可缺標幽賦云兼地五會治眼痛癢地五會在足小指次指本節後陷中去俠溪一寸刺一分禁灸主治標幽賦云兼光明治眼癢痛解溪一名鞋帶在衝陽後一寸五分足腕上繫鞋帶處陷中一曰在足大趾大趾直上跗上陷者宛宛中刺瘧論注曰在衝陽後三寸半氣血論注曰二寸半甲乙經曰一寸半足陽明所行為經刺五分留五呼灸三壯主治風氣面浮頭痛目眩生翳神農經云治腹脹腳腕痛目眩頭痛可灸七壯豐隆在外踝上八寸下廉胻骨外廉陷中陽明絡別走太陰刺三分灸三壯主治頭痛面腫風逆顛狂見鬼好笑百證賦云兼強間治頭痛難禁攢竹一名始光一名員柱一名夜光又名光明在兩眉頭梢穴宛宛中刺五分留五呼不宜灸甲乙經云明堂用細三稜針刺之宣泄熱氣眼目大明宜刺三分出血主治目視䀮䀮淚出目眩瞳子癢眼中赤痛及腮臉瞤動不臥玉龍賦云兼頭維治目疼頭痛百證賦云兼三間可治目中漠漠通玄賦云腦昏目赤瀉此印堂在兩眉中間神農經云治小兒急慢驚風可灸三壯艾炷如小麥玉龍賦云善治驚搐睛明一名淚孔在目內眥明堂云內眥頭外一分宛中氣府論注曰手足太陽足陽明陰蹺陽蹺五脈之會刺一分半留六呼甲乙經曰刺六分一曰禁灸主治目痛視不明見風淚出胬肉攀睛白翳眥癢疳眼頭痛目眩凡治雀目者可久留針然後速出之席弘賦云治眼若未效併合谷光明不可缺百證賦云兼行間可治雀目巨髎夾鼻孔八分直瞳子陽蹺足陽明之會由此入上齒中後出循地倉刺三分灸七壯主治瘛瘲唇頰腫痛口喎目癢青盲無見遠視䀮䀮面風鼻䪼腫腳氣膝脛腫痛大骨空在手大指前二節前尖上屈指當骨節中灸二七壯禁針主治內障久痛及吐瀉小骨空在手小指第一節前尖上屈指當骨節中灸二七壯禁針主治迎風冷淚風眼爛弦等症以上大小骨空二穴宜口吹火滅後溪在手小指末節後外側橫紋尖上陷中仰手俯拳取之一云在手腕前外側拳尖起骨下陷中手太陽所注為腧刺一分留二呼灸一壯一云三壯主治目翳鼻衄耳聾通玄賦云治頭頂立安捷法云肺與三焦熱病腎虛頭痛肝厥頭暈及頭目昏沉偏正頭風疼痛兩額顱眉角疼痛太陽痛頭項拘急痛引肩背醉後當風嘔吐不止惡聞人言眼赤痛衝風淚下不已行間在足大趾間動脈應手陷中一云在足大趾次趾岐骨間上下有筋前後有小骨尖其穴正居陷中有動脈應手足厥陰所溜為榮刺三分留十呼灸三壯主治中風口喎四逆嗌乾煩渴瞑不欲視目中淚出百證賦曰兼睛明可治雀目汗氣二間一名間谷在食指末節前內側陷中手陽明所溜為榮刺三分留六呼灸五壯主治目黃口乾口眼喎斜通玄賦云治目昏不見毫針式尖如蚊虻喙取法於毫毛長一寸六分主寒痛痹在絡或問曰睛明迎香承泣絲竹空等穴皆禁灸何也曰穴近目目畏火故禁灸也以是推之則知睛明不可灸矣凡灸頭面之艾炷宜小麥大不宜多灸蓋頭面為諸陽之首故也若四肢炷稍大背腹則又大不妨多灸四肢多灸則枯細瘦人春夏之月刺宜淺肥人秋冬之月刺宜深此行針灸之大法也古人灸艾住火便用洗法以赤皮蔥薄荷葉煎湯溫洗瘡周圍約一時久令驅逐風散於瘡口出更令經脈往來不澀自然疾愈若灸火退痂後用東南桃枝青嫩皮煎湯溫洗能護瘡中諸風若瘡內黑爛加胡荽煎洗若疼不可忍加黃連煎洗神效古人貼灸瘡不用膏藥要得膿水出多而疾除資生云春用柳絮夏用竹膜秋用新綿冬用兔腹下白細毛或貓腹細毛今人多以膏藥貼之日兩三易欲其速愈此非治疾之本意也但今貼膏藥意在避風亦取其便惟久久貼之可也金針辨義古人云金針者貴之也金為五金之總名銅鐵金銀皆是也本草云馬銜鐵無毒可作針以馬屬午屬火火剋金能解鐵毒故用以作針煮針法煮針一法素問原無今世用之欲溫而澤也是法有益而無害故從之危氏書用烏頭巴豆各一兩硫黃麻黃各五錢木鱉子烏梅各十個將針入水用砂鍋內或罐內煮一日洗擇之再用止痛藥沒藥乳香當歸花蕊石各五錢又如前水煮一日取出用皂角水洗再於犬肉內煮一日仍用瓦屑打磨淨端直松子油塗之常近人氣為妙金針式金針柄以紫檀花梨木或犀角為之長二寸八九分如弓弦粗兩頭鑽眼深三四分用止好赤金子抽粗絲長一寸用乾麵調生漆嵌入針柄根內外餘六分許略尖不可太鋒利恐摜瞳神以鵝毛管套收平日收藏匣內臨用供於佛前無有不驗此龍樹王菩薩神針也用水法凡撥金針之時須看患目者之人老弱肥壯若氣盛者欲行針之際前二三日先服退氣散血之劑數服平其五臟弱者不必服之臨撥新汲井水一盆放於桌上令患目者對盆就洗醫家側坐以手蘸水頻頻於眼上連眉稜骨淋洗使眼內腦脂得水乃凝以洗透數十遍冷定睛珠為度然後用針庶幾隨手而下並不黏滯矣撥內障手法凡撥眼要知八法六法易傳惟二法巧妙在於醫者手眼心眼隔垣見證手法探囊取物方得其法臨撥先令患者以水洗眼如冰使血氣不行為度兩手各握紙團端坐椅上後用二人將頭扶定醫人先用左手大指二指分開眼皮按定黑珠不令轉動次用右手持金針如撥右眼令患者視右方好下針庶鼻梁骨不礙手離黑珠與大眥兩處相平分中慢慢將針插下然後斜回針首至患處將腦脂撥下復放上去又撥下來試問患者看見指動或青白顏色辨別分明然後將腦脂送至大眥近開穴處護睛水內盡處方徐徐出針不可早出恐腦脂復還原位撥左眼側左鋭眥凡行針須用朔望對神祈佛通誠鄉貫姓名敬祝用針者亦逢朔望念咒七遍畫符一道封針臨用必先齋戒設供香燭之類又畫符一道取太陽神光接其眼光亦念咒大叫救苦救難南海觀世音菩薩其針自轉令用針者心膽大開不驚先畫後三光符下針宜天氣晴明用開成除收日忌子日開針三光符書符默念取日光接神光明目光咒曰清淨眼紫金燈灑灑水離黃沙滿藏經千手千眼千龍王文殊大士騎獅子普善菩薩騎象王目神夜裹云膜內障盡消除強中強吉中吉婆羅會上有殊利眼中一切得光明清靜般若波羅蜜封針符封眼法預收芙蓉半老緑葉曬乾為末用井花涼水調勻以綿紙剪圓塊如茶盅口大先將敷藥敷眼上眉稜骨及下眶以紙一層封貼藥上又上藥一層蓋紙一層封定俟將干以筆蘸水潤之日夜數次夏月倍之一日一換仰面而臥若將針眼向下就枕防腦脂從上覆下也起坐飲食大小二便俱宜緩不可用力震動三日內只用溫和稀粥爛熟肴饌不可震動牙齒三日後開封視物服藥靜養而已針後若目疼痛急取生艾或干艾同生蔥各半共搗銅鍋內炒熱布包尉太陽穴三五次即止若瞳神有油氣不清當平肝氣用檳榔枳殼柴胡之類作嘔吐用藿香淡豆豉薑製厚朴半夏之類火旺體厚者宜清火順氣消痰用黃連枳殼檳榔半夏麥冬瓜蔞之類老弱者有茯神熟地枸杞麥冬棗仁貝母白朮橘紅五味子白芍當歸之類針後忌用川芎恐行血作痛太陽頭痛用防風白芷羌活石膏之類痛甚用炒鹽尉之若白睛赤用柴胡紅花赤芍歸尾梔仁桑皮防風之類瞳神微散用白芍五味子麥冬茯神人參當歸酸棗仁之類受熱致瞳神細小者用寒水石當歸黃連麥冬茺蔚子柴胡炒梔仁之類若障復朦宜服平肝順氣之劑其障自退如不速退復再針撥亦可退氣散血飲大黃當歸身乳香沒藥連翹穿山甲白芷各等分上銼劑白水二盅煎至八分去滓食遠服愚按此症乃濕熱鬱積蒸爍腦脂下垂故珠內有膜遮蔽瞳仁之光猶如布慢懸於明窗之內外人雖見其窗似明孰知窗內有幔懸挂而不明也但今人以訛傳訛皆謂瞳仁反背其訛相延已久一時難以正之當知此症惟用金針入珠內撥去脂膜頃刻能明此論惟可與知者道難與俗人言也謹辨之以為後人垂鑑上龍木論金針開內障大法謹按其法初患眼內障之時其眼不痛不澀不癢頭不旋不痛而翳狀已結成者必俟歲月障老始宜金針撥去其翳如撥雲見日而光明也今具其略於後開內障圖圓翳初患時見蠅飛花發垂蟻薄霧輕煙先患一眼次第相牽俱圓翳如油點浮水中陽看則小陰看則大金針一撥即去滑翳翳如水銀珠宜金針撥之澀翳翳如凝脂色宜金針撥之浮翳藏形睛之深處細看方見宜金針撥之橫翳橫如劍脊兩邊薄中央厚宜針於中央厚處撥之以上五翳皆先患一目向後俱損初患之時其眼痛澀頭旋額痛雖有翳狀亦難針撥獨偃月翳棗花翳黑水凝翳微有頭旋額痛者宜針輕撥之冰翳初患時頭旋額痛者眼瞼骨鼻頰骨痛目內赤色先患一目向後翳如冰凍堅白宜於所經過脈針其腧穴忌出血宜針撥動不宜強撥偃月翳初患時微微頭旋額痛先患一目次第相牽俱損翳一半厚一半薄宜針先從厚處撥之棗花翳初患時微有頭旋眼澀目中時時癢痛先患一眼向後俱臀周圍如鋸齒輕輕撥去莫留短腳兼於所過之經針灸其腧散翳翳如酥點乍青乍白宜針撥之黑水凝翳初患時頭旋眼澀見花黃黑不定翳凝結青色宜針撥之驚振翳頭腦被打築惡血流入眼內至二三十年成翳翳白色先患之眼不宜針牽損後患之眼宜針撥之雖不痛不癢其翳黃色紅色者不宜針撥翳破散者不宜針撥中心濃重者不宜針撥撥之不動者曰死翳忌撥獨白翳黃心宜先服藥後針之若無翳者名曰風赤不宜針之白翳黃心翳四邊白中心黃者先服逐翳散次針足經所過諸穴後用金針輕撥撥若先損一目向後俱損烏風無翳但瞳人小三五年內結成翳青白色不宜針視物有花為虛宜藥補不宜藥瀉肝風無翳眼前多見虛花或白或黑或赤或黃或一物見二形兩眼同患急宜補治切忌房勞五風變初患時頭旋額痛或一目先患或因嘔吐雙目俱暗瞳子白如霜緑風初患時頭旋額角偏痛連眼瞼眉及鼻頰骨痛眼內痛澀先患一眼向後俱損無翳目見花或紅或黑黑風初患時頭旋額偏痛連眼瞼鼻頰骨痛眼痛澀先患一眼向後俱損無翳眼見黑花青風初患時微有痛澀頭旋腦痛先患一眼向後俱損無翳勞倦加昏重雷頭風初患時頭旋噁心嘔吐先患一目次第相牽俱變傷瞳神或大或小凝脂結白用針忌日子時在踝丑時在頭寅時在耳卯時在面辰時在頭巳時在乳午時在腳未時在腹申時在心酉時在背戌時在腰亥時在股針灸避人神論千金云欲用針灸先知行年宜忌及人神所在不與禁忌相犯即可故男忌除女忌破男忌戌女忌巳有曰神忌有每月忌有十二時忌有四季人神有十二部年人神九部傍通人神有雜忌傍通人神有血支血忌之類凡醫者不能知此避忌若逢病人危會男女氣怯下手至困通人達士豈拘此哉若遇卒暴急患皆不拘禁忌許希云卒暴之疾須速灸療一日之間止忌一時是也千金云癰疽疔腫喉痹客忤尤為急切凡作湯藥宜速不可避凶又曰凡卒暴急症並中風卒僕痰厥等症即用針灸治療若論忌神少緩則不可救此所以不可拘泥也若平居從容治病於末形選吉日避人神可也取十二建人神之忌時建日在足禁晡時除日在眼禁日入滿日在腹禁黃昏平日在背禁人定定日在心禁半夜執日在手禁雞鳴破日在面禁平旦危日在鼻禁日出成日在唇禁食時收日在頭禁寅時開日在耳禁午時閉日在目禁日映附前賢治目醫案補遺諸方十全大補湯治諸虛百損榮衛不和形體羸瘦面色痿黃腳膝痠疼腰脊倦痛頭眩耳重口苦舌乾骨熱內煩心忪多汗飲食進退寒熱往來喘嗽吐衄遺精失血婦人崩漏經候不調凡病後不爽及憂慮傷動血氣此藥平補有效白茯苓白朮土炒肉桂去粗皮川芎當歸身人參黃耆蜜制白芍熟地黃甘草炙各等分上銼劑水二盅生薑三片大棗一枚煎至八分去滓溫服不拘時候按經曰氣主煦之血氣濡之故用人參白朮黃耆茯苓甘草甘溫之品以補氣氣盛則能充實於肌肉矣用當歸川芎白芍藥地黃肉桂味厚之品以補血血生則能潤澤其枯矣七宣丸治風氣結聚宿食不消兼砂石皮毛在腹中及積年腰腳疼痛冷如冰石腳氣衝心煩憤悶亂頭旋暗倒肩背重痛心腹脹悶胸膈閉塞風毒腫氣連及頭面大便或祕小便時澀脾胃氣痞不能飲食腳氣轉筋掣痛攣急心神恍惚睡臥不安等疾錦紋大黃麵裹煨十五兩甘草灸四兩柴胡去苗洗訶黎勒皮枳實焙木香各五兩桃仁泡去皮尖焙乾六兩上為細末煉蜜為丸如梧桐子大每服二三十丸食遠臨臥米飲送下漸增至四五十丸取宣利為度覺病勢退愈則止服不問男女老少並宜服之量虛實增減神功丸治三焦氣壅心腹痞悶六腑風熱大便不通腰腿疼痛肩背重痛頭昏面熱口苦咽乾心胸煩躁睡臥不安及治腳氣並素有風人大便結燥火麻仁另搗如膏人參去蘆各二兩錦紋大黃麵裹煨訶黎勒取干皮各四兩上為細末另入麻仁膏擦勻加煉蜜丸如梧桐子大每服二三十丸滾白湯或溫酒米飲皆可送下食遠臨臥時服如大便不通可倍丸數以通利為度小柴胡湯治傷寒溫熱病身熱惡風頸項強急胸滿脅痛嘔噦煩渴寒熱往來身面皆黃小便不利大便祕澀或過經未解或潮熱不除及瘥後勞復發熱疼痛婦人傷風頭痛煩熱經血適斷寒熱如瘧發作有時及産後傷風並宜服之柴胡去蘆半斤人參去蘆甘草灸黃芩各三兩半夏湯泡七次焙乾二兩五錢上銼劑或為粗末每服三五錢水二盅生薑三片棗一枚去核同煎七分去滓溫服不拘時候小兒分作二服量其大小多寡按邪在表則惡寒邪在裡則發熱邪在半表半裡則惡寒且熱故寒熱往來少陽之脈行於兩脅故令脅痛其經屬於膽膽汁上溢故口苦膽者肝之腑在五行為木有垂枝之象故脈弦柴胡性辛溫辛者金之味故用之以平目溫者春之氣故用之以入少陽黃芩質枯而味苦枯則能浮苦則降君以柴胡則入少陽矣然邪之傷人常乘其虛用人參甘草者欲中氣不虛邪不得復傳入里耳是以中氣不虛之人雖有柴胡證而人參在可去也邪初入表裡氣逆而煩嘔故用半夏之辛以除嘔逆邪半在表則榮衛爭故用薑棗之辛甘以和榮衛二陳湯治痰飲之患或嘔吐噁心或頭眩心悸或中脘不快或發熱發寒或因食生冷脾胃不和半夏湯泡洗七次薑汁炒廣陳皮湯泡去白各一錢半甘草灸七分白茯苓一錢上銼劑水二盅生薑三片烏梅一個同煎至六分去滓不拘時溫服按水穀入胃無非濕也脾土旺則能運化水穀上歸於肺下達膀胱無濕氣之可留也惟夫脾弱不能制濕則積而為痰飲半夏之辛能燥濕茯苓之淡能滲濕甘草之甘能健脾陳皮之辛能利氣脾健則足以制濕氣利則積飲能行東南之人多有濕飲之痰故丹溪恆主之其曰加升提之劑者亦清氣升而濁氣自降之謂按此湯乃治一身之痰都管之要藥也欲下行加引下藥黃柏木通防己之類欲上行加引上藥升麻柴胡防風之類又曰二陳加升入之藥能使大便潤而小便長溫白丸治心腹積聚久癥癖塊大如杯碗黃疸宿食朝起嘔吐肢滿上氣時時腹脹心下堅結上乘搶心旁攻兩脅十種水病八種痞塞翻胃吐逆飲食噎塞五種淋疾九種心痛積年食不消化或瘧痰連年不瘥及療一切諸風身體頑痹不知痛癢或半身不遂或眉發墮落及療七十二種風三十六種遁尸疰忤及癲癇或婦人諸疾斷縮不生帶下淋瀝五邪煩心憂愁思慮意思不樂飲食無味月水不調及腹中一切諸疾有似懷孕連年屢月羸瘦困憊或歌或哭如有所使俱服此藥無不除愈川烏頭炮去皮臍二兩五錢紫菀去苗土葉柴胡去蘆頭石菖蒲厚朴去皮薑製桔梗皂角去皮子炒吳茱萸用湯洗炒乾薑炮黃連人參白茯苓肉桂去粗皮巴豆去心皮膜出油炒另研蜀花椒去目及閉口者微炒去汗各五錢上為細末另入巴豆拌勻煉蜜為丸如梧桐子大每服三丸薑湯送下食後臨臥服漸加到至五丸七丸通利則止再縮減四服川芎茶調散治男婦小兒諸風上攻頭目昏重偏正頭風疼痛鼻塞聲重傷風壯熱肢體煩疼肌肉蠕動膈熱痰盛婦人血風攻注太陽穴疼但是感風氣悉皆治之蘇薄荷去梗取葉不見火八兩防風三兩白芷川羌活甘草炙各二兩細辛去蘆八錢川芎荊芥穗各四兩上為細末每服二錢食後茶清調下或薑蔥煎服亦可一方加菊花殭蠶蟬蛻名曰菊花茶調散常服清頭目四物湯能調益榮衛滋養氣血治衝任虛損月水不調臍腹疴痛崩中漏下血瘕塊硬發歇疼痛妊娠宿冷將息失宜胎動不安血下不止及産後乘虛風寒內搏惡露不下結生瘕聚少腹堅痛時作寒熱當歸身去須酒浸微炒白芍藥酒洗川芎酒洗干熟地酒蒸各等分上銼劑白水二盅煎至八分去滓溫服按是方治血分之聖藥也用當歸引血歸肝經川芎引血歸肺經芍藥引血歸脾經地黃引血歸腎經惟心生血肝納血脾統血肺行血腎藏血男子化而為精女子化而為月水血有形之物屬乎陰故名曰四物湯經云氣血身之二儀也天地之道陽常有餘陰常不足人與天地相似故陰血難盛而易虧是方也當歸芍藥地黃味厚者也味厚為陰中之陰故能生血川芎味薄而氣清為陰中之陽故能行血中之氣然草木無情何以便能生血所以謂其生血者以當歸芍藥地黃能養五臟之陰川芎能調榮衛中之氣五臟和而血自生耳若曰四物便能生血則未也師云血不足者以此方調之則可若上下失血太多氣息機微之際則四物禁勿與之所以然者四物皆陰陰者天地閉塞之令非所以生萬物者也故曰禁勿與之涼膈散治男婦小兒臟腑積熱煩躁多渴面熱頭昏唇焦咽燥舌腫喉閉目赤疼痛鼻衄頷頰結硬口舌生瘡痰濕不利涕唾稠黏睡臥不寧譫語狂妄腸胃燥澀便溺祕結凡一切風壅等症並宜治之黃芩酒炒梔仁炒黑蘇薄荷各三兩連翹四兩大黃酒炒甘草炙元明粉各二兩上為粗末每服四錢白水二盅煎至八分去滓食遠熱服按是方黃芩梔子味苦而氣涼故瀉火於中連翹薄荷味薄而氣薄故清熱於上大黃芒硝鹹寒而味厚故諸實皆瀉用甘草者取其性緩而戀膈也不作湯液而作散者取其泥膈而成功於上也三黃丸治三焦積熱上攻眼目赤腫小便赤澀大便結燥五臟俱熱腸風痔漏等症並皆治之川黃連黃芩黃柏俱用酒潤炒各等分上為細末煉蜜為丸如梧桐子大每服三錢空心白滾湯送下忌煎炒辛辣椒薑等熱物按少火之火無物不生壯火之火無物不耗經曰壯火食氣是也故少火宜升壯火宜降今以三物降其三焦之壯火則氣得其生血得其養而三焦皆受益矣黃芩苦而枯故清熱於上黃連苦而實故瀉火於中黃柏苦而潤故瀉火於下雖然火有虛實是丸但可以治實火若虛者用之則火益盛謂降多亡陰也丹溪曰虛火宜補則虛實之辨若天淵矣明者當求之證焉一名三補丸三補云何謂以黃連黃芩黃柏三黃能瀉三焦之火火瀉則陰生故曰三補按是方乃瀉中之補非補中之補也若真以為補是向癡人説夢也程岩泉曰人皆知補之為補而不知瀉之為補知瀉之為瀉而不知補之為瀉真知言哉四季三黃瀉心丸治男婦三焦積熱上焦有熱攻衝眼目赤腫頭項疼痛口舌生瘡中焦有熱心膈煩躁不善飲食下焦有熱小便赤澀大便祕結五臟俱熱即生背癤瘡痍及治五般痔疾糞門腫或下鮮血小兒積熱亦宜服之大黃酒浸九蒸曬春秋二夏一各五兩黃連酒炒春四夏五秋三冬一兩黃芩酒炒春四夏秋六冬二兩上為細末煉蜜為丸或用水疊為丸亦可如梧桐子大每服三錢滾白湯送下按味之苦者皆能降火黃芩味苦而質枯黃連味苦而氣燥大黃苦寒而味厚質枯則上浮故能瀉火於膈氣燥則就火故能瀉火於心味厚則喜降故能蕩邪攻實此天地親上親下之道水流濕火就燥之義也青州白丸子治男婦半身不遂手足頑麻口眼喎斜痰涎壅塞及一切風他藥所不能療者小兒驚風大人頭風洗頭風婦人血風病宜服之天南星制三兩白附子二兩半夏以水浸洗過白大者用七兩川烏頭去皮臍五錢各生用上為細末以生絹袋盛用井花水擺未出者更為手揉令出如有滓更研再入絹袋擺淨為度放磁石盆中日曬夜露至曉棄水別用井花水攪又曬至來日早再換新水攪如此春五日夏三日秋七日冬十日去水曬乾後如玉片碎研以糯米粉煎粥清為丸如緑豆大初服五丸服至十五丸生薑湯送下不計時候如癱瘓風溫酒下二十丸日進三服至三日後當有汗便能舒展大承氣湯治陽明胃經積熱攻目其脈沉實睛珠疼痛眩運紅腫生翳纍發纍治久服寒涼之劑太過以致寒裹火邪結熱未除治宜瀉滿通大便不實熱可也錦紋大黃酒洗炒芒硝各三錢厚朴去皮炙枳實炙各二錢上為劑水四盅先煮厚朴枳實至二盅入大黃煎二三沸入硝煎溫服取利為度如不利再投一服按經云燥淫所勝以苦下之大黃之苦寒以瀉實熱枳實之苦辛溫收腸胃壅滯潤燥除熱又曰燥淫於內治以苦溫厚朴之苦辛溫破腹中結燥又曰熱淫所勝治以鹹寒芒硝之咸以攻蘊熱之堅痞白通湯治少陰腎水客寒自利宜通陽氣溫中散寒故用蔥白通氣助乾薑附子溫中散寒可也蔥白四莖乾薑二錢附子制過三錢水二盅煎服本方加人尿豬膽汁苦寒使熱藥不為寒氣所格乃內經所謂甚者從治之法是也十棗湯治傷寒熱內蓄伏飲以致頭疼心下痞滿引脅下痛乾嘔氣治宜下熱逐飲為當經云辛以散之故用芫花之辛以散飲苦以泄之故用甘遂大戟之苦以泄水大棗之甘以益脾土芫花錢半甘遂四錢大戟一錢大棗六枚上取白水二盅先煮大棗至八分入前三味共為細末每服二錢用大棗汁調服吐之為度導痰湯治風痰湧盛者半夏制二錢廣陳皮去白枳實去穰赤茯苓甘草炙膽南星各一錢上銼劑白水二盅生薑三片煎至八分去滓溫服去風痰者濕土生痰痰生熱熱生風也半夏陳皮茯苓甘草前之二陳湯耳加南星以治風痰入枳實去痰如倒壁保命集當歸湯治翳補益瞳人當歸身黃芩赤芍藥各一錢半柴胡川黃連各一錢甘草六分熟地黃二錢上銼劑白水二盅煎至八分去滓溫服保命集羚羊角散治冰翳久不去者羚羊角銼細末升麻北細辛各等分甘草炙減半上為細末一半煉蜜為丸每服五六十丸用一半為散以清水煎滾吞丸子食後送下散服二錢空心滾湯送下濟陰地黃丸治三陰虧損虛火上炎致目睛散大視物不真或昏花澀緊作痛畏明或卒見非常之處等症其功效與六味還少丹相似遼五味當歸山茱萸菊花肉蓯蓉山藥巴戟肉枸杞熟地黃麥冬去心各等分上為細末煉蜜為丸如梧桐子大每服四十丸空心白滾湯送下點眼藥法凡治目點眼藥必按時候每日須過已至午始點蓋人之陰陽與天地同子後一陽生午後一陰生正是陽生之際火亦生焉若點藥犯之則火勢難遏午後屬陰方宜點藥或膏或散或錠用犀簪骨簪如錠膏必蘸水乳磨化如散者則干挑俱先宜少點些微若目受藥再略多些不妨不可令患目者疼而怕點即系仙丹患者畏恨要在醫者輕手徐徐對病投藥命患者閉目仰面久不睜切戒妄想多言輕則可點二三次重則點三四次必用簪撥淨藥滓不可過點過多點則未必爽快恐激動其火反復增其患矣祕製點眼丹藥諸方靈飛散治目疾消腫止淚明目去翳退赤定痛收濕除爛一切等症爐甘石火煅通紅用童便淬如此七次水飛淨曬乾聽用每用一兩明硃砂琥珀珍珠牛黃真熊膽以上俱各另研膩粉各一錢靈藥二錢上和極勻每用牙簪挑少許點眼閉目片時再點又閉片時待藥性過然後用簪撥去藥滓溫水洗淨每日點二三次久閉為妙附靈藥方水銀黑鉛各五錢火硝八錢官硼二錢先將鉛化開入水銀作一家再加硝硼研勻入陽城罐內鹽泥封固打火三炷香先文後武待冷取出聽用按此靈飛散所宜制也是散也甘石收濕除爛靈藥磨翳撥雲若砂珀珠末牛黃熊膽者解毒清熱止淚退赤明目之品也凡目有外症者俱可用五膽膏治一切火熱赤眼流淚爛弦怕熱羞明或痛或癢等症熊膽鯖膽鯉膽豬膽羊膽川蜜等分上將膽蜜入銀銚或銅銚中微火熬膏取起用磁盒藏之出火毒點眼神良夫目證內熱則瞼赤肝熱則出泣微熱則癢熱盛則腫痛或癢或痛皆火之故也氣熱則神濁昏冒故令晝不能視物陽盛者喜水惡火故目不可以近燈光此經所謂天明則日月不明邪害深竅也五膽之苦是以清熱用蜜之潤是以濟火且諸膽者乃甲木之精也蜜者百花之精也皆有滋潤九竅之妙焉宋真宗皇帝敕封瓊液膏治目一切不療之火病等症熊膽牛黃硼砂蕤仁去殼皮淨肉黃連各一錢龍腦五分蜂蜜一兩上熊膽牛黃蕤仁黃連四味長流水二大碗傾於砂鍋之內煎至半錠用重綿紙濾過去滓入蜂蜜再用文武火熬至紫金色蘸起牽絲為度不可太過不及取出入硼砂龍腦研極細末和勻入磁罐內封固入土埋七日出火氣簪腳挑少許點於目內瞑目片時候藥過性方開每日點二三次仍忌一切動風之物紫金錠子治眼疾不分遠年近日諸般翳膜血灌瞳人胬肉攀睛拳毛倒睫積年赤瞎暴發赤腫白睛腫脹沙澀難開火燥緊澀怕日羞明眵多淚爛弦風癢視物昏花迎煙淚出目中溜火諸般目疾爐甘石煅飛黃丹各半斤當歸硼砂各五錢川黃連硃砂各一兩白礬生用硇砂制白丁香輕粉貝齒石蟹煅飛海螵蛸熊膽乳香沒藥白珍珠麝香各一錢二分半梅花片二錢其片麝入忌氣味走泄宜諸藥合畢加入上除腦麝外余各另製為末稱合和勻入黃連水研至千萬餘下自干次入麝香研細羅過又次入片腦再研復羅入後膏搜和作錠子陰乾豬胰子四枚以稻草挪洗去膏膜乾淨無油為度再用布包搗爛入藥生地黃當歸黃連一斤防風龍膽草黃柏各二兩訶子八枚蕤仁去皮殼五錢大鵝梨八枚冬蜜八兩另熬酥干為度上將當歸等八味洗淨銼碎以水浸於銅器內春夏三秋四冬七日濾去滓復添水熬三次取盡藥力以密絹綿紙重濾過澄去砂土漫水煎熬槐柳枝各四十九條互換一順攪不住手攪得此藥如飴糖相類入蜜和勻磁器盛放湯瓶口上重湯蒸燉成膏復濾淨滴入水中沉下成珠可丸為度待數日出火毒再溶化入末和勻杵搗為丸錠陰乾金銀箔為衣每以少許新汲水浸化開鴨毛蘸點眼大眥內又可以熱水泡化作洗眼藥亦可如水冷再暖用口洗五六次日點二三次大效陽丹藥品法制爐甘石眼科之要藥也選輕白者佳四兩用蘇薄荷羌活防風麻黃荊芥穗川芎白芷細辛發散之藥各二錢用清河水或雪水更妙四大碗煎至半去滓將甘石捶碎入藥中於瓶內煮乾為度此陰制用陽藥煎水法也又用龍膽草黃芩赤芍藥大黃生地黃黃連木賊草連翹劉寄奴黃柏夏枯草淨當歸千里光菊花山梔仁苦寒之藥各二錢用井水五碗春夏浸二日秋冬浸四日常以手攪之浸畢去滓將藥水分作清濁二碗將所煮甘石入陽城罐內大火煅紅鉗出少時先以濁水淬入再煅再淬以水盡為度此陽制用陰藥浸水法也又將前陰制煎水藥滓及陽制浸水藥滓共合一處浸水二碗去滓濾淨再澄清將煉過甘石傾內研攪浸露一宿飛過分輕重兩處曬乾上者為輕下者為重各研極細收藏輕者治輕眼重者治重眼此陽丹合制用藥之法也蓋甘石經火煉本陽藥也又用發散藥制度是辛甘發散為陽之象故以陽丹名又用陰藥為陰制者是陽中亦有微陰之象及治火毒法也陰丹藥品法制銅緑黃連水煮飛過陰乾一錢五分青鹽塊白水洗乳香各三分硇砂甘草水洗六分密陀僧飛過二分沒藥三分五釐又將前制陽丹爐甘石一兩共七味俱研極細勿令犯火所以為陰藥也中用陽丹甘石者為陰中有陽之象也但只用蘇州薄荷淨葉川黃連龍膽草三味各等分浸水二盞露一宿去滓濾淨水一盞入前藥在內調勻明月下露一宿而得月之陰氣次日曬乾又得日之陽氣也俟夜露日曬透干再研極細入後藥此制陰丹之法也川黃連去皮毛洗淨干六分三釐草烏新白者六分細辛去土葉五分胡黃連條實者洗淨干四分薄荷要蘇州淨葉洗淨曬乾三分以上五味乃疏風退熱之藥取象於五輪之義也各研極細拌勻用人乳和丸如小豆大用絹袋盛之懸於東屋角頭風乾再研極細篩過和前藥內共研勻又入後藥生薑粉用大鮮苗四五塊竹刀齊中切片剜孔以黃連末填內濕紙包火煨取出搗爛絹濾出薑汁放日中曬乾一分半硃砂明者飛過六分黃丹黃連水飛過曬乾研為細末白丁香真者飛過粉霜各一分螵蛸去粗皮研輕粉各一分半制牙砂硝四兩血竭艾熏研四分雄黃飛過分半珍珠五分細研以上陰丹藥味共和一處研極細用磁罐收貯是為陰丹藥雖頗峻但合時有輕重緩急之分而有病輕則輕病重則重之法也如用者須當斟酌配合陰陽法式前所制陰陽二丹無獨用之理所謂孤陽不生孤陰不長之義然配合之法其名有五取陰陽生五行之義也開列於後上藥研有先後二丹為先後所配如加粉砂礬味為次而片麝則又候諸藥研至極細時方可加入同研凡閣眼藥皆依此法而粗細須以舌嘗之大抵女人眼藥宜從右轉男子宜從左轉否則治目有反攻之患須識此意一九金丹陽丹九分陰丹一分硼砂一分二釐玄明粉風化一釐明礬一釐麝香二釐冰片三釐二八木丹陽丹八釐陰丹二釐粉霜二釐玄明粉風化二釐硼砂二分明礬一釐麝香二釐梅花片三釐三七水丹陽丹七分陰丹三分粉霜四釐硼砂一分麝香一釐冰片三釐此丹不用礬四六火丹陽丹六分陰丹四分粉霜六釐硼砂一分五釐明礬二釐麝香釐半冰片三釐陰陽合配土丹陽丹五分陰丹五分粉霜八釐硼砂二分明礬二釐麝香一釐冰片三釐用丹頭大要前所配合諸丹按陰陽生五行之義也其輕重之分則金丹為輕而木丹水丹則漸加重暴發赤眼近年翳膜可以酌點者也至若火土二丹則為峻重遠年老翳膜胬肉攀睛方可施治可暫點數次不可常點所謂邪輕則輕邪重則重又須量人眼內容受何如以意推裁不必拘執故曰神而明之存乎其人然點眼宜飽治重眼患乎吹若翳膜在眼珠上必吹可到吹較點多有神效眼輕則不宜吹吹點後則以桑白皮側柏葉煎水稍熱洗之一可以退散赤脈二可以洗去藥毒切勿用冷水洗忌寒涼點至將愈時則不可過點蓋留有餘不盡之意恐過點以致復發須識此意不換金撥雲丹治一切遠年近日翳障皆能復明大石蟹一個為則照後製法大黃桔梗川黃連黃柏黃芩防風荊芥穗羌活烏藥陳皮蘇薄荷枳殼乾薑前胡桑白皮薑黃細辛當歸木賊菊花柴胡各等分上將二十二味細銼用水五大碗放銅器內浸三日將布濾去滓卻將石蟹微火煅令紫色入藥汁內蘸冷取起細研為末就將藥水淘飛浮清者以淨器盛浮水安靜室勿動以物覆器上毋使塵垢入內俟其澄清傾去藥水以蟹粉暴乾取用配合後之諸藥蟹粉坯子各五錢熊膽明硼砂膽礬各二錢銀硃輕粉蕤仁霜硃砂各一錢川椒黃連夜明砂牛黃珍珠鷹條各五分巴豆霜血竭金墨各二分上各依製法合研一日極細無聲磁罐貯之聽用名曰丹頭隨病輕重加減點眼其效如神輕號丹頭五分冰片一分麝香三釐坯子一錢上共研極細專治一切風熱暴赤爛弦迎風冷淚怕熱羞明或兼半年一發或一年一發歇作無時悉以輕劑點之不可輕用重藥病輕藥重反受其害內服合病之劑為助次輕號丹頭六分冰片一分麝香三釐坯子一錢上共研極細專治久患不瘥珠上必生薄翳或有紅筋赤膜悉以此次輕藥點之每日三四次若見退減日點一二次愈則勿點重號丹頭七分冰片一分麝香三釐坯子一錢上共研極細治眼患頗重或翳障垂簾或赤帶痛澀用此吹點每日三四次目漸愈即止吹藥點數亦減內服稍輕藥為愈至重號丹頭九分冰片一分麝香三釐坯子一錢上共研極細專治重眼厚膜遮睛釘白翳昏盲無見方點此藥每日二三次漸愈漸減祕授制爐甘石法用好田泥做成大窩球二個外以硼砂硝朴不拘多少共為末即將所做窩二個日中暴乾極透用上好羊腦甘石一斤裝在窩內將球相合又用前硼砂鹽水調塗回濟又用泥包過以干為度大炭周圍架之居中煅至三炷香盡色如松花樣為度取出淬入童便內略輕研一遍浮上者逼在一處重濁不碎者裝入照前復煅又淬再研又逼所沉者石腳不用細末須炙烘得極干再用三黃湯開列於後煮過曬乾收貯聽用煮爐甘石三黃湯藥味川黃連黃柏川羌活黃芩山梔仁防風木賊草蟬蛻家菊花白芷蘇薄荷細辛當歸身川芎荊芥穗大黃赤芍藥連翹各等分上銼一劑白水四碗煎至二碗去滓澄清入煅過甘石煮之取汞粉法此粉如遇痰火症配痰火藥驚風症配驚風藥每劑中加四釐無有不效汞一兩鉛二錢五分鐵杓熔化另放冷定再將白礬牙硝皮硝皂礬各五錢青鹽二錢炒乾再入鉛汞共研極細入罐升打鐵盞扎好硼砂鹽泥固濟三釘駕於火上先用文一炷後武二炷為度武火時以新羊毛筆蘸水盞內畫圈香盡止冷開取用制硇砂法用好硇砂五錢以初生男兒乳汁濕透放古鏡背面碗蓋密布包定埋土內四十九日取出色緑的是活砂聽用眼科取靈砒法白砒五錢為末用牙硝白胰子一個切如豆大將砒拌勻用烏公雞一隻餓二日將胰喂之食盡半頓飯時殺雞取出淘淨入罐內封固打火三炷香取升盞靈砒再用多年老鵝油拌砒封固放淨處四十九日去油加蕤仁去殼皮五錢黃連三錢生砒五分俱為末再入罐內打火取出聽用爛翳方用虎掌草根燒灰點之胬肉並點亦妙點翳膜老障驗方凡難退翳障須用是藥點除如畏痛勿用治之明礬二兩要上好者人言七分番硇砂一錢共研細入陽城罐內打火先文後武罐口留一孔出煙以煙盡為度埋土中一宿去其火毒次早開出研極細末加銀硃一分二釐再研勻似桃紅色收貯罐內聽用收淚散治風淚不止緑爐甘石制煅飛細一錢海螵蛸五分梅花片少許共研極細點出淚竅處凡蟹睛不收捉大白花蜘蛛數個用陰陽瓦焙乾研細末或滾於丸藥上或溫酒調服即收神效敷眼諸藥方玉龍丹治一切火眼赤腫明礬六分沒藥二錢乳香二錢五分爐甘石煅飛過一兩珍珠一錢黃丹淨一兩麝香七分梅花片三分共研為極細煉蜜為丸銀硃五分為衣收貯聽用如用將井花涼水磨塗眼皮外立效散血膏治赤腫不能開睛痛熱淚如雨紫金皮白芷大象皮大黃赤小豆南星寒水石薑黃上各等分為細末生地黃汁調成膏敷眼四圍清涼膏南星生用蘇薄荷各五錢荊芥百藥煎各三錢上為細末井水調成膏貼眼角上自然清涼搜風散箍風熱眼及腫痛川黃連大黃朴硝上黃丹上等分為末以苦參同煎湯外加煉過白蜜同調敷眼四弦甚妙洗眼諸藥方碧霞丹治內外諸障當歸沒藥各二錢血竭白丁香硼砂片腦麝香牙硝乳香各五分黃連三錢銅緑一兩五錢為衣上為熬黃膏和丸如雞頭大每用新汲水半盞於磁盒內浸常用每一丸可洗四五日大病不過一月小疾半月冷淚三日見效洗爛弦風赤眼方其效如神此藥人家不可少無目病則以施人價廉工省濟人甚便苦參四錢五倍子荊芥穗防風黃連各三錢銅緑五分上為細末外以蘇薄荷煎湯丸如彈子大臨時用以熱水化開洗眼每日三次立愈神效洗眼紅棗兒治不論年久爛弦風眼俱可洗皮硝一斛滾水泡化澄清去滓取上好紅棗兒一斛去核入硝汁內浸一日取出曬乾又浸如此數次以汁盡為度將棗兒一個裝黃連末三分小者二分將棗仍舊合之勿令泄氣用時取棗一個投白滾湯泡之不時洗眼更妙治眼吹藥諸方立應散治內外障翳昏澀多淚及暴赤眼一切目疾並皆治之二次嗅鼻躑躅花減半香白芷當歸雄黃另研川附子炮鵝不食草洗淨各等分上為細末入麝香少許和勻含水嗅鼻內去盡濁涕眼淚為度碧玉散治眼睛腫脹紅赤昏暗羞明怕日隱澀難開疼痛風癢頭疼鼻塞腦鼻痠疼翳膜胬肉眵淚稠黏拳毛倒睫一切眼症羌活躑躅花蘇薄荷川芎防風蔓荊子北細辛荊芥白芷各一錢風化硝石膏煅青黛黃連各三錢鵝不食草三兩上為細末吹鼻中一日吹三次清火金針治少眼赤腫及頭痛牙疼者焰硝一兩青黛蘇薄荷淨葉川芎各五錢上為細末令患人口含水以管吹入鼻內濁涕熱淚去淨為愈赤火金針治赤眼頭風冷淚鼻塞耳鳴牙疼者焰硝一兩川芎雄黃沒藥石膏各一錢上為細末每用一二分如前嗅鼻三次通頂散治風毒攻眼並夾腦風香白芷細辛藿香葉川芎各七錢躑躅花三錢上為細末每令病人先噙新汲冷水一口然後蘆筒少挑嗅於鼻內以手擦兩太陽穴止痛藥方乳香丸治眼疼頭痛或而攻作而急遍身疼痛五靈脂二錢乳香沒藥草烏夏蠶砂各五錢木鱉子五枚上為細末酒煮麵糊為丸如梧桐子大每服七丸薄荷湯或茶清任意送下如頭疼痛甚三服即止按乳香沒藥總為定痛之要藥也必審其痛之源而佐之以乳沒則其效速也如有風而痛者用散風藥中加乳沒則痛可止如血滯而痛者當用行血藥中加乳沒而痛即止如熱鬱而痛者當用清熱藥中加乳沒而痛即止今人不工於此而惟恃乳沒定痛服之而痛不止不知治痛之所由也乳沒豈能奈之何哉而徒嗟其藥之不效弗思甚耳神仙拈痛散治一切暴發火眼疼痛晝夜不止生明礬揀上白明透者佳研極細如粉樣上用雞蛋清共礬粉調勻將鵝翎毛搽腫眼胞疼痛之處如干再搽數次其痛即止
