body:
  text: 卷三運氣原證按內經時行暴熱天氣亢和燥火犯淫邪風所侮民病目赤大要有三一曰風助火鬱於上經云少陰司天之政初之氣陽氣布風乃行寒氣時至氣鬱於上而熱目赤經云少陽司天之政二曰火勝二之氣侯乃大溫其病氣拂於上目赤三曰燥邪傷肝三之氣歲金太過燥氣流行經云陽明司天燥氣下臨肝氣上從脅痛而目赤雖其間病有不同大要不出此三侯也目痛經云有二一謂目眥白眼痛一謂目珠黑眼痛蓋目眥白眼疼屬陽故晝則痛甚點苦寒藥則效經所謂白眼赤脈法於陽故也目珠黑眼痛屬陰故夜則痛甚點苦寒藥則反劇經所謂瞳子黑眼法於陰故也凡目痛皆屬於熱之所致煩躁者氣隨火升也東垣云毛氣虛挹而熱輕手捫之熱在皮毛血脈也重手接之筋骨熱甚者熱在筋骨也不輕不重而熱熱在肌肉也又云晝則發熱夜則安靜是陽氣自熱於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名曰熱入血室晝夜發熱是重陽無陰也亟瀉其陽峻補其陰也婁全善用夏枯草治目珠痛至夜則痛甚者神效天行赤熱論天行赤熱謂目赤痛或睥腫頭重怕日羞明涕淚交流等病一家之內一里之中往往老幼相傳然有虛實輕重不同亦因人之虛實時氣之輕重各隨其所受而分經絡以發若人素無目疾體氣充實感染自輕輕則邪不勝正病至七日自愈益火數七之故耳七日不愈而有二七者乃再傳也二七不退者必有犯觸及本虛之故防生他症矣治法原以驅風散熱飲子及桑白皮散與瀉熱黃連湯未免過拘貽誤吾為酌之須審系何氣參以目赤條分經絡陰陽表裡以施方則善矣證治歌天行赤熱易相傳目赤羞明涕淚漣睥腫頭重兼畏日虛實輕重各相懸體分虛實須詳辨時氣輕重分自天感染自輕緣體實病至七日自安然若至二七猶睥腫必有犯觸故纏綿或體本虛乃至此拘執古方恐難痊審系何氣參目赤分明經絡是真詮從此制方當人妙醫師幸勿執成篇暴風客熱論暴風客熱之症原非天行赤熱爾我傳染之可比又非寒熱似瘧及目痛腫脹久積退遲之相類究其源乃因素養不清躁急勞苦客感風熱卒然而發也治法風勝者羌活勝風湯熱勝者局方洗心散東垣瀉熱黃連湯風熱俱勝者洗肝散瀉青丸主之證治歌暴風客熱病何因躁急勞苦養不清客感風熱卒然發風勝湯宜用羌活勝風湯熱勝則服局方洗心散東垣瀉熱黃連湯亦工風熱俱勝投何藥洗肝散進與瀉青丸局方洗心散熱勝者服治風壅壯熱頭目昏痛肩背拘急肢節煩疼熱氣上行口苦唇焦咽喉腫痛痰涎壅滯涕唾稠黏心神煩躁眼澀睛疼及寒壅不調鼻塞聲重咽乾多渴五心煩熱小便赤澀大便祕澀荊芥穗甘草當歸大黃煨赤芍藥麻黃各六錢白朮五錢上為末每服二三錢生薑薄荷湯煎服洗肝散治風毒上攻暴作目赤腫痛隱澀眵淚交流薄荷當歸羌活炙草梔仁炒防風大黃川芎上細研為末每服二三錢食遠沸湯調服瀉青丸治肝膽火併小兒急驚發搐眼赤睛痛龍膽草當歸川芎防風羌活山梔大黃上蜜為丸服四五十丸白湯下羌活勝風湯見風熱東垣瀉熱黃連湯見陰弱火脹大頭論火脹大頭者目赤痛而頭面浮腫皮肉燥赤也狀若大頭傷寒夏月多有此患有濕熱風熱之分濕熱者多淚而皮爛風熱者多脹痛而憎寒失治則血滯於內雖腫消而變症作矣治法宜以普濟消毒飲或住痛解毒丸審而用之證治歌火脹目赤若大頭皮肉燥赤頭面浮症見多於夏月有濕熱風熱共相作風熱憎寒多脹痛濕熱皮爛淚多流失治血旋滯於內腫雖消矣變堪憂治宜普濟消毒飲住痛解毒丸亦堪投方普濟消毒飲治大頭天行疫疾初覺憎寒體重次傳頭面腫盛不能開上喘咽喉不利舌乾口燥昔先師曰夫身半以上天之氣身半以下地之氣此邪熱客於心肺之間上攻頭目而為腫盛黃連黃芩各五錢白殭蠶炒一錢鼠黏子連翹陳皮板藍根黑元參柴胡桔根甘草梢馬屁勃升麻各二錢人參三錢上為末半用沸湯調時時服之半用蜜丸噙化之住痛解毒丸硼砂五錢沒藥五錢川芎荊芥穗朴硝白芷石膏家菊花各一錢麝香上為細末米糊為丸每服錢半溫湯送下怕熱羞明論怕熱羞明者何謂明熱之處而目痛澀畏避不能開也病目若此者十有七八病源在於心肝脾三經總而言之不過一火燥血熱分在陽分是以見明見熱則惡而畏之且惡陽而澀痛也此蓋陽虧故當陽光莫敵一居陰黑之所則清爽自如然亦有虛實之辨昔聞怕熱者有餘之症羞明為不足之候若目不赤痛而畏明者則又為血分不足膽汁少而絡弱不能運精以敵陽治法宜服明目細辛湯或歸葵湯審系陰虛則服決明益陰丸點則通用吹雲膏證治歌羞明怕熱起何經病發肝脾及在心總緣火燥兼血熱症在陽分故畏明陽虧難與陽光敵宜分虛實莫朦朧怕熱原屬有餘症羞明乃為不足人若不赤痛明偏畏血分不實病故生膽汁更少兼絡弱精不能運敵陽曛治法歸葵湯可用明目細辛湯亦靈審系陰虛宜補益決明益陰丸可陳通用吹雲膏點目自然光彩復明清方明目細辛湯治目赤微痛羞明怕日怯風寒眼睫成組眵糊多隱澀難開眉攢腫悶鼻塞大便微硬涕唾稠黏川芎四分藁本歸身茯苓各五分紅花細辛各二分生地黃酒製蔓荊子各六分防風羌活荊芥穗各一錢川椒十粒麻黃八分桃仁十個泡去皮尖上水煎臨睡溫服歸葵湯一名連翹飲子治目中溜火惡日與火隱澀小角緊久視昏花迎風有淚連翹紅葵花當歸人參甘草蔓荊子生地各五分升麻八分黃耆酒黃芩防風羌活各七分柴胡二分上水煎食遠溫服吹雲膏治隱澀難開睡覺多眵迎風寒泣羞明翳膜遮睛目中淚下防風青皮連翹四分生地一錢五分細辛一分柴胡二分甘草當歸各六分黃連三錢蕤仁去皮尖升麻各三分荊芥穗一錢上除連翹外用淨水一碗先熬諸藥去半碗連翹熬至一大盞去滓用文武火熬至滴水成珠加熱蜜少許熬勻點之決明益陰丸見七情瞼硬睛疼論附氣眼痛瞼硬睛疼者不論有障無障但兩瞼堅硬而睛疼若加以頭痛者尤急乃風熱在肝肝虛血少不能榮運於目無水以滋火反乘虛而入會痰燥濕熱或頭如縛血滯於睥內睛因火系而痛輕則內生椒瘡重則腫脹如杯瘀血貫睛等症作矣治法當急用協腫膏敷軟若硬不能軟或頭痛腦脹不退此頭風欲成毒之侯宜服二術散通肝散庶幾無誤氣眼復有所謂氣眼痛者何也益因怒氣過甚內傷心肝腎三經抑鬱太甚三經之氣不行而血亦阻遂致氣血妄行上衝於目其症或珠痛或白痛或眼眶紅腫治法宜酒調復無通氣散或加味逍遙散隨宜擇用可也證治歌瞼硬睛疼症非常有障無障總相妨兩瞼堅硬而睛痛若兼頭痛更宜防肝虛血少緣風熱無水以滋火為殃痰燥濕熱頭如縛血滯睥內受火戕重則如杯成腫脹輕者內亦生椒瘡瘀血貫睛等症作敷用協腫膏最良更或堅硬不能軟頭風腦脹勢倉皇此是頭風欲成毒二術散通肝散克擅長病症更名風眼痛心肝腎因怒氣傷抑鬱氣滯血復阻妄衝於目症宜詳珠痛白痛或赤痛更兼紅腫在眼眶治宜酒調元通氣散加味逍遙散罔不臧方協腫膏膩粉少許黃臘代赭石研各五錢細磁末黃柏末麻油各一兩上為極細末入銅杓內加油臘同煎為膏塗敷於硬瞼處二術散治瞼硬睛痛去翳障蟬蛻去頭足膽草黃連俱酒洗炒枸杞焙乾蒼朮米泔浸炒地骨皮白朮土炒丹皮上為細末每服一錢食後荊芥湯調下復元通氣散石決明草決明楮實香附木賊甘草蟬蛻去足川芎上為細末茶清調下加味逍遙散當歸酒芍柴胡白朮甘草茯苓丹皮梔仁上水煎服通肝散梔子蒺藜炒枳殼荊芥各四錢車前子牛子各二錢甘草四錢上為末每服二錢苦竹葉湯調下寒熱凡患寒熱者由風邪外客於腠理痰飲內漬於臟腑致血氣不足陰陽更勝之所作也陽勝則發熱陰勝則發寒陰陽交爭邪正相干則寒熱往來時發時止然此症與瘧相似而發寒不致戰栗發熱不致悶亂稍異也赤痛如邪論赤痛如邪謂目痛而赤且頭痛寒熱交作如風寒瘧疾狀也輕者一年數次重者一月數發非暴風客熱乍發之症所可比也究其病源系肝腎俱虛第有寒熱之分熱者內之陰虛火動邪熱也寒者榮衛虛損外之腠理不實而覺寒也治法宜首以小柴胡湯繼以四物湯或十珍湯酒調洗肝散之類主之若作風熱痰瘧以剛劑治之則血愈虛而病愈深矣證治歌何來赤痛竟如邪頭疼寒熱復交加輕則一年發數次一月數次重堪嗟病由肝腎俱虛弱症分寒熱可推查陰虛火動邪在內此為熱症本無差寒症原因營衛損腠理不實故多瑕小柴胡湯宜首服繼投四物湯亦嘉十珍湯與洗肝散勿投剛劑效無涯方小柴胡湯柴胡半夏人參甘草黃芩上入薑棗煎服四物湯當歸川芎熟地白芍上水煎服十珍湯治虛損血枯上攻目痛滋陰降火養血清肝生地酒洗二錢當歸酒洗錢半芍藥炒地骨皮炒知母鹽酒拌炒丹皮童便浸炒天門冬去心麥冬去心各一錢半人參甘草梢各五分上水煎溫服酒調洗肝散治實熱氣攻眼無時痛甚黑元參大黃黃芩梔仁炒生地知母桔梗歸尾元明粉上為細末每服二三錢食遠溫酒調下痛如針刺論附熱結膀胱目珠痛有如針刺者病源發在心經乃實火有餘之候若痛驀然一二處如針刺痛目雖不赤亦是心經流火別其痛在何部即以見病何經治宜服洗心散次服還睛丸及乳香丸補肝散按此症發因體虛目勞兼染淋濁之病營氣不能上潮於目而如針刺之痛者宜養其營若降火則殆矣原治用加減八正散在體強者則可虛者切禁熱結膀胱特目痛之症非止一二更有目痛而小便不通頭痛而寒熱並作所謂熱結膀胱症者治法宜五苓散或導赤散益元散擇而用之證治歌目珠疼痛刺如針實火有餘發在心經驀然數處如針刺亦是心經流火淫目雖不赤無拘泥當從部位細心尋洗心散與還睛丸乳香丸補肝散任酌斟體弱目勞兼濁染榮氣不潮宜養榮或投加減八正散但在體虛禍必臨更有目痛小便塞頭痛寒熱更交侵此為熱結膀胱症治法宜投散五苓或用益元散兼導赤散自然熱解若甘霖方還睛丸川芎白蒺藜木賊羌活熟地甘草菟絲子白朮上細末蜜丸彈子大空心熱湯嚼下加減八正散治心熱沖眼赤腫澀痛熱淚羞明兼治大小心經邪熱一切蘊毒咽乾口燥大渴引飲心忪面熱煩躁不寧唇焦鼻衄口舌生瘡咽喉腫痛小便赤澀或癃閉不通及熱淋血淋滑石甘草梢大黃麵裹煨木通瞿麥車前子梔子炒萹蓄上研極細末每服五錢燈芯三十段水煎溫服乳香丸五靈脂二錢乳香沒藥夏蠶砂草烏各五錢木鱉子五枚上為末酒煮麵糊丸梧子大每服七丸薄荷湯下補肝散人參茯苓川芎五味子藁本各一兩細辛茺蔚子半兩上細末每服一錢空心米飲調服五苓散白朮豬苓茯苓澤瀉肉桂上水煎服導赤散生地木通甘草上加竹葉二十片水煎服益元散粉甘草滑石上為細末每服二三錢新汲水調服洗心散見暴風客熱頭痛子和云頭痛不止乃三陽受病也三陽分部分頭與項痛者足太陽經也攢竹痛俗呼為眉稜骨痛者是也額角上痛俗呼為偏頭痛者足太陽經也如痛久不已則令人喪目以三陽受病皆胸膈有宿痰之所致也先以茶調散吐之吐訖可服川芎薄荷辛涼清上之藥叔和云寸脈急而頭痛是也大小雷頭風論雷頭風症不論偏正但頭痛挾痰而來痛之極而不可忍身熱目痛便祕結者曰大雷頭風若頭痛大便先潤後燥小便先清後澀曰小雷頭風大者害速小者稍遲然雖有大小之說而治則一若失之緩禍變不測目必損壞輕則米厭凸重則結毒宜早為之救以免禍成治法宜服清震湯加味補中益氣湯將軍定痛丸及藥枕方隨宜擇用誠如所治雖症急如雷要自有收雷定震之捷效也證治歌雷頭風症大小分不拘偏正總為凶頭痛挾痰更難忍身熱便閉大頭風小頭風症同頭痛小便後澀必先清大便先潤而後燥大小雖殊治則同治之稍緩目難保結毒緣重米厭凸輕治法清震湯宜進加味調中益氣湯工將軍定痛丸偕藥枕方隨宜擇用風自平方清震湯兼治發熱惡寒口渴升麻赤芍藥甘草荊芥穗黃連蒼朮米泔水浸一宿炒葛根蘇薄荷青荷葉上銼細末水煎熱服加味補中益氣湯治氣血俱虛頭痛嫩黃耆蜜制一錢升麻細辛各三分廣皮四分人參廣木香二分川芎蒼朮泔水制甘草炙當歸蔓荊子柴胡各五分上銼細水煎熱服將軍定痛丸治巔頂痛挾痰濕實者動輒眩暈黃芩酒洗七錢白殭蠶陳皮鹽煮去白天麻酒洗桔梗各五錢薄荷三錢青礞石煅白芷各二錢大黃酒蒸九次焙乾九次二兩半夏牙皂薑汁煮焙乾一兩上為細末滴水為丸如緑豆大每服二錢食後臨臥茶清吞下藥枕方治頭風目眩通草石菖蒲犀角銼末羚羊角銼末蔓荊子甘草防風各三錢細辛真川芎白芷藁本白朮黑豆一升半上為細末拌勻以生絹囊盛滿置在盒子內其盒形如枕枕時揭去盒蓋令藥氣入頭不枕即蓋之使藥氣不散枕之日久漸低再入前藥仍要滿實或添黑豆三五日後藥氣微則換之枕旬日或一月耳中雷鳴是藥抽風之驗也左右偏頭風論偏頭風症痛分左右兩不相涉左邊頭痛右不痛者曰左偏風右邊頭痛左不痛者曰右偏風世人往往不以為慮久則左發損左目右發損右目且有損左反攻右損右反攻左而兩目俱損者若外有赤痛淚澀等病則外症生若內有昏眇眩暈等病則內症生凡頭風痛左害左痛右害右此常病易知者若左攻右右攻左痛從內起止於腦則攻害也遲痛從腦起止於內則攻害也速若痛從中間發及眉稜骨內上星中發者兩目俱壞亦各因其人之觸犯感受左右偏盛起患不同遲速輕重不等風之害人至於此哉治宜審定所發陰陽經絡驗明症候而後於羌活芎藁湯柴芎湯蒼朮湯細辛湯吳茱萸湯升麻芷葛湯擇而下之庶幾無誤證治歌偏頭風症左右歧痛則損目各相隨更有損左還攻右損右攻左病愈奇赤痛淚瀝外症作內症昏眇眩暈滋痛從內起止於腦左右攻害尚遲遲痛從腦起止於內攻害最速急宜知痛發上星中眉稜骨內或自中間發更危觸犯感受原相異遲速輕重亦差池陰陽經絡須詳番症候精明始足醫羌活芎藁湯偕蒼朮湯柴芎湯與細辛湯宜升麻芷葛湯吳茱萸湯並因類修方總慎之方羌活芎藁湯治太陽經頭風頭痛夜熱惡寒半夏薑汁炒川羌活藁本防風白芷廣陳皮杏仁去皮尖白茯苓川芎甘草麻黃桂枝上銼細水煎服內熱加酒製黃芩薄荷葉生薑三片柴芎湯治少陽經頭風頭痛寒熱而嘔川芎白茯苓柴胡蘇薄荷炙甘草陳皮細辛製半夏黃芩蔓荊子等分上加生薑三片水煎食後服蒼朮湯治太陰經頭風頭痛腹滿不食蒼朮制白芍藥枳殼白芷炙半夏炙甘草白茯苓廣陳皮川芎升麻上加生薑三片水煎食後服細辛湯治少陰經頭風頭痛四肢厥但欲寢者細辛廣陳皮川芎製半夏獨活白芷白茯苓炙甘草上加生薑三片食後服吳茱萸湯治厥陰經頭風頭痛四肢厥嘔吐痰沫半夏薑製吳茱萸川芎炙甘草人參白茯苓白芷廣陳皮上加生薑三片水煎食後服升麻芷葛湯治陽明經頭風頭痛身熱口渴升麻家乾葛白芷蘇薄荷甘草石膏廣陳皮川芎製半夏上加生薑三片水煎食後服卒腦風論卒腦風者太陽內如錐似鑽一團而痛也若痛及目珠珠外有赤脈縱貫及瘀滯者必有外障之惡症來矣若珠不赤痛只自覺視如雲遮霧障漸漸昏眇者則內症成矣治法外症用羌活勝風湯內症用沖和養胃湯證治歌卒腦風症在太陽內如錐如鑽痛結團痛及目珠有瘀滯赤脈縱貫珠外傷必生外障成惡症珠不赤痛又分行云遮霧障漸昏眇將成內症更宜防外症羌活勝風湯妙內症沖和養胃湯方羌活勝風湯見風熱不制沖和養胃湯見陰弱不能配陽遊風論附邪風及五風變內障二症遊風者何謂頭痛無常信雖一飯之傾即遊易數遍而不能度其何所起止也此病若痛緩珠赤而外有障起者必變外障痛甚而腫脹緊急者必有瘀滯之患久而其目不治亦不赤痛但昏眇者則內障成矣治法外症用羌活勝風湯內症用沖和養胃湯急痛有瘀滯者用分珠散邪風變內障有所謂邪風症者何謂其人素有頭風因而目病或素目病因而頭風輕則一年數發重則一月數發頭風目病常並行而相害此症非若雷頭風火相搏激而瘀滯之急者又非天行赤熱而有傳染之邪與客風暴熱風火寄旅無定處及諸火脹頭痛之可比發若赤痛脹急則有外症之候若無赤痛而但內脹雖赤痛不甚且無瘀滯之症而但昏眇者則內障成矣通治以羌活勝風湯若見內外二症則通以卒腦風治法治之五風變內障諸風之治詳矣特五風變成內障一症又不可不究心也其候頭旋偏腫而痛甚瞳仁結白顏色相間卻無淚出日中如坐暗室常自憂嘆此乃五氣毒風腦熱所致治法宜除風湯皂角丸合生熟地黃丸證治歌遊風症發定無憑起止遊易莫能明痛發珠赤外有障甚痛腫脹緊急瘀滯凝久而不治惟昏眇並無赤痛內障成外症羌活勝風湯可用沖和養胃湯分內症工急痛有滯分珠散邪風一症更中論素有頭風因目痛或因目痛更頭風輕髮間來重發數頭風目病並均行赤痛脹急生外症惟覺昏眇內障萌羌活勝風湯並治內外二症或均增卒腦風治堪通用諸風症治已條陳更有五風成內障頭旋偏腫甚疼疼瞳仁結白顏相間卻無淚出目常昏五氣毒風兼腦熱治法湯宜用除風生熟地黃丸兼皂角丸管教風毒一時平方分珠散治眼患瘀血灌睛惡血不散槐花生地黃梔子炒黃芩赤芍藥白芷龍膽草荊芥甘草當歸尾上為末每服三錢水煎熱服春加大黃瀉肝夏加黃連瀉心秋加桑白皮瀉肺除風湯羚羊角車前子芍藥茯苓大黃黃芩芒硝人參各一兩上為末每服一錢水煎溫服皂角丸治內外一切障膜如十六般內障同生熟地黃丸用之亦效人參川芎各五錢龍蛻七條蟬蛻元精石生用當歸白朮土炒穿山甲炒白茯苓穀精草木賊各一兩白菊花赤芍藥連翹膽草刺蝟皮蛤粉炒各兩半獖豬爪蛤粉炒三十枚上為細末一半入豬牙皂角二條燒灰和勻煉蜜為丸如梧子大每服三十丸空心杏仁湯送下一半入仙靈脾一兩為末和勻每服一錢用豬肝夾藥煮熟細嚼及用原汁湯送下月進三服生熟地黃丸石斛枳殼防風牛膝各六兩生地熟地各一斤半菊花一斤羌活杏仁各四兩上細末蜜丸梧子大每服三十丸以黑豆三升炒令煙盡用好酒淋之每用半盞食前送下或蒺藜湯下羌活勝風湯見暴風客熱沖和養胃湯見陰弱附方加減知母湯治遊風症知母二錢黃耆白朮羌活防風甘菊花蔓荊子天麻棗皮藁本川芎當歸各一錢細辛甘草各二分上水煎溫分二服頭面腫加牛子炒研二錢巔頂風論謂天靈蓋骨痛極如錐如鑽也陽分痛尤甚陰分痛稍輕病源系夾痰濕者每痛多眩運治宜羌活勝濕湯或東垣除濕防風湯若痛連及珠子而脹急瘀赤者乃外症之惡候若但昏眇則成內障矣治分內外用藥同前卒腦風症須審擇之證治歌巔頂風症更需詳天靈蓋骨痛非常如錐如鑽痛奚辨輕則屬陰重屬陽若夾痰濕多眩運羌活勝濕湯東垣除濕防風湯良脹急瘀赤珠皆痛外症惡候最宜防若成內障惟昏眇治分內外以修方卒腦風症宜參看用藥始不致荒唐方東垣除濕防風湯防風二錢白朮白茯苓白芍藥各一錢蒼朮酒浸去皮四錢上水煎食前服羌活勝風湯見暴風客熱眉骨痛按眉稜骨痛有二眼屬肝有肝虛而痛才見光明則眉骨痛甚宜服生地丸有眉稜骨痛目不能開晝夜劇宜導痰丸湯之類加入芽茶二陳湯吞清州白丸子亦效甫見眉稜骨痛者多是肝火上炎怒氣甚者多有此病其謂風症亦火之所致熱甚生風是也大抵抑肝火有風痰則兼而治之陰邪風論附陽邪風陰邪風者必額角板骨眉稜骨痛也多發於太陽用事之時元虛精弱者則為內症兼火者則為外症治法表症多者宜服加味柴胡湯或選奇湯風熱上攻者宜服祛風上清散肝虛者宜服生熟地黃湯因風而頭痛眉骨痛眼眶俱痛者宜服上清散此治陰邪風之通法陽邪風若所謂陽邪風一症則但腦後枕骨疼痛其病多發於太陰用事之月發則有虛昏耳鳴之患久而不治內障成矣治法宜服小芎辛湯風寒甚而在腦者宜防風羌活湯若風熱上攻眼昏耳鳴鼻塞頭痛逆痰涎嗽心腹疼痛大小便澀者宜服子和搜風丸若變成內障則宜服磁石丸審症下方陰陽二邪之病有不治者乎證治歌陰邪風症多痛疼額角板骨及眉稜病在太陽用事日元虛精弱內症名外症必須兼有火表症多者治法陳加味柴胡湯選奇湯妙肝虛生熟地黃湯工風熱上攻何藥治祛風上清散奏功因風頭痛眉骨痛眼眶俱痛服上清散更有陽邪風獨異其月用事屬太陰病惟腦後枕骨痛發則虛昏耳更鳴久而不治成內障治法宜服小芎辛湯風邪若甚而在腦防風羌活湯最靈風熱上攻同鼻塞耳鳴頭痛並眼昏逆痰涎嗽心腹痛二便俱澀而不通子和搜風丸可用若成內障更當尋磁石丸進堪奏效辨症下方仔細詢方加味柴胡湯柴胡酒芩荊芥穗製半夏防風前胡甘草川芎香白芷蘇薄荷上加生薑三片水煎食後服驅風上清散治風熱上攻眉稜骨痛酒黃芩二錢白芷錢半川芎一錢二分羌活柴胡梢防風各一錢荊芥八分甘草五分上細末每服四錢水煎食後服上清散治因風頭痛眉骨眼眶俱痛乳香另研沒藥研各一錢腦子另研五分赤芍藥川芎薄荷芒硝荊芥穗鬱金各五分上細末每用二分半口噙水鼻內搐之甚妙選奇湯防風羌活各二錢黃芩一錢用酒炒冬不用熱痛者加之甘草三錢夏用生冬炙上水煎稍熱食後服小芎辛湯青黛蔓荊子鬱金紅豆芒硝石膏細辛根薄荷川芎防風羌活湯治眉稜骨痛而風寒在腦或感痰濕及腦昏痛防風川羌活半夏薑製黃芩酒洗川芎南星薑製北細辛白朮土炒甘草上水煎熱服子和搜風丸治風熱上攻眼昏耳鳴鼻塞頭痛眩暈逆酸涎嗽心腹疼痛大小便澀滯天南星薑製蘇薄荷人參茯苓各五錢黃芩半夏薑製乾生薑蛤粉寒水石生白礬大黃各一兩藿香二錢滑石黑牽牛各一兩上為細末水疊為丸每服二三錢量其體之虛實酌用生薑湯送下日進三服此方雖名搜風其實乃下實熱痰症藥也磁石丸治以上頭風變成內障者磁石燒紅醋浸三次乾薑炒牡丹皮玄參各一錢附子炮二錢上細末煉蜜為丸如梧子大每服十丸食前茶清下生熟地黃湯治目不光明眉骨痛甚此係肝虛法當養血涼血益血痰火降而風熱除熟地黃甘草生地五味子天門冬當歸身酒芩枳殼地骨皮川黃連人參柴胡上銼細水煎食遠服赤痛內經目赤有三一曰風助火鬱於上二曰火盛三曰燥邪傷肝戴復菴云赤有數種氣毒赤者熱壅赤者有時眼赤者無非血壅肝經所致蓋肝主血通竅於眼赤血病也目赤論目赤之病原遺治法抑思目之為病赤者甚多言治遺之豈不令人見此症而束手無策耶試詳輯而補益之當考目赤通治以黑神散消風散等分白湯調之睡時靜服仍用豆腐切片敷其上鹽就者可用酸醬者不可用風熱赤甚者於黑神消風散二藥二藥以米泔浸二對朝取出放置當風之處以瀝米泔睡時冷調洗肝散或菊花散仍進四物湯內用生地赤芍只須半貼食後作一服卻加赤茯苓五分酒蒸大黃一錢早晨鹽湯下養正丹二三十粒若不便於過涼則不必用洗肝散宜黑神散二錢消風散一錢尋常赤眼用黃連研末用大菜頭一個切片作蓋剜中心作一竅入連末在內復以蓋遮住竹籤簽定慢火內煨熱取出候冷以菜頭中水滴入眼中若赤眼久不愈用諸藥無效者早起以蘇子降氣湯下黑錫丹日中以酒調黑神散臨睡以消風散下三黃丸此數藥不獨治久病赤眼凡諸目疾皆可治之海藏云目赤暴作雲翳痛不可忍者宜四物龍膽湯眼赤暴發腫者以散熱飲子瀉青丸肝藏實熱眼赤疼痛者竹葉湯龍膽飲決明子湯瀉肝散因服涼藥太過而目赤不痛者內服助陽和血補氣湯外用碧天丸洗之目赤腫而足寒者必時時溫洗其足並詳赤脈處屬何經灸三里臨泣崑崙等穴立愈有赤眼癢痛者煎枸杞汁服之若暴赤眼以古銅錢刮淨姜上取汁於錢唇點目使熱淚出隨點隨愈有瘡者不可用或削附子赤皮末如蠶屎著眥中或本事針頭丸皆治陰病目赤九節黃連秦皮粗末加滑石煎湯洗或用艾燒煙以碗蓋之候煙上煤取下入黃連以溫水調洗及前煨大菜頭汁皆治陽病目赤此中不可不辨也證治歌目赤由來治法無因為採輯著成書通治黑神散消風散二方調以白湯俱宜待睡時才靜服豆腐還須切片敷風熱赤痛仍前藥冷調洗肝散菊花散儲仍投四物湯用生地赤芍同煎美可姑服後覺加赤芍藥酒蒸大黃同進是良謨晨以鹽湯吞養正丹若嫌涼甚又分沖散號洗肝宜禁用黑神散與消風符熱眼宜點黃連藥此宜精製勿模糊赤眼不瘳宜蘇子降氣湯丹吞黑錫熱能除日中酒調黑神散臨睡消風散不記吞下三黃丸最妙諸病能醫可反陽目赤暴作云醫痛四物龍膽湯痛可舒眼赤暴腫散熱飲子瀉青丸進亦相如肝藏實熱眼赤痛助陽和血補氣湯扶外用碧天丸洗目能清實熱自恬愈赤腫足寒勤溫洗赤絡宜尋經絡區三里臨泣崑崙等穴灸之立愈保無虞赤眼癢痛宜何藥汁用枸杞莫踟蹰暴赤銅錢刮薑汁點出熱淚效並迂有瘡宜禁莫輕點附子赤皮末相孚本事針頭丸亦好皆治陰病信非虛目赤更堪用洗法黃連秦皮滑石輪用艾燒煙將碗蓋煤調黃連末法攸殊前用黃連精製法皆醫陽病戒拘墟方局方黑神散熟地當歸尾白芍藥蒲黃炒肉桂乾薑炒甘草黑豆炒去皮上精配水煎酒童便生地汁相和調服消風散治風熱上攻頭目昏痛荊芥厚朴薑汁泡炙草羌活殭蠶人參川芎蟬蛻陳皮去白防風藿香茯苓上為末每服三錢茶湯下菊花散白蒺藜炒去刺羌活去蘆不見火木賊去節蟬蛻去翅足各三兩菜花去梗六兩上細末每服二錢食後茶清調下養正丹水銀黑錫火熔去渣硫黃研硃砂研細各一兩上用鐵盞熔錫成汁次下水銀以柳條攪次下硃砂攪令不見星子放下少時方下硫黃末急攪成汁和勻如有焰以醋灑之候冷取出研細糯米和丸鹽湯下或棗湯下蘇子降氣湯蘇子半夏前胡厚朴薑製陳皮當歸炙草肉桂上加姜水煎服黑錫丹黑錫硫黃各二兩上將錫熔化漸入硫黃候結成片傾地上出火毒研至無聲為度三黃丸治三焦積熱頭項腫痛目赤口瘡大黃酒蒸曬九次黃連黃芩上細末蜜丸白湯下四物龍膽湯川芎當歸生地白芍各五錢羌活防風各三錢膽草酒拌炒焦防己各二錢上水煎服散熱飲子防風羌活黃芩黃連各一兩上每服五錢食後溫服大便祕加大黃痛甚加川芎當歸地黃煩躁不得臥加梔仁龍膽飲膽草梔仁各二錢防風茵陳川芎玄參荊芥菊花楮實甘草各一錢上細末每服一錢半食後茶清調下竹葉湯麥冬錢半茯苓黃芩各一錢人參五分淡竹葉十片上水煎服一方以苓為君無人參有防風一方無人參有防風知母決明子湯決明子炒苦竹葉柴胡黃連防風升麻各七錢半細辛二錢半菊花甘草炙各五錢上每服五錢水煎食後溫服瀉肝散梔仁荊芥大黃甘草上銼細每服二錢水煎食後服碧天丸瓦粉炒一兩銅緑七分枯礬二分上研銅緑枯礬極細旋入瓦粉研勻熟水和之共為丸每用一丸熟湯半盞浸一二時洗眼洗至覺微澀為度少閣眼半時臨臥再洗瞑目就睡一丸可洗十日此藥治其標裡實者不宜用此當瀉其實熱本事針頭丸川烏尖七枚白殭蠶七枚去嘴硼硝十枚上為細末用豬膽汁調成軟塊攤碗內另用荊芥艾各一兩小皂角一條燒將藥碗覆熏之常將藥膏攪勻又熏以皂角荊芥艾燒盡為度再做成塊用油紙裹入地中出火毒冬天兩日夏一夜春秋一日夜取出丸如針頭大每用一丸點眼中妙四物湯見目痛如邪助陽和血湯見總論洗肝散瀉青丸見暴風瘀血貫睛論瘀血貫睛其病最毒若人偏執已見不聞開砭者其目必壞初起不過紅赤次後紫脹又後則白珠皆脹起甚則脹為形如虯筋蓋其病乃血灌睛中瘀塞不通在睥則腫脹如杯及椒瘡之患在珠則白輪湧起凝脂黃膜痕米厭成窟花翳白陷鶻眼凝睛及青黃蝶出諸等惡症凡見白珠赤紫睥腫虯筋紫脹敷點不退者必有瘀滯在內再翻脾內視之若睥內色暈泛浮椒瘡粟瘡者皆用導之法則吉不然將有變症生焉治法宜服宣明丸分珠散或通血丸證治歌瘀血貫睛症若何在睥腫脹粟瘡羅白輪湧起敷難退赤紫虯筋病症多瘀滯於中脾色暈均宜導法任調和宣明丸通血丸宜服或用分珠散仍起疴方宜明丸治瘀血貫睛赤腫澀痛大熱壅上赤芍藥當歸尾黃連大黃黃芩生地黃薄荷葉川芎上為末煉蜜為丸如梧子大每服三錢食後米飲下通血丸生地赤芍甘草各五錢川芎防風荊芥當歸各一兩上為末蜜丸食後荊芥薄荷湯下血既散而歸肝又恐目生花須再服還睛散分珠散見遊風血灌瞳神論血灌瞳神者謂視其瞳神不見黑瑩且見一點鮮紅若見紫濁病為尤甚初一二日尚可以救遲則不治蓋此症因腎之真一有傷膽中精汁皆損元陽正氣俱耗故此一點之神光不見而血之英色來乘腎部患此者十難治一非惟目之難治其命亦恐不久豈比火入血分瘀凝有形之急者比乎治法宜服四物湯用赤芍生地或益陰腎氣丸一方用生地汁溫服一盞其餘墜血凝目飲摩沙石散及落紅散之類不惟無濟恐反滋伐削用者慎之證治歌瞳神不見匪無妨腎水元陽膽汁傷症見鮮血剛一點或生紫濁病非良益陰腎氣丸宜服醫此尤需四物湯生地黃分杵汁服赤芍煎偕生地黃其餘墜血凝目飲以及摩沙石散方更有落紅散諸藥投之決定反招殃方摩挲石散摩挲石少許曾青龍腦石膽各一分上研極細粉每日早晨夜後點眼落紅散治貫瞳神致成紅障穿山甲炒桔梗炒硇砂研細另入人退焙各三錢鵝不食草紙烘焙為末穀精草紙焙蟬蛻去頭足蛇蛻二退入甘草水洗淨焙乾各一錢上為細末吹入鼻中次日以筒吸目漸次為之自然障落適吸筒法用好銅打成漏斗相似留一竅用豬脂薄皮扎筒竅上如臨用時以筒安病人目上醫者吸氣一口次看其翳輕重漸吸則漸除矣四物湯見赤痛如邪益陰腎氣丸見總論色似胭脂論色似胭脂一症其白睛不論上下左右但見一片或一點紅血儼似胭脂抹者是也此其病因血熱妄行不循經絡偶然熱客肺膜之內滯成此患抑有因嗽起者皆肺氣不清之故治宜服退赤散庶乎肺清血散而病止矣證治歌白睛何忽似胭脂上下左右無定之蓋以血熱妄行故偶客肺膜乃如茲或因咳嗽而成病肺氣不清當熟思治法宜投退赤散肺清血散效堪期方退赤散桑白皮蜜制甘草天花粉黃芩酒洗栝蔞仁去殼油為霜牡丹皮酒洗桔梗赤芍藥歸尾上細末每服二錢麥門冬去心煎湯調下赤系虯脈論赤系虯脈者謂氣輪有赤脈赤虯常時如是也然有不同或因目痛火雖退而不守禁戒致血滯於絡而赤者或因風沙煙瘴親火內熱鬱氣勞心怨積酒燥竭視勞瞻致有鬱滯而赤者有痛不痛有有淚無淚有羞明者為病不等當以六脈為主從何部分而來或穿連某位即別其所患在何經絡或傳或變自病合病等證分其生克承製然後因其症而分其經以治之外治蕤仁膏魚膽敷眼膏內服退熱散證治歌氣輪有絲脈赤虯其症如斯亦有由目痛火退不能禁血滯於絡致生憂或因風沙煙障起親火內熱鬱勞愁怨積酒燥兼竭視致有鬱滯易招尤有淚無淚痛不痛羞明與否不相侔當從六脈尋部分生克承製貴精搜外治蕤仁膏及魚膽敷眼膏內治退熱散堪投方點眼蕤仁膏治風熱眼飛血赤脈癢痛無定蕤仁去殼去皮心膜油取霜五錢好酥一栗子大上將蕤仁與酥和勻研攤碗內用艾二小團燒煙出將碗覆煙上熏待艾煙盡即止重研勻每以麻子大點眼兩眥頭日二度魚膽敷眼膏鯉魚膽五枚黃連去須研五錢上以膽汁調黃連末磁合盛飯上蒸一次取出如干入蜜少許調似膏塗敷目眥日五七次退熱散見癢如蟲行赤脈貫睛論赤脈貫睛者或一赤脈或二三赤脈不論粗細多少但在這邊氣輪上起貫到風輪經過瞳外接連那邊氣輪為症甚不易治細者稍輕粗者尤重從上下者重從下上者稍輕貫過者有變症絲粗及有旁系虯亂者亦有變症凡外障有此等脈罩者亦不易退貫雖未連而侵入風輪或一半或三分之二之一皆不易退蓋礙生氣之故也治宜芍藥清肝散證治歌赤脈貫睛無定評氣輪直起貫風輪經過瞳外相傳接粗細上下重輕分細者稍輕粗較重自上而下甚傷人自下而上猶易治貫過定多變症生絲粗或有旁絲亂皆生變症勿輕心外障有此俱難退貫雖未連風輪已侵治宜芍藥清肝散應除障翳復光明方芍藥清肝散見總論白痛白眼痛有表裡等症或疼極而痛從外走內者宜溫之散之有不紅腫而澀痛者火伏氣分瀉白散為主有白珠變青藍色乃郁邪蒸逼走散珠中極宜調氣以養之白澀論白眼之證多有赤脈視其從上而下者太陽病也羌活為使從下而上者陽明病也升麻為使從外走內者少陽病也柴胡為使若惡寒脈浮為有表宜選奇湯脈實而大便閉為在裡宜瀉青丸微利之亦有不腫不紅但如沙澀昏痛乃氣分隱伏之火脾肺絡有濕熱秋天多有此患通用桑白皮散證治歌白澀之症可明標赤脈異起各分條從上而下太陽病羌活為使治法昭陽明則從下而上使用升麻病自消從外走內少陽病柴胡為使法超超惡寒脈浮病在表惟有選奇湯可療在裡脈實大便閉瀉青丸進效堪邀不紅不腫惟昏痛氣分隱伏火如燎濕熱藏於脾肺絡桑白皮散效最饒方桑白皮散桑皮升麻旋覆花杏仁甜葶藶炒黃芩玄參赤芍甘菊花防風枳殼去瓤麥炒甘草各一兩上㕮咀每服四錢生薑三片水煎食後溫服選奇湯見陰邪風瀉青丸見暴風附方瀉肺湯治暴風客熱外障白睛腫脹羌活元參黃芩各一兩地骨皮桔梗大黃芒硝上藥各一兩為末每服五錢水煎食後溫服玄參丸治肺臟積熱白睛腫脹遮蓋瞳人赤澀疼痛升麻防己梔仁炒杏仁泡去皮尖炒火麻仁車前子玄參沙參桑皮羚羊角屑大黃微炒上為末蜜丸每服二十丸食後溫湯下硃砂煎治白睛腫起赤澀痛疼硃砂杏仁去皮尖青鹽各二錢半馬芽硝黃連各五錢上研細綿裹以雪水二合浸一宿濾入瓷盆內每用以銅筋點之白珠俱青論目珠俱青者乃白珠變成青藍色也病症尤急蓋氣輪本白被郁邪蒸逼走入珠中膏汁游出入於氣輪之內故色變青藍瞳神必有大小之患治宜服還陰救苦湯或天麻湯然各因其病而治其本譬之頭風者風邪也傷寒瘧疾痰火熱邪也因毒者毒氣所攻也仿此推治其無失矣證治歌白珠何忽變青藍郁邪蒸逼病源探漸至瞳神分大小還陰救苦湯天麻湯諳更須推本以求治審慎修方勿二三方天麻湯天麻家菊花川芎當歸身羌活白芍藥甘草上精配水煎食後熱服傷寒瘧後白珠青者加柴胡麥門冬去心黃芩天花粉毒氣所攻白珠青者加黃芩牛蒡子炒研連翹黃連還陰救苦湯見心火乘金目癢癢有因風因火因血虛而癢者大約以降火為主然有為血行而癢目將復明火散發癢宜平肝滋榮為主癢如蟲行論癢如蟲行之症謂癢若蟲行而癢不可忽也非若常時小癢之輕而比過此須驗目上有無形症決其病之進退至於有障無障皆有癢極之患然病源非一有風邪之癢有血虛氣動之癢有虛火及邪退火息氣血得行脈絡通暢而癢者大抵有病之目久延不治癢一番則病重一番若醫治後而作癢者病必速去若癢極難當時時頻作自覺低陷者命亦不久矣有極癢而目脫者死期至矣癢而淚多者血虛挾火總之痛屬實而癢屬虛雖火乘虛而入非本病也治法因風而癢者驅風一字散因火而癢者退熱散因血虛而癢者四物湯因肝熱澀癢昏蒙者人參羌活湯眼瞼癢極抓至破爛者廣大重明湯證治歌癢不可忍若蟲行病勢須從形症徵有障無障皆生癢病源不一貴分明目若有病久不治一番生癢病旋增癢從醫後必速愈極癢目脫死期臨癢極難當時頻作覺如低陷命將傾血虛挾火癢多淚癢痛相殊可別論癢屬虛兮痛屬實火乘虛入病非真治法因風驅風一字散因火而癢退熱散工四物湯除血虛癢肝熱澀癢致昏蒙人參羌活湯能治眼瞼癢極更須詢甚至破爛何藥洗廣大重明湯奏功腎風作癢四生散風毒癢生菩薩散靈方驅風一字散治目癢極難忍川烏炮川芎荊芥穗各五錢羌活防風各二兩五錢上為細末每服一錢食後薄荷湯下人參羌活湯治肝熱澀癢昏朦赤茯苓人參羌活獨活枳殼細甘草地骨皮川芎柴胡桔梗前胡天麻上水煎熱服癢甚者加防風荊芥穗廣大重明湯治兩目瞼赤爛熱腫痛並稍赤及眼瞼癢極抓至破爛眼𥈮生瘡痂目多眵痛隱澀難開防風川花椒龍膽草細辛甘草上銼如麻豆大內甘草不銼先以水一大碗半煎龍膽草一味至一半入餘三味煎至小半碗去滓用清汁帶熱洗以重湯頓令極熱日用三五次洗畢閣眼須臾癢亦減矣退熱散赤芍藥木通梔仁炒黃柏鹽水炒黃芩酒炒歸尾黃連炒生地甘草梢丹皮上每服五錢水煎熱服四生散治腎風上攻作癢白附子黃耆獨活蒺藜上細末每服二錢用豬腰一枚批開入藥濕紙包裹煨熟細嚼鹽湯下菩薩散治風毒攻眼昏淚風癢蒼朮防風蒺藜炒各二兩荊芥三兩半甘草鹽水炒七錢半上為末每服一錢入鹽少許沸湯調下龍膽丸治兩胞黏瞼眼皮赤爛成瘡疾苦參龍膽草牛蒡子上為細末煉蜜為丸梧子大每服二十丸食後米飲下腫脹按腫脹有風熱上攻有燥火客邪或黑珠疼甚或白睛腫痛皆因肝經實熱或眵熱於肺俱宜清火散風治之腫脹如杯論腫脹如杯者謂目赤痛脾脹如杯覆也是邪火有餘肝木受克而火不能生故火邪乘虛而為炙燥之病其候珠必痛而睥緊硬若暴風客熱而作痛且必多熱淚大抵此病風熱外感易治若木火內攻則病退遲重則瘀滯塞目血灌睛中而症變莫測其治必須開導輕則敷治可退若敷之不退退而復反開導不消消而復生痛連頭腦或腫愈高而睥愈實此風熱成毒也治宜內服散熱消毒飲子點以金絲膏證治歌病生腫脹竟如杯邪火有餘肝受災火邪乘虛而炙燥珠痛睥硬病相摧暴風客熱痛隨作必多熱淚治宜猜風熱外感醫原易木火內攻必遲回重則變症原難測治宜開導勿徘徊輕病敷之當即退如其不退病旋來開導不消消復發痛連頭腦實堪哀腫愈高兮睥愈實毒緣風熱亦危哉內服散熱消毒飲金絲膏點障能開方散熱消毒飲子牛蒡子研炒羌活黃連黃芩連翹蘇薄荷防風上銼細水煎食後服金絲膏治風熱上攻目赤腫痛黃連二兩龍膽草大黃黃柏去皮當歸梔仁各一兩乳香去油明硼砂燈心各二錢半青竹葉一百片大棗二十枚去核上用水五升不拘冬夏浸一時久取出於銀石器內慢火熬不令大沸候滓盡汁出下火放冷用絹絲取汁於無風塵處澄一時久去滓於器內用慢火熬令減半入白蜜半斤同攪將有蜜者以手挑起有絲則止放冷再以夾絹袋濾過用磁盒盛之每取一匙許研龍腦二分半極細入膏同研一二千遍令勻取少許點之瀉青丸見暴風瀉肝散見赤痛狀如魚脬論附鶻眼凝睛旋臚泛起旋螺尖起狀如魚脬者謂氣輪努脹不紫不赤或水紅或白色若魚脬也此乃氣分之病金火相搏所致宜桑白皮散玄參丸瀉肺湯或洗眼青皮湯亦可鶻眼凝睛然而尤有異者初起項強頭痛面臉赤燥其狀目火赤綻大脹於脾間不能斂運轉動若廟塑凶神之目尤鶻鳥之眼珠赤而綻凝謂之鶻眼凝睛者此乃三焦閉格陽邪實盛亢極之患風熱壅阻諸絡澀滯目欲爆出矣治宜內服四物湯加酒蒸大黃連翹散或瀉腦湯外貼摩風膏若有明者能於迎香太陽兩脾上星等穴並針而攻治之則又可不藥而愈矣旋臚泛起不更有氣輪自平水輪自明惟風輪高泛而起謂非旋臚泛起之症乎其病或左邊泛起者或右邊泛起者且或上或下皆因肝氣獨盛膽液澀而木道滯火鬱風輪故隨火脹起也治宜瀉肝散或救睛丸甚不可執旋螺尖起以同治也旋螺尖起彼夫旋螺尖起一症氣輪以裹烏珠大概高而綻起如螺螄之形圓而尾尖視烏珠亦圓綻而中尖高聳故曰旋螺尖起病源因亢極之害五氣壅塞故耳最為難治之症然用搜風散制黑豆還睛丸亦有治之獲瘳者是在醫者之明證治歌氣輪努脹狀何居謂似魚脬擬不誣象或水紅邊或白火金相搏病堪虞治宜桑白皮為妙或用元參丸治不迂瀉肺湯兮均甚善青皮湯洗赤能祛若逢鶻眼睛無轉其症頭疼目色朱閉格三焦風熱滯滯凝諸絡藥誰須酒蒸大黃連翹散妙四物湯同煎效最殊瀉腦湯兮宜配服摩風膏妙任君敷上星穴與迎香處及太陽兮認莫糊合併兩脾諸穴外用針刺治自恬愈風輪泛起緣肝盛火鬱因高下上殊或左浮高或浮右瀉肝丸與救睛丸符若遇亢害凝諸氣高綻如螺在黑珠黑豆制還青丸甚妙搜風散進病堪驅方洗眼青皮湯治白睛腫起赤磣痛癢葳蕤去殼槌碎桑白皮青皮各一錢玄參大黃梔子仁各五分青鹽一分另入竹葉十片上銼細水煎濾去滓入青鹽微熱淋洗冷即再燉熱洗玄參飲即白澀症內玄參丸內之藥水煎熱服瀉腦湯防風車前子元參熟大黃桔梗木通元明粉茯苓蔚子黃芩酒炒上水煎食遠熱服摩風膏黃耆細辛當歸杏仁去皮尖為霜防風松脂各五錢白芷黃臘各一兩上除黃臘研細後將黃臘熔化入諸藥慢火熬膏絞入退其火性貼太陽穴瀉肝散升麻細辛黃連酒炒五靈脂薄荷梔仁炒朴硝木賊赤芍黃芩酒炒家菊花防風大黃炒陳皮甜葶藶酒炒甘草上細末每服二錢食遠白湯調下或煎服亦可老人加枳殼厚朴救睛丸當歸身蒼朮米泔水炒草決明炒薄荷穀精草木賊荊芥穗蟬蛻去頭足翅川芎酒炒甘草枳實麵炒上研極細末蜜丸如彈子大每服一丸食後茶湯下制黑豆治旋螺症大黃黃連黃芩各五錢甘草密蒙花朴硝各一兩上用黑豆一升入藥煮乾用豆每服二十粒細嚼清米泔下搜風散治旋螺症防風大黃天冬五味子桔梗細辛赤芍藥茺蔚子上精配水煎食後服大黃連翹散羌活獨活柴胡前胡川芎枳殼桔梗茯苓甘草連翹黃連紅花大黃梔子上精配水煎服還睛丸見痛如針刺桑白皮散瀉肺湯見白澀四物湯見赤痛如邪珠突出眶論珠突出眶者謂烏珠暴然忽突出眶也其發不一有因真元將散精華衰敗致絡脈俱損癢極揩擦而出者其人不久必死有因酒醉怒甚及嘔吐極而出者亦有止因怒甚吼喊而爭出者且有因患病熱甚致關格亢極而出者要其源總因水衰液少精血虧損故脈絡澀脆邪氣盛極火無從出而竅澀泄之不及故湧脹而出然亦有因打撲而出者總之出雖離兩瞼而脈絲未斷者可乘熱揉入勿致脈絡損動若脈絡損動終是無光若離瞼系脈俱斷而出者雖華陀復生不能救矣治法未斷脈絲者宜分珠散或救睛丸立退丸隨宜擇用證治歌烏珠胡為突出眶真元將散絡脈傷出因奇癢頻揩擦其人旦夕定危亡或因醉怒兼嘔吐或因患病關格亢或因怒甚吼喊出總由水液血精戕脈絡澀脆邪氣盛火無從出故為殃有時打撲睛隨出醫師言治必推詳脈絲未斷尤堪治乘熱揉入免成盲救睛丸與分珠散立退丸投治法彰方救睛丸枸杞子蒼朮山梔仁炒黑赤芍蘇薄荷上細末酒糊為丸如梧子大每服三錢井花涼水送下或冷茶亦可小年人可服年老者宜服下方立退丸一名定志丸硃砂另研為衣人參各二錢天門冬去心烘乾石菖蒲炒遠志去心麥冬去心預知子各一兩白茯苓二兩上細末煉蜜為丸每服錢半茶清下或沸湯亦可水淋法治眼睛腫脹突出新汲涼井水決眼中頻數換水眼睛自入更以麥門冬桑白皮梔子仁煎湯通口服分珠散見遊風形如蝦座論形如蝦座者謂瘀血已甚血脹無所從出遂致壅起氣輪狀如蝦座甚則脹出脾外干瘀血灌睛雖與此症相似然灌睛則未至於極此則極矣有半邊脹起者有通珠俱被脹起蓋定烏珠者又有大眥目內近鼻梁處脹出一片如皮如肉狀似袋者乃血脹從額前中落來故脹起若此皆里白上寬切不可割蓋此為血英若誤割之為漏為瞎不可不知也但用開導血漸去而皮自漸縮小眥脹出如袋者亦然治法宜宣明丸或分珠散證治歌貫睛之極勢危哉瘀血壅起氣輪摧形如蝦座證最惡脹出睥外更堪哀脹或連珠或邊起亦或脹自鼻梁來如肉如皮形如袋血從額起是禍胎裹白上寬宜忌割為漏為瞎難挽回此為血英須明辨但宜開導勿徘徊血自去兮皮自縮脹出如袋治同儕宣明丸與分珠散古來治目法門開方宣明丸見瘀血貫睛分珠散見遊風神珠目脹論神珠目脹一症有內外輕重不同輕則自覺目內脹急重則自覺脹甚人視其珠亦覺漸漸脹起是病目珠覺脹急而下赤者火氣微病在氣分痛者外邪重而若轉而變赤則有瘀塞之患防鶻眼之禍如不赤或脹時作時止為火無定之故風邪濕熱氣勝怫鬱者皆有目脹之患治法通用加減八正散加桃仁紅花或酒調洗肝散加蘇木桃仁證治歌神珠目脹病胡名內外輕重貴分明重則人視目亦脹輕但自覺脹於睛火氣微兮脹下赤外邪重者氣分疼轉而變赤防瘀塞更防鶻眼衲相陵火火無定目不赤時作時止脹相循風邪濕熱氣拂鬱若有目脹病厥躬通治加減八正散加入紅花與桃仁或用酒調洗肝散蘇木桃仁加藥陳方加減八正散見痛如針刺酒調洗肝散見瞼硬疼睛振胞瘀痛論振胞瘀痛者多因偶被物撞打而血停滯於臉脾之間緩而失治則脹入珠內瘀血灌睛而睛有損壞之患狀亦與脹如杯覆同外治開導敷治亦同內治不同蓋脹如杯覆火從內起此因外觸凝滯脈道而後灌及神珠或素有痰火風邪因而湧動乘虛為患是又當必審症而施乃免瞽人之誤證治歌被物撞傷血滯凝久延瘀血灌睛瞳致睛損壞緣醫緩狀與脹如杯覆同同狀敷方雖一類慎調服藥乃為工退赤散經效散皆良散加味四物湯局黑神散任折衷方加味四物湯治打傷耳目當歸川芎白芍熟地荊芥防風上為末每服三錢水煎再入生地汁少許溫服經效散治撞刺生翳大黃當歸芍藥各五錢粉草連翹各二錢半北柴胡一兩犀角一錢上水煎食後服退赤散見色似胭脂局方黑神散見赤痛如邪附方內消散治傷損目羌活獨活蘇木紅內消當歸川芎瓜蔞根白芷紅花桃仁甘草節赤芍生地鉤藤鉤大黃紫金皮金鎖匙血蠍草上水煎食後服次仍用生地杏仁搗爛貼復以豬睛內肉切片貼之一緑散治打撲損傷眼胞赤腫疼痛芙蓉葉生地等分上搗爛敷眼胞上或為末以雞子清調勻敷一方治目刺損有翳生地生薄荷生巨葉朴硝生土當歸上研爛貼太陽二穴一方羌活紅內消獨活赤芍蘇木鉤藤白芷各五錢地榆瓜蔞根各四錢甘草節三錢上㕮咀每服三錢水煎食後服外障外障者睛外起翳障也內經診目痛凡赤脈初從上而下者屬太陽以太陽主表其病必連眉稜骨痛或腦頂痛或半邊頭痛是也治宜溫之散之溫則臘茶鹽川附等分煎服立效戴立齊嘗於此症用川附一錢服之即愈一方用附子五錢芽茶一大撮白芷一錢細辛川芎防風羌活荊芥各五分神效散則簡要夏枯草散必與退云丸相兼服東垣選奇湯羌活除翳湯之類皆主溫散並可擇用赤脈翳初從下而上或從內眥出外者皆屬陽明以陽明主裡其症多熱或便實是也治宜下之寒之下則局方流氣飲錢氏瀉青丸局方溫白丸加黃連黃柏之類屢用屢驗寒則一味黃連羊肝丸之類是也赤脈翳初從外眥入內者為少陽以少陽主半表半裡治宜和解之神仙退云丸羌活退翳湯消翳散之類是也翳膜者風熱重則有之或癍入眼此肝氣盛而發在表翳膜已生在表明矣宜發散而去之也若反疏利則邪氣內搐為翳益深邪氣未定謂之熱翳而浮邪氣已定謂之冰翳而沉邪氣牢而深者謂之陷翳當以焮發之物使其邪氣再動翳膜乃浮佐以退翳之藥而能自去也病久者不能速效宜以歲月漸除之新翳初生則表散之東垣羌活除翳湯有熱者退云丸之類焮發陷翳保命集羚羊角散主之用之在人若陰虛有熱者兼服神仙退云丸方流氣飲局方治婦人血風眼及時行暴赤眼大黃川芎菊花牛子炒細辛防風山梔仁白蒺藜炒去刺黃芩蔓荊子荊芥木賊去根節甘草炙元參各一兩草決明兩半蒼朮制三兩上細末每服二錢半臨臥時冷酒調下小兒令乳母服之神仙退云丸川芎當歸各兩半犀角酒洗枳實川楝子蟬蛻洗薄荷不見火菊花各五錢瓜蔞仁生者二錢蛇蛻密蒙花荊芥穗各二錢均同甘草焙乾去甘草不用地骨皮白蒺藜炒去刺生地酒洗焙乾羌活各一錢木賊一兩去節童便侵一宿焙乾上細末蜜和丸每一兩作十丸米泔飲下日進二三丸食後服婦人當歸湯下有氣木香湯下羌活退翳湯羌活五味子黃連升麻當歸各二錢黃芩黃柏酒炒龍膽草酒洗芍藥甘草各五錢柴胡黃耆各三錢防風錢半石膏二錢半上銼細分作二服水煎入酒少許臨臥熱服忌言語消翳散一名龍膽飲子青蛤粉穀精草川鬱金各五錢羌活龍膽草黃芩各二錢炒升麻二錢麻黃錢半蟬蛻甘草根炙各五分上細末每服二錢食後溫茶調下羚羊角散羚羊角升麻細辛等分甘草五分上為末以一半蜜丸每服五七十丸以一半為散用泔水煎吞丸子食後服溫白丸紫菀去苗土菖蒲九節去毛柴胡厚朴姜水制吳茱萸鹽湯泡七次各一兩桔梗去蘆茯苓去皮桂枝炮姜皂角炙去皮弦黃連各八錢川椒去閉口者炒出汗巴豆去皮膜油取霜人參各五錢川烏炮去皮脈八錢上細末入巴霜研勻蜜丸如梧子大每服三丸漸加至五丸七丸生薑湯下臨臥服有孕者不宜服慎之羌活除翳湯麻黃根二錢半薄荷葉二錢生地酒洗一錢當歸川芎各三錢黃柏四錢知母五錢酒製荊芥穗藁本各七錢羌活兩半川椒五分細辛少許防風一兩每服三錢水煎將好入荊芥穗再煎食後稍熱服忌酒濕面夏枯草散夏枯草五錢香附一兩臘茶調下不拘時服一味黃連羊肝丸見總論東垣選奇湯見陰邪風瀉青丸見暴風客熱黃膜上衝論黃膜上衝者其症於風輪下際坎位神膏之內有翳生而色黃加人指甲根白岩相似有若凝脂翳症但凝脂翳從輪外生點藥可除此則在膏內點藥所不能及者若蔓及瞳神其珠必破不可誤認為湧波治之此是經絡塞極三焦關格火土諸邪之盛實者故其病大便祕小便塞久則膏火蒸而作膿若上衝失治凸米厭之禍作矣治法宜通脾瀉胃湯立應散或神消散犀角飲須究脈之虛實察病之原因而後施方甚不可執一而治也證治歌黃膜上衝病可探風輪下際坎位間色如指甲根白岩似症若凝脂當剔看彼在輪外藥能達此在膏內點藥難蔓及瞳神珠必破莫作湧波治法觀三焦關格經絡塞火土諸邪盛實幹大便閉兮小便塞久延膿作定為殃上衝失治凸米厭作治用通脾瀉胃瀉立應散神消散犀角飲脈分虛實貴參詳方通脾瀉胃湯麥門冬去心茺蔚子各二錢半知母元參各一錢黃芩七分車前子軟石膏煅防風各一錢大黃熟天門冬各七分上水煎食遠服熱甚者加元明粉一錢立應散治內外障翳昏澀多淚及暴赤眼一切目疾皆治之宜三次搐鼻鵝不食草洗淨曬乾香白芷洗當歸去須洗羊躑躅花減半川附子泡去皮脈雄黃另研後入上等分細末入麝香少許和勻含水搐鼻內去盡濁淚淚出為度神消散黃芩蟬蛻甘草木賊各五錢穀精草蒼朮各一兩龍蛻三條炒上為末每服二錢夜臥冷水調下犀角飲犀角二兩白附子泡麥冬各二錢半車前子羌活黃芩各五錢上水煎食後溫服赤膜下垂論赤膜下垂之症初起甚微次後甚大大者病急其患有障其色赤多赤脈從白輪貫下也而黑珠上邊從白際起障一片仍有赤絲牽絆脹大絲粗赤甚淚澀珠疼頭痛者病急而有變絲細少色微赤珠不疼頭不痛者緩而不變亦有珠雖不疼頭不痛者如無他症或只色赤而生薄障障上仍有細絲牽絆或於障邊絲下仍起星數點此星亦是凝脂之微病也此等皆是火在內滯之患其病尚輕治亦當善蓋無形之火潛入膏內故作是症非比有形血熱之重也若障上有絲及星生於絲梢皆是退遲之病為接得絲脈中生氣故易生而難退雖然退遲以善退為上至於甚者不得已而開導之大抵白珠上半邊有赤脈生起垂下黑珠者不論多寡但有疼痛虯赤便是凶症絲少赤微或細粗連斷或貫瞳神或翳薄翳厚皆是惡症雖是可治亦當耐久此症系濕熱在腦幽隱之火深潛在絡故有此脈之赤四圍雖無瘀血其深處亦有滯積故滯深而火赤甚一旦觸發則患迸發疾亦甚矣內見澀滯外無此病輕者消散重者開導此定法也內服皂角丸外用洗眼金絲膏洗之依法而行自無不治然此治未免驟急婁全善云此症因於濕熱隱火固也而獨不言濕熱積於何經火發於何處徒令後人揣想莫得亦無形之誤人也益火乃命門之相火濕熱乃肝家之濕熱維濕熱鬱遏於肝故相火莫能通利治必先清其肝肝清而相火自定藥宜內服炙肝散外點紫金膏若治之久者則宜服通肝散神消散再久乃可服皂角丸愚按婁說為是醫者詳之證治歌赤膜何緣竟下垂始微繼大恐難醫症多赤色兼有障赤脈白輪下際滋障起白輪現黑珠上更兼牽絆有赤絲脹大絲粗兼赤甚淚澀珠疼頭痛危若無此症病由緩珠頭不痛又當思色赤障薄絲仍糾障邊絲下更殊揆星點仍從絲障起病微症或似疑脂內火滯潛從膏內入漫將血熱有形凝若逢障上有絲起星起絲梢病退遲病之甚者宜開導倘逢凶症最宜知白珠上半邊赤脈垂下疼痛虯赤病於斯惡症赤微絲亦少細粗連斷貫瞳岐濕熱在腦火潛絡滯積須從深處窺輕者消散重開導古人治法有成規皂角丸佳宜內服金絲膏洗是專師究竟病由濕熱隱火更從經脈細詳推濕熱由肝火由相肝必先清火自夷藥當內服炙肝散外點紫金膏最宜久治宜服通肝散或進神消散效可期倘逢最久宜皂角丸前賢定論不差移方洗眼金絲膏治遠年近月翳膜遮睛攀睛胬肉昏暗淚多瞻視不明或風氣攻注瞼生風粟或連眶赤爛怕日羞明隱澀難開黃連去頭五錢雄黃研飛二錢麝香另研五錢硃砂另研乳香另研硼砂另研赤芍藥當歸尾各二錢五分上細末後入研藥拌勻再研蜜丸皂角子大每用一丸安淨盞內沸湯泡開於無風處洗藥冷令閉目少時候三兩時再煨熱依前洗一丸可洗數次勿犯銅鐵器如暴赤眼腫不可洗紫金膏即金絲膏炙肝散石決明洗穀精草各四兩皂角去皮一錢半黃芩去黑心木賊各五兩炙草二兩蒼朮制半斤上細末用獖豬肝一葉去筋膜劈數縫摻藥於內摻鹽一錢合定用濕柳條數莖擱起慢火炙香熱清晨空心吃盡吃飯一盞壓之仍於三里穴炙三七壯淚下為驗七日翳膜必退通肝散梔子蒺藜炒枳殼荊芥各四錢車前子牛子炒各二錢甘草四錢上共研末每服二錢苦竹湯食後調下神消散見黃膜上衝凝脂翳症論附癍脂翳症及黃油症凝脂翳症為病最急盲瞽十有七八其病非一端起在風輪上有點初起如星色白中有米厭如針刺傷後漸漸長大變為黃色米厭亦漸大為窟者有初起如星色白無米厭後變大而色黃始變出米厭者有初起便帶鵝黃色或有米厭無米厭漸變大者或初起便成一片如障大而厚色白而嫩或色淡黃或有米厭無米厭而變者或有障又於障內變成一塊如黃脂者或先有痕米厭後變出凝脂一片者所變不一為禍則同治法不問星障但見起時肥浮脆嫩能大而色黃善變而速長者即此症也總之初起微小次後漸大甚則為窟為漏為蟹睛內消睛膏外為枯凸或氣極有聲爆出水而破者此皆郁迫之極蒸灼肝膽二經清氣受傷是以枯及神膏潰壞雖退不過旬日即損攻瞳神治宜服平肝清火湯洗肝散若四圍見有瘀滯者因血阻滯道路清汁不得升運之故宜先服退赤散繼進四順清涼飲子若四圍不見瘀滯之甚者其心絡深處必有阻滯宜服洗心散凡見此症須晝夜速治遲恐無及視此症者但見有頭痛珠痛二便燥澀即是極重之候二便通利為禍稍緩一有於斯均為可畏通治宜服四順清涼飲子醫者倘不詳慎一經遺誤為害甚矣是宜慎之特是脂之為名一也而系之以凝則為禍慘癍脂翳症彼有所謂癍脂一症脂非猶是脂乎而細細赤脈絆罩抑或淡黃浮嫩生於氣輪之上如黃油之脂者其發先有絲絆是病發之兆也審症言治須分經絡虛實初起帶黑者腎熱也實宜服蠲毒飲虛宜服四物湯帶青者肝病也實宜服洗肝散虛則服四物補肝散或養肝丸焦黃者脾病也實宜服除風清脾飲虛宜服調脾清毒飲微紅而或赤脈絆罩者心病也實服洗心散虛服天王補心丹黃油症淡黃如油脂者乃肺金受土之濕熱宜服清肺飲夫如是正謂治於未然而安有病發之患哉證治歌凝脂一症本多凶起自風輪色不同初起如星而色白既而有米厭刺如針從茲長大成黃色米厭亦隨之為窟形有時初起白無米厭漸致色黃米厭亦生更有鵝黃初異色米厭別有無漸長成初時一片還如障色白嫩分厚且洪色或淡黃時有米厭或時無米厭變相仍或於障內黃脂現或有米厭痕脂復凝變症雖殊為禍一但從初起認分明肥浮脆嫩兼能大色黃速長變相侵總之初小旋長大甚為窟漏為蟹睛睛膏內竭外枯凸氣極有聲水出頻此症總由多郁迫肝經與膽受熏蒸傷其清氣神膏損害及瞳神不過旬治法平肝清火湯進洗肝散進亦如神四圍瘀滯血多阻清汁不升是病因退赤散宜先服好後投四順清涼飲子工心絡深處多阻滯四圍稍遲洗心散靈此宜速治遲難效臨症醫師辨貴精頭痛珠疼兼便澀更為危候莫因循治宜四順清涼飲子更有癍脂可細詢白眼帶青時帶黑焦黃亦或現微紅細微赤脈如絆罩浮嫩淡黃在氣輪脂似黃油病將發先看絲絆是明徵須從經絡分虛實驗色堪將五臟分黑為腎熱實蠲毒散四物湯療虛可建功肝實帶青洗肝散虛宜四物補肝養肝丸陳焦黃脾病虛調脾清毒飲實用除風消脾飲平心病微紅赤脈罩實用洗心散虛天王補心丹淡黃更如油脂狀濕熱原來在肺金清肺飲投堪奏效修方辨症莫朦朧方平肝清火湯治黑睛脹大虛者宜服車前子連翹各一錢枸杞柴胡夏枯草白芍生地當歸各錢半水煎溫服蠲毒飲防風赤芍川芎連翹甘草牛蒡子炒研各八分上水煎服四物補肝散熟地黃焙乾二兩香附子酒製川芎白芍酒洗炒夏枯草當歸身酒洗炒各八錢甘草四錢上細末每服二三錢食後滾白湯送下除風清脾飲陳皮連翹防風知母元明粉元參黃連大黃桔梗生地黃芩荊芥穗上精配水煎食遠服天王補心丹生地黃四兩人參元參炒丹參炒遠志炒桔梗白茯苓各五錢五味炒當歸酒洗麥冬炒天冬炒柏子仁炒棗仁炒各一兩上細末蜜丸臨臥燈心湯下養肝丸治小兒肝血不足眼目昏花或生眵淚久視無力防風當歸身酒製白芍藥酒洗炒葳蕤仁去殼皮尖油取霜川芎酒洗炒楮實子去膜陰乾車前子酒煮焙熟地黃酒蒸搗膏各等分上除熟地膏蕤霜另入余細末煉蜜共為丸或一錢或五分一丸量兒大小每服一丸大人每服三錢均白湯下四順清涼飲子當歸身膽草酒洗炒黃芩桑皮蜜制車前子生地赤芍枳殼各八分炙草三分熟大黃防風川芎黃連炒木賊羌活柴胡各六分上水煎食遠服四物湯見赤痛如邪清肺飲見肺瘀症退赤散見色似胭脂洗肝散洗心散見暴風客熱調脾清毒飲見正漏花翳白陷論花翳白陷之症因火爍絡內膏液蒸傷凝脂從四圍起而漫神珠故風輪皆白或微黃色視之與混障相似而嫩者或輪白之際四圍生翳漸漸厚潤中間尚青未滿與夫瞳神尚見只是四圍皆起中間低陷者此皆金盛剋木之禍通治宜服知母飲子桑白皮湯若或脂下起黃膜一片乃火鬱脾胃之禍為症尤急宜服通脾瀉胃湯若上下生起是又與順逆障相似乃火上郁逼之禍也治宜羚羊角飲子亦有不從沿際起只自凝脂色黃或不黃初小後大其細條如翳或細顆如星四散而生後卒長大牽連混合而害目此是木火之禍也治宜服洗肝散至點藥通用琥珀散可也證治歌花翳白陷症非常火爍絡內膏液傷脂凝四圍神珠散風輪皆白或微黃視如混障而嫩者翳起四圍白輪旁中間尚青翳未滿或是瞳神尚未盲四圍皆起中低陷此皆金盛木受戕通治宜服知母飲子桑白皮湯亦堪當更或脂下生黃膜火鬱脾胃病勢張通脾瀉胃湯宜服上下生起症再詳是與順逆障相似火上郁逼故相妨治法宜投羚羊角飲子木火之禍更需商其症不從沿際起黃與不黃脂色彰初小後大更為害如翳更或如星芒洗肝散進多神效點藥通用琥珀良方知母飲子知母茺蔚子各二兩防風細辛各一兩五錢桔梗大黃茯苓芒硝各一兩上每服五錢水煎食遠溫服桑白皮湯桑白皮木通各一兩半澤瀉犀角屑黃芩茯神元參旋覆花大黃炒各一兩菊花五錢炙草二錢五分上為細末每服二錢水煎連滓溫服羚羊角飲子羚羊角五味細辛大黃知母芒硝各一兩防風二兩上銼細每服五錢水煎食後溫服洗肝散當歸尾川芎防風薄荷生地紅花家菊花羌活木賊赤芍藥白蒺藜杵去刺蟬蛻去頭足蘇木各五錢甘草二錢上為細末每服三錢入松絲十餘根水煎去滓服琥珀散治目積年生花翳烏賊魚骨五錢先於粗石磨去其澀用好者一錢硇砂白者琥珀馬牙硝珊瑚硃砂各五錢珍珠一兩上研極細膩令勻每日三四次點於目翳處久閉通脾瀉胃湯見黃膜上衝蟹睛眼論蟹睛一症謂真睛膏損凝脂破壞風輪神膏綻出黑顆小則如蟹睛大則如黑豆甚則損及瞳神內視瞳神則有如杏仁棗核之狀至極則青黃迭出此症雖與黑翳如珠相類而治有不同然有虛實之異虛者軟而不痛來遲去速實者堅而多痛來速去遲實者宜用防風瀉肝散或瀉肝湯肝腎虛者用磁石丸以治之證治歌蟹睛症起壞風輪真睛膏損脂漸凝神膏綻出見黑顆小如蟹睛大黑豆形甚則瞳神皆損及瞳類棗核與杏仁延極青黃俱迭出症類黑翳治不同治法總宜分虛實虛則來遲軟不疼實則堅痛其來速瀉肝湯進與防風瀉肝湯肝腎虛者宜何藥磁石丸投效絶倫方防風瀉肝散防風遠志桔梗羚羊角甘草赤芍細辛人參黃芩上為細末每服錢半或一錢食遠沸湯調服瀉肝湯治實蟹睛地骨皮元參車前元明粉各一錢茺蔚子二錢大黃知母各一錢半上水煎食後服磁石丸黃耆青鹽人參巴戟附子木香蓯蓉沉香防風牛乳牛膝桂心乾薑覆盆子遠志熟地茯苓磁石蒼朮陳皮大腹皮白朮川芎檳榔白芷青皮烏藥獨活上細末蜜丸梧子大每服三十丸溫鹽湯下冰瑕翳論冰瑕翳者言其薄薄隱隱或片或點生於風輪之上其色光白而甚薄如冰上之瑕也此翳若在瞳神傍側或掩及瞳神者人雖不覺目自昏眊大凡風輪有痕米厭點服不久不曾補得水清膏足及凝脂聚星等症初發點服不曾去盡或點片腦過多障跡未盡因之金氣水液凝結皆成此症其狀類圓翳但薄而不圓又似白障之始但經久而不長初患者堅守確攻可退若滑澀深沉及久患者雖極治亦難盡去治法宜內服開明丸外點琥珀散證治歌冰瑕翳症類冰瑕起自風輪片點加其形勘薄還光白掩及瞳神翳已遮或在瞳神傍側起己身自覺目昏花目病未曾經補足更因片腦點曾奢釀成金水皆凝結此症生來實足嗟狀如白障偕圓翳究竟相殊可細查初起確攻堅守好倘因久患慢求瘥深沉滑澀均難退明醫難克復光華制方丸取開明善點藥還需琥珀散嘉方開明丸治遠年近日翳障昏盲寂無所見一切目疾草決明防風杏仁炒去皮尖地膚子茺蔚子黃芩麥冬肉去心焙乾葶藶炒蕤仁去皮五味子青葙子澤瀉菟絲子水淘煮炒細辛不可見火車前枸杞子各一兩上官桂五錢熟地兩半酒水煮爛搗膏羊肝用白羊肝薄切瓦上焙乾後作末或以肝煮爛研為丸庶可久留少則以蜜漬之上為細末煉蜜為丸如梧子大每服三十丸白滾湯送下日進三次仍忌生薑糟酒炙煿熱物琥珀煎治眼生疔翳久治不瘥明硃砂另研貝齒各五錢琥珀另研龍腦各二錢半馬牙硝煉過者七錢半上同研極細膩以水一盞別入蜜一兩攪和入瓷罐中重湯煮以柳木枝煎取用一合已來即住以綿濾過於瓷罐中盛之或銅器亦可每取少許點之一方為細末點陰陽翳論烏珠上生二翳俱白色一中虛一中實兩翳連環如陰陽之圈者是也若白中略帶焦黃色或純白而光滑沉澀者皆不能盡去若有細細赤絲絆者退尤遲大略此症非心堅耐久不能得其效也治法宜服羌活退翳湯證治歌陰陽翳起在烏珠中虛中實各分區兩翳邊環與圈似白帶焦黃色與俱純白光滑而沉澀欲翳退去定難除更有赤色細絲絆欲退更覺蔓難圖心堅耐久方能治羌活退翳湯其庶乎方羌活退翳湯見外障瑪瑙內傷論瑪瑙內傷一症其障薄而圓缺不等其色昏白而帶焦黃或帶微紅如瑪瑙之狀者是此雖生在輪外實是內傷肝膽真氣精液損壞結成此翳最難治盡或先有重病過後結成者久之耐治多服補肝丸亦可減薄而欲盡去恐莫能也證治歌瑪瑙內傷症如何障薄圓缺不同科色帶焦黃並昏白或帶微紅是坎坷雖生輪外實傷內精液損壞玷難磨或因病後結成翳補肝丸服最宜多方補肝丸蒼朮米泔水制蟬蛻車前子連翹夜明砂龍膽草酒洗熟地焙乾川芎當歸身羌活菊花上細末米泔水浸豬肝搗爛入末為丸梧子大每服五十丸薄荷湯下聚星障論聚星之症謂珠上有細顆或白色或微黃色微黃者急而變重或聯綴或團聚或散漫或齊起或先後逐漸相生也此病初起易治久則難退能大者有變聚生成塊者則變凝脂連綴四散伴風輪白際起變大接連者則變花翳白陷若兼赤脈疤絆者退遲生於絲盡頭者不惟退遲亦且變重難治究其病源大抵由於痰火為患能保養者庶幾可治斫喪犯戒者難矣治法宜服羚羊角散或海藏地黃散酌而行之證治歌珠上細顆若聚星白與微黃色不同微黃病急而變重聯綴團聚散漫生逐漸而生或齊起初起易治久難平大則必變聚成塊連綴四散似脂凝伴在風輪白際起花翳白陷自茲成赤脈疤絆難速退生絲盡頭病更凶病源總由痰火患必須保養免沉𤵜治法宜服羚羊角散海藏地黃散比倫方羚羊角散羚羊角防風知母人參茯苓黃芩車前子桔梗元參各一兩細辛三兩上為末每服一錢水煎食後服海藏地黃散治大小男婦心肝壅熱目赤腫痛生赤翳或白膜遮睛四邊散漫者易治若暴遮黑睛者多失明宜速用此此方又治痘瘡入目沙苑蒺藜大黃煨黃連酒洗炒熟地防風穀精草白蒺藜拌去刺犀角銼蟬蛻去頭足元參生地當歸身甘草減半木賊草羌活木通上等分細末每服二錢羊肝煮湯調下垂簾障論附湧波翳垂簾障者生於風輪從上而下不論厚薄但在外色白而薄者方是若紅增乃變症非本病也第認此症最宜細別若徒執其起自風輪從上而下如簾之垂即指為是鮮不謂胬肉攀睛偃月侵睛赤膜下垂等症之自風輪上起者而指為此也總之此症只是白障慢慢而生下來形為混障者是治法內宜服羌活除翳湯天麻退翳散外宜點捲簾散審症施方無不捷效湧波翳更有謂湧波障者何謂其障從輪外自下而上如波之湧故曰湧波也非黃膜上衝從內向外之急甚者可比治宜流氣飲醫者其慎之證治歌何來目障似垂簾起自風輪從上聯白且薄兮為外症赤紅症變已多愆總之此症須詳辨莫拘成見執一偏白障生來形混障天麻退翳湯最妍羌活除翳湯亦妙捲簾散點自安然湧波障症尤當別障從輪外自下牽治法宜投流氣飲管教障退保安全方天麻退翳散治昏暗失明白殭蠶熱水泡去絲薑汁炒當歸身酒洗炒防風黃芩炒荊芥穗白蒺藜杵去刺炒石決明醋煅白芷羌活密蒙花熟地黃酒炒焙乾枳殼炒木賊赤芍藥蔓荊子麥冬去心焙乾蟬蛻去頭足菊花天麻炒川芎上精製細末每服二三錢燈心湯下眼紅加黃連用酒炒捲簾散治新舊病根昏澀難開翳障遮睛或成胬肉連眼赤爛常多冷淚或暴發赤眼腫痛爐甘石四兩擂碎玄明粉五錢入黃連內同煮川黃連七錢捶碎以水一大碗煮數沸濾出渣上先將爐甘石末入煬銅罐內開口煅紅令外有霞色為度次將黃連玄明粉水中浸飛過候乾又入黃連五分水飛過再候乾次入銅青一兩半白丁香另研乳香另研青鹽另研膽礬另研膩粉另研鉛白霜研合一字硇砂另研白礬半生半飛川黃連研各五錢上共研極細膩末同前藥再研勻每用少許點眼翳處每日點二三次宜久閉為妙羌活除翳湯見外障逆順障論逆順症色赤而障及赤脈赤虯縱橫上下兩邊生來若是色白不變乃治後凝定非本症生來如是治亦不同若色浮嫩而能大或微黃色者又非此症乃花翳白陷也凡見風輪際處由白珠而來粗細不等赤脈周圍圈圓侵入黑睛上障起昏澀者即此症大抵此症脾雖不赤腫珠雖不脹痛必有瘀滯在內滯左則從左來滯右則從右來均有所滯則四圍而來遇此甚不可以輕視若傷膏水則有花翳白陷之變若燥澀甚則有黃膜上衝之災若頭痛珠痛脹急其病又重而急矣治宜消翳散或羚羊角飲子總之醫者不難下方難於認症之的切切慎之證治歌絲脈赤虯入黑睛縱橫上下匪無因內多瘀滯因生此起自白珠辨貴明滯在右邊生自右滯如在左左先生倘傷膏水花翳發黃膜多緣燥澀萌頭痛珠疼兼脹急症逢如此豈猶輕羚羊角飲子宜煎服消翳散投治亦精方羚羊角飲子羚羊角銼末犀角銼末防風桔梗黃芩炒茺蔚子元參知母大黃炮車前子草決明等分甘草減半上水煎食後溫服清翳散見外障混睛障論混睛障謂漫珠皆一色之障也而有赤白二症赤者怕赤脈外爬白者畏光滑如苔有此二症牽帶者必難退亦有白睛先赤而後癢痛迎風有淚閉澀難開年久則睛變成碧色滿目如凝脂赤路縱橫赤絲不斷者此毒風積熱之候多服地黃散外點七寶膏其無患已證治歌混障一色漫睛珠赤白二症各分區赤脈外爬赤者怕光滑如苔白者虞二症牽帶必難退白睛先赤更相殊後生癢痛迎風有淚漸成閉澀難展舒年久睛變成碧色赤絲縱橫不斷除此係毒風積熱候地黃散服病堪驅點以七寶膏最美自然明徹不模糊方地黃散治混睛或白睛先赤後癢迎風有淚難開生地黃一兩芍藥土當歸甘草各五錢上銼細每服三錢水煎食後溫服七寶膏治混睛外障珍珠水晶貝齒各一兩石決明琥珀各七錢半空青瑪瑙龍腦各五錢上研細入砂鍋內用水濃煎去滓入蜜五錢煎成膏夜點晨不宜胬肉攀睛論附馬蝗積胬肉攀睛者多起氣輪有脹如肉或如黃油至後漸漸厚而長積瘀血胬起如肉或赤如硃凡性躁暴悖恣嗜辛熱之人多患此久則漫珠積肉視亦不見治宜峻伐久則自愈倘積而無瘀為甚惡症與夫珠尚露者皆不必用鉤割之治宜內服洗刀散二黃散定心丸還睛散外點吹霞散馬蝗積若馬蝗積一症與此症大同小異其服藥點藥治法均同但胬肉有不須刀割而治愈者其狀橫條不同努起如肉故曰小異風痰人多患此然其甚者亦用鉤割十去五分方用峻伐藥治庶可收功不割則恐藥力不敵而割又須先烙其根處不然恐朝去暮生使病者枉受其痛楚矣證治歌匪由性躁兼嗜辛胬肉胡為扳及睛脹似黃油或如肉此症原多起氣輪瘀血努起如珠赤幔珠積肉視物昏治宜峻伐自能愈積而無瘀病更深珠尚露者宜慎治輕用鉤割恐傷人內服洗刀散二黃散還睛丸進與定心丸外點吹霞散更妙馬蝗積症治相同橫條不同原小異風痰之人罹此凶甚者亦可用鉤割後投峻伐藥收功割則宜先烙根處病蒂斬除免復生方還睛散治眼生翳膜昏澀淚出瘀血胬肉攀睛龍膽草酒洗炒川花椒去目炒野麻子白菊花荊芥白蒺藜杵去刺草決明石決明川芎楮實子木賊茯苓甘草上精製為細末每服二錢食後茶清下日進三服忌一切雞魚腥味及喬麥面等物吹霞散專點胬肉攀睛星翳外障白丁香一錢白芨白牽牛各三錢上研細膩無聲放舌上試過無滓方收貯每日點三次重者不出一月全愈輕者朝點暮好定心丸石菖蒲枸杞子白菊花各五錢麥門冬去心烘乾一兩遠智肉二錢五分明辰砂研細二錢另入上細末煉蜜為丸如梧子大每服三十丸食後白滾湯送下二黃散黃芩大黃防風薄荷上等分水煎入蜜少許食後服洗刀散防風連翹羌活獨活草決明蔓荊子木賊元參各一兩當歸荊芥滑石薄荷麻黃白朮赤芍大黃各五錢黃芩川芎梔子桔梗芒硝蟬蛻白菊花蒺藜各四錢甘草細辛各三錢石膏四錢上加姜水煎食後服再用清涼洗眼之藥雞冠蜆肉論附魚子石榴雞冠蜆肉二症形色相類經絡相同治亦一法故總而言之非謂二病同生也其狀色紫如肉形頭雞冠蜆肉者即是多生睥眥之間然後害及氣輪而遮掩於目治者須宜早割後用殺伐藥治庶乃有功然目大眥內有紅肉一塊如雞冠蜆肉者乃心經血部之英華不可割若割輕則損目重則喪命最宜慎之宜服涼膈清脾飲外擦翠云錠魚子石榴更有魚子石榴二症其發經絡同而治法亦同雖非二症同生見此無異見彼也此症非聚星玉粒之比其狀生肉一片外而纍顆叢生或淡紅色或淡白色狀如榴子魚子綻露於房其紅肉顆或四或六或八四角生來障滿神珠視而不見俱是血部瘀實之病目病惡症治用割割後見三光者方可伐治三光瞑黑者內必瞳神有損不必治也證治歌雞冠蜆肉兩症分形色經絡治法同共狀色紫原如肉恍似雞冠蜆肉形病從睥眥之間起害及氣輪遮目睛治先用割後峻伐割時審慎莫輕心大眥內中有紅肉英華露發出心經醫如誤割必遭害輕則損目重傷人內服涼膈清脾飲擦用碧雲錠最工更有魚子石榴症治法相沿彼此均其狀生來肉一片外面纍顆更叢生恍似石榴和魚子色或淡白與淡紅四角內生紅肉顆障滿神珠視物昏統為血部瘀實病治先用割後調停割後見光方可治否則無勞藥餌攻方抽風湯治雞冠蜆肉外障防風桔梗大黃細辛黃芩元參芒硝車前子上水煎食遠服決明散決明子赤芍甘草炙各二錢半天花粉五錢上為末入麝香少許米泔調食後服涼膈清肺飲治脾經蘊熱凝結而成其患眼胞內生如菌頭蜆肉根小頭漸長垂出甚者眼翻流淚亦致昏朦荊芥穗石膏防風赤芍藥生地蘇薄荷黃芩連翹山梔仁等分甘草減半上銼細加燈心三十段水煎去滓食遠熱服翠云錠治眼胞內生菌毒用左手大指甲掐患根右手以披針尖頭齊根切下血出不妨用此錠磨濃塗之其血自止銅緑研末一錢杭粉五錢輕粉一分上研極細末用黃連末一錢同川米百粒水一盞煎至半盞再熬折去一分和藥作錠陰乾用清水磨擦兼治爛弦風暴赤腫痛連珠外翳論連珠外翳一症與聚星但象而非蓋聚星在可治之時而色亦不同此則凝定之候形色沉滑堅澀有如冰瑕雖有妙手久則難治然服開明丸點琥珀散亦有治之獲效者證治歌連珠外翳聚星同似是而非辨貴精此尚可醫原異色此時凝定翳聯睛其形沉滑還堅澀患類冰瑕恐失明藥服開明丸點琥珀散成能挽救復明清方開明丸琥珀散見冰瑕翳白翳黃心論白翳黃心者四邊皆白而中心獨一點色黃大小眥頭微赤時下澀淚團圍在黑珠上即其候也其源乃肝肺相搏停留風熱所致宜服還睛散皂角丸或生熟地黃丸擇而用之無不效也證治歌白翳黃心症可詳四圍皆白獨中黃眥頭微赤淚時下團在黑珠目受戕風熱停留肝肺搏還睛散皂角丸並良方或將生熟地黃丸進選擇隨宜罔不臧方生熟地黃丸皂角丸見頭風還睛散見胬肉攀睛肺瘀症論肺瘀症者其障多由大眥而起貫過氣輪如皮似筋橫帶至於風輪甚則掩及瞳神妨礙瞻視有赤白二症赤者血分白者氣分其源發於心肺二經初起如薄薄黃脂或赤脈數條後漸大而厚赤者少白者多雖赤者亦是白者所致治法宜服清肺飲合洗心散而惟有一割即去烙之免其再發大抵眼科鉤割一法唯此患最為得效用之甚勿驚怖證治歌障自大眥過氣輪風輪貫過至瞳神黃脂赤脈妨瞻視肺與心經見病因血分生來多色白赤由氣分辨尤真洗心散清肺飲宜和服鉤割治斯效絶倫方清肺飲麥冬桔梗各二錢荊芥穗天花粉知母各一錢石菖蒲訶子仁各一分上水煎服洗心散見暴風客熱輪上一顆如赤豆論氣輪有赤脈灌注直落風輪風輪上有顆積色紅初如赤小豆次後積大即此症也其候因內有瘀血之故急宜進分珠散若赤腫澀痛則進宣明丸如此開導則血精通而顆亦漸消但到此十有九損治者宜慎若或白珠上獨自有顆其色鮮紅者亦是瘀滯則亦宜服墜明丸如上下無絲脈接貫者但服分珠散點摩沙石散其病自消若有貫接者必絡中有血灌來宜向所來之處尋看量其輕重而導之輕用退赤散重用宣明丸若白輪有紅顆而脹急澀痛或變而急痛連內而根深接內者乃火疳也又非此比治仍火疳之法若白珠雖有紅顆而珠不痛雖痛不甚者病輕治亦易退以退赤散或分珠散善消可也證治歌輪上何來赤豆生氣輪赤脈落風輪風輪積顆紅如豆次後長成候最真其候內因瘀血滯分珠散進效無倫倘逢澀痛兼紅腫丸號宣明可急陳瘀滯白珠惟一顆色現鮮紅用墜明丸上下無絲脈相貫分珠散進自光瑩摩沙石散原堪點若有絲貫量精詢此必絡中會灌血治尋來處分重輕重用宣明丸輕退赤散白輪紅顆又當尋脹急澀疼或急痛連內火疳一症已條分白珠不痛惟紅顆痛不甚兮症易平退赤散分珠散當奏效醫師臨症貴精心方分珠散見遊風宣明丸見瘀血灌睛摩沙石散見血灌瞳神退赤散見色似胭脂墜明丸見深疳為害黑翳如珠論黑翳如珠一症非蟹睛木疳之比木疳生即損瞳神此則至大方損珠漸後乃損瞳神又非蟹睛因破而出之比此蓋自然生出究其病源乃肝氣有餘欲泛起之患故起從風輪際處見黑泡如珠圓而細或一二或三四五六多寡不一但症有虛實之別火實盛者痛虛緩者不痛治亦易平若長大則有裂目之患治法實者宜服羚羊角飲子後服補腎丸虛者略從表解即宜服補腎丸或生熟地黃丸循序醫治未有不化黑而更增光明也證治歌目生黑翳竟如珠此症原與蟹睛殊更非木疳所比似病因肝氣有盈餘風輪際起成黑泡圓細宜分實與虛實則痛兮虛不痛長成目裂最堪虞實宜先服羚羊角飲子後服宜投補腎丸扶虛者略宜從表解即投補腎莫踟躇或投生熟地黃丸好撥開翳障不模糊方補腎丸人參茯苓細辛五味肉桂桔梗各一兩山藥柏子仁各二兩半乾地一兩上細末蜜丸如梧子大每服十丸空心茶清下羚羊角飲子見花翳白陷生熟地黃丸見遊風狀如懸膽論其翳從上而下貫及瞳神為色青或癍上尖下大薄而圓長狀如懸膽故明曰懸膽也此症蓋因腦有瘀熱肝膽膏汁有損變症急來之候治以涼膽丸合洗肝散亦自有破膽開明之捷效焉證治歌翳色青兮若膽懸上頭尖小下寬圓腦藏瘀熱生從上貫及瞳神藥孰賢肝膽汁傷因患此洗肝散涼膽丸翳旋蠲方涼膽丸膽草酒洗黃連酒炒防風柴胡地茄子黃芩酒炒蘆薈黃柏鹽水制荊芥穗上精配細末蜜丸如梧子大每服三錢茶清下洗肝散見暴風客熱玉粒分經論玉粒分經者何其狀儼如玉粒或生於脾或生於氣輪生於氣輪者金火亢成之症燥熱為重生於脾者濕熱為重由土之燥滯其形圓小而頗堅其色淡黃而如障抑或為白肉色皆當辨其所生部分為候虛實若治癍脂翳之治法而分治之其無失矣證治歌狀如玉粒是何因或發於脾或氣輪發在氣輪金火亢由脾濕熱燥而臻形如圓小為斯症色辨白黃不誤人分部醫之須甚藥癍脂翳藥治如神銀星獨見論附睛中一點如銀星銀星獨見者謂烏珠上有白點如銀星而獨自生者也若連萃而相生相聚者不是星蓋星不能大大而能變者亦不是星而果系此症亦有虛實自退不退之分夫虛實者非指人之氣血而言乃指絡間之火而言若絡間之虛火客遊因而鬱滯於風輪結為星者其火無根不得久滯服升陽散火湯數合自火退氣散膏清而星自消若火有源而來氣實塞滯於絡者則水不清故星不能散然其色白圓而顆小浮嫩者易退沉澀堅滑者宜作急治之恐滯久氣定治雖退仍有跡而為冰瑕治宜四順清涼飲子繼服開明丸如此而治庶幾世星之在天者視之朗朗病星之在目者消歸烏有矣眼中一點如銀星所可慮者獨睛中一點似銀星一症症與此相似而治則較此更難其症白點一顆如星光滑適當睛中蓋定雖久不大不小傍視瞳神在內只是小些其視光華亦損此乃患目痛時不忌房事及服滲泄下焦寒涼之藥過多火雖退而腎絡氣滯凝結此病雖服藥不退點藥亦不能除終身之患也夫既不治矣吾何為列論哉蓋録之以為患目病之不慎保養及醫治之不固本者鑑耳證治歌銀星一點在烏珠症有實虛退否殊星自絡間虛火發風輪暫結久旋無升陽散火湯宜服火退星消治不迂氣實倘逢凝滯絡有源火結白點常敷圓浮小嫩無難治沉澀滑堅匪易祛四順清涼飲宜速進開明丸藥繼投符如逢一點銀星似蓋定睛中莫克驅此由痛目行房事及泄下焦藥過諸到此總無方可治病人戒慎庶無虞方升陽散火湯升麻葛根羌活獨活芍藥人參各五分防風炙草各三分柴胡八分生甘草二分上加生薑三片水煎服忌生冷四順清涼飲子見凝脂翳開明丸見冰瑕翳驚振外障論驚振外障者謂目被撞觸而結為外障也治法與為物所傷同然其根因物觸而成而其障之奚若又不可不審經辨症參諸外障之治以言治也是在醫之因時變通有不可預為決擇者焉證治歌外障倘由驚振成尋經辨脈貴分明雖同為物所傷症外障參觀定準衡五花障論附黑花翳五花障生於神珠之上癍癍雜雜五色分見故曰五花其病蓋因五臟經絡之氣俱傷因結而為此症若中有一點黑色者乃腎絡氣虧雖治不能盡去此候與癍脂翳瑪瑙內傷形略相似斑脂翳乃破而結成瘢痕不能去者瑪瑙內傷乃小而薄未掩瞳神此則高厚顯大生在膏外故可退也治法必分審經絡虛實以多見者為主病下方俱與癍脂翳同茲不贅列黑花翳獨有所謂黑花一翳其狀青大小眥頭皆澀痛頻頻下淚口苦莫喜飲食此蓋膽受風寒之故非同五花中一點黑花之發於腎絡也須宜涼膽丸還睛丸四物湯生熟地黃丸皂角丸隨宜酌進甚不得執一以為治也證治歌目障癍癍五色花經絡氣傷病可查腎氣若傷中有黑從經醫治總多瑕宜從經絡分虛實治與癍脂翳不差黑花翳障多青色眥頭澀痛亦堪嗟口苦惡食淚頻下膽受風寒有賊邪涼膽丸與還睛丸妙四物湯投皂角丸嘉生熟地黃堪並選目明翳退效無涯方涼膽丸黃連洗黃芩荊芥龍膽草蘆薈防風各一兩黃柏去皮地膚子各二錢半上為細末蜜丸梧子大每服二十丸食後薄荷湯下還睛丸見痛如針刺四物湯見赤痛如邪生地黃丸皂角丸均見遊風
