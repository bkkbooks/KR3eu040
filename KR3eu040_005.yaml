body:
  text: 卷五運氣原證按內經原氣所乘風燥火侵或水衰金弱木侮所勝民病目昏大要有四一曰風熱經曰少陰司天之政風熱參布雲物沸騰大陰橫流寒乃時至往復之作民病聾瞑此風熱參布目昏也二曰熱經云少陰在泉熱淫所勝病目瞑治以鹹寒此熱勝目昏也三曰風經云歲水不及濕乃大行復則大風暴發目視𥉂𥉂此風勝目昏也四曰燥經云陽明司天燥淫所勝目昧眥傷治以苦熱是也目昏經云腎足少陰之脈動則病生目𥉂如無所見又云少陰病目𥉂無所見者陰內奪故目𥉂無所見也此蓋房勞目昏也左腎陰虛右腎陽虛劉河間曰目昧不明熱也然玄府者無物不有人之臟腑皮毛肌肉筋膜骨髓爪牙至於世人萬物盡皆有之乃氣出入升降之道路馮戶也人之眼耳鼻舌身意神識能為用者皆升降出入之通利也有所閉塞者不能為用也目無所見耳無所聞鼻不知臭舌不知味筋痿骨痹爪退齒腐毛髮墜落皮膚不仁腸胃不能滲泄者悉由熱氣怫鬱玄府閉塞而致氣液血脈榮衛精神不能升降出入故也各隨鬱結微甚而為病之重輕故知熱鬱於目則無所見也故目微昏者至近則轉難辨物由目之玄府閉小如隔簾視物之象也或視如蠅翼者玄府有所閉合者也或目昏而見黑花者由熱氣甚而發之於目亢則害承乃制而反出其淚泣氣液瞇之以其至近故雖微而亦見如黑花也婁全善曰誠哉河間斯言也目盲耳聾鼻不聞臭舌不知味手足不能運用者皆由玄府閉塞而神氣出入升降之道路不通故也故先賢治目昏花如羊肝丸用羊肝引黃連等藥入肝解肝中諸郁蓋肝主目肝中郁解則目之玄府通利而明矣故黃連之類解鬱熱也椒目之類解濕熱也茺蔚之類解氣鬱也芎歸之類解血鬱也木賊之類解積鬱也羌活之類解經郁也磁石之類解頭目郁墜邪氣便下降也蔓菁下氣通中理亦同也凡此諸劑皆治氣血鬱結目昏之法而河間之言信不誣矣至於東垣丹溪治目眥用參耆補血氣亦能明矣又必有說通之蓋目主氣血盛則玄府得通利出入升降而明虛則玄府不能出入升降而昏此則必用參耆四物湯等劑助氣血運行而明也瞻視昏眇論瞻視何為而昏眇也蓋目無內外諸證但自覺昏眇朦昧不清也有神勞有血少有元氣弱有元精虧而昏眇者若人年五十以外而昏者雖治不復光明蓋時猶月之過望天真日衰自然目光漸衰不知一元還返之道雖妙藥難回故曰不復愈矣此證專言人之昏視非若因目病昏眇之比各有緣故須當分別凡目病外障而昏者由障遮之故欲成內障而昏者細視瞳內必有氣色若有障治愈後而昏眇者因障遮久滯澀其氣故光隱耗當培其本而光自發有因目病漸發生痛損經絡血液澀少故光華虧耗而昏有因目病失治其中寒熱過傷及開導經絡炮尉失當而因損傷其血氣耗其精華而昏者以上皆宜培養根本乘其初時而治之久則氣脈定雖治不愈若因目痛暗而昏者此因氣滯火壅絡不和暢而光澀譬之煙不透徹故火不明如目暴痛愈後尚昏者血未充足氣未和暢也宜慎養以免後患若目病久愈而昏眇不醒者必因六欲七情五味四氣瞻視哭泣等故有傷目中氣血精液脈絡也宜早調治若人未五十目又無痛赤內障之病及斫喪精元因而昏眇無精彩者其人不壽凡人年在精強而多喪失其真元苦思勞形縱味久患頭風素多哭泣婦女經産損血而且內外別無證候自覺昏花月復月而年復年漸漸昏眇者非青盲即內障也治法審系腎虛目暗不明者宜服明目地黃丸若因虛損夢泄遺精瘦削少氣因之目視不明者宜服龜鹿二仙膠若肝腎不足體弱眼昏內障生花不計遠近者宜服三仁五子丸若因勞心肝虛風熱攻眼赤腫羞明漸生翳膜兼肝腎風毒熱氣上衝而目痛久視傷血血主肝故勤書則傷肝而目昏傷肝則木生風而熱氣上湊目昏赤盛不宜專服補藥當益血鎮肝而目自明宜服地黃丸至洞見碧霄說似不經然傳之自古是在醫者酌用之證治歌視瞻昏眇亦堪悲內外俱無他證滋自覺目中恆昏憒年過五十最難醫證因神勞與血少元氣弱兮元精虧若因病目成昏眇所因不一治各歧腎虧明目地黃丸進虛損夢泄更精遺瘦削氣少目復暗龜鹿二仙膏最饒肝腎不足成內障三仁五子丸效堪期勞心肝虛熱攻眼赤脈羞明翳膜垂風熱上衝而目痛鎮肝益血地黃丸施至若洞見碧霄法不妨並録備參稽方明目地黃丸治腎虛目暗不明熟地焙乾四兩生地酒洗山藥澤瀉山茱萸去核丹皮灼酒柴胡茯神當歸酒洗五味烘乾各一兩上為細末蜜丸梧子大每服三錢空心鹽湯下龜鹿二仙膏鹿角二斤龜板一斤枸杞六兩人參三兩上將鹿角銼碎龜板打碎長流水浸三日刮去垢入砂鍋用河水慢火魚眼湯桑柴煮三晝夜不可斷火當添滾水不用冷水至三日取出曬乾碾為末另用河水將末並枸杞人參又煮一晝夜濾去滓並先原汁合用慢火熬成膏初服一錢五分漸漸加至三錢空心無灰酒化下三仁五子丸治肝腎不足體弱眼昏內障生花柏子仁肉蓯蓉酒浸車前酒炒苡仁酸棗仁去殼炒枸杞酒蒸焙菟絲酒煮焙當歸酒炒覆盆子酒蒸焙白茯苓乳拌蒸曬各二兩沉香銼末另研五錢五味焙一兩熟地三兩酒水煮爛搗膏上除沉香熟地別入余為細末煉蜜和丸梧子大每服五十丸空心或鹽湯白滾湯下地黃丸一名菊花丸治用力勞心肝虛風熱攻眼赤脈羞明漸生翳膜熟地一兩半防風羌活桂心甘菊花沒藥明硃砂各五錢黃連決明子各一兩上為細末蜜丸每服三錢食後沸湯送下日三次洞見碧霄此鷹鷀鼠睛三法點眼之說似乎不經然載在醫統故録之用鷹眼一對炙乾為末研極細以人乳拌再研用簪腳少挑點於瞳仁上日夜三度可以夜見物或取臘月的鵒眼依上法用三日能見霄中之物又用鷀鳥眼汁注目中則見妖物神鬼睛黃視眇論附乾澀昏花坐起生花睛黃視眇謂風輪黃亮如金之色而視亦昏眇也此為濕熱重而濁氣蒸爍清陽之氣升入輪中故輪亦變色也凡好酒嗜食熱燥腥膩之人多有此疾治法宜服葛花解毒飲然酒與燥熱之傷人非特此也乾澀昏花更有乾澀昏花一證其目自覺乾澀而不爽利視瞻昏花究其源亦由耽酒恣燥不忌房事兼之勞瞻竭視過慮多思致傷神水而細細赤脈及不潤澤等病必接踵生焉然苟能自保養閣眼養光良久得淚則潤開則明爽此可見水少之明驗也治法宜急滋陰養水略帶抑火以培其本本立則清純之氣和而化生之水潤若誤認為火證妄用開絡針泄之治則又有緊縮細小之患藥宜服四物五子丸若澀而痛則點黃牛膽煎坐起生花雖然以上二證藥治固所必須而究以自嚴保養為急倘不自保養則元氣因之怯弱陰精因之虧損遂致水少液枯脈絡衰疲而坐起生花之證作矣此證也別無他患但其人動作起坐偶失其常或久坐久立或久眠久視便覺頭暈目眩而昏花也遇此者總宜補氣血之虛耗治肝腎之虧損宜服加減駐景丸若或得之飢飽勞役形為額角目睛痛時見黑花及目赤腫痛者則服止痛散若或肝腎虛風上攻風熱外侮致瞻視生黑花或如水浪者則宜先用摩頂膏以摩其頂繼進駐景丸以補其虛循次而治宜無不愈矣證治歌睛黃視眇濕熱凝清氣原遭濁氣蒸升入風輪色黃亮飲食不節病斯成葛花解毒飲宜進乾澀昏花證更凶目中乾澀無清爽禍因酒色損其身兼之竭視多思慮神水受傷目已朦治貴滋陰而養水微須益火以培根認為火證必貽誤四物五子丸可斟澀而痛兮宜點藥黃牛膽煎痛自寧倘逢坐起生花證起居動作忽頭昏氣血虛耗宜補益肝腎虧損貴調停加減駐景丸最善自許昏花不復生或傷飢飽兼勞役痛在額角及目睛時見黑花及赤腫散投止痛有奇功肝腎虛風上攻者風熱外侮兩相侵致起黑花或如水浪先投摩頂膏最工繼服駐景丸誠妙何憂眸子不光明方葛花解毒飲黃連炒黑元參當歸膽草炒茵陳甘草葛花熟地茯苓梔仁連翹車前上水煎食遠服四物五子丸治心腎不足眼目昏暗熟地當歸酒洗地膚子白芍菟絲子酒煮爛焙川芎覆盆子枸杞車前酒蒸量虛實加減上為末蜜丸梧子大每服五十丸不拘時鹽湯下黃牛膽煎治眼澀痛豬膽汁黃牛膽汁羊膽汁鯉魚膽汁各半合白蜜二兩胡黃連青皮川黃連均研末熊膽各二錢半上將各末與蜜膽汁和勻入磁瓶內用紙封口放飯甑內蒸飯熟為度以新淨綿濾過每以銅筋取如麻子大點目眥日二三次加減駐景丸車前略炒枸杞五味各二兩當歸去尾酒洗熟地各五錢川椒去目楮實子曬乾各一兩菟絲子水淘淨酒煮焙乾半斤上為細末蜜丸梧子大每服三十丸空心溫酒下或鹽湯下摩頂膏青空研五錢白附子泡木香各一兩丹砂二錢半龍腦五分青鹽五錢牛酥二兩鵝脂四兩槐子一兩旱蓮草自然汁一斤上為末先以旱蓮草汁牛酥鵝脂入銀器或銅器中熬至五沸再下諸藥末煎即傾入瓷器內盛之臨臥用舊鏵鐵一片重二三兩蘸藥於頂上摩二三十遍令入發中次服駐景丸忌鐵鍋止痛散栝蔞根二兩柴胡兩半甘草炙七錢半當歸生地各一兩黃芩四兩一半酒浸一半炒上為末每服三錢加薑棗煎臨臥熱服如小便不利加茯苓澤瀉各五錢附方菊睛丸治肝腎眼昏常見黑花多淚枸杞三兩蓯蓉酒浸炒巴戟去心各一兩甘菊花四兩上為末蜜丸梧子大每服五十丸食遠或溫酒或鹽湯送下一方加熟地二兩石決明丸治眼目昏暗石決明槐子肉蓯蓉酒浸一宿去鱗炙乾菟絲子酒浸三日曬乾另研末陽起石酒煮七日細研水飛過熟地各一兩桂心五錢磁石一兩五錢火煅醋淬七次細研水飛過上為細末蜜丸梧子大每服二十丸加至三十丸食前鹽湯下芎藭散治目昏澀視物不明芎藭地骨皮荊芥穗何首烏去皮菊花旋覆花草決明石決明刷淨甘草炙各一兩青葙子蟬蛻木賊各五錢白芷二錢半上為末每服一錢食後米泔水調下服椒方治肝腎虛風上攻目生黑花川椒一斤揀選去目及合口者於銚內炒令透於地上鋪淨二重用新盆合定周圍用黃土培之半日毒出汗然後取之曬乾用磁盒收貯每日空心新汲水下十粒磁石丸治眼因患後起早元氣虛目無翳視物昏暗欲成內障磁石二兩火煅醋淬七次水飛過肉蓯蓉一兩酒浸一宿去甲焙乾甘草炙赤桂心各五錢菟絲子酒浸五日曬乾另研為末三兩補骨脂微炒巴戟去心石斛遠志熟地各一兩五味木香各五錢上為細末蜜丸梧子大每服三十丸食前溫酒下一方有茯神無遠志石斛駐景丸即加減駐景丸除當歸五味枳實川椒三仁五子丸治肝腎不足眼昏內障生花見瞻視昏眇雲霧移睛論附螢星滿目雲霧移睛者謂人自見目外有如蠅蛇旗斾蛺蝶條環等狀之物色或青黑粉白微黃儼在眼外空中飛揚撩亂仰視則在上俯視則在下也此候乃元府有傷絡間精液耗澀鬱滯精純之氣而為內障之患其源皆屬膽腎之病其見為白者因痰火之故肺金清純之氣不足黃者則脾胃清純之氣有傷蓋瞳神乃先天之元陽所生稟聚五臟之精華因其內損故有其狀凡虛弱不足之人及經産去血過多或悲泣太過深思積忿之婦女每有此病小兒疳證熱證及痰瘧傷寒熱久致目痛為閉蒸傷清純之氣亦有此患幼兒無知至長始曉氣絡已定治亦難愈凡遇此者人多指為鬼神見像誤從祈禱之說持久不治實自貽伊疾也吾為考厥治法肝虛目暗者以生熟地黃丸主之若腎弱不能濟肝致肝熱而膽不足者則先以豬苓散次進蕤仁丸若肝腎俱虛眼見黑花者則以羚羊羌活湯主之至於摩頂膏則又通治之方隨宜用之無不取效螢星滿目復有所謂瑩星滿目一證者何也自見目外有無數細細紅星如瑩火飛伏撩亂甚則如燈光掃星之狀也得此病者其人必耽酒嗜燥勞心竭腎致痰火上升目絡澀滯精汁為六賊之邪之熏蒸所損故陽光散亂而飛伏乃水不勝火之患也久而不治則內障成矣治法宜服滋陰降火湯及加味坎離丸醫者誠審證下方則雲霧自散而瑩星自落矣豈有傷情之患哉證治歌何來雲霧竟移睛變態風生色不同元府有傷因致病氣滯精耗障內生揆厥由來因膽腎黃白均從經絡尋白為痰火肺氣弱黃由脾胃失調停瞳神內損因成狀病發多由虛弱人出血過多經産後或因悲忿慮傷神小兒疳熱及痰瘧熱久目疼常欲瞑清氣蒸傷成斯疾治之不慎病增深治法肝虛目暗者生熟地黃丸可斟腎不濟肝膽旋弱豬苓散初服繼蕤仁丸肝腎俱虛花見黑羚羊羌活湯最靈通治膏惟摩頂善隨宜擇用效無倫瑩星滿目證須審紅星無數竟如螢此由耽酒嗜辛燥勞心竭腎火上升六賊邪火熏精汁陽光散亂內障成滋陰降火湯宜進加味坎離丸奏功方豬苓散豬苓木通萹蓄蒼朮米泔制黑狗脊大黃泡滑石飛過梔仁各一兩車前酒蒸五錢上為細末每服三錢空心青鹽湯調下蕤仁丸治眼黑花飛蠅澀痛昏暗漸變青盲蕤仁去皮尖地膚子白茯苓細辛人參石決明洗淨另研地骨皮白朮炒各一兩石膽另研五錢熟地焙楮實子各三兩空青另研防風各一兩青羊膽一枚鯉魚膽五枚上為細末研勻以膽汁同蜜煉摟和為丸梧子大每服二三錢食後米飲下羚羊羌活湯黃耆二兩甘草炙一兩羚羊角銼末羌活黃芩去黑心棗皮車前附子炮人參青葙子決明子微炒澤瀉秦艽去苗柴胡去苗各一兩半上為末每服五錢水煎不拘時溫服滋陰降火湯當歸一錢川芎五分生地薑汁炒熟地黃柏知母均蜜水炒麥冬各八分白芍薄荷汁炒黃芩柴胡各七分甘草梢四分上水煎熱服加味坎離丸熟地八兩一半用砂仁一兩以絹袋盛之共入砂罐內用好酒二碗煮乾去砂仁一半用白茯苓二兩如前法煮去茯苓甘州枸杞揀去根烘乾全當歸用酒浸三日洗淨曬乾白芍酒浸一日切片曬乾川芎大白者用小者而不用洗切片女貞子即冬青子冬至日採蜜水拌丸蒸九曬淨各四兩甘菊花去根葉家園者佳野菊花不用曬乾淨三兩川黃柏去粗皮切片八兩二兩酒浸二兩泔水浸二兩人乳浸二兩蜜浸各一晝夜曬乾炒褐色知母去毛切片六兩分作四分照黃柏四制同上除熟地另搗膏外餘八味合一處鋪開日曬夜露二晝夜共為細末並熟地膏蜜丸梧子大每服八九十丸空心白湯或青鹽湯下養肝丸當歸酒洗車前酒蒸焙防風白芍熟地枳實川芎上為細末蜜丸每服七十丸熟水下一方無川芎枳實補腎丸磁石煅醋淬七次水飛過菟絲酒蒸二次各二兩五味枸杞石斛熟地覆盆子楮實子肉蓯蓉酒浸車前酒蒸各一兩沉香青鹽二味另研各五錢上為末蜜丸梧子大每服七十丸空心鹽湯下生熟地黃丸見遊風摩頂膏見睛黃視眇妄見靈樞大惑論帝曰豫嘗上清冷之臺中階而顧匍匐而前則惑豫私異之竊內怪之獨瞑獨視安心定氣久而不解獨搏獨眩披髮長跪俯而視之復久而不已也卒然自上何氣使然岐伯曰五臟六腑之精氣皆注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈併為系上屬於腦後出於項中故邪中於項因逢身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪中其精其精所中不相比連則精散精散則視歧故見兩物又云目者五臟六腑之精也榮衛魂魄之常營也而神氣之所生也故神勞則魂魄散志意亂是故瞳子黑睛法於陰白睛赤脈法於陽也故陰陽轉合而睛明也目者心之使也心者神之舍也故神精亂而不轉卒然見非常處精神魂魄散不相得故曰惑也帝曰子疑其然豫每之東苑未曾不惑去之則復豫唯獨為東苑勞神乎何其異也岐伯曰不然也心有所喜神有所惡卒然相惑則精氣亂視誤故惑神移乃復是故聞者為迷甚者為惑素問云睛明者所以視萬物別白黑審長短以長為短以白為黑顛倒錯亂神光暗矅則精衰而視變矣宜分虛實治之可也神光自見論附黑夜睛明神光自見者謂目外自見神光出現每如電閃掣甚則火焰霞明時發時止與視瞻有色之定者不同此乃陰精虧損元府大傷孤陽飛越神光欲散內障之重者治宜急進補水寧神湯黑夜睛明可異者黑夜睛明一證夫人體天地之陰陽晝明夜晦量之常也今晦明之中倏忽見物是背於陰陽矣其源必水火不交精華關格乖亂不和陽關飛越不能攝養陰精故陽光無制耳如日精華聚盛罹害其不小矣治當培補陰精以留制陽光多服加減八味丸庶幾陰陽和而瞻視如常矣證治歌神光自見如電閃甚而火焰與明霞元府有傷陰精損孤陽飛越實堪嗟補水寧神湯急進黑夜睛明證又差水火不交因致病精華關隔可精查培補陰精陽可制加減八味丸最嘉方補水寧神湯熟地生地各二錢白芍當歸麥冬去心茯神各錢半五味三十粒生甘草六分上水煎空心溫服加減八味丸熟地八兩另搗山藥烘乾山茱萸酒洗焙各四兩白茯苓乳拌蒸曬乾澤瀉酒洗焙丹皮酒洗焙各三兩五味子烘一兩五錢肉桂去皮一兩上為細末與熟地膏煉蜜和丸梧子大每服三錢空心鹽湯下視正反斜論附視定反動視物顛倒視正反斜者謂物本正而目見為倚斜也此候乃陰陽偏盛神光欲散之候陽盛陰者因恣辛嗜酒怒悖頭風痰火氣傷之病陰勝陽者因色欲哭泣飲味經産血傷之病總內之元府鬱滯有偏而氣重於半邊故發見之光亦偏而不正耳治宜培其本而伐其標然必審其何勝何虛而後下方陽不勝其陰者以補陽湯或升陽泄陰湯主之陰不勝陽者以連柏益陰丸主之昔淮南程吉儒醫也有富翁子因醉後得此視正反斜之病求吉方吉設樂開宴酬歡至醉扶病坐輪中使人弄之常令傾側輾轉久之方令登榻醒後病愈詢治之方吉老云無他疾醉中當閃倒肝之一葉搭於肺上不能下故視正為斜今復飲之醉則肺脹輾轉之間肝亦垂下故愈藥安能治之哉善夫吉老真神治也然目之為病豈視乖斜正之一候乎視定反動更有所謂視定物而反動者其候物本定而目見為振動也此乃氣忿火邪之害水不能救火之故陽邪虛火上旋眩連振掉不定光華欲墜久則地石亦覺振動而不定內障成矣凡恣酒嗜燥頭風痰火之人陰虛血少者屢有此疾洽宜服鉤藤散視物顛倒更有視物顛倒者其候視定物皆振動而顛倒也此蓋血氣不正陰陽反復陰精衰弱陽邪上干虛眩而運掉其發不一時有一年數發者有一月數發者須因其發時別其因虛因火因痰因風而治之通宜服羚羊角散昔有呂復深於醫道有道士肖云泉者視物皆倒其源因大醉盡吐睡至天明遂得此病切其脈左關浮促呂即告之曰傷酒大吐時上焦反復致倒其膽府故視物皆倒置法當復吐以正其膽遂以藜蘆瓜蒂為粗末用水煎之平旦頓服以吐為度吐畢視物如常此治與程吉之治無異也然非精研之久豈得此哉證治歌視正反斜證有因陰陽偏盛損其神陽盛氣傷痰火熾嗜酒頭風更恣辛陰勝由悲兼色欲經産傷血病斯成總由元府多鬱滯氣重半邊是禍根伐標培本為良策更從虛火辨分明陽不勝陰補陽好升陽泄陰湯亦同若逢陰不勝陽者連柏益陰丸建功視定反動尤堪異氣忿火邪害相侵水難救火火旋上病因痰火與頭鳳血少陰虛食不節治用鉤藤散最工尤奇視物多顛倒血氣不正陰陽爭陽邪上干陰精弱虛眩運掉髮無憑發時所因原不一虛風痰火莫朦朧通治宜用羚羊角散昔人治法可明徵藜蘆瓜蒂為粗末吐法流傳試細詢方補陽湯炙甘草羌活獨活人參熟地白朮土炒黃耆制各一兩白茯苓生地知母炒各三錢柴胡去油二兩肉桂三錢白芍陳皮澤瀉防風歸身酒製各二錢上為末每服五錢水煎溫服連柏益陰丸甘草根羌活獨活歸身酒洗五味防風黃芩草決明黃柏知母黃連酒洗炒各一兩石決明煅存性六錢上為末蜜丸豆大每服五十丸漸至百丸臨臥茶清下升陽泄陰湯一名升陽柴胡湯羌活歸身獨活甘草根白芍熟地各一兩人參生地酒洗炒黃耆楮實子酒蒸焙白朮各兩半白茯苓防風陳皮知母酒炒各二錢柴胡去苗肉桂去皮各錢半上每服五錢水煎服另合一料為末蜜丸梧子大食遠茶清下每日五十丸與煎藥合一服如天氣熱甚加五味三錢天冬五錢鉤藤散鉤藤陳皮麥冬石膏家菊花人參明天麻防風白茯苓鹿茸法夏甘草上各等分共為末每服四錢加生薑三片水煎服羚羊角散製法夏七錢當歸川芎白芷防風明天麻枳殼甘草各二錢半茯神羚羊角銼細末各一兩上為末每服四錢入姜三片煎服視一為二論視一為二者本一物也而目視為二焉即內經所謂視歧也此乃精光衰亂偏隔敗壞病在腎膽膽腎真一之精不足故陽光失其主而視一為二若目赤痛者乃火壅於絡陰積不得升運以滋神光反為陽邪錯亂神光而歧其視也通治宜服補肝散千金磁朱丸或沖和養胃湯許學士云苟牧仲謂豫曰有人視一為二醫作肝氣盛治以瀉肝湯不愈豫曰孫真人有云目之繫上屬於腦令服驅風大腦藥得愈此又一治法也由此以觀凡行醫治豈可執一概論哉證治歌視一為二最堪憂病從腎膽溯源頭真精不足陽無主致成歧視害雙眸火壅於絡必赤痛神光失潤是病由沖和養胃湯補肝散千金磁朱丸治法周或用驅風入腦藥臨證修方勿刻舟方補肝散治肝風內障不痛癢眼見花發黃白黑赤等證車前黃芩羌活細辛黑元參各一兩人參白茯苓各二兩防風羚羊角銼末各三兩上為末每服一錢五分食後米飲調服千金磁朱丸見氣為怒傷沖和養胃湯見陰弱不能配陽光華暈大論光華暈大者何謂視日與燈燭皆生紅暈也甚則通紅而人物在燈光之下亦大矣此乃實火陽邪發越於上之害諸絡必有滯澀輕者暈小而淡重者暈大而濃治宜滋養化源剋制其火通治宜滋陰降火湯昔張子顏少卿晚年嘗目光閃閃或見白衣人一日從壽卿求治卿投大丸即明目清心大補湯數十小丸即地芝丸數十囑以十日中服之服畢見白衣人變黃色目光不見又明日俱無所見乃請卿卿曰公脾初受病為肺所乘心乃脾之母也公既多疑心氣不固自然有所見吾以大丸實其脾以小丸補其心肺為脾之子既不能盛其母其病自愈也一少年苦眩暈常見一鏡子卿曰來晨以魚鱠奉候及期延於內從容久飢候客退方得攀接俄而抬上施一瓶芥醋並無他味少年飢甚聞芥醋香徑啜之再啜覺胸中豁然眼花不見卿曰君吃魚鱠人少芥醋不快又有魚鱗在胸中所以眼見鏡子故權誑而愈其疾也證治歌光華暈大暈生紅視人與物亦皆洪實火陽邪因發越諸絡必多滯澀凝輕者暈小而色淡重大而濃治法詢滋養化源還制火滋陰降火湯奏功古人醫治多神妙細心參透可遵循方滋陰降火湯見雲霧移睛視赤如白論附視直如曲視赤如白何謂視物失其本色也此因物著形之病與視瞻有色空中氣色之症不同其候譬諸觀太陽若水輪燈花反粉色或視粉牆如紅如碧視黃紙而似緑似藍等證此內絡氣鬱元府不和之故遇此當因其色而別之以知何臟腑乘侮之為病而施治之通治則宜服復明湯或益氣聰明湯視直如曲有視直如曲之一證與此雖相類而究大異蓋彼由內絡氣鬱元府不和而視直如曲則由隱憂積鬱傷肝欲火炎熾損腎而致治當平肝泄腎宜先服蠲毒飲繼多服加味逍遙散然能如程氏之以醉治呂氏之以吐治則又不藥而愈矣證治歌視赤反白證最歧目中五色總差池此由內絡多氣鬱元府不和故若斯宜從所見分臟腑通治復明湯益氣聰明湯宜更有視直偏如曲病源則一最宜知憂鬱欲火傷肝腎平肝瀉腎是良規蠲毒飲加味逍遙散自然視物不差移方復明湯蜜黃耆當歸柴胡連翹甘草炙生地各錢半黃柏三分半川芎蒼朮米泔水泡炒陳皮各五分上水煎熱服忌酒面辛熱大米等物益氣聰明湯見陰弱不能配陽蠲毒飲見水疳加味逍遙散見補瞼硬睛痛視瞻有色論視瞻有色一證非若瑩星雲霧之細點長條也乃目凡視物有大片甚則通行異色當因其色而別其證以治之若見青緑藍碧之色乃肝腎不見之病由陰虛血少膽汁不足氣弱而散故視亦見其色治宜三仁五子丸及加減駐景丸若見黃赤者乃火土絡有傷也痰火濕熱人每有此患治宜調脾清毒飲或清脾散若見白色者由金分元氣有傷及有痰沫阻滯者皆有此患治宜瀉肺湯繼進黃耆湯若視有大黑片者腎之元氣大傷膽之所養不榮治宜明目地黃丸益陰腎氣丸若久不治則盲矣證治歌視瞻有色證原殊因色驗證各分區色為青緑與藍碧此病原由肝腎虛陰虧血少膽不足氣弱而散病相符三仁五子丸進善加減駐景丸與俱火土有傷見黃赤調脾清毒飲可茹金元有傷痰沫阻目中白色自卷舒治宜瀉肺湯為妙繼進黃耆湯病可除膽養不榮腎元損片成大黑自模糊明目地黃丸可選益陰腎氣丸定無虞方調脾清毒飲見正漏明目地黃丸三仁五子丸均見瞻視昏眇加減駐景丸見睛黃視眇瀉肺湯見白澀益陰腎氣丸見總論黃耆湯見大眥漏清脾散見土疳內障在睛里昏暗與不患之目相似惟瞳神里有隱隱青白者無隱隱青白者亦有之婁全善云內障先患一目次第相引兩目俱損者皆有翳在黑睛內遮瞳子而然今詳考黑睛之脈者目系也目系屬足厥陰足太陽手少陰三經蓋此三經臟腑中虛則邪乘虛入經中鬱結從目系入黑睛內為障翳龍木論所謂腦脂流下作翳者即是太陽之邪也所謂肝氣衝上成翳者即足厥陰之邪也故治法以針言之則當取三經之腧穴如天柱風府太衝通天等穴是也其有手巧心審諦者能用針於黑眼內撥其翳為效尤捷也以藥言之則當補中疏通此三經之鬱結使邪不入目系而愈飲食不節勞傷形體脾胃不足內障目病宜人參補胃湯益氣聰明湯圓明內障升麻湯復明湯婁云上四方治目不明皆氣虛而未脫故可與參耆中微加連柏若氣既脫則連柏等涼劑不可施經云陽氣者煩勞則張精絶目盲不可以視耳閉不可以聽之類是其證也內障右眼小眥青白翳大眥亦微顯白翳腦痛瞳子散大上熱惡熱大便澀滯艱難小便如常遇熱暖處頭痛睛脹能食日沒後太陰暗則昏此證可服滋陰地黃丸翳在大眥加升麻葛根翳在小眥加柴胡羌活東垣云木旺則火勝無所畏而妄行也故脾胃先受之或病目而生內障者脾裹血胃主血心主脈脈者血之府也或曰心主血又曰脈主血肝之竅開於目也治法亦宜地黃丸當歸湯之類倪云凡目病初起時視覺微昏常見空中有黑花神水淡緑色次則視歧視一成二神水淡白色可服沖和養胃湯益氣聰明湯千金磁石丸石斛夜光丸有熱者瀉熱黃連湯久則不見神水純白色永為廢疾矣方地黃丸即羌活退翳丸熟地八錢生地黃柏當歸均酒製茺蔚子丹參各五錢黑附子泡寒水石生用各一錢芍藥一兩二錢防己酒製二錢知母酒製丹皮羌活川芎各三錢柴胡五錢或三錢上為細末煉蜜為丸如小豆大每服五七十丸空心白湯下於食未消候飢服之忌語言隨後以食壓之當歸湯治翳更補益瞳子散大黃連柴胡各一錢黃芩芍藥各二錢熟地歸身甘草炙各二錢上水煎臨臥服瀉熱黃連湯黃芩酒炒黃連酒洗柴胡酒炒生地酒洗各一兩膽草三錢升麻五錢上每服三錢水煎食前熱服午後服則陽逆不行臨臥服反助陰升麻湯即沖和養胃湯益氣聰明湯均見陰弱不能配陽石斛夜光丸見氣為怒傷復明湯見視赤如白滋陰地黃丸見總論人參補胃湯見傷寒愈後千金磁石丸見氣為怒傷瞳神散大論附瞳神緊小東垣云凡心包絡之脈出於心中代心君行事也與少陽為表裡瞳子散大者少陰心之脈挾目系厥陰肝之脈連目系心主火肝主木此木火之勢盛也其味宜苦宜酸宜涼大忌辛辣熱物故藥中宜去茺蔚子以味辛及主益肝是助火也亦不可用青葙子為助陽火也且瞳散大風輪反為窄窄一周甚者一周如線此乃邪熱鬱蒸風濕攻擊以致神膏遊走散壞兼有內障以收瞳神為先於收瞳神藥內漸加攻內障藥治之宜保命集當歸湯熟地黃丸濟陰地黃丸若只攻內障不收瞳神使瞳神愈散而內障不退坐令二證氣定膏損不復治而為終身之疾矣大抵瞳神散大十有七八因頭風痛攻之害然而傷寒瘧疾痰濕怒氣憂思勞役經産敗血及久鬱熱邪火證亦皆能為之災治當尋所因而下方乃不貽失治之患治法多見大便澀小便常天熱暖處頭痛睛脹日沒則昏暗等證宜服羌活退翳丸因喜食辛辣炙煿之物過多者則宜先服瀉胃湯繼服磁朱丸若因暴怒而致者宜先服調氣湯繼進磁朱丸因患頭風痰厥而致者宜服清痰飲若因血弱陰虛不能養心火旺於陰而致者宜服滋陰地黃丸此皆言治瞳神散大之候瞳神緊小頗有反散大而為瞳神緊小者何也其候瞳神細小如簪腳甚則縮小如針此蓋因恣色之故病目亦不忌淫欲及勞傷血氣思竭心意肝腎二經俱傷元氣衰弱不能升運精汁以滋於膽膽中三合之精有虧則輪亦乏故瞳中之精亦日漸耗損甚則隱沒俱無為終身疾矣亦有頭風熱證攻走蒸乾精液而細小者皆宜早治遲則恐無及也治法水實而血自收者宜清腎抑陽丸若陽氣強盛而搏陰陰氣堅實而有御宜用抑陽酒連散若繫心火乘金水衰反制者宜用還陰救苦湯亦宜用搐鼻碧雲散如此因證尋源得源下方豈有不治之證哉證治歌瞳神散大亦危哉病自心肝木火來其味宜酸涼與苦莫投辛熱釀成災瞳大風輪翻窄小熱邪風濕內為烖若兼內障須詳審先斂瞳神障後排保命當歸湯偕熟地黃丸濟陰地黃丸與偕倘不收瞳惟去障致成痼疾深可哀證各有因須細察古人治法簡而賅小便如常大便澀日沒昏暗覺如霾睛暖頭疼睛復脹羌活退翳丸勿緋徊食貪辛煿先瀉腎湯繼進磁朱丸最諧若因暴怒先調胃湯磁朱繼進亦同儕因患頭風痰厥者清痰飲進是良材血弱陰虛心失養滋陰地黃丸可挽回更有瞳神翻緊小色欲勞思是禍胎肝腎俱傷元氣弱精汁失運膽旋擢三合精虧輪亦乏瞳中精損故多乖頭風熱證相攻走蒸乾精液厲之階水實血收何藥妙清腎抑陽丸可挽禿陽盛搏陰陰堅實抑陽酒連散是正裁心火乘金水反制還陰救苦湯莫遲回或投搐鼻碧雲散修方隨證法門開方保命集當歸湯黃連柴胡各一錢當歸身黃芩芍藥各二錢熟地甘草炙各三錢上水煎臨臥服濟陰地黃丸五味麥冬當歸熟地肉蓯蓉山茱萸淮藥枸杞甘菊花巴戟肉等分上為末煉蜜和丸梧子大每服七八十丸空心白湯下瀉腎湯枸杞一錢二分生地五味子黃柏知母俱酒洗炒麥冬去心山茱萸去核白芍歸尾各一錢白茯苓獨活各八分上水煎熱服調氣湯白芍陳皮生地黃柏鹽水炒香附醋製當歸身知母鹽水炒各一錢生甘草梢五分枳殼白茯苓各八分上水煎熱服清痰飲青黛六分陳皮去白半夏薑製天花粉梔仁炒黑石膏煅黃芩枳殼炒白茯苓膽南星各一錢上銼劑水煎熱服清腎抑陽丸寒水石另研黃柏知母均鹽水制生地枸杞黃連酒炒白茯苓各二兩獨活八錢決明砂當歸白芍均酒洗炒各一兩上為細末煉蜜為丸梧子大每服三錢空心白湯下熟地黃丸見陰邪風症加分作丸磁朱丸見氣為怒傷羌活退翳丸見內障滋陰地黃丸見總論抑陽酒連散見強陽搏實還陰救苦湯見心火乘金搐鼻碧雲散見淫熱反克能遠視不能近視論附近視不能遠視目有能遠視而不能近視者此乃陽氣有餘陰精不足血虛氣盛有火而無水者也治之只在心腎心腎平則水火調而陰陽和暢遠近發用各得其宜矣法當以地芝丸及六味地黃丸主之能近視不能遠視抑有反此能近視而不能遠視者何以治乎原其候乃陽氣不足陰氣有餘氣虛而血盛有水而無火者也此證非言稟受生成近覷不治之病蓋膏厚而經絡潤澤神氣和而陽光盛聚矣治法宜補心益腎以定志丸及補腎磁石丸主之總之此上二證皆因酒色過度及嗜燥頭風忿怒暴悖勞役憂思致傷氣血所致人苟能於此而謹慎之豈至白貽伊戚如此哉證治歌遠視偏憂近視難陽盛陰衰是病端證因有火而無水血虛氣盛病相干治從心腎調水火地芝丸六味地黃良倘逢近視偏難遠陽衰陰盛可反看生成近覷原難治因患目病治須參病由膽腎須詳審補心益氣有金丹補腎磁石丸定志丸自然眸子報平安方地芝丸天冬去心生地煉乾四兩枳殼去瓤菊花上為細末煉蜜為丸如桐子大每服百丸食後茶清送下定志丸遠志去心菖蒲各二兩人參白茯神各一兩上為細末煉蜜為丸桐子大以砂為衣每服七八十丸白湯下補腎磁石丸石決明醋煅甘菊花去根葉磁石捶碎煅紅醋淬肉蓯蓉酒浸切焙菟絲子水淘淨酒浸一宿慢火焙乾一兩上為細末用雄雀十五隻去毛嘴足留肝腸以青鹽二兩水二升同煮令雀爛水盡為度取出先搗如膏和藥末為丸如梧子大每服三錢空心溫酒下六味地黃丸見睥生痰核內湯加分作丸神水將枯論神水將枯者謂視珠外神水乾澀而不瑩潤也最不易識雖欲言而不能妙其狀此乃火鬱蒸於膏澤故精液不清而珠不瑩潤汁將內竭雖有淫淚盈珠亦不潤澤視病氣色乾澀如蜒蝣唾涎之光凡見此證必有危急病來緩治則神膏乾澀瞳神危矣若小兒素有疳證糞如鴨溏並人五十以外糞如羊矢而目得此證者皆死若熱結膀胱之證神水消渴者蓋水枯熱結蒸爍不清澄其源而流自清矣其治宜服滋腎丸然其證有二有陰虛證有陽虛證不可混治陰虛以補腎丸主之陽虛以調中益氣湯主之或曰既云神水將枯而又調陰虛者何也蓋神水即氣中之精液陽不生即陰不長也證治歌神水將枯最可憂火蒸膏澤致招尤精液不清珠不潤目中乾澀如蜒蝣治如稍緩神膏竭瞳神危殆慮宜周小兒疳疾或年老倘並此證最堪愁若逢熱結膀胱候神水消涸豈無由水枯熱結多蒸爍澄源自許克清流通治滋腎丸可服更別陰陽仔細求陰虛補腎丸宜進陽弱調中益氣丸投方滋腎丸黃柏知母均鹽水炒各三兩肉桂二錢上為細末水疊為丸如梧子大每服百丸空心沸湯下補腎丸杜仲薑汁炒牛膝酒洗陳皮各二兩黃柏鹽水炒龜板酥制各四兩五味子夏加一兩焙乾乾薑各加五錢炒上為細末煉蜜為丸如梧子大每服三十丸空心鹽湯送下調中益氣湯炙黃耆一錢升麻五分陳皮六分木香二分人參甘草蒼朮米泔水制柴胡各五分上水煎臨臥溫服瀉膽散元參黃芩地骨皮麥冬知母各一兩黃耆茺蔚子各一兩五錢上每服五錢水煎食後溫服聚開障論聚開障證因血熱妄行不循經絡熱客肺膜之內或因久嗽傷肺而起皆肺氣不清之故所謂障或圓或缺或厚或薄如雲似片或數點如星痛則見之不痛則隱聚散不一來去無時也治宜退血散或桑白皮散主之證治歌障亦胡為聚復開肺氣不清致此災痛則相見不痛隱圓缺厚薄不時來如雲如月如星點桑白皮散是良材退赤散投亦良法定教雲翳永成灰方退血散並治色似胭脂當歸赤芍木賊防風細辛膽草均等分水煎先乘熱蒸眼後溫服桑白皮散見白澀棗花障論棗花障者其證甚薄而白起於風輪周匝從白膜之內四圍環布而來也凡性急及患痰竭視勞瞻耽酒嗜辣傷水濕熱之人每罹此患久則始有目急乾澀昏花不爽之病犯而不戒甚則有瞳神細小內障等證或因人觸激火入血分淚流赤痛者亦在變證之例雖有棗花鋸齒之說實無正形凡見白圈傍青輪際從白膜四圍圈圓而來即是此證宜羚羊角飲子主之皂角生熟地黃丸桑白皮散亦可隨宜酌用若目生花翳多年不退則宜蕤仁散主之至白嫩在輪外四圍生起珠赤痛者是花翳白陷不可誤認為此證醫者慎之證治歌棗花障證起風輪周匝來從白膜中性急患痰兼嗜酒起居飲食失調停久為目急與乾澀瞳神縮小內障成或因觸激火入血淚流赤痛變證生白圈若傍青輪際白膜圈圓此證明皂角丸偕羚羊角飲生熟地黃湯與桑白皮散同目生花翳久不退散進蕤仁可奏功花翳白陷證原異醫師臨證莫朦朧方蕤仁散蕤仁湯浸去赤皮秦艽去苗各一兩枳殼炒黃赤茯苓各兩半川大黃炒一錢車前青葙子赤芍各七錢半柴胡一兩上為細末每服三錢水煎連滓熱服羚羊角飲子見下圓翳內障桑白皮散見白澀皂角丸生熟地黃丸均見遊風圓翳內障論附散翳黑睛上一點圓翳有陰陽二證之別陽證明處看之不覺暗處看之則明旦大陰證日中見之差小陰處見之則大或明或暗視物不明以冷藥治之愈見黑花此因肝腎虛而得也治宜皂角丸合生熟地黃丸補腎丸鎮肝丸主之亦有色白而大小不同者此則由腎熱肺虛而致治宜青空丸或羚羊角飲子然此特言圓聚不散之翳之治法也散翳而顧有所謂散翳者何也其形如鱗點或瞼下起粟子而爛日夜痛楚瞳神最痛常下熱淚此由肝腎虛熱所致治宜皂角丸生熟地黃丸八味還睛丸穀精草散主之主方不一總宜審慎驗證而下庶乃不致誤人證治歌圓翳何為及黑珠陰陽二證各相區陽者明看原難覺暗處看之明且粗陰者日中見差小陰看則大不同衛另暗無常難視物此病原由肝腎虛如投冷藥病增甚愈見黑花日卷舒治貴鎮肝丸兼補腎丸皂角丸合生熟地黃糊或有肺虛兼腎熱色白雖同大小殊空青丸與羚羊角飲子自然翳退病消除更有散翳如鱗點瞼下粟子爛堪虞瞳神最痛淚流熱肝腎虛熱信非誣治宜八味還睛丸妙穀精草散皂角丸俱生熟地黃丸可用審證下方其最諸方補腎丸巴戟山藥故紙炒丹皮茴香各五錢肉蓯蓉枸杞各一兩青墁二錢五分上為細末煉蜜為丸梧子大每服三十丸空心鹽湯下鎮肝丸治肝經不足風熱目昏癢痛難開多眵灑淚羞明赤痛生翳障遠志去心地膚子茺蔚子白茯苓防風決明子蔓荊子人參各一兩山藥青葙子柴胡柏子仁炒地膚皮甘草炙元參車前菊花各五錢細辛三錢上為細末煉蜜為丸梧子大每服三十丸食後米湯下空青丸細辛五味車前石決明知母防風各二兩上為細末煉蜜為丸如桐子大每服三十丸空心茶清下羚羊角飲子羚羊角銼末三兩細辛知母人參車前子各三兩防風二兩五上為細末每服一錢五分水煎食後溫服八味還睛丸蒺藜炒防風甘草炙木賊梔子各兩五錢蟬蛻各二錢草決明八錢上為細末每服二錢食後麥冬湯調服穀精草散穀精草豬蹄退炒緑豆皮蟬蛻上為末每服三錢食後米泔水調服補肝散治圓翳內障熟地白茯苓白菊花細辛白芍甘草柏子仁防風柴胡上水煎食後服皂角丸生熟地黃丸均見遊風劍脊翳論附魚鱗障水晶障劍脊翳者亦名橫翳其色白或如糙米色者或帶焦黃者但狀如劍脊中間略高兩邊微薄橫於風輪之外者即此證也此證蓋因肝虛血損而致治宜養血益血涼血以皂角丸合生熟地黃丸或七寶湯主之更點以七寶膏不啻以鋼刀折肉劍之捷效也雖然此證尤可治也魚鱗障所難者魚鱗一障為證色雖白而不光亮狀帶斜歪如魚鱗疊故號曰魚鱗也其候乃氣結膏凝雖以除絶其源多因病之初起誤認他證過用寒涼多點片腦此證原稱難治然能久服加味逍遙散繼以還少丹或羚羊角散點以七寶膏而命無喪明之患不如魚遇鱗利刃也水晶障不但此也且有水晶一障其色白如水晶之清瑩但高厚滿珠看雖易治得效最難蓋根深亦氣結故也而究由腎水虛泛金水無相生之意火土生克之功遇此者一然能以生熟地黃丸合皂角丸或七寶丸耐久服之亦常有獲效如銅錘之破水晶者矣是在醫者之明亦須病者之緣證治歌劍脊翳白橫翳同狀如劍脊在風輪色帶焦黃或如糙米色血損肝虛是病因治宜涼血兼養血益血皂角丸合生熟地黃工更或七寶湯亦妙點藥膏仍七寶成難治更有魚鱗障證雖色白少光瑩狀帶欹斜如鱗疊其候氣結更膏凝病因誤服寒涼藥加味逍遙散服貴頻繼投還少丹羚羊角散點將七寶膏可生明更有水晶障亦白高厚滿珠氣結深病因火土無生克更因金水不相生腎水虛泛因成病醫師遇此術幾窮惟服生熟地黃合皂角丸或投七寶丸亦靈久服有時能奏效仰望良工細酌斟方七寶湯羚羊角鎊犀角鎊胡黃連車前石決明洗搗碎丹砂另研炙草各五錢上除丹砂石決明外余為末每服三錢水煎好去渣入丹砂末五分決明末二分五釐再煎兩沸食後溫服七寶丸石決明搗研二兩琥珀三七錢半珍珠研細熊膽研各五錢茺蔚子人參各一兩龍腦二錢半上為細末煉蜜為丸梧子大每服十五丸加至二十丸食前茶下還少丹熟地二兩山藥山茱萸杜仲薑汁炒枸杞各二兩牛膝酒浸遠志薑汁浸炒肉蓯蓉酒浸北五味續斷楮實子茴香菟絲子制巴戟各一兩上為細末煉蜜為丸梧子大每服五十丸空心鹽酒下七寶膏見混睛羚羊角散見外障加味逍遙散見瞼硬睛疼皂角丸生熟地黃丸均見遊風浮翳障論附沉翳浮翳證初患之時不癢不痛但從瞳神內映出白色暗處看則其翳見大明處看其翳則略小全無血色相混此原腦風衝入於眼致腦脂流下之故抑有因腎虧而肝失滋養者故治此者最宜分別治法系腦風所致又系強壯之人宜服石決明散虛人則宜服墜翳丸若系腎虧而肝失養則宜服皂角丸合生熟地黃丸或七寶散主之此係翳之通治也沉翳有所謂沉翳者治將何如其候白藏在黑睛之內向日細看乃見其白且有疼痛而日輕夜重者此係肝經之病而有虛實之分治法系實證原因過勞傷肝或傷於酒漿辛辣鬱熱所致或因肝熱蒸腦腦熱流下而致者宜服羚羊角飲繼進皂角丸或系腎水不足不能上滋於肝致肝鬱熱為患則宜服皂角丸合生熟地黃丸繼進羊肝丸總之證分虛實治法各殊是在醫者神而明之證治歌障名浮翳究何如初時癢痛亦俱無白色映自瞳神內暗處看與明處殊此係腦風衝入眼腦脂流下故多虞或因腎虧肝失養醫師治法總宜區倘系腦風更強壯石決明散自非誣虛則墜翳丸可進腎虧七寶散相孚生熟地黃丸合皂角丸更有沉翳可舉隅黑睛有白宜細看更兼疼痛不安居日輕夜重肝經病此證須分實與虛實證所因原不一總屬於肝病厥脈羚羊角散宜先服繼投皂角丸疾能除若系腎水不足候致肝鬱熱難展舒生熟地黃丸皂角丸宜兼服羊肝丸繼進莫踟蹰方石決明散石決明醋煅防風人參茺蔚子細辛減半知母車前黃芩元參白茯苓五味各等分上為細末每服二錢食前茶清調下墜翳丸青羊膽青魚膽鯉魚膽各七錢熊膽二錢半牛膽五錢石決明煅存性另研二兩麝香少許上為末煉蜜為丸梧子大每服十丸空心茶清下七寶散治風眼除瘀熱當歸芍藥黃連銅緑各二錢研杏仁七粒去皮白礬甘草各一錢上㕮咀水煎去滓澄清臨臥洗之羊角飲車前黃芩黑參大黃各一錢羚羊角茺蔚子防風各二錢上為末水煎食後溫服皂角丸蛇蛻七條蟬蛻白朮膽草元精石當歸穿山甲茯苓白菊花赤芍連翹刺蝟皮穀精草木賊川芎人參豬爪上為細末一半入芽皂十二挺燒存性和勻煉白蜜為丸梧子大每服一錢五分空心杏仁湯下一半入仙靈脾二兩每服三錢用豬肝三片披開夾藥煮熟臨臥細嚼原汁送下平肝丸羯羊肝一具新瓦盆中煿了更焙之肝大用一半甘菊花羌活柏子仁細辛官桂白朮五味各五錢黃連七錢半上為末煉蜜和丸梧子大每服三四十丸食前空亦溫湯下皂角丸生熟地黃丸均見遊風暴盲論暴盲者謂素無他病外不傷輪廓內不損瞳神倏然盲而不見也其故有三曰陽寡曰陰孤曰神離乃否塞關格之病病於陽傷者緣忿怒暴悖恣酒漿辛燥及久患痰火人得之則煩躁祕渴病於陰傷若多色欲悲傷思竭哭泣太頻之故或因中風中寒之證起傷於神者或因思慮太過心惘極憂傷至而驚恐無措者得之則其人如癡呆病發之狀屢有因頭風痰火元虛少水之人眩運發而盲瞀不見能保養者不治自愈不能保養則成痼疾治法系怒氣傷肝脾虛血少者宜服加味逍遙散系怒傷元陰元陽者宜服柴胡參朮湯若忽然失明翳膜障蔽者宜服熊膽丸若元氣聯脫致目無見者宜獨參湯昔丹溪治一老人目暴盲飲食起居如故急煎人參膏二斤服一日眼方見治一男子四十餘歲好飲熱酒忽目盲脈澀此因熱酒所傷胃氣汙濁之血死在其中遂以蘇木作湯調人參膏飲之服二日鼻內兩手掌皆紫黑色自此病退矣以四物湯加蘇木紅花桃仁陳皮煎調人參末數日而愈一男子五十五歲九月間早起忽開眼無光視物不見急就睡片時能見人物飲食減少神思極倦脈緩大四至之上重按則散而無力作受濕治果因臥濕地半月而得此證遂以白朮為君黃耆茯苓陳皮為臣附子為佐十餘貼而愈由此視之病形相同而發源各異而調治各殊經云治病必求其本此其然歟證治歌暴爾昏盲三證歧陰孤陽寡與神離總因關格多否塞病在陽傷宜早思起緣忿怒食不節久患火痰致蔓滋病發躁煩兼祕渴若在陰傷宜辨之中風中寒或自神傷起或因色欲與傷悲或因思慮憂傷至暴盲病發狀如癡常有頭風痰火者更兼少水與元虛眩運發時盲不見倘能保養不須醫如詢治法須詳辨血少或兼虛在脾怒氣傷肝何藥妙加味逍遙散最宜元陰元陽俱被怒傷損柴胡參朮湯可施翳膜忽然成障蔽熊膽丸進莫遲遲元氣聯脫目無見獨參湯可救垂危嗜酒暴盲兼脈澀蘇木湯調參膏飲一巵繼投四物湯加蘇木桃仁紅花及陳皮和調人參末頻煎服定復光明效奏奇或因受濕暴盲瞀飲食少思神氣疲白朮為君附子佐更合陳皮茯苓黃耆治貴尋源毋孟浪古人治法可詳披方柴胡參朮湯人參白朮熟地白芍各一錢半柴胡二分甘草蜜炙八分川芎七分當歸身二錢青皮四分上水煎食遠服熊膽丸熊膽川黃連密蒙花羌活各兩半地骨皮蛇蛻炙仙靈脾木賊去節各一兩麒麟蠍蔓荊子水淘各二兩瞿麥旋覆花甘菊花各五錢膽草一兩葳蕤去殼皮取霜三錢上十五味熊膽為主共為細末用羊肝一具一半煮熟焙乾為末先入於藥內一半生者去膜搗爛和藥杵而為丸如梧子大飯後米飲送下三十丸獨參湯人參數兩清河者佳用銅刀切片或銀鍋沙鍋煎湯頓服加味逍遙散見瞼硬睛疼四物湯見赤痛如邪青盲論附雀盲青盲者目內外並無障翳氣色等病只目不見者是此乃元府幽深之源遏郁不得發此靈明其因有二一曰神失二曰膽澀須究其為病之始系傷於七情則傷於神若傷於精血則傷於膽皆不易治而失神者尤難有能保養不治亦愈若年高及疲病者或心腎不清足者雖治不愈世人但見目盲便呼為此證者謬矣夫此證瞳神不大不小無缺無損細視之瞳神內並無些少別樣氣色儼然與好人一般只是不見方為此證若少有氣色即是內障非青盲也治法傷於膽者宜鎮肝明目羊肝丸傷於神者宜復明丸肝腎兩虛者宜水木兩培湯青盲兼內障者宜本事方然盲之證不一雀盲更有所謂雀盲者其候至晚不明至曉則見也俗曰雞盲本科高風內障此乃元陽不足陰濁上升之病治法宜以人參補胃湯及補中益氣湯決明夜靈散肝虛者以轉光丸小兒得此以還明散腎虛者以三陰蛤蚊丸如此分部就治自然濁陰墜鎮清陽上升而曉晚如一矣證治歌人生何忽病青盲神失膽澀兩證詳七情傷害成神失膽澀原由精血傷內外並無諸氣色目中自覺視茫茫若為神失尤難治苟能保養亦無妨年高疲病心腎損縱有良醫莫下方鎮肝明目羊肝丸治傷膽傷神宜取復明丸將倘逢肝腎俱虛證宜用水木兩培湯證若青盲兼內障本事方投罔不藏此外更有雀盲證晚則昏兮晝則光陰濁上升元陽損人參補胃湯可嘗補中益氣湯能效決明夜靈散莫忘肝虛轉光丸最妙還明散冶小兒良腎虛三因蛤蚧丸進自然晝夜總如常方復明丸冬青子生用一升陳酒共蜜拌蒸七次曬七日露七夜焙乾元蝙蝠活捉數個枸杞搗焙夜明珠酒洗煮炒熟地酒蒸焙緑豆殼炒各一兩川黃連炒白朮制各三錢辰砂兩半一半共蝙蝠搗爛一半為衣上為細末煉蜜為丸梧子大辰砂為衣每服五十丸食後熱酒下水木兩培湯治肝腎兩虛或因他病而弱青盲初起服之如神菟絲子洗酒煮炒補骨脂巴戟枸杞川牛膝酒洗炒肉蓯蓉竹刀切片酒浸焙乾各一兩青鹽二錢另研上為細末用豬腰子一個竹刀切開半邊去內筋膜入藥末一錢用線扎緊用上年陳酒浸濕炙熱冷定火性食之即愈本事方白羚羊肝只用一片薄切新瓦上焙乾蕤仁去殼皮澤瀉菟絲車前麥冬肉防風黃芩苦葶藶地膚子去殼茺蔚子杏仁炒桂心炒青葙子五味枸杞細辛白茯苓各一兩熟地兩半上為細末煉蜜為丸梧子大每服三四十丸溫湯下日三服決明夜靈散石決明夜明砂均另研各二錢豬肝一兩生用不食豬肝者羊肝代上末和勻用竹刀切豬肝作二片將末鋪一片以一片合之麻扎定勿令藥泄米泔水一大碗勿犯鐵器用沙罐盛之將肝藥入於罐內煮至小半碗臨臥連肝藥汁服之轉光丸治肝虛雀目青盲生地白茯苓川芎山藥熟地蔓荊子白菊花防風細辛上為細末煉蜜為丸梧子大每服二十丸空心桑白皮湯下還明散治小兒每至夜不見物名曰雀盲夜明硝井前砂穀精草蛤粉各等分上為細末煎黃臘為丸如雞頭大三歲一丸用豬肝一片切開置丸於中麻扎定沙罐內煮熱先熏眼後服之蛤蚧丸蛤粉細研黃臘等分上臘搜粉為丸如棗大每用豬肝一片二兩許披開包一丸麻線扎定入沙罐內水一碗煮熟先熏目後食之千金方治青雀盲神效地膚子五錢決明子一升上二味為末以米飲汁和丸食後服二十丸加至三十丸日二服一方治青雀盲大效蒼朮四兩米泔水浸一宿切片焙乾為末每服三錢用豬肝二兩批開摻藥末仍合定將麻扎緊粟米一合水一大碗砂罐內煮熟熏眼臨臥服之補中益氣湯見總論鎮肝明目羊肝丸見浮翳人參補胃湯傷寒愈後青風內障論附緑黃黑烏絲銀青風內障者謂視瞳神有氣色昏蒙如青山籠淡煙也然自視尚見但比平時光華則昏蒙耳其原乃陰虛血少及勞心竭慮憂鬱忿怒所致為證甚危宜急治之治法宜羚羊角湯或白附子湯補腎磁石丸還睛散之類主之特是風之為患豈但此哉而尤有曰絲曰黃曰黑曰烏曰緑曰銀風等證之異緑風內障考夫緑風者為候瞳神氣濁而不清其色如黃云之籠翠岫似藍靛之罩藤黃乃青風炎重之證久則變為黃風雖曰頭風所致亦由痰濕所攻火鬱憂思怨急之故治法審系痰濕攻傷先以半夏羚羊角散或羚羊角散後以還睛丸主之系頭風所致以羚羊角散主之黃風內障黃風者為候瞳神已大其色昏濁而黃也此乃緑風之變證原由痰濕攻脾頭風損胃所致其病較緑風而治更難然久服快脾湯清胃湯亦有治之猶效者黑風內障若夫黑風則與緑風之候相似但時時黑花自起此乃腎受風寒邪熱上攻於眼治宜以白附子湯補腎磁石丸還睛散主之烏風內障至於烏風其候色濁暈氣滯有如暮雨中之濃煙重霧風痰之人嗜欲太過及敗血傷精腎絡損而膽汁虧真氣耗而神光墜治法宜以白附子湯或涼膽丸主之絲風內障他如絲風一證為候視瞳神內隱若有一條橫經或豎經於目內自視全物亦有碎路者此乃絡為風邪攻郁是真氣玄府有一系之遏故視亦光華有損久不治則變內障之篤治宜先以生犀角丸繼以還睛丸主之銀風內障更何以曰銀風謂瞳神大成一片雪白如銀故曰銀風也此病頭風痰火之人偏於氣忿怒郁不得舒暢故傷真氣而成乃終身之痼疾恐金丹不能為返光矣然能耐服加味逍遙散繼進人參養榮湯當有治之復明者甚矣風之為病顧若是之多且奇哉而究皆系人之不能自保使人皆能存心養性內調七情使之各發於正外慎六淫制之邪無從入則又何風之足畏乎證治歌那堪內障有青風淡煙儼向青山籠陰虛血少多思慮憂鬱忿怒驚昏蒙此證最危宜急治羚羊角湯可奏功白附子湯治速效補腎磁石丸還睛散靈青風炎重緑風現瞳神氣濁證斯成色似黃云籠翠岫藍靛罩藤黃亦與同病延日久黃風變頭風更兼痰濕攻火鬱憂思兼忿怒治法分明可引伸痰濕半夏羚羊角散羚羊角散更還睛丸頭風仍用羚羊角散黃風瞳大色更昏痰濕攻脾風損胃治原不易莫逡巡清胃湯快脾湯能久服或能挽救復光瑩黑風原與緑風似腎受風寒邪熱沖黑花時現須求治白附子湯克奏功補腎磁石丸還睛散更有烏風可細論色濁氣滯如籠霧風痰更兼嗜欲侵敗血傷精因致病神墜原因氣損真膽汁虧因腎絡損白附子湯偕涼膽丸工絲風一證如何辨橫絲隱躍在瞳神風邪入絡相攻害真氣玄府遏難通久而不治貽深害生犀角丸與還睛丸從內障尤有銀風證瞳神一片白如銀頭風痰火兼鬱怒致傷真氣最為凶加味逍遙散宜耐服繼則宜投人參養營湯風證如斯已詳數尤須臨證細心尋方羚羊角湯人參元參地骨皮羌活羚羊角銼末各一兩車前一兩五錢上為末水煎食後溫服白附子湯治發散初起黑花昏蒙內障荊芥白菊花防風木賊白附子蒼朮人參羌活蒺藜上等分水煎食後服半夏羚羊角散羚羊角銼細末薄荷羌活炙半夏各一錢半細辛二錢白菊花川烏炮川芎車前防風各五錢上為末每服三錢生薑三片水煎服或荊芥湯調服羚羊角散白菊花川烏炮川芎車前防風各五錢羌活半夏羚羊角薄荷各二錢半細辛二錢上入生薑三片水煎服或為末荊芥湯調服生犀角丸石決明醋煅當歸身犀角銼末麻黃減半楮實子枸杞防風上為細末麵糊丸梧子大每服五十丸茶清送下補肝散治絲風內障均系肝風不痛癢眼見花發黃白黑赤或物二形難辨羚羊角防風各三兩人參茯苓各一兩細辛元參車前黃芩炒羌活各一兩上為細末每服一錢米飲調下大黃瀉肝散治烏風內障郁李仁荊芥各二錢半甘草大黃各五錢上水煎食後服還睛散即胬肉攀睛內還睛丸加仙靈脾茵陳補腎磁石丸見能遠視清胃湯見睥生痰核加味逍遙散見瞼硬睛疼人參養榮湯見總論涼膽丸見狀如懸膽快脾湯即人參養胃湯見傷寒愈後偃月內障論附仰月如銀如金偃月障者風輪上半邊氣輪交際處從白膜內有隱隱白氣一灣如新月覆垂向下也其色粉青與偃月侵晴在輪膜中來緩者不同初起不覺無慮積久始下風輪而損光或沿邊周匝而為棗花為害最遲人不為慮多中其患其源乃腦漏或腦有風濕久滯郁中微火攻擊腦油滴下好酒暴怒激滯生郁為變亦急凡經水洗腦不得干而濕熱伏抑者及痰火人好燥膩濕熱等物者皆有此患治宜補肝散或墜翳丸此偃月之治法也仰月內障更有白氣隱隱一灣如新月從風輪下半邊仰而從下生上謂之仰月障者何以治之蓋此候乃水不足木失培養金反有餘之故也治宜培木抑金滋水補陰以生熟地黃丸及右歸丸之類主之自爾水足金和光明無損矣倘抗久失治則變為如銀內障之難治者可不畏哉如銀內障夫如銀內障何為者其候瞳神中白色如銀輕則一點白亮而如銀星一片重則瞳神皆雪白而圓亮圓亮者一名圓翳內障有仰月偃月變重為圓者有一點從中起視漸昏漸大而不見者此乃鬱滯傷乎中和之元氣故陽光精華為其閉塞而不得瞻見亦有濕熱在腦腦油滴落而元精被損鬱閉其光非若銀風散大而不可收者乃不治之兆故稱難治然有年未六旬血氣未衰者主以石決明散猶可復明也但未若如金內障之易退耳如金內障如金內障又何為者其候瞳神不大不小只是黃而明瑩此乃元氣傷滯所成因而痰濕陰火攻激故色變易非若黃風之散大不可醫者治以羚羊羌活湯及羚羊角飲子自爾就愈而有能保養培元調和氣息者則又可勿藥有喜矣證治歌目障竟成偃月形病在風輪與氣輪白氣隱生白膜內狀如新月色粉青證與偃月侵睛異始猶不覺繼多凶至下風輪光漸損沿邊周匝棗花成病由腦漏或風濕久滯火鬱腦油生或因飲食起居害補肝散與墜翳丸工更有白氣下而上隱隱一灣仰月名水木若衰金反勝治宜培木以抑金生熟地黃丸右歸丸進金和水足自光明內障更有如銀證瞳神白色竟如銀重則雪白而圓亮輕猶一片似銀星元氣中和傷鬱滯陽光精華閉塞成濕熱在腦腦油滴元精被損光郁凝年未六旬氣未弱石決明散或回春如金內障亦先辨瞳神無恙黃色侵此病亦由元氣弱痰濕陰火更相攻羚羊羌活羚羊角飲子神效昭然若發蒙方補肝散羚羊角細辛羌活白茯苓夏枯草元參防風楮實子人參石斛車前各等分上為細末每服三錢食後米飲調下墜翳丸石決明散均見浮翳生熟地黃丸見遊風右歸丸見目閉不開羚羊羌活湯見雲霧移睛羚羊角飲子見逆順障補腎丸治如銀障見圓翳內障瞳神反背論附瞳神欹側瞳神反背者因六氣偏勝風熱搏擊其珠斜翻側轉白向外而黑向內也藥不能治止用撥治須久久精熟能識其何向何背或帶上帶下之分然後撥之則在反掌否則不能治矣今人但見目盲內障或目損風水二輪而膏雜壞白掩黑者皆呼為瞳神反背謬矣夫反背實是斜翻烏珠向內豈珠正向外而可謂之反背哉使此而亦謂之反背其有瞳神欹側一證將何謂乎瞳神欹側夫欹側者謂瞳神歪斜或如杏仁棗核半月也此乃腎膽之神膏所損瞳神將盡矣若風輪被損神膏流綻致瞳神欹側者輪外必有蟹睛在焉蟹睛雖去而瞳神不得復圓外亦結有脂翳終身不脫若輪外別無形證而瞳神欹側者必因內傷腎水與肝血膽之化源故膏液日漸耗而瞳神欲沒甚為可畏宜急治之雖難復圓亦可挽住而免墜盡無光之患治宜服生犀角丸甚矣病形之各異也治者可不詳辨哉證治歌瞳神反背最為奇六氣偏勝故如斯白向外兮黑向內搏急總由風熱滋藥不能攻惟用撥熟精撥法效堪期目盲內障及諸證妄稱反背實堪嘆更有瞳神時欹側腎膽神膏寡損虧棗核杏仁半月似風輪破損更堪悲神膏流綻瞳欹側輪外蟹睛狀可窺蟹睛雖去瞳難復外翳終身不脫離若無外證瞳斜欹此係內傷證若茲腎肝血膽俱虧損膏液目耗勢甚危治宜丸服生犀角庶能挽救莫遲遲方生犀角丸見青風內障冰翳內障論附澀翳障冰翳內障謂如冰凍堅實傍觀透於瞳神內陰處及日中看之其形一色痛而淚出此因膽氣盛遂使攻於肝而得之也治宜服皂角丸合生熟地黃丸及七寶丸羊肝丸分珠黃然此翳也凝而不痛故名曰冰澀翳障而有所謂澀翳者何也蓋其候微微赤色或聚或開兩傍微光瞳神上如凝脂色時復澀痛而無淚故曰澀翳也此因心腎虛熱而致治宜服皂角丸生熟地黃丸誠如所治而冰有不如遇日之融澀有不如遇水之洗也則吾未之前聞證治歌冰翳內障實而堅痛而淚出實堪憐日中觀與傍觀異膽氣攻肝治法傳羊肝丸七寶丸分珠散皂角丸合生熟地黃丸更有澀翳須分辨瞳神色似凝脂然或聚或開色微赤時復澀痛無淚漣皂角丸仍與生熟地黃丸進心腎虛熱不纏綿方還肝散治冰翳內障梔子蒺藜均炒枳殼荊芥各四錢車前牛子炒各二錢甘草四錢上為細末苦竹葉湯食後調下分珠散皂角丸生熟地黃丸均見遊風七寶丸見劍脊羊肝丸見青盲緑映瞳神論緑映瞳神謂瞳神乍看無異熟視乃見深處隱隱緑色自視亦漸覺昏眇蓋由痰火濕熱害及清純太和之元氣延久不治或有觸犯者則如金青盲等證成矣其日中及日映紅光處看瞳神有緑色目視不昏者此乃紅先鑠於瞳神照映黑紅相射而光映為緑之故非緑自生之謂及春夏瞳神亦覺色微微緑瑩者乃肝膽清純之正氣視亦不昏不可誤認為此但覺昏眇而瞳神緑色明處暗處看之一般氣濁不清者乃是此證治宜葛花解毒飲或清痰飲主之若源多因過酒及嗜辛熱之傷此其治所謂源清而流自澄也證治歌緑色隱隱映瞳神自視亦覺漸昏蒙害由濕熱兼痰火久延不治禍必深醫師臨證須詳審莫將假證認為真此證明暗視皆緑瞻視昏眇治法詢葛花解毒飲清痰飲源既清兮流自澄方清痰飲見瞳神散大葛花解毒飲見睛黃視眇真精膏損論真精膏損乃傷於真水以致神膏缺損也為證不一其源各異治之豈可概論哉凡診此證見四圍赤甚痛極者由絡間瘀滯是火燥於神膏宜服加減坎離丸若凝脂翳碎壞神膏而缺者是熱爛於神膏為病尤急治宜滋陰降火湯若四圍不甚赤痛不是凝脂所損者為害稍緩乃色欲煩躁恣辛嗜熱之故治宜先進瀉腎湯繼進明目地黃丸三仁五子丸雖然神膏者乃先天一五精氣妙凝自然至精至粹今以後天之藥物氣味而補之原非誠鑑之精需以歲月恐鮮能復其初焉病者須知行功培養庶幾內外兩調無喪明之患也證治歌真精虧損神水傷病源不一可推詳火燥神膏瘀在絡四圍赤甚痛難當加減坎離丸最善凝脂翳證更參觀碎壞神膏因致缺熱爛神膏貴謹防滋陰降火湯宜進若非此證難等量四圍赤痛猶未甚此因欲躁辛熱戕湯名瀉腎宜先進繼進三仁五子丸與明目地黃丸方滋陰降火湯見雲霧移睛瀉腎湯見睥生痰核明目地黃丸三仁五子丸均見瞻視昏眇膏傷珠陷論膏傷珠陷謂目珠子覺低陷而不鮮綻也非因損破膏流水耗而陷低之比蓋內有所虧目失其養源枯絡傷液耗膏損之故所致不一治亦有異試詳辨之有恣色而竭腎水者治宜八味丸六味丸滋腎丸補腎丸主之有嗜辛熱而傷津液者治宜清胃湯葛花解毒飲有因風痰濕鬱而損精膏者治宜清痰飲或瀉濕湯主之有出血太過以致膏液不得滋潤者治宜四物湯當歸補血湯主之有哭損液津而致者治宜明目地黃丸滋陰地黃丸主之總之證治雖別而要皆系元氣弱而膏液不足也若人目無故而低陷者死期至矣若目外惡證內損精膏者不治慎勿等此而統論之也證治歌膏傷珠陷最堪憐液耗膏損病之緣內有所虧目失養所因不一治法傳恣色腎虧宜八味丸六味丸滋腎丸補腎丸精液竭困辛熱嗜葛花解毒飲清胃湯便風痰濕鬱精膏損清痰飲與瀉濕湯連出血過多膏失潤當歸補血湯四物湯妍哭損液汁滋陰地黃丸美或明目地黃丸最賢方六味丸見目睛瞤動八味丸即六味丸加附桂滋腎丸見神水將枯補腎丸見圓翳內障清胃湯見睥生痰核葛花解毒飲見睛黃視眇清癭飲見瞳神散大瀉濕湯見大眥漏四物湯見赤痛如邪當歸補血湯見雙目睛通明目地黃丸見瞻視昏眇滋陰地黃丸見總論神珠將反論神珠將反論謂目珠不正人雖要轉而目不能轉乃風熱攻腦經絡被其牽縮緊急吊偏珠子是以不能運轉甚則其中自開刮眙聲而時響血分有滯者目亦赤痛失治者有反背之患與雙目睛通初起相似而不同治法宜初服鉤藤飲子一二貼即進天門冬飲子元參瀉肝湯麥門冬湯如此而治自然神珠活潑轉運自如矣證治歌神珠將反勢危哉風熱攻腦禍之階經絡被牽珠難轉甚則自開更可哀血分有滯亦赤痛失治恐成反背災雙目睛通初略似鉤藤飲子首宜裁麥門冬湯與天門冬飲元參瀉肝湯治法賅方鉤藤飲子天門冬飲子元參瀉肝湯麥門冬湯均見轆轤轉關珠中氣動論珠中氣動者視瞳神深處有氣一道隱隱梟梟而動狀若明鏡遠照一縷清煙也此蓋因患頭風痰火之病郁久火勝搏激而動其絡中真一之氣遊散飄耗而成急宜治之動而定後冥眇者內證成矣治宜天門冬飲子枳桔荊芥之屬或消風散治此者甚勿緩侍也證治歌珠中氣動在瞳神隱隱梟梟若鏡明蓋以頭風痰火候郁久火盛病斯成由動而定遂冥眇天門冬飲子加枳桔荊芥消風散用多奇效總宜急治保雙瞳方天門冬飲子見轆轤轉關消風散見妊娠目病驚振內障論驚振內障者因病目再被撞打變成內障也其候夜疼痛而赤膜遮目不能瞻視治宜補肝丸石決明補腎丸及皂角丸合生熟地黃丸治方雖多總不外乎補虛散瘀而已豈有異治哉證治歌驚振竟成內障憂痛疼在夜赤遮眸病目更兼遭擊觸補虛散辨法宜周補肝丸進堪期效石決明散亦宜投生熟地黃合皂角丸障開驚定不須愁方補肝丸枸杞五味決明子杏仁茺蔚子青葙子茯苓去皮各一兩乾地三兩菟絲子二兩山藥車前地骨皮柏子仁大黃黃芩去黑心黃連去須人參細辛防風甘草炙各一兩半上為細末煉蜜為丸梧子大每服二十丸加至三十丸食後米飲下石決明丸見睛黃視眇補腎丸見雲霧移睛皂角丸生熟地黃丸均見遊風內障根源歌不疼不痛但昏朦薄霧輕煙漸漸濃或見花飛蠅亂出或如絲絮在虛空此般狀樣因何得肝臟停留熱與風大叫大啼驚與恐腦脂流入黑睛中初時一眼先昏暗次第相牽亦與同苦口還須良藥進只緣肝氣不相通彼時服藥宜稍定將息多乖即沒功遷延日久全黑暗證名內障障雙瞳名字隨形分十六醫師臨證貴通融縱投妙藥難祈效須行撥法用金針將息仍如前戒慎倘虧調養禍靡窮針內障眼法歌內障由來十六般學醫濟世細心看分明一一知形證施針方可得相安若將針法同圓翳誤損神光最可傷冷熱光明虛與實調和四體待平康不然氣必違將息嘔逆勞神翳翻揚咳嗽震驚皆不可多驚先服鎮心丸方若求涼藥銀膏等用意臨時仔細觀老翳細針初復嫩針形切勿一般將病虛新産懷娠月下針才知將息難不雨不風兼皓日針前三日齊戒良安心定意遵醫道念佛尤宜嘈雜防患者嚮明盤膝坐腰帶提撕法亦臧針者原遵前哲路心存惻隱勿倉皇有血莫驚須住手裹封如舊再酌商忽然驚振醫斟酌服藥三旬定吉祥七日解對難見日水搖花上勿驚慌還睛丸散堅心服百日分明覆舊光針內障後法歌內障金針針了時醫師言語要深思錦色黑豆如球子眼上安排日系之臥眠頭忱須要穩仰臥三朝莫厭遲封后忽然微有痛腦風牽動莫他疑或針或烙依經法痛極仍將火尉之擬吐白梅含咽汁吐來仰臥卻從伊起則恐因遭努損雖然稀有也須知七朝豉粥溫溫食震動牙關事不宜大小便時須緩緩無全自起與扶持高聲叫喚言多後驚動睛輪見雪飛如此志心三十日漸行出入認親知狂心莫憶陰陽事夫婦分床百日期一月不需臨洗面針痕濕著痛微微五腥酒面周年斷服藥消除病本基鎮心丸治心癇驚悸憂思愁慮傷心惕然心跳動振不安吐舌面赤目瞪等症牛黃一錢另研生地酒洗炒當歸身酒洗炒遠志肉去心茯神各五錢金箔十五片石菖蒲九節者佳川黃連各二錢半辰砂二錢另研上以前六味共為細末後入牛黃辰砂二味豬心血為丸如黍米大金箔為衣每服五六十丸煮豬心湯送下
