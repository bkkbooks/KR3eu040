body:
  text: 卷二治法總論眼目一證伊古皆竟言五輪八廓及七十二證之辨余細察之此皆非切當之論徒資惑亂未足憑也以愚論之凡病目者非火有餘即陰不足但辨以虛實二字可盡之矣彼凡紅腫赤痛之病及少壯暫得之疾或因積熱而發者皆屬有餘而為實其有無紅腫熱痛而但或昏或澀或眩運無光或年及中衰或酒色過度以致羞明黑暗瞻視無力珠痛如摳等證則皆水之不足而屬虛也夫虛者當補實者當瀉固其然矣然而實中亦有兼虛者則於腫痛中亦當察其不足虛中亦有兼實者則於衰弱內又當辨其有餘總之虛實殊途自有形氣脈色可診而可辨知斯二者目證雖多無餘義矣且眼科有風熱之説今醫家凡見火症無論有風無風無不稱為風熱輒從散治不知風之為義最當辨析蓋風本陽邪然必有外感方是真風因風生熱者風去火自熄此宜散之風也若本無外感只因內火上炎而為癢為痛者人亦稱為風熱豈知本屬肝肝主風因熱極而生風者熱去風自息甚不宜乎散也哉矧病果風山外感而起必見頭痛鼻塞或為寒熱或多涕淚或筋骨痠痛而脈見緊數見此諸候從而散之庶乃有效而無害如無表症而系陰火熾於上者如仍以荊防薄荷升麻白芷細辛川芎羌活之屬進之豈惟無效而反害之雖曰芩連梔柏自能清火然宜升者不宜降則散之為宜宜降者不宜升則清之為是若用藥不精自相掣肘未有不致病可速愈者反遲病之輕者反重耽視日久而翳障損明無所不至也此言治者又不可不察其陰陽升降之道也然而虛實之別見於症者固明而微諸色者尤不可不察經曰色黃赤者多熱色青白者少熱故治黃赤者宜清肝瀉火治青白者宜壯腎扶陽此固不易之通法也但目黃一症尤宜辨其虛實不可謂其症盡屬熱也蓋有實熱而黃者有虛寒而黃者實熱之黃如造面者然此以濕熱內蓄蒸而成熱熱去則黃自退是非清利不可虛寒之黃猶草木之凋此以元陽日剝津液清索而然其為病也既無有餘之形氣又無煩熱之脈症惟因乾涸所以枯黃使非大加溫補明何以生苟因其色黃概執為熱而加清利鮮不危實至若翳障亦有虛實大都外障者多由赤痛而成赤痛不已則或為胬肉或為瘢痕此皆有餘之症治當內清其火外磨其障若夫內障外無雲翳內有矇蔽綱目謂其有翳在黑睛內遮瞳子而然龍木論又云腦脂流作翳者足太陽之邪也肝風上作翳者足厥陰之邪也故治法以言之則當取三經之愈天柱風府大沖通里等穴是也雖然當今之日能用金針於黑眼內以撥去雲翳取效之最捷者吾聞其語矣未見其人也又有所謂內障者察其瞳子本無遮隔惟其珠色青藍或微兼緑色或瞳人散大別無熱壅等病而病目視不明或多黑花等症此悉由腎氣不足故致瞳子無光內若有障實無障也治當以補腎水為先氣虛者當兼補其氣又有七情不節肝氣上逆或挾火邪而為矇蔽不明若有所障外實無障也雖外無赤痛等症然必睛珠脹悶或口鼻如煙此亦有餘之症氣逆者先當順氣多火者兼宜清火若氣不甚滯火不甚熾必當滋養肝血然有餘者多暴至若因循日積者多不足也虛實之辨此又明甚治法凡火症眼目赤痛或腫或澀或羞明脹悶凡暴病而火之甚者宜抽薪飲加減主之若緩至而火之微者宜徙薪飲黃芩黃連湯之類主之若陰虛而火盛者則宜加減一陰煎瀉白散滋陰地黃丸之類主之若久病不已或屢發多火者宜黃連羊肝丸明目羊肝丸或固本還睛丸之類主之若真陰不足本無火症但目視無光及昏黑倦視等症悉由水虧血少而然宜滋陰地黃丸左歸丸之類主之若陰中之陽虛宜大補元煎左歸飲人參養榮湯十全大補湯之類主之至風熱腫痛之症察其果有外感方可從散宜芎辛散明目細辛湯助陽和血湯之類主之若風熱相兼者宜芍藥清肝散當歸龍膽湯蟬衣散之類主之至於翳障遮睛系火有未清者宜蟬花散之類主之凡退翳諸藥如蒺藜木賊蒙花蛇蛻蟬蛻青葙子草決明石決明夜明砂之類皆所宜用然欲退翳於已成終屬費力不若早杜其源頃爾收功若其點眼諸方載者固多然豫嘗驗之皆不若金露散之為妥或丹砂散亦妙若其火連五臟熱毒深遂與夫過用寒涼點洗者多致留邪為害古之良法火邪不甚暴為赤痛者用雞子黃連膏其效甚捷或黃連膏亦可至目眶久赤爛俗呼為赤瞎者當以三稜針刺目眶出血以瀉濕熱而愈或用洗爛弦風赤眼方亦妙薛氏云凡目視物昏花或飲食勞倦益甚者脾胃虛也用補中益氣湯眵多緊澀赤脈貫睛或臟腑祕結者用芍藥清肝散若赤翳布白畏日羞明或痛如刺者上焦風熱之傷也用神效黃耆湯凡午前甚而作痛者東垣助陽和血湯午後甚而作痛者黃連天花粉丸午後而不痛者東垣益陰腎氣丸以上總言治法為醫家入門之津梁誠能神明運用治目之法其過半矣況後之分類言治莫不詳書醫者精之不以盲治盲則人物熙熙又何至瞽者倀倀何之也哉證治歌人生眼目最宜珍古分八廓與五輪病症攸分七十二從前論説總紛紛繼之虛實須明辨補虛瀉實法宜精實或帶虛虛挾實形氣脈色可明微症名風熱須分析莫把無風作有風風縱外感方宜散此是陽邪風乃真症見頭痛兼鼻塞多涕垂淚寒熱臻筋骨痠痛脈緊數見此諸症散方工若無外感內火熾概從散治定罹凶見諸症者徵諸色虛實之辨更當伸色分黃赤定多熱清肝瀉火是章程熱少則形青白色壯腎扶陽始奏功目黃一症分虛實濕熱宜清黃自平虛寒總緣元氣剝大加溫補明自生翳障亦分虛與實外障多由赤痛成延為胬肉或瘢痕內清外磨障自融內障外無雲翳蔽經詳病源法用針穴尋天柱兼風府猶及通里與太衝更有珠系青藍色或帶微緑或散瞳目視不明花見黑腎氣不足是病因治法先宜補腎水氣弱宜兼補氣功七情不節肝氣逆火邪上灼目昏蒙口鼻如煙珠脹悶順氣清火貴酌斟若氣不滯火不熾滋養肝血莫輕攻症惟有餘多暴至如逢不足必因循治法火症必赤痛腫澀脹悶或羞明暴病火甚抽薪飲緩至火微宜徙薪飲黃芩黃連湯等類陰虛火盛更須尋加減一陰煎瀉白散滋陰地黃丸可陳屢發多火病不止黃連羊肝丸最靈明目羊肝丸亦善固本還睛丸與同真陰不足無火症昏黑倦視目昏昏悉由水虧兼血少滋陰地黃丸左歸丸神陰中陽虛宜大補元煎左歸飲十全大補湯與人參養榮風熱腫痛緣外感治宜從散方安寧助陽和血湯宜進明目細辛湯與芎辛散風熱相兼蟬花散芍藥清肝散當歸龍膽湯翳障遮睛火猶在散進蟬花效絶倫退翳藥用青葙子蒺藜木賊草決明蒙花蛇蛻偕蟬蛻夜明砂與石決明從點眼諸藥金露散丹砂散點自光瑩火連五臟毒深遂雞子黃連膏法古人或用黃連膏亦可眶爛刺宜用三稜洗爛弦風赤眼方亦妙視物昏花獨異群飲食縱兮勞倦甚補中益氣服宜頻眵多緊澀臟腑祕赤脈貫睛芍藥清肝散赤翳布白痛如刺此係上焦風熱侵神效黃耆湯最善午前午後更申論午前痛甚宜何藥助陽和血湯最純痛甚有時逢午後黃連天粉丸可庸午後不痛宜分辨東垣益陰腎氣丸回春治法已詳傳後學自此昭然若發蒙方抽薪飲治諸凡火熾盛而不宜補者黃芩石斛木通梔子炒黃柏枳殼澤瀉甘草上水煎食遠服徙薪飲治三焦之火內熱漸覺未甚者陳皮黃芩麥冬芍藥黃柏茯苓丹皮等分上水煎食遠服黃芩黃連湯治兩眼血熱赤痛黃芩黃連膽草生地俱各酒洗上㕮咀水煎熱服加減一陰煎治水虧火勝之劑生地芍藥麥冬熟地炙草知母地骨皮上㕮咀水煎服瀉白散甘草桑白皮地骨皮上㕮咀水煎服滋陰地黃丸治虛火上炎目睛散大視物不明及昏花緊澀羞明兼眵熟地歸身酒製黃芩天冬焙炙草枳殼柴胡五味人參地骨皮黃連生地等分上為細末蜜丸食前茶湯下黃連羊肝丸治肝虛風熱冷淚赤澀內外障眼黃連羊肝一具焙上為末蜜丸濟生用生羊肝去筋膜同黃連搗丸明目羊肝丸治同前黃連家菊花膽草石決明人參當歸熟地枸杞麥冬牛膝青鹽黃柏柴胡防風羌活各八錢肉桂四錢羯羊肝一具焙上為細末蜜丸溫湯下固本還睛丸治年遠一切目疾內外翳膜遮睛風弦爛眼及老弱人目眵多糊血風冷淚昏花等症天冬酒浸一宿另研如泥麥冬生地酒浸焙熟地各三兩人參茯苓山藥枸杞各兩半川牛膝酒洗石斛酒洗草決明微炒各一兩五味焙白蒺藜取仁川芎各七錢杏仁去皮另研枳殼麵炒菟絲子酒浸煮甘菊花各一兩羊角鳥犀角青葙子微炒防風各八錢黃連炙草各七錢上為細末蜜丸鹽湯下左歸丸治真陰不足熟地山藥枸杞山茱萸牛膝菟絲子鹿膠龜膠上㕮咀共為細末蜜丸鹽湯下大補元煎治氣血大壞等症人參山藥熟地杜仲當歸山茱萸枸杞炙草上㕮咀水煎服左歸飲治水不足以壯其水熟地山藥枸杞炙草茯苓山茱上㕮咀水煎服人參養榮湯人參黃耆當歸白朮炙草桂心陳皮熟地五味茯苓芍藥遠志上㕮咀加薑棗煎服十全大補湯人參白朮當歸茯苓川芎白芍熟地黃耆肉桂炙草上㕮咀水煎服芎辛散治兩眼風熱晝夜隱澀難開及羞明赤腫等症明目細辛湯治兩目發赤羞明多眵鼻塞流涕大便硬結細辛麻黃羌活蔓荊子防風藁本川芎荊芥穗茯苓生地歸尾花椒上水煎食後臨臥服助陽和血湯治目愈猶有上熱白睛赤色隱澀多眵黃耆當歸酒洗柴胡炙草防風升麻白芷蔓荊子上水煎食遠服芍藥清肝散治眵多眶燥羞明赤脈貫睛臟腑祕結白朮防風羌活川芎桔梗滑石石膏芒硝黃芩薄荷荊芥前胡炙草芍藥柴胡山梔知母大黃上㕮咀水煎服當歸龍膽湯治眼中白翳歸身膽草酒洗黃芩黃柏各酒炒芍藥黃耆黃連甘草防風羌活升麻柴胡五味石膏上水煎入酒少許臨臥熱服忌言語蟬花散治肝經風熱上攻目痛及一切內外翳障蟬蛻甘菊花穀精草羌活甘草炒白蒺藜炒草決明梔子炒防風密蒙花荊芥穗木賊川芎蔓荊子黃芩上水煎食後茶清調下金露散點治赤目腫痛翳障諸疾天竹黃擇辛香者海螵蛸不必浸洗月石各一兩爐甘石片子者作浸童便七次飛淨硃砂各八分上為極細用時加冰片少許研入丹砂散點治諸目皆妙硼砂海螵蛸去殼爐甘石照前制各一兩硃砂五錢上為極細用時仍加冰片少許雞子黃連膏治傷火目疾用雞子一個開一小孔單取其白於碗內另用黃連一錢研細入蛋白內用箸速攪成浮沫安放淨處少頃撥開浮沫取汁點眼熱淚湧出數次即愈黃連膏點赤熱眼龍腦一錢黃連去毛淨酒炒八兩上黃連令碎以水四碗貯沙鍋內入連煮至一大碗濾去渣入薄磁碗內重湯煮成膏半盞許以龍腦為引或用時旋入尤妙洗爛弦風赤眼方一名萬金膏此藥神效文蛤黃連去淨毛防風荊芥穗各五錢苦參四錢銅緑五分上為極細末外以薄荷煎湯糊丸用時以熱水化開乘熱洗眼日三四次立愈一方有當歸川芎各四錢補中益氣湯人參黃耆炒白朮炙草當歸陳皮升麻柴胡上㕮咀加薑棗煎服神效黃耆湯治目緊縮小羞明黃耆人參炙草蔓荊子芍藥陳皮上㕮咀水煎臨臥熱服黃連天花粉丸治兩眼赤痛眵多眊燥緊澀羞明赤脈貫睛臟腑祕塞黃連酒洗天花粉家菊花川芎薄荷連翹各兩黃芩梔子各四兩黃柏酒炒六兩上為細末水滴丸或蜜丸臨臥茶湯下益陰腎氣丸治足三陰虧損虛火上炎目睛散大昏花羞明熟地二兩酒洗生地歸尾俱酒洗丹皮五味山藥山茱柴胡茯苓澤瀉各二錢半上為細末蜜丸硃砂為衣空心鹽湯下明經通治十八章明淫熱反克病治膏粱之變滋味過也氣血俱盛稟受厚也亢陽上炎陰不濟也邪入經絡內無御也因生而化因化而熱熱為火火性炎上足厥陰肝為木木生火母妊子子以淫勝禍發反克而肝開竅於目故肝受克而目亦受病也其病眵多眊燥緊澀赤脈貫睛臟腑祕結者為重重者芍藥清肝散主之通氣利中丸主之眵多眊燥緊澀赤脈貫睛臟腑不祕結者為輕輕者減大黃芒硝芍藥清肝散主之黃連天花粉主之火盛服通氣利中丸目眶爛者內服上藥外以黃連爐甘石散收其爛處兼以點睛春雪膏龍腦黃連膏嗅鼻碧雲散攻其淫熱此治淫熱反克之法也非膏粱之變非氣血俱盛非亢陽上炎非邪入經絡毋用此也用此寒涼傷胃胃氣不升降反為所害治疾者不可明也噫審諸證治歌淫熱反克病如何肝木生火理不訛子以淫勝翻克母目病原由肝病多赤脈貫睛眊燥澀臟腑祕結是重疴宜投芍藥清肝散通氣利中丸同一科臟腑不結為輕病黃連天花粉丸莫蹉跎芍藥清肝散芒硝大黃減少盛通氣利中丸可羅目眶爛者仍前藥外用黃連爐甘石以磨點用龍腦黃連膏與春雪膏搐鼻碧雲病可瘥此係有餘非不足醫師審慎任調和方通氣利中丸治眵多緊澀羞明赤脈貫睛臟祕大黃二兩半滑石取末另入牽牛取末黃芩各兩半白朮一兩白芷羌活各五錢上為細末滴水為丸食後臨睡茶清送下黃連爐甘石散治眼眶破爛畏日羞明爐甘石一斛黃連四兩龍腦量入上先以爐甘石置巨火煅通紅為度另以黃連用水一盆磁器盛貯納黃連於水內卻以通紅爐甘石淬七次就以所貯磁器置日中曬乾然後同黃連研為極細用時以一二錢旋量入龍腦少許井花水調稠臨睡醮敷破爛處不破爛者點眼內眥鋭眥尤佳不宜使入眼內搐鼻碧雲散治腫脹紅赤昏暗羞明隱澀疼痛風熱鼻塞腦痠外翳攀睛眵淚稠黏鵝不食草二錢青黛真川芎各一錢上為細末每用如大豆許先水滿口嗅入鼻中以淚出為度不拘時用目病俱可用蕤仁春雪膏治肝經不足內受風熱上攻頭目昏暗癢痛隱澀難開昏眩赤腫羞明迎風有淚多見黑花蕤仁去皮殼心壓去油四錢龍腦研五分上先以蕤仁研細入龍腦和勻用生好真用白蜜一錢二分再研和勻每用簪角醮點內眥鋭眥此藥與黃連爐甘石散龍腦黃連膏並用芍藥清肝散黃連天花粉丸龍腦黃連膏均見總論明風熱不制病治論風動而生熱譬如烈火焰而必吹此物類感召而不能違間者也因熱而召是為外來久熱不散感而自生是為內發內外之邪惟病則一淫熱之禍條列如前益以風邪害豈纖止風加頭痛風加鼻塞風加腫脹風加涕淚風加腦巔沉重風加眉骨痠疼有一於此羌活勝風湯主之風加癢則以杏仁龍膽草泡散洗之病者有此數症或不服藥或誤服藥翳必隨之而生翳如雲霧翳如絲縷翳如稱星翳如稱星者或一點或三四點而至數十點翳如螺蓋者為病久不去治不如法至於極至為服寒涼藥過多脾胃受傷生意不能上升漸而至也然必要明經絡方能應手翳凡自內眥而出為手太陽足太陽受邪治在小腸膀胱經加蔓荊子蒼朮羌活勝風湯主之自鋭眥客主人而入者為足少陽手少陽手太陽受邪治在膽與三焦小腸經加龍膽草藁本少加人參羌活勝風湯主之自目系而下者為足厥陰手少陰受邪治在肝經心經加黃連倍加柴胡羌活勝風湯主之熱甚者兼用治淫熱之藥搐鼻碧雲散俱治以上之症大抵如開鍋蓋法嗅之隨效然力少而鋭宜不時用之以聚其力雖然始者易而久者難漸復而復漸復而又復可也急於復者則不治今世醫用磨翳藥者有之用手法揭翳者有之噫翳猶瘡也奚能即愈乎庸者用此非徒無益增害猶甚愚者蒙害欣然而不悟可勝嘆哉故置風熱不制之病治法證治歌目沾淫熱病靡常況復加風更肆殃風加頭痛或鼻塞或加腫脹涕淚汪眉骨痠疼腦巔重均用羌活勝風湯加癢杏仁龍膽草誤治生翳更細詳要別經絡分內外總宜羌活勝風湯良邪侵手足太陽者治在小腸與膀胱此是翳從內眥出宜加蔓荊子術取蒼有自鋭眥客主人入邪在手足太陽手少陽治在三焦小腸膽膽草人參藁本勷翳自目系而下者足厥陰手少陰邪隱藏治從心肝柴胡培加入黃連豈畏良若目抵過而上者用藥惟宜治小腸邪入手太陽宜熟湊加入木通五味子香更有搐鼻碧雲散治上諸症罔不藏方羌活勝風湯治眵多矂緊澀羞明赤脈貫睛頭痛鼻塞腫脹腦巔沉重眉骨痠痛外翳絲縷稱星螺蓋柴胡黃芩白朮荊芥穗枳殼川芎白芷羌活防風獨活前胡薄荷桂枝甘草杏仁龍膽草泡散治風熱上攻眊燥赤癢滑石膽草黃連歸尾杏仁去皮尖赤芍上水煎不拘時洗搐鼻碧雲散見淫熱反克明七情五賊勞役飢飽病治論陰陽應象大論曰天有四時以生長收藏以生寒暑燥濕風寒暑燥濕風之發耶發而皆宜時則萬物俱生發而皆不宜時則萬物俱死故曰生於四時死於四時又曰人有五藏化為五氣以生喜怒憂悲恐喜怒憂悲恐之發耶發而皆中節則九竅俱生發而皆不中節則九竅俱死故曰生於五藏死於五藏目竅之一也光明視見納山川之大及毫芒之細悉雲霄之高盡泉沙之深或因七情內傷五賊外攘飢飽不節勞役異常足陽明胃之脈足太陰脾之脈為戊己二土生生之原也七情五賊總傷二脈飢飽傷胃勞役傷脾戊己既病則生生自然之體不能為生生自然之用故致其病曰七情五賊勞役飢飽之病其病紅赤睛珠痛痛如針刺應太陽眼睫無力常欲垂閉不敢久視久視則痠疼生翳皆成陷下所陷者或圓或方或長或短或如點或如縷或如錐或如鑿證有若此者柴胡復生湯主之黃連羊肝丸主之睛痛甚者當歸養榮湯主之助陽活血湯主之加減地黃湯主之決明益陰丸主之加當歸黃連羊肝丸主之龍腦黃連膏主之以上數方皆升發陽氣之藥其中有用黃連黃芩之類者去五賊也搐鼻碧雲散亦可見用最忌大黃芒硝牽牛石膏梔子之劑犯所忌則病愈厲證治歌人生胡以目昏盲五賊為害七情傷飢飽傷脾勞損胃赤痛睛珠應太陽或常欲閉難視久久視痠疼匪不妨因生翳障均成陷陷形有圓亦有方如縷如錐或如點或如鑿兮或短長總之治此黃連羊肝丸主或進柴胡復生湯亦良睛如痛甚宜誰治助陽活血湯與當歸養榮湯決明益陰丸好當歸湊加減地黃膏更擅長黃連羊肝丸亦善龍腦黃連罔不藏諸方藥性皆升發有用黃芩黃連性取涼搐鼻碧雲散可用惟忌芒硝與大黃石膏梔子牽中藥均宜禁用勿煎嘗方柴胡合生湯治紅腫羞明淚多眵少睛珠痛常閉不能久視翳陷等症柴胡蒼朮白茯苓黃芩白芍炙草薄荷桔梗羌活獨活蔓荊子藁本川芎白芷五味等分上水煎食後熱服當歸養榮湯治同上熟地當歸川芎白芍羌活防風白芷等分上水煎溫服決明益陰丸治畏日惡火沙澀難開眵淚俱多久病不痊羌活獨活歸尾酒製五味甘草防風五錢黃芩一兩半石決明知母黃連酒製黃柏酒製草決明各一兩上為細末蜜丸茶清送下加減地黃丸治男婦肝虛熱積上攻翳膜遮睛羞澀多淚生地酒洗熟地各半斤枳殼三兩牛膝當歸各三兩羌活杏仁泡去皮尖防風各一兩上為細末蜜丸或溫酒淡鹽湯送下龍腦黃連膏黃連羊肝丸助陽活血湯均見總論搐鼻碧雲散見淫熱明血為邪勝凝而不行之病血陰物類地之水泉性本靜行其勢也行為陽是陰中之陽乃坎中有火之象陰外陽內故行也純陰故不行也不行則凝凝則經絡不通經曰足陽明胃之脈常多氣多血又曰足陽明胃之脈常生氣生血手太陽小腸之脈斜絡於目眥足太陽膀胱之脈起於目內眥二經皆多血少氣血病不行血多易凝靈蘭祕典論曰脾胃者倉廩之官五味出焉五味淫則傷胃胃傷血病是為五味之邪從本生也又曰小腸者受盛之官化物出焉遇寒則阻其化又曰膀胱者州都之官津液藏焉遇風則散其藏一阻一散血亦病焉是為風寒之邪從末生也凡是邪勝血病不行不行漸滯滯則易凝凝則病始外見以其斜絡目眥耶以其起於目內眥耶故病環目睛黤如被物傷狀重者白睛亦黤輕者或成癍點然不痛不癢無淚眵眊燥羞澀之證是曰血為邪勝凝而不行之病此病初起之時大抵與傷風證相似一二日則顯此病也川芎行經散主之消凝大丸子主之睛痛者更以當歸養榮湯主之如此則凝散滯行邪消病除血復如故寧有不愈也耶證治歌血因邪滯病何如黤色環睛痛癢無且鮮淚眵惟色黯黯如被毆重輕珠但成癍點為輕症重則白睛黤必俱散用川芎行經治甚妙消凝丸子亦非迂或兼睛痛宜誰治當歸養榮湯藥符用此行邪兼散滯何憂血阻病難除方川芎行經散治目中青黯如物傷重者白睛如血貫桔梗五錢茯苓七錢羌活蔓荊子白芷防風荊芥薄荷獨活各四錢柴胡川芎炙草當歸枳殼各六錢紅花二錢上為末每服三錢水煎食遠大熱服消凝大丸子治同上川芎歸尾桔梗炙草連翹家菊花各七錢防風荊芥羌活薄荷藁本各五錢滑石石膏梔子白朮黃芩各一兩上為細末煉蜜為丸每劑一兩分八丸每服一二丸當歸養營湯見七情明氣為怒傷散而不聚病治論氣陽物類天之雲霧性本動聚其體也聚為陰是陽中之陰乃離中有水之象陽外陰內故聚也純陽故不聚也不聚則散散則經絡不收經曰足陽明胃之脈常多氣多血又曰足陽明胃之脈常生氣生血七情內傷脾胃先病怒七情之一也胃病脾病氣亦病焉陰陽應象大論曰足厥陰肝主目在志為怒怒甚傷肝傷脾胃則氣不聚傷肝則神水散何則神水亦氣聚也其病無眵淚痛癢羞明緊澀之證初但昏如霧露中行漸空中有黑花又漸睹物成二體久則光不收遂為廢疾蓋其神水漸散而又散終而盡散故也初漸之次宜以千金磁朱丸主之鎮墜藥也石斛夜光丸主之補益藥也益陰腎氣丸主之壯水藥也有熱者滋陰地黃丸主之此病最難治餌服上藥必要積以歲月必要無飢飽勞役必要驅七情五賊必要德性純粹庶幾易效不然必廢廢則終不復治久病光不收者亦不復治一證因為暴怒神水隨散水遂無收都無初漸之次此一得永不復治之證也又一證為物所擊神水散如暴怒之證亦復不治俗名為青盲者是也世病者多不為審概曰目昏無傷始不經意目病已成世醫亦不識直曰熱之所致竟以涼藥投治之殊不知涼藥又傷胃況不知涼為秋為金肝為春為木涼藥又傷肝往往致廢然後已病病者猶不以藥為非而委之曰命也醫者猶不自悟其藥而贅之曰病拙籲二者若此罪將誰歸豫屢見也故兼陳涼藥之誤證治歌氣象由來養目原怒甚傷肝病相沿初如外症如行霧空中漸見黑花懸繼則睹物成二體久則光散病堪憐初起宜投鎮墜藥方用千金磁朱丸壯水益陰腎氣好補益石斛夜光丸圓有熱滋陰地黃進此病原來不易痊宜慎起居節飲食寒涼禁用是真詮方千金磁丸治神水漸散昏霧視有黑花睹物成二及內障神水淡緑色淡白色者磁石吸針者佳二兩辰砂一兩神麯末二兩上先以磁石火煅醋淬七次與辰砂神麯共研極細更以神麯末一兩水和作餅煮浮為度併入前藥末蜜丸空心鹽湯下石斛夜光丸治內障初起視空中有黑花神水變淡緑色次變淡白色久則變純白色及有眵淚眊燥天門冬去心麥冬去心人參茯苓熟地生地各一兩牛膝酒浸杏仁去皮尖枸杞中七錢半草決明八錢川芎石斛犀角白蒺藜羚羊角枳殼五味青葙子甘草防風肉蓯蓉黃連各五錢菊花山藥菟絲子酒煮各七錢上為細末蜜丸每服三五十丸溫酒鹽湯送下益陰腎氣丸見總論明血氣不分混而遂結病治論輕清圓健者為天故首象天重濁方厚者為地故足象地飄騰往來者為云故氣象云過流循環者為水故血象水天降地升云騰水流各宜其性故萬物生而無窮陽平陰祕氣行血隨各得其調故百骸理而有餘反此則天地不降升雲水不騰流各不宜其性矣反此則陰陽不平祕氣血不行隨各不得其調矣故曰人身者小天地也難經曰血為榮氣為衛榮行脈中衛行脈外此血氣分而不混行而不阻也明矣故如雲騰水流之不相雜也大抵血氣如此不欲相混混則為阻阻則成結結則無所去還故隱起於皮膚之中遂為疣病然各隨經絡而見疣病自上眼睫而起者乃手少陰心脈足厥陰肝脈血氣混結而成也初起時但如豆許血氣衰者遂止不長亦有久止而復長者盛者則漸長長而不已如杯如盞如碗如斗皆自豆許致也凡治在初須擇人神不犯之日大要令病者食飽不飢先汲冷井水洗眼如冰勿使氣血得行然後以左手持銅柱按眼睫上右手翻眼皮令轉轉則疣肉已突按以左手大指按之勿令得動移復以右手持小眉刀尖略破病處更以兩手大指甲捻之令出則所出者如豆許小黃脂也恐出而根不能斷宜更以眉刀尖斷之以井水再洗洗後則無恙要在手疾為巧事畢須投以防風散結湯數服即愈此病非手法則不能去何則為血氣初混時藥自可及病者則不知其為血氣混也既結則藥不能及矣故必用手法去去畢必又以升發之藥散之藥手皆至庶幾可矣證治歌氣血不分最可憂混結日久必生疣疣生眼睫緣何屬須向心肝脈內求疣初起日雖如豆日久如杯漸不侔日擇人神均不犯令伊飽食力心愁先用冷水宜多洗洗冷如冰血淹留翻轉眼皮令疣突刀破疣頭用拇揉揉出黃脂如豆許湯投散結病旋瘳方防風散結湯治目上下睫隱起肉疣用手法除病後服之防風羌活歸尾白芍各六分紅花蘇木蒼朮白茯苓獨活前胡黃芩各五分甘草防己各四分上銼細水煎熱服明熱積必潰病治論積者重疊不解之貌熱為陽陽平為常陽淫為邪然邪行則病易見易見則易治此則前篇淫熱之病也但邪深則不行不行則伏因伏而又伏故日漸月聚勢不得不為積也積已久久積必潰潰則難治難治者非不治也為邪積久久則必潰潰猶敗也其病隱澀不自在稍覺眊燥視物微昏內眥穴開竅如針目按之則沁沁膿出有兩目俱病者有一目獨病者目屬肝內眥屬膀胱此蓋二經積邪之所致也故曰熱積必潰之病又曰漏睛眼者是也竹葉瀉經湯主之大便不硬者減大黃為用惟用蜜劑解毒丸主之不然藥誤病久終為枯害矣證治歌經熱由來病易醫積久必潰已多危其病隱澀不自在稍覺眊燥視昏微內眥開竅如針樣按之沁沁膿出隨兩目俱病或一目肝與膀胱積熱遺此症又名漏睛眼竹葉石膏湯主之大便不硬大黃減蜜劑解毒丸效可期方竹葉瀉經湯治隱澀眊燥內眥開竅如針目痛按之膿浸出柴胡梔仁炒羌活升麻炙草黃連各五分茯苓澤瀉赤芍草決明車前子各四兩大黃八分竹葉十片黃芩六分上銼細水煎食後溫服蜜劑解毒丸治同上梔子仁炒十兩杏仁去皮尖二兩大黃五兩上為細末蜜丸茶湯下明陽衰不能抗陰病治論或問曰人有晝視通明夜視罔見雖有火光月色終為不能睹物者何也答曰此陽衰不能抗陰之病諺所謂雀目者也問曰何以知之答曰黃帝生氣通天論曰自古氣之通天者為生之本天地之間六合九州之內其氣無不共貫人身九竅五藏十二節皆通乎天氣又曰陰陽之氣在人平旦陽氣生日中而陽氣隆日西陽氣已虛氣門乃閉又曰陽不勝其陰則五藏氣虛九竅不通故知也問曰氣何以辨其陽耶答曰凡人之氣應之四時者春夏為陽也應之一日者平旦至昏為陽也應之五臟六腑者六腑為陽也問曰陽何為而不能抗陰也答曰人之有生以脾胃中州為主靈蘭祕典曰脾胃者倉廩之官在五行為土土生萬物故為陽氣之原其性好生惡殺遇春夏則生長遇秋冬則斂藏或有憂思恐怒勞役飢飽之類過而不節皆能傷動脾胃脾胃受傷則陽氣下陷陽氣下陷則於五臟六腑之中陽氣皆衰陽氣既衰則五臟六腑之中陰氣獨勝陰氣既勝故陽不能抗也問曰何故夜視罔見答曰目為肝肝為足厥陰也神水為腎腎為足少陰也肝為木腎為水水生木蓋亦相生而成也況怒傷肝恐傷腎肝腎受傷亦不能生也晝為陽天之陽也晝為陽人亦應之也雖受憂思恐怒勞役飢飽之傷而陽氣下陷遇天之陽盛陰衰之時我之陽氣雖衰不得不應之而升也故猶能晝視通明夜為陰天之陰也夜為陰人亦應之也既受憂思恐怒勞役飢飽之傷而陽氣下陷遇天陰盛陽衰之時我之陽氣既衰不得不應之而伏也故夜視罔所見也問曰何以為治答曰鎮陰升陽之藥決明夜靈散主之問曰病見富貴乎貧賊者乎答曰憂思恐怒勞役飢飽貧賤者固多富貴者亦不能無之也證治歌病自陽衰難抗陰晝則明兮夜則昏諺謂雀盲陽氣弱五臟虛兮氣不通憂思恐懼兼勞役飢飽失時脾胃侵夜則陰盛陽虛候人氣隨天與屈伸藥用決明夜靈散鎮陰升陽是定評萬決明夜靈散治目至夜則昏夜明砂另研二錢石決明醋煅研二錢羯羊肝一兩生用公豬肝亦可上以竹刀將肝切開以二藥末鋪中間仍合之用麻扎定淘米泔水一大碗將肝藥入砂罐內煮好臨臥連肝藥汁服陰弱不能配陽之病論五臟無偏勝虛陽無補法六腑有調候弱陰有強理心肝脾肺腎各有所滋生一臟或有餘四臟俱不足此五臟無偏勝也或浮或為散是曰陽無根益之欲令實翻致不能禁此虛陽無補法也膀胱大小腸三焦膽包絡俾之各有主平祕永不危此六腑有調候也衰弱不能濟遂使陽無御反而欲匹之要以方術盛此弱陰有強理也解精微論曰心者五臟之專精目者其竅也又為肝之竅腎主骨骨之精為神水故肝木不平內挾心火為勢妄行火炎不制神水受傷上為內障此五臟病也勞役過多心不行事相火代之五臟生成論曰諸脈皆屬於目相火者心包絡也主百脈上榮於目火盛則百脈沸騰上為內障此虛陽病也膀胱小腸三焦膽脈俱循於目其精氣亦皆上注而為目之精精之窠為眼四腑一衰則精氣盡敗邪火乘之上為內障此六腑病也神水黑眼皆法於陰白眼赤脈皆法於陽陰齊陽侔故能為視陰微不立陽盛即淫陰陽應象大論曰壯火食氣壯火散氣上為內障此弱陰病也其病初起時視覺微昏常見空中有黑花神水淡緑色次則視岐睹一為二神水淡白色可為沖和養胃湯主之益氣聰明湯主之千金磁朱丸主之石斛夜光丸主之有熱者瀉熱黃連湯主之久則不睹神水純白色永為廢疾也然廢疾亦有治法先令病者以冷水洗眼如冰氣血不得流行為度用左手大指次指按定眼珠不令轉動次用右手持鼠尾針去黑睛如米許針之令入白睛甚厚欲入甚難必要手準力完重針則破然後斜回針首以針刀刮之障落則明有落而復起者起則重刮刮之有至再三者皆為洗不冷氣血不凝故也障落之後以棉裹黑豆數粒令如杏核樣使病目垂閉覆眼皮上用軟帛纏之睛珠不得動移為度如是五七日才許開視視勿勞也亦須服上藥庶幾無失此法治者五六不治者亦四五五臟之病虛陽之病六腑之病弱陰之病四者皆為陰弱不能配陽之故噫學者慎之證治歌陰陽偏勝定為殃臟腑陰陽審必詳初起微昏眼花黑神水淡緑已堪傷次則視岐神水淡白宜用沖和養胃湯益智聰明湯或十全磁石丸石斛夜光丸亦良更有瀉熱黃連湯進久則純白恐成盲至此惟宜用針法針後還宜藥餌安方沖和養胃湯治成內症兼治內障初起視昏及空中有黑花神水變色等症茯苓四分柴胡七分人參炙草當歸酒製白朮土炒升麻葛根各一錢白芍六分羌活錢二分黃耆蜜制錢半防風五錢五味三分上水煎數沸加生薑一片黃連黃芩二錢再煎食後稍熱服東垣瀉熱黃連湯治眼暴發赤腫疼痛黃連黃芩俱酒製膽草生地各錢半升麻柴胡各五分上銼細水煎午時食前服益氣聰明湯治同上並治耳聾耳鳴蔓荊子錢半黃耆人參五分黃柏酒炒芍藥各一錢炙草四分升麻葛根上合劑水煎臨睡熱服五更再服明心火乘金水衰反制病治論天有六邪風寒暑濕燥火也人有七情喜怒悲思憂恐驚也七情內召六邪外從從而不休隨召見病此心火乘金水衰反制之原也世病目赤為火人所共知者也然不審其赤分數等各治不同有白睛純赤如火熱氣炙人者乃淫熱反克之病也治如淫熱反克之病有白睛赤而腫脹外睫虛浮者乃風熱不制之病也治如風熱不治之病有白睛淡赤而細脈深紅縱橫錯貫者乃七情五賊勞役飢飽之病也治如七情五賊勞役飢飽之病有白睛不腫不脹忽如血貫者乃血為邪勝凝而不行之病也治如血為邪勝凝而不行之病有白睛微變青色黑睛稍帶白色白黑之間赤環如帶謂之抱輪紅者此邪火乘金水衰反制之病也此病或因目病已久抑鬱不舒或因目病誤服寒涼藥過多或因目病時內多房勞皆能內傷元氣元氣一虛心火亢盛故火能剋金金乃手太陰肺白睛屬肺水乃足少陰腎黑睛屬腎水本剋火水衰不能克反受火制故視物不明昏如霧露中亦或睛珠高低不平其色如死甚不光澤赤帶抱輪而紅也口乾舌苦燥眵多羞澀稍有熱者還陰救苦湯黃連羊肝丸菊花決明散主之無口乾舌燥眵多羞澀者助陽活血湯神驗錦鳩丸主之萬應蟬花散主之有熱無熱俱服千金磁朱丸鎮墜心火滋益腎水榮養元氣自然獲愈也噫天之六邪未必能害人也惟人以七情召而致之也七情弗召六邪安從反此者欲其無病奚可得哉證治歌水為火制病胡來七情內召六邪栽赤分數等治法變白睛如火熱為媒倘逢腫脹白睛赤外睫虛浮成禍胎細脈深紅白睛淡赤縱模錯貫病勢危白睛不腫脹如血貫治法均同可類推白睛帶青黑睛白如火如帶赤環圍抱輪紅症原如此水為火制勿須猜或因目病抑鬱久或受寒涼藥餌摧或因病候房勞損視物不明如霧埋口乾舌苦兼羞澀醫師從此法門開病症若逢稍有熱還陰救苦湯勿徘徊黃連羊肝丸亦善川芎決明散同儕若無口干舌燥羞澀症助陽活血湯可培神驗錦鳩丸最妙萬應蟬花散可裁不拘有熱與無熱千金磁硃丸可挽回方還陰救苦湯治目久病白睛變青色黑睛稍帶白色以及口乾舌苦眵多羞澀等症升麻蒼朮甘草梢炙桔梗柴胡防風羌活各五分藁本四分川芎一錢歸尾七分黃連黃芩黃柏生地知母連翹各六分紅花一分膽草三分細辛三分上銼細水煎食遠服每服三錢神驗錦鳩丸治同上錦斑鳩一隻跌死去皮毛腸嘴爪連骨炙乾茯苓四兩羯羊肝一具竹刀薄批炙焦肉桂二兩蔓荊子二升淘淨絹袋盛甑一伏時曬乾牡蠣洗煅粉甘菊花各五錢瞿麥蕤仁去皮尖草決明羌活各三兩細辛防風黃連白蒺藜炒去尖各五兩上為細末蜜丸溫湯下每服二十丸萬應蟬花散治大人小兒遠近風眼氣眼昏眼翳膜或久患頭風牽搐兩目眼眶赤爛等症石決明東流水煮一伏時研極細一兩五錢蒼朮泔制四兩蛇蛻炙三錢芍藥三錢蟬蛻去土五錢上細末每服二錢臨臥時濃米泔調下熱清茶亦可黃連羊肝丸助陽活血湯見總論千金磁朱丸見氣為怒傷明內急外弛之病治論陰陽以和為本過與不及病皆生焉急者緊縮不解也弛者寬縱不收也緊縮屬陽寬縱屬陰不解不收皆為病也手太陰肺為辛為金也主一身皮毛而目之上下睫之外者亦其屬也手少陰心為丁手太陽小腸為丙丙丁為火故為表裡故分上下而目之上下睫之內者亦其屬也足厥陰肝為乙乙為木其脈循上睫之內火其子也故與心合心肝小腸三經受邪則陽火內盛故上下睫之內緊縮而不解也肺金為火克受克者必衰衰則陰氣外行故目之上下睫之外者寬縱而不收也上下睫既內急外弛故睫毛皆倒而刺里睛既受刺則深赤生翳此翳者睛受損也故目所病者皆具如羞明沙澀畏風怕日沁爛或痛或癢生眵流淚等症俱見有用藥夾施於上睫之外者欲弛者急急者弛而睫毛無倒刺之患者非其治也此徒能解厄於目前而終復其病也何則為不審過與不及也為不能除其原病也治法當攀出內瞼向外速以三稜針刺撥出血以左手大指甲迎其針鋒後以黃耆防風飲子無比蔓荊子湯決明益陰丸菊花決明散主之搐鼻碧雲散亦宜兼用如是則緊縮自弛寬縱漸急或過不及皆復為和藥夾之治忌勿施也徒為苦耳智者宜審此證治歌內急外弛症堪憐陰陽不和禍故延陽則緊縮陰寬縱睫毛倒刺若針砭刺里損睛生翳障目病皆具可伸言羞明畏日症俱見夾施上睫藥難痊宜攀內瞼使向外速以三稜針刺血鮮針鋒迎以左大指甲黃耆防風飲子最便決明益陰丸無比蔓荊子湯菊花決明散並妍搐鼻碧雲散兼用仰望醫師各慎施方黃耆防風飲子治目倒睫拳毛損睛生翳及上下眥赤爛羞澀眵淚稠黏蔓荊子黃芩各錢半黃耆蜜炙防風各八分細辛二分炙草五分葛根一錢上銼細水煎大熱服無比蔓荊子湯治同上黃耆一錢二分川連七分人參甘草各一錢柴胡七分蔓荊子當歸葛根防風各五分細辛葉三分上銼細水煎溫服決明益陰丸見七情菊花決明散見心火搐鼻碧雲散見淫熱明奇經客邪之病治論人之有五臟猶天地之有五嶽也六腑者猶天地之有四瀆也奇經者猶四瀆之外別有江河也奇經客邪非十二經之治也十二經之外別有治奇經之法也繆刺論曰邪客於足陽蹺之脈令人目痛從內眥始啓玄子王冰注曰以其脈起於足上行至頭而屬目內眥故病令人目痛從內眥始也針經曰陰蹺脈入鼽屬目內眥合於太陽陽蹺而上行故陽蹺受邪者內眥即赤生脈如縷縷根生瘀肉瘀肉生黃赤脂脂橫侵黑睛漸蝕神水此陽蹺為病之次第也或兼鋭眥而病者以其合於太陽故也鋭眥者手太陽小腸之脈也鋭眥之病必輕於內眥者蓋枝蔓所傳者少而正受之者必多也俗呼為攀睛即其病也還陰救苦湯主之撥雲退翳丸梔子勝奇散萬應蟬花散磨障靈光膏消翳復明膏朴硝黃連爐甘石泡散主之病多藥不能及者宜治以手法先用冷水洗如針內障眼法以左手按定勿令得動移略施小眉刀尖剔去脂肉復以冷水洗淨仍將前藥餌之此治奇經客邪之法也故並置其經絡病始證治歌客邪何事在奇經邪客陽蹺脈可憑目病因從內眥始陽蹺為病次第分合於太陽鋭眥病欲呼攀睛病勢成還陰救苦湯堪治撥雲退翳丸亦同梔子勝奇散可用萬應蟬花散磨障靈光膏朴硝黃連爐甘石論散消翳復明膏亦工倘逢前藥難祈效內障針法細心尋方撥雲退翳丸治陽蹺受邪內眥即生赤脈縷縷根生瘀肉瘀肉生黃赤脂脂橫侵黑睛漸蝕神水白蒺藜當歸川芎各兩半川椒七錢甘菊花地骨皮荊芥各八錢木賊密蒙花蔓荊子各一兩蛇蛻炙甘草各三錢天花粉六錢桃仁蟬蛻去頭足黃連薄荷各五錢梔子勝奇散治赤脈縷睛風熱痛癢胬肉攀睛眵多淚澀羞明白蒺藜炒蟬蛻穀精草木賊草黃芩草決明菊花梔子川芎荊芥穗羌活密蒙花防風荊芥子各五分上為細末每服二錢臨臥熱茶清調下磨障靈光膏治同上爐甘石另以黃連一兩煎水燒爐甘石通紅淬七次六兩黃丹水飛三兩白丁香取末海螵蛸取末硇砂另研輕粉各一兩黃連銼散晝便浸一宿曬為末麝香另研乳香各五錢歸身研末二錢龍腦少許上先用白蜜十兩或銀器或砂鍋熬五六沸以紙搭出臘面除黃丹外下余藥用柳枝攪勻次下黃丹再攪慢火徐徐攪至紫色又將麝香乳香輕粉硇砂和勻入上藥內以上黏手為度急為丸皂角子大每用一丸新汲水化旋入龍腦少許時時點翳上消翳復明膏治同上海螵蛸取末二錢黃丹水飛四兩訶子去核取末八個白蜜一斤青鹽另研一兩上先將白蜜熬數沸用紙搭去臘面下黃丹將棍攪勻旋下余藥將至紫色取出又龍膽草木賊草各一兩黃連十兩杏仁去皮尖七十五個蕤仁去殼皮一錢此數味共入磁器內以水一斗浸之春秋五日夏三冬十入鍋內文武火熬至小半升濾去渣並前煎藥成膏攪成紫色入龍腦一錢每用少許點上藥乾淨水化用還陰救苦湯見心火萬應蟬花散見陰弱明為物所傷之病治論養之固者則八風無以窺其隙本之密者則五臟何以受其邪故生之者天地召之者人也雖生弗召莫能害也為害不已召之甚也生氣通天論曰風者百病之始也清淨則肉腠閉拒雖有大風苛毒弗之能害陰陽應象大論曰邪風之至疾如風雨故善治者治皮毛夫肉腠固皮毛密所以為害者安從其來也今為物之所傷則皮毛肉腠之間為隙必甚所傷之際豈無七情內移而為衛氣衰憊之原二者俱召風安不從故傷於目之上下左右者則目之上下左右俱病當總以除風益損湯主之傷於眉骨者病自目系而下以其手少陰有隙也加黃連除風益損湯主之傷於額者病自抵過而上傷於耳中者病自鋭眥而出以其足太陽有隙也加蒼朮除風益損湯主之傷於耳後耳角耳前者病自客主人之穴斜下傷於頰者病自鋭眥而入以其手少陽有隙也加枳殼除風益損湯主之傷於頭角耳前後及目鋭眥後者病自鋭眥而入以其足少陽有隙也加龍膽草除風益損湯主之傷於額角及巔者病自目系而下以其足厥陰有隙也加五味子除風益損湯主之諸有熱者更當加黃芩兼服加減地黃丸傷甚者須從權倍加大黃瀉其敗血六節藏象論曰肝受血而能視此蓋滋血養血之藥也此治其本也又有為物暴震神水遂散更不復治故並識之於此證治歌人生慎勿惹風傷不固皮毛決召殃傷目周圍何藥治除風益損是良湯病生目系傷眉骨加入黃連性取涼額角受傷加甚藥柴胡加入可煎嘗額交巔上傷連腦病自內眥貴入蒼術耳後耳前與額損惟加枳殼自安康目鋭眥頭角耳前後數處傷加龍膽草良額角及巔傷發病惟加五味子相當諸藥有熱加黃芩妙兼服無如丸加減地黃丸傷甚均宜從權治大黃倍入記無忘方除風益損湯治目為物傷者當歸白芍熟地川芎各一兩藁本前胡防風各七分上銼細水煎大熱服加減地黃丸見七情明傷寒愈後病治論傷寒病愈後或有目復大病者以其清陽之氣不升而餘邪上走空竅也其病隱澀赤脹生翳羞明頭腦骨痛宜作群墜升發之劑餌之數服斯愈傷寒論曰冬時嚴寒萬類深藏君子固密不傷於寒觸冒之者乃名傷寒其傷於四時之氣者皆能為病又生氣通天論曰四時之氣更傷五臟五臟六腑一病則濁陰之氣不得下清陽之氣不得上今傷寒時病雖愈濁陰清陽之氣猶未來復濁陰清陽之氣未復故餘邪尚熾不休故其走上而為目之害也是以一日而愈者餘邪在太陽二日而愈者餘邪在陽明三日而愈者餘邪在少陽四日而愈者餘邪在太陰五日而愈者餘邪在少陰六日而愈者餘邪在厥陰七日而復是皆清陽不能出上竅而復受其所害也當為助清陽上出則治人參補胃湯主之羌活勝風湯主之加減地黃丸主之嗅鼻碧雲散亦宜用也忌大黃芒硝苦寒通利之劑用之必不治證治歌傷寒愈後病胡生多是餘邪尚未平頭腦骨疼兼隱澀生翳赤障且羞明治宜群墜升發劑及早除邪以復清降濁升清須甚藥人參補胃湯是奇兵羌活勝風湯碧雲散俱妙藥加減地黃丸治亦精惟禁苦寒與通利芒硝大黃誤服恐皆盲方人參補胃湯治傷寒愈後餘邪不散上走空竅隱澀赤脹生翳羞明等症羌活獨活各六分白芍生地澤瀉各三分人參白茯苓炙草白朮黃耆熟地酒洗歸身各四分柴胡防風各五分上銼細水煎熱服搐鼻碧雲散見淫熱羌活勝風湯見風熱加減地黃丸見七情明強陽搏實陰病治論強者盛而有力也實者堅而內充也故有力者強而欲搏內充者實而自收是以陰陽無兩強亦無兩實惟強與實以偏則病內搏於身上見於虛竅也足少陰腎為水腎之精上為神水手厥陰心包絡為相火火強搏水水實而自收其病神水緊小漸小而又小積漸之至瞳人竟如菜子許又有神水外圍相類蟲蝕者然皆能睹而不昏但微覺眊燥羞澀耳是皆陽氣強盛而搏陰陰氣堅實而有御雖受所搏終止於邊鄙皮膚也內無所傷動治法當抑陽緩陰則愈以其強耶故可抑以其實耶惟可緩而弗宜助助之則反勝抑陽酒連散主之大抵強者則不易入故以酒為之導引欲其氣味投合入則可展其長此反治也還陰救苦湯主之療相火藥也亦宜用搐鼻碧雲散然此病世亦罕見醫者要當識之證治歌病有陽強搏實陰火強搏水病斯成瞳仁微小如菜子亦或神水外圍蝕類蟲微覺眊燥與羞澀皆能睹物不昏蒙此蓋內無所傷動益陽緩陰效最神治法入陽酒連散還陰救火湯最工亦用搐鼻碧雲散醫師臨症貴分明方抑陽酒連散治瞳神緊小漸如菜子大許神水外圍相類蟲蝕者睹物不昏微有眊燥羞澀獨活生地各四錢黃柏防己知母各三錢蔓荊子黃芩酒製寒水石黃連酒製各五錢上水煎大熱服每服三錢還陰救苦湯見心火搐鼻碧雲散見淫熱明亡血過多病治論六節藏象論曰肝受血而能視宣明五氣篇曰久視傷血氣厥論曰膽移熱於腦則辛頞鼻淵傳為衄衊瞑目繆刺論曰冬刺經脈血氣皆脫令人目不明由此推之目之為血所養者明矣手少陰心生血血榮於目足厥陰肝開竅於目肝亦多血故血亡目病男子衄血便血婦人産後崩漏亡之過多者皆能病焉其為病睛珠痛珠痛不能視羞明隱澀眼睫無力眉骨太陽因為痠疼當以芎歸補血湯主之當歸養榮湯主之除風益損湯主之滋陰地黃丸方之諸有熱者加黃芩婦人産後者加阿膠脾胃不佳噁心不進食者加生薑復其血使所養則愈然要忌咸物宣明五氣篇曰咸走血血病無多食鹹是忌證治歌目需血養是真詮亡血過多病必纏羞明隱澀睛俱痛太陽眉骨痛相連眼睫無力不能視芎歸補血湯最妍當歸養榮湯除風益損湯或用滋陰地黃丸有熱則加黃芩好婦人産後阿膠添噁心少食脾胃弱生薑復血加最便宜禁咸物血能養自爾光明病能痊方芎歸補血湯治男子衄血便血婦人産後崩漏亡血過多致睛珠痛羞明酸澀眼睫無力眉骨太陽俱痛生地天門冬各四分川芎牛膝白芍炙草白朮防風各五分熟地歸身各六分上銼細水煎溫服噁心不進食加生薑煎服滋陰地黃丸見總論當歸養榮湯見七情除風益損湯見為物所傷明癍疹餘毒病治論東垣李明之曰諸癍疹皆從寒水逆流而作也子之初生也在母腹中母呼亦呼母吸亦吸呼吸者陽也而動作生焉飢食母血渴飲母血飲食者陰也而形質生焉陰具陽足十月而降口中惡血因啼即下卻歸男子生精之所女子結胞之處命宗所謂玄牝玄關者也此血僻伏而不時發或因乳食內傷或因濕熱下溜營氣不從逆於肉理所僻伏者及為所發初則膀胱壬水夾背逆流而克小腸丙火故頸項以上先見也次則腎經癸水又克心火故胸腹以上次見也終則二火熾盛反制寒水故胸腹以下後見也至次則五臟六腑皆病也七日齊七日盛七日謝三七二十一日而愈者七為火數故也愈後或有疽病瘡者是皆餘毒尚在今其病目亦然與風熱不制之病稍同而異總以羚羊角散主之便不硬者減硝黃未滿二十一日而病作者消毒化癍湯主之此藥功非獨能於目蓋專於癍者之藥也不問初起已著服之便令消化稀者則不復出方隨四時加減證治歌癍疹餘毒病胡成風熱不制略相同醫師治法宜精核羚羊角散是定程便不硬者減硝黃消毒化癍湯亦工此方並可治癍毒四時加減任調停方羚羊角散治小兒癍痘後餘毒不解上攻目生翳羞明眵淚多紅赤腫閉草決明芒硝升麻防風車前子黃芩黃耆大黃羚羊角上等分水煎溫服消毒化癍湯治小兒癍疹未滿二十一日而目痛者餘症同上柴胡藁本生地黃連翹細辛黃柏酒製黃連當歸甘草各四分花粉吳茱萸白朮蘇木陳皮乾葛各二分麻黃防風升麻羌活各五分黃芩酒製蒼朮泔水制川芎各三分上銼細水煎溫服明深疳為害病治論衛氣少而寒氣乘之也元氣微而飲食傷之也外乘內傷釀而成之也父母以其純陽耶故深冬不為裳父母以其惡風耶故盛夏不解衣父母以其數飢耶故乳後強食之父母以其或渴耶故乳後更飲之有愚憨而為父母者又不審其寒暑飲食故寒而不為暖暑而不能涼飲而不至渴食而不及飢而小兒幽玄銜默抱疾而不能自言故外乘內傷因循積漸釀而成疳也渴而易飢能食而瘦腹脹下利作嘶嘶聲日遠不治遂生目病其病生翳睫閉不能開眵淚如糊久而膿流竟枯兩目何則為陽氣下走也為陰氣反上也治法當如陰陽應象大論曰清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽行四肢濁陰歸六腑各還其原不反其常是其治也當以升陽降陰之劑茯苓瀉濕湯主之升麻龍膽草飲子主之此藥非獨於目並治以上數症然勿緩緩則危也為父母者其慎諸證治歌深疳為害是何因外乘內傷病厥躬寒熱飢飽均多過釀而成疳禍匪輕渴而易飢食且瘦腹脹不利嘶嘶聲日遠不治生目病睫閉難開翳已生眵淚如糊致膿出竟枯兩目不能明陽氣不走陰反上升陽降陰古法程藥用升麻龍膽草飲子茯苓瀉濕湯本同功以上數症皆能治緩則難痊莫輕心方茯苓瀉濕湯治小兒易飢渴腹脹目痛生翳睫閉不開眵淚如糊久而流膿柴胡四分白朮炙草蔓荊子人參枳殼麵炒茯苓薄荷各二分前胡蒼朮獨活各三分川芎防風羌活各三分半澤瀉半分上銼細水煎溫服升麻龍膽草飲子又名消翳散治小兒疳眼流膿生翳及眼中諸痰之症羌活黃芩炒膽草青蛤粉各五分蛇蛻炙草穀精草鬱金各三分麻黃升麻各二分上銼細共為細末每服二錢熱茶濃調下墜明丸即墜血明目飲細辛人參各一錢赤芍藥五味子十粒川芎酒洗炒牛膝酒洗炒山藥石決明醋煅生地黃歸尾知母鹽水炒白蒺藜研去刺防風各八錢水煎溫服
