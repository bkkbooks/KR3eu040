body:
  text: 卷六運氣原證按內經運氣淚出皆從風熱經云厥陰司天之政三之氣天政布風乃時舉民病泣出是也目淚靈樞黃帝曰人之哀而泣涕者何氣使然岐伯曰心者五臟六腑之主也目者宗脈之所聚也上液之道也口鼻者氣之門戶也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈感宗脈感則液道開液道開故涕泣出焉液者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣故命曰奪精補天柱經俠頸俠頭中分也又曰五臟六腑心為之主耳為之聽目為之視肺為之相肝為之榮脾為之衛腎為之主故五臟六腑之精液上滲於目心悲氣並則心系急心系急則肺舉肺舉則澤液上溢夫心系與肺不能常舉乍上乍下故咳而泣出矣素問解精微論曰厥則目無所見夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹夫一水不勝五火故曰昏盲是以氣衝風泣下而不止夫風之中目也陽氣內守於精是火氣燔目故風見則泣下有喻比之夫火疾風生乃能雨此之類也東垣云水附木勢上為眼澀為眵為冷淚此皆由肺金之虛而肝木寡於畏也迎風冷淚論附迎風熱淚迎東迎西迎風冷淚不論何時何風見則冷淚交流若赤眼障翳者非是此症此乃水木二經血液不足陰邪之患與熱內帶火及無時冷淚者不同治法宜河間當歸湯或阿膠散與枸杞酒之類迎風熱淚然迎風淚出一也而忽有不冷而熱者何也其候亦不論何時何風見之則熱淚交流若有別症者非也此乃肝膽腎水之精液不足故因虛竅不密而風邪引出其淚也水中有隱伏之火發故淚流而熱治法因肝藏受熱者宜以羚羊角散主之衝風淚出者以白殭蠶散主之因肝虛者以珍珠散主之此言淚之冷熱異症之治也而更有別以迎東迎西者抑何故哉迎東蓋迎東一症其候目見東南二風則澀痛淚出見西北風則否此與迎風赤爛淚出末同而本異迎東乃肝之自病氣盛於血其發每在春夏非若迎西因虛受克而病發也治法宜抑氣之有餘而清肝之抑鬱始以流氣飲繼進洗肝散或龍膽瀉肝湯若肝虛則加服補肝散或養肝丸其通治也迎西若夫迎西一症其候目見西北二風則澀痛淚出見東南風則否此乃肝虛受克之病其發每在秋月治當補肝之不足抑肺之有餘宜先以瀉肺湯繼進珍珠散以此分治自無視不明矣證治歌迎風冷淚淚交流肝膽液虧陰邪留河間當歸湯最善阿膠原與枸杞侔若為熱淚無他症肝膽腎虧是病由水中伏火發為熱治法攸殊勿刻舟肝藏受熱羚羊角散衝風淚出白殭蠶散投肝虛宜用珍珠散迎東迎西又別求迎東肝病氣盛血東南風起淚盈眸其發每當春與夏飲投流氣是先籌繼進洗肝散最善龍膽瀉肝湯可謀肝虛則服補肝散養肝丸好亦同儔迎西肝虛而受克西北風生淚不收發每在秋先瀉肺湯繼進珍珠散病自瘳方河間當歸湯治風邪所傷寒中目淚自出肌瘦汗不止當歸酒製二錢人參二錢官桂陳皮各一錢炮薑白朮炒白茯苓甘草川芎細辛白芍各五分上薑三片棗二枚水煎不拘時熱服日三次阿膠散治目有冷淚流而不結肝受風冷阿膠馬兜鈴各一兩半紫菀冬花各一兩甘草五錢白蒺藜炒二錢半糯米一兩上㕮咀每服二錢水煎溫服不拘時枸杞酒治目視不明迎風冷淚枸杞揀肥者一斤杵爛用絹袋盛貯以陳無灰酒七斤浸須密封口勿令泄氣至三七日取飲上仍用豬肝煮熟切片蘸花椒鹽同食每飲一二盞若過飲不但無益反佐濕熱為害不淺羚羊角散羚羊角銼細末羌活元參車前梔仁炒各五錢黃芩瓜蔞各五錢胡黃連三錢家菊花三錢細辛一錢上為細末每服二錢食後竹葉煎湯調下殭蠶散治衝風淚出白殭蠶炒粉草旋覆花細辛木賊各五錢嫩桑皮一兩嫩芥二錢半上為末每服二錢水煎食後溫服珍珠散治肝虛目風淚出珍珠另研丹砂研乾薑研各三分貝滷火煅水淬乾研一兩上為細末以熟絹篩三次每仰臥以少許點眼閉目少時為妙龍膽瀉肝湯膽草酒洗人參天冬麥冬生甘草黃連炒梔仁知母各五分黃芩七分柴胡一錢五味三分上水煎服一方治迎風冷淚不止用烏雞膽汁臨臥點眼效洗肝散見暴風客熱補肝散見外障夏枯草散即補肝散此用麥冬湯調服彼治冷淚養肝丸見雲霧移睛瀉肺湯見金疳流氣飲見倒睫拳毛無時冷淚附無時熱淚無時冷淚謂目不赤不痛並無別病且不待迎風常流冷淚久則瞻視昏渺非迎風冷淚因虛引邪之輕者比其源乃精液傷耗肝膽氣弱精膏枯澀腎水不足幽陰已甚之病久而失治則有內障青盲之患精衰血散之人及悲傷哭泣久郁婦人産後悲泣火過者多患此病治法系肝腎不足者宜菊精丸主之悲傷久郁者以加味逍遙散主之外以麝香散嗅鼻又其通治也夫冷淚常流於斯可以治矣無時熱淚而有目亦無別病無時常流熱淚者將何如乎此候蓋肝膽腎水耗而陰精虧澀及勞心竭視過慮深思動其火而傷其汁故耗液不足也治法系肝虛者以二妙散枸杞酒主之肝實者洗肝湯主之肝熱者決明子方主之風熱風冷者羌活散主之風濕者菊花散蟬蛻餅子川芎丸主之通治以當歸飲子椒苄丸亦正治也外點珍珠散乳汁煎其淚自止若目有別病而熱淚流出者則因火激動水治宜降火滋陰以滋陰降火湯主之而尤當審因何病而致對病下方而後乃無誤也證治歌何來冷淚出無時久而瞻視亦昏迷精液傷耗肝膽弱精膏枯澀腎水虛內障青盲從此起或將治法逐詳披悲傷久郁加味逍遙散肝腎不足菊精丸施外以麝香散嗅鼻此為通治最宜知至於熱淚須分別病因竭視與勞思肝膽腎耗陰精澀膏液不足故如斯審系肝虛求治法枸杞酒偕二妙散奇決明子方清肝熱肝實洗肝湯可醫風熱風冷宜羌活散風濕菊花散莫離川芎丸與蟬蛻餅通治有法不差池當歸飲子椒苄丸並外點珍珠散乳汁煎宜若因別痛淚流熱因火激水病若茲滋陰降火湯宜進定教淚止自揚眉方菊精丸甘菊花去根葉四兩肉蓯蓉酒洗去甲切片焙二兩枸杞搗焙三兩巴戟去心一兩上為細末煉蜜為丸桐子大每服三錢空心或溫酒鹽湯送下麝香散香附川椒目各等分蒼朮麝香各少許上為細末令病者噙水一口將藥吹入鼻中二妙散養肝氣治目昏不明淚下當歸熟地各等分上為細末每服二錢不拘時用無灰酒調服洗肝湯治肝實眼人參黃芩去黑心赤茯苓去皮梔仁川芎柴胡地骨皮菊花桔梗炒各一兩黃連去須炙草各五錢上每服三錢入竹葉七片水煎服決明子方治肝熱止淚赤眼等症用決明子朝朝取一匙揀令淨空心白湯吞下百日見夜光一方作菜食之羌活散治目風冷淚羌活一兩木香官桂去皮胡黃連山藥升麻艾葉焙各一兩牛膝酒浸切焙山茱萸去核白附子炮各七錢半上每服三錢水煎食後溫服日三服菊花散蒼朮四兩肥者用銀石器入河水同皂角一寸煮一日去皂角取末銅刀刮去皮曬乾三兩木賊菊花草決明洗焙乾荊芥穗旋覆花甘草炙各一兩蟬蛻洗焙七錢半上為末每服一錢臘茶五分同煎空心臨臥時服蟬蛻餅子治目昏冷淚去翳膜蟬蛻洗焙木賊甘菊花荊芥穗川芎各一兩蒼朮火泔水浸三兩炙甘草五錢上為細末煉蜜和作餅子如錢大每服一錢食後細嚼臘茶下日三服川芎丸治風盛鼻塞流清涕熱氣攻眼下淚齒間緊急作頭痛川芎柴胡各一兩半夏炙甘草菊花人參前胡防風各五錢上每服四錢薑四片薄荷五葉同煎服當歸飲子治目淚不止當歸身人參柴胡黃芩白芍甘草大黃各一錢滑石五分上加生薑三片水煎溫服椒苄丸治目昏多淚熟地焙乾川椒去目及閉口者微炒生地切焙各等分上為末蜜丸梧子大每服五十丸空心鹽湯或米飲下乳汁煎治風淚澀癢人乳一升黃連去頭取淨末七錢半蕤仁研爛一兩炮薑為末二錢半上除乳外研極細以乳浸一宿明旦入銅器中煎取三合用綿濾去滓每以忝米大點眥中勿當風點銀海止淚方蒼朮米泔水浸一兩五錢木賊去節三兩香附炒去毛二兩上為細末煉蜜為丸梧子大食後鹽湯下三丸木賊散治目出冷淚實則用此木賊蒼朮蒺藜防風羌活川芎甘草上水煎服羌活散治風熱攻眼昏澀多淚羌活川芎天麻旋覆花藁本防風蟬蛻菊花細辛杏仁去皮尖各一兩甘草炙五錢上為細末每服二錢水煎食後服瀉肝湯治目熱淚生糞者脾肝受熱故也桑皮一兩地骨皮二兩甘草五錢上㕮咀每服三錢水煎食遠服一方治熱淚用烏賊魚骨研極紙絹濾過點眼愈珍珠散枸杞酒均見迎風冷淚加味逍遙散見瞼硬睛疼滋陰降火湯見雲霧移睛風沿丹溪云風沿眼繫上膈有積熱自飲食中挾怒氣而成頑痰痞塞濁氣不下降清風不上升由是火益熾而水益降積而久也眼沿因膿潰而腫於中生細小蟲系遂年久不愈而多癢者是也用紫金膏以銀叉腳撥去油膩點之試問若果癢者又當去蟲以絶根本蓋紫金膏只去濕與去風涼血而已若前所謂飲食挾怒成痰又須更與防風通聖散去硝黃為細末以酒拌日曬乾依法服之禁諸厚味及大料物方盡諸法之要眥帷赤爛論眥帷赤爛謂赤爛惟眥有之並無別病也若別病而赤爛者乃因別火致傷其眥又非此比赤勝爛者火多乃勞心憂鬱忿怒無形之火所傷爛勝赤者濕多乃恣燥嗜酒哭泣過多冒火沖煙風熱熏蒸所傷病屬心絡甚則火盛而水不清瘡遂生於眥邊矣要分大小二眥相火君火虛實之説治宜內服洗刀散菊花通聖散洗用黃連散點以爐甘石散東垣碧天丸紫金膏擇而用之雖然赤爛似亦小病也而亦有赤瞎者焉嘗聞治法以青泥蛆淘淨曬乾為末仰臥合目用藥一錢放眼上須更藥行少時去藥赤瞎自無東垣云目瞳赤爛歲久欲呼赤瞎是也常以三稜針刺目外以瀉濕熱立愈治風弦爛眼祕穴大骨空在手大指第二節尖灸九壯以口吹火減小骨空在手小指二節尖灸七壯以口吹火減今並録之以便選用證治歌目眥赤爛症無他若因他症貴精查赤勝爛屬無形火勞憂鬱怒病相加爛勝赤者因多濕熏蒸風熱故生瑕病在心絡須詳審慎則瘡生實足嗟火從君相分虛實內服洗刀散與菊花通聖散洗用黃連散最妙古人點法自無差碧天丸與爐甘石散膏用紫金取效奢倘為赤瞎須求治泥蛆治法功獨賒刺法流傳兼灸法遵循醫治效無涯方洗刀散治風熱弦爛目赤腫內外障羞明倒睫出淚兩瞼赤爛紅筋瘀血等症防風連翹羌活獨活草決明蔓荊子木賊元參各一兩當歸荊芥滑石薄荷麻黃白朮赤芍大黃各五錢黃芩川芎梔仁桔梗石膏芒硝蟬蛻白菊花蒺藜各四錢甘草細辛各三錢上薑引水煎食後服再用清涼洗眼之藥菊花通聖散治兩瞼潰爛或生風粟白菊花一兩半滑石三兩石膏黃芩甘草桔梗牙硝黃連羌活各一兩防風川芎當歸芒硝各五錢荊芥白朮梔仁各二錢半上㕮咀每服五錢生薑三片水煎食後服黃連散治爛眼弦風黃連防風荊芥赤芍五倍子蔓荊子覆盆子即甜勾根上水煎入鹽少許濾去滓淨又入輕粉少許和勻洗眼效甘石散治爛風眼爐甘石不拘多少火煅七次童便淬七次又煅七次用黃連濃煎汁淬七次又煅七次用穀雨前細茶濃煎淬七次又並三汁合一處煅淬三次然後安放地上一宿出火氣細細研入冰片麝香研勻點上煅時用好紫銷炭極大者鑿一坑以安爐甘石東垣碧天丸瓦粉炒一兩銅緑七分為末枯礬二分上研銅緑枯礬令細旋旋入瓦粉研勻熱水和為丸如黃豆大每用一丸熱湯半盞浸一二時洗眼至覺微澀為度閉眼半時候臨臥再洗瞑目就睡尤為神妙一丸可洗二三日紫金膏即赤膜下垂內洗眼金絲膏藥味為末以文武火熬膏風弦赤爛論風弦赤爛謂目睥沿赤爛垢膩也此蓋血虛液少不能滋養睥肉以致濕熱滯於睥絡常時赤爛非若迎風因邪乘虛之比若先有障而赤爛者治其障通其經絡自愈有因毛倒而拔剪損動精液引入風邪以致壞爛各因其源而治之卻治以小烙鐵捲紙蘸桐油燒紅烙之濕爛而癢者頗效內宜先服清睥散後進當歸活血飲或加減四物湯如此治之自濕熱去而陰血足睥肉得其養而病去矣證治歌如何赤爛在風弦血虛熱少病之緣睥肉難滋濕熱滯若先有障治宜權治法須知當治障通其經絡自安然或因毛倒多拔剪損傷精液風邪牽治貴因源毋孟浪烙鐵由來卻法傳治宜先服清肝散後進當歸活血飲便加減四物湯同效睥肉得養病方痊方清脾散見土疳當歸活血飲見睥翻黏瞼加減四物湯見濕熱生瘡附菊花通聖散洗刀散均見眥帷赤爛迎風赤爛論迎風赤爛不論何風見之則赤爛無風則否與風弦赤爛入睥絡之深者不同夫風屬木木強土弱弱則易侵因邪引邪內外夾攻土受木克是以見風則爛無風則愈赤爛者木土之正病也赤者木中火爛者土之濕症若痰若濕盛者爛勝赤若火若燥盛者赤勝爛心承肺承者珠亦痛而赤焉此專言見風赤爛之患與前章迎東西冷熱淚症之深者又不同治宜柴胡散或疏風散濕湯外兼方治自有捷效證治歌迎風赤爛症如何土受木克故沉疴木中火症因成赤爛屬土中濕症磨痰與濕盛爛勝赤赤勝爛者火燥多珠痛而赤心兼肺柴胡湯進莫蹉跎疏風散濕湯同選外兼方治病能瘥方柴胡散治眼眶澀爛因風而作用氣藥燥之柴胡羌活防風赤芍桔梗荊芥生地甘草上水煎服疏風散濕湯赤芍黃連防風各五分銅緑另入歸尾川椒各一錢輕粉一分另入羌活三分膽礬明礬各三釐五味子三分荊芥六分上水煎去滓加銅緑泡化後又入輕粉攪勻用綿紙濾過澄清用手蘸洗爛處治爛弦眼生蟲方覆盆子葉為末一錢乾薑燒灰生礬各五釐枯礬一分上共研蜜調用絹片做膏藥貼眼上一夜次早揭起其蟲自出黏在絹上次晚再用豬精肉切片貼眼上一宿即愈敷爛弦眼方爐甘石煅飛一兩飛丹五錢枯礬二錢五分明砂研細一錢銅緑二錢上研極細先用荊芥陳茶煎水洗患處乘濕將藥敷上即效治爛弦血風眼方覆盆子葉不拘多少曬乾研極細用薄絹包之將男小兒所食之乳浸一時仰臥以汁點眼上神效諸因內外諸因種種不一有郁七情六淫傷感過度而致者其症隨愈隨復最難調治有外受風邪燥火克削致榮衛失調而淹滯澀翳朦昧不清宜散宜和隨症施之若因他症侵乘及物傷等症纍目雖內外輕重各分其類總之火鬱者宜疏之氣滯者宜導之燥甚風邪宜審虛實調之庶不致客邪延久成痼疾已因風論因風者謂患風病入目疾也蓋風在五行為木在臟為肝在竅為目本乎一氣然不能生火故久風則熱勝熱勝則血弱風久必郁鬱則火生火性炎上故患風病人未有目不痛者然有郁未深而為偏喎歪斜者有入脾而脾反濕赤勝爛者有血虛筋弱而振搐者有不禁戒反傷精神及恣燥嗜熱助邪乘亂清和之氣而為內障者有風盛血滯結為外障如胬肉等症者加以服餌香燥之藥耽酒縱辛不善保養使陰愈虧火愈燥風愈勝病變為凝瘀之重者治當各因其症而伐其木大抵風病目者當去風為先清火次之不然源不清流何能止目病雖退後必復來矣治法見口喎眼斜儀容不正者宜服正容湯痰厥頭痛頭旋眼黑顛倒如暈及身重肢冷者宜服半夏茯苓天麻湯風邪傷於胞瞼致風牽瞼翻淚流者宜服夜光柳紅散肝臟積熱肝虛目暗者宜服加減地黃丸肝虛風邪所致者宜服槐子丸風熱上攻宜服川芎石膏散至於蟬花無比散及外治摩風膏則又通治諸風之定方也醫者誠神明運用主方合宜風其自息也已證治歌諸因症屬患風人火自風生目病成或為脾濕赤勝爛或復偏斜郁未深血虛筋弱隨振搐罔知禁戒反傷神乘亂清和因燥熱致成內障最為凶風盛血滯外障結胬肉等症致傷睛總因服藥多辛燥更兼嗜酒食貪辛病變凝瘀非淺禍治當因病細推尋風病目者無他法風實先去火旋清倘逢口眼喎斜症儀容不正須正容湯痰厥頭旋頭復痛眼黑顛倒竟昏蒙更或身重兼肢冷半夏茯苓天麻湯工風牽胞瞼致流淚夜光柳紅散奏功肝虛目暗因肝熱加減地黃丸可呈肝虛風邪而致病槐子丸投自建功風熱上攻何藥治川芎石膏散可憑通用蟬花無比散外治摩風膏最靈方正容湯羌活白附子防風秦艽膽星白殭蠶半夏煎木瓜甘草黃松節即茯苓心木上各等分入生薑三片水煎酒對服半夏茯苓天麻湯治痰厥頭痛頭旋眼黑等症天麻黃耆蜜炙人參蒼朮米泔水泡陳皮澤瀉茯苓白炒麵各五分白朮炒半夏薑製麥芽炒各錢半黃柏酒炒二分乾薑泡一錢二分夜光柳紅散人參荊芥穗川烏泡白芷南星制軟石膏川芎各一兩石決明煅首烏草烏去皮尖藁本細辛雄黃當歸身蒲黃薄荷防風蒼朮浸炒甘松藿香葉全蠍各一兩半川羌活二兩上為細末每服三錢或二錢茶清調下加減地黃丸生地熟地均乾者各一斤石斛去苗防風去蘆枳殼麵炒牛膝酒洗杏仁泡去皮尖麵炒黃入瓦器研去油各四兩上為細末除杏霜另入煉蜜和諸末後入杏霜攪勻為丸梧子大每服五十丸空心以豆淋酒送下或米飲及青鹽湯亦可忌一切動風毒物豆淋酒法以黑豆半升炒令煙出以酒三斤浸之取酒對湯服名紫湯槐子丸槐子仁二兩棗仁去殼蔓荊子覆盆子柏子仁車前白蒺藜炒去刺牛子茺蔚子各一兩上為細末煉蜜為丸梧子大每服三四十丸空心白湯下川芎石膏散石膏煅防風薄荷連翹各一兩桔梗甘草寒水石滑石飛過各二兩半川芎人參當歸黃芩大黃泡白朮制荊芥穗梔仁菊花赤芍各五錢縮砂仁炒二錢半上寒水石石膏滑石另研細余共為細末一併攪勻每服二三錢食遠白湯調下忌薑蒜辛熱等物摩風膏白芷黑附子當歸身防風細辛木香骨碎補藁本各一兩赤芍烏頭肉桂各一兩半牛酥即牛乳鵝脂各四兩豬板油半斤上除酥脂板油外余為細末用真麻油半斤浸一晝夜再入酥脂板油共熬以文武火熬成膏開貼患處蟬花無比散即心火乘金內萬應蟬花散加白蒺藜因毒論因毒謂人生瘡瘍腫毒纍及目痛也夫六陽火燥有餘水不能制以致妄亂無拘氣滯血壅而始發瘡瘍腫毒火性上炎目竅高火之所從泄濁能害清理之自然肝膽清淨融和之腑瘡瘍毒癰痘疹濁邪熾盛侵攪清和因素斫喪肝腎有虧陰虛血少膽之精汁不充化源弱而目絡少滋故邪得乘虛入目而為害若病目正在病毒之時治毒愈而目亦愈若毒愈而目不愈者乃邪入至高之深處難以速退當浚其流而澄其源若急治之因而觸激甚者有瘀滯之變治法通宜服內疏黃連湯若梅瘡餘毒移害肝腎致病於目則宜服還陰解毒湯然瘡症不一皆能為害尋根指以主方有難盡述凡爾醫士總宜清源澄流尋根拔蒂對症下方乃無誤人之憾證治歌目病或因瘡毒生水難制火病斯成血凝氣滯因流毒火性上炎禍匪輕目竅最高火從泄清為濁害故相侵陰虛血少膽精弱化源既損致邪乘病毒若還兼病目毒邪既去目隨明邪如深入目難愈其流宜浚源宜清醫如觸激必多變治法通用內疏黃連湯工梅瘡餘毒移肝腎病生於目致還陰解毒湯瘡症不一皆為禍總貴尋源用酌斟方內疏黃連湯黃連梔仁炒黃芩當歸身桔梗木香檳榔赤芍甘草薄荷各八分連翹大黃制各錢二分上水煎食遠服還陰解毒湯川芎當歸酒洗生地連翹黃芩酒炒金銀花去葉土茯苓甘草減半黃連酒炒苦參麥冬去心白芍酒洗元參上各等分水煎溫服因他論因他者言因害別病而纍及目也所致不同有陰病而陰自傷有陽病而陽自損有寒病熱藥太過傷其神氣熱病寒藥太過耗其精血補者瀉之瀉則損其元瀉者補之補則助其邪砭針之泄散真氣炮灸之激動火邪實實虛虛損不足益有餘之為害亦各因人觸犯感受臟腑經絡衰旺隨其所因而入為病內外輕重不等當驗其標而治其本譬如傷寒陽症熱鬱蒸損瞳神內症也熱甚血滯赤瘀內澀者外症也陰症脫陽而目盲內症也服薑附溫劑多而火燥赤澀者外症也瘧疾之熱損瞳神內症也火滯於血而赤澀外症也精瀉液耗而膏汁不得滋潤內症也山嵐瘴氣而昏者邪氣矇蔽平正內症也蠱脹中滿亦痛者陰虛難制陽邪外症也氣症拂鬱熱多昏花皆內症也痰症之膩滯火症之赤澀皆外症也余仿此嗚呼身之精血有限人之斫喪無窮故虛者多實者少明者少而渺者多若能知保養之方而不犯禁忌之戒外不縱性以傷於五味四氣內不放心於六欲七情順時氣養天和頗立清淨之志而存恆久之心則三真不喪而六賊潛消血充精固神定氣清陰陽和而水火濟精華盛而目力全復何病之有哉若久久不輟綿綿若存不獨目無病而瞻視明命亦長矣非然者不自保養致由他症以及於目則須以本症治之難執方括亦不可拘定眼科藥法治之如傷寒陽症熱鬱蒸損瞳神須看是何經之熱分表裡攻發使其熱退則目自愈若必用眼科之藥其症壞矣餘症仿此治法系傷寒目昏或生翳者以前胡犀角飲主之系時氣後目暗及臀膜者以茺蔚子丸主之系氣血俱損或涼藥過多而病目昏朦者以明目大補湯主之系脾胃虛弱慎服洗肝散或服涼藥過多而目病者以東垣清神益氣湯主之系目病後因早起元氣虛弱目無障而視暗者以磁石丸主之若肥人酒色太過而致目病者以羊肝丸主之抑有室女月水停久倒行逆上致目輕赤生翳者則以順經湯主之若服藥過燥傷於肝腎致目病者則以生熟地黃丸皂角丸主之若因遺精傷精致目病者則以夢靈丸主之如此按部就班尋源類治其庶幾乎證治歌目病或因他症生陰陽傷損辨分明庸醫用藥多疵謬他症貽殃及目睛法貴驗標而治本宜區內外分重輕醫師通變無拘執好從經絡定權衡傷寒生翳兼昏眩宜用前胡犀角飲子平目暗翳生因氣染丸投茺蔚子氣能清氣血虛虧涼藥損湯須明目大補湯建功宏體虛倘更傷涼藥湯取東垣清神益氣精病後元虛目復暗丸投磁石復光瑩肥人好色多傷害丸取羊肝古法程閨秀經停因逆上目紅生翳順經湯行倘因燥藥傷肝腎生熟地黃丸皂角丸呈目以遺精而致病夢靈丸進自堅真症難詳列宜參看怡養還須自玉成方前胡犀角飲黃耆一錢二分前胡羌活菊花梔仁炒蔓荊子犀角銼末防風麥冬去心生地細辛草決明炒車前各八分甘草四分上水煎食遠溫服茺蔚子丸黃連炒三兩生地焙乾枳殼去瓤麵炒青葙子枸杞各一兩茺蔚子澤瀉各一兩半細辛麥冬去心焙車前石決明煅各二兩上為細末煉蜜為丸梧子大每服三錢食後漿水送下明目大補湯干熟地酒蒸白朮土炒白茯苓焙乾人參白芍炙甘草川芎當歸身酒洗黃耆白豆蔻取肉附子炮沉香肉桂上入生薑一片棗二枚水煎不拘時溫服東垣清神益氣湯白茯苓人參白朮制各一錢蒼朮米泔水制白芍陳皮防風黃柏泔水制陳皮各六分甘草炙麥冬去心五味各五分上水煎溫服羊肝丸白蒺藜炒去刺菊花去根葉石決明煅生地各一兩楮實子五味子槐角炒歸尾黃連各五錢北防風荊芥穗各二錢半甘草川芎三錢蕤仁去殼油淨七錢上為細末用雄羊肝一具沸水洗過共前末搗為丸梧子大每服三五十丸空心薄荷湯下忌椒薑辛辣酒順經湯當歸身川芎柴胡桃仁泡去皮尖陳皮烏藥香附制青皮紅花蘇木赤芍元參上水煎食遠加酒對服熱甚加酒炒黃連夢靈丸治內障眼防風蜜炙威靈仙蕤仁去殼蒼朮米泔浸石決明水一升煮乾蚌粉飛過穀精草各一兩菊花二兩上為細末用雄豬肝一具竹刀切去筋膜和藥搗爛入面少許共搗為丸梧子大每服三十丸食後鹽湯下忌煎煉酢豆腐毒物磁石丸見睛黃視渺生熟地黃丸皂角丸均見遊風物損真睛論附觸動真氣物損真睛謂被物觸打迫在風輪之急者物大則狀大物小則狀小有黃白二色黃者害速白者害遲若尖細之物觸傷淺小者可治可消若粗厲之物傷大而深及缺損神膏者雖愈有瘢痕若觸破膏珠者必有膏汁或青黑色或白色如痰流出者為害尤急縱然急治瞳神雖在亦難免欹側之患綻甚而瞳神已去者不治若傷在氣輪皮肉取遲者必有瘀血灌脹取去物而先導之後治餘症有小物所傷亦輕年少壯精強善於護養性情純緩之人不治亦可自愈必其內外別無他症也若傷在風輪或飛流之物撞入而致破風輪者必至清黃牒出狀若稠痰白脂凝在風輪欲流不流此是破傷神珠外邊氣分之精膏也不可誤認為障若神昏者瞳神有大小欹側之患久而失治目必枯凸大凡此症不論大小黃白但有流淚赤障等病者急有珠痛頭疼者尤急通治宜服加味四物湯局方黑神散及經效散之類外宜以一緑散敷之觸動真氣其有被物撞打而目珠痛痛後視復如故但過後漸昏此蓋觸動珠中真氣之症絡澀滯而鬱遏精華不得上運損及瞳神此症既成即驚振內障治宜補肝丸石決明丸及皂角丸合生熟地黃丸之類主之雖然藥治末也要在人之自慎勿致有傷則善矣證治歌目因物觸損真睛驗色須將黃白分白者害遲黃者速病殊緩急重與輕物觸氣輪瘀血灌先導其瘀後酌斟有時或遇飛流物撞入竟至破風輪青黃牒出諸症現若認為障已非真神昏大小瞳神側久而枯凸已多凶不拘大小兼黃白流淚赤障急堪徵珠痛頭疼尤急症通治加味四物靈局方黑神散亦妙經效散好類相從外敷宜用一緑散或能挽救復光瑩若因撞打目珠痛痛後視物漸昏冥珠中真氣原觸動郁遏精華不上行損及瞳神成內障藥用補肝丸石決明生熟地黃偕皂角丸總宜自慎莫輕心方治傷損目羌活獨活紅內消蘇木赤芍鉤藤白芷各五錢甘草節三錢地榆瓜蔞根各四錢上㕮咀每服三錢水煎食後服加味四物湯經效散一緑散均見振胞瘀痛局方黑神散見赤痛如邪神肝散見瑪瑙內傷石決明丸見睛黃視眇皂角丸生熟地黃丸均見遊風飛絲入目論附眯目飛揚飛絲入目謂風揚遊絲偶然撞入目中而作痛也即今之所謂天絲打眼者是若野蠶蜘蛛等蟲之絲其患倘遲若遇金蠶老鸛之絲其目不出二三日並裂治法不須服藥但遵法外取之可也眯目飛揚抑有外行因風吹沙上入目中頻多揩拭以致氣血凝滯而為病者此名眯目飛揚症初起磊澀赤脈次後淚出急澀漸重結為障翳然有輕重赤白亦因感受血氣部分或時令之燥熱不同耳或變或不變亦隨人之感觸所致當辨形症別經絡而施治之重者須按而服藥輕者亦遵法外治可矣而又不若保於未然即外治亦有不必用者之善也何勿慎之證治歌陡然眼目觸飛絲目中作痛亦難支金蠶老鸛毒尤急逾時並裂實多危此症不須尋治法但須外取勿遲遲眯目飛揚何自起飛沙入目故如斯氣血凝聚因揩拭磊澀赤脈初起時次後淚流旋急澀障翳漸結莫揚眉輕重赤白鬚分辨亦為外治不須醫重則必須辨形證經絡分明治可施方一方治飛絲人目紅腫如迷痛澀不開則鼻流青涕用金墨濃磨以新筆塗入目中閉目少時以手張開其絲自成一塊著在眼白上用新筆輕輕拭出則愈未盡再塗其法甚效一方治飛絲入目用柘樹漿以絹包筋頭蘸漿於目內效一方治飛絲入目用火麻子一合搗碎用井花調一碗將舌浸於碗中涎沫飛絲自出立愈一方治飛絲入目用茄子葉搗爛照火麻子治法尤妙一方治眯目用鹽與豉置水中浸之以目視水其物立出一方治物落眼中用新筆蘸激立出一方治稻麥入眼以新布覆眼上將蠐螬從布上摩之其芒自著布上諸物落眼均可用物偶入睛論物偶入睛謂偶然被物落在眼中而痛也凡人被物入目不可乘燥便擦按住性待淚來滿而擦則物潤而易出如物性重及有芒刺難出急令人取出不可揉擦之擦則愈深入若深入須翻上睥取之不取則轉運阻礙氣滯血凝且芒刺金石稜角之物失取礙及擦重拭之則壞損輪膏如痕米厭凝脂等病輕則瘀血水滯為痛為障等病故結於睥內須翻而尋看因其症而治之治法凝血者宜加味四物湯損輪膏者宜四物湯合生熟地黃丸至按經分部參觀為物所傷病症自無微不入矣醫者慎之證治歌偶然被物入睛中痛亦難堪不自寧慎毋乘燥多揉擦待淚來時擦始工或翻上睥令人取須防凝滯損雙瞳芒刺金石偕稜角失取擦重總傷神因症施治堪條列加味四物瘀除凝若損輪膏宜四物湯生熟地黃丸可並陳昔人此症留名論參觀經絡自分明方四物湯見赤痛如邪生熟地黃丸見遊風加味四物湯見振胞瘀痛時復論時復者謂目病不治忍待自愈或治失其宜有犯禁戒傷其脈絡遂致深入又不治之致邪正搏擊不得發散之故或年之月月之日如花如潮至期而發至期而愈久而不治及同激發遂成大害未發者問其所發之時令以別病本在何經位已發者當驗其形症經絡以別其何部分而後治之乃可獲效治法發於春者宜服洗肝散發於夏者宜服洗心散發於秋者宜服瀉肺湯發於冬者宜服六味地黃湯若系氣眼則以通明散主之有腫痛赤脈從上而下太陽病者則宜服東垣羌活除翳湯有腫痛赤脈從下而上陽明者則宜服明目流氣飲有腫痛赤脈從外走內少陽病者則宜服神仙退云丸心血不足神志不寧者天王補心丹陽虛精滑者加味六味地黃丸此治法也別時令分經絡辨陰陽制治不可謂不詳且精也使後之學者循規蹈矩不參謬妄之見詳症究源不行鹵莽之思則豈惟此一症之無不治哉推而傲之神明運用吾決其無不治之疾矣醫者省之豫目望之證治歌病名時復是胡然時令經絡細推焉發從春者洗肝散發於夏者洗心散便秋宜瀉肺湯冬六味地黃湯通明散治氣眼妍太陽赤脈上而下羌活除翳湯最賢自下而上陽明病明目流氣飲宜先少陽從外而走內用方宜取神仙退云丸神志不寧心血弱天王補心丹心自恬若是陽虛精滑症六味地黃丸可永年方洗肝散歸尾酒洗川芎薄荷甘草減半生地梔仁炒羌活大黃煨防風膽草上為細末每服三錢白滾湯調下通明散升麻梔仁炒各兩半細辛川芎白芷草決明防風夏枯草白芨白斂羌活各一兩楊梅皮蟬蛻去頭足五味子各五錢甘草二錢上為細末每服三錢淡竹葉七片同煎食後溫服明目流氣飲蒼朮米泔浸一宿炒二錢細辛牛子炒大黃煨川芎防風菊花白蒺藜炒去刺梔仁炒蔓荊子甘草炙木賊元參各七分草決明炒一錢黃芩七分瀉肺湯見白澀六味地黃湯見睥生痰核洗心散見火疳羌活除翳湯神仙退云丸均見外障天王補心丹見凝脂翳加味六味地黃丸見下附通治目疾方蟬花無比散治男婦大小遠年近日一切風眼氣眼目昏瞼生風粟或痛或癢漸生翳膜及久患偏正頭風牽搐兩眼漸漸細小連眶赤爛瘡痘入眼等症蛇蛻微炙二兩蟬蛻去頭足翹三兩羌活當歸酒洗焙川芎石決明用鹽入東流水煮時漉出搗如粉各三兩防風茯苓去皮甘草炙各四兩赤芍十三兩蒺藜炒去刺半斤蒼朮浸去皮炒十五兩上為細末每服三錢食後米泔水調服忌服發風毒等物還睛丸治男婦風毒上攻眼目赤腫羞明眵淚難開眶癢赤痛瞼眥紅爛瘀內浸睛或患暴赤眼痛不可忍又治偏正頭痛一切頭風目眩白朮生用菟絲酒浸另研青葙子去土防風甘草炙羌活白蒺藜炒去刺密蒙花木賊去節上為細末煉蜜為丸如蟬子大每服一丸細嚼白湯送下空心食每日三服光明丹治一切眼目翳膜胬肉赤眼爛弦羞明爐甘石制硃砂硇砂各一錢麝香一分片腦三分上各另制極細末篩過點眼如翳膜加石斛珍珠各三分白丁香硇砂熊膽牛黃琥珀貝齒各一分細研和勻點眼要紅加硃砂一錢白龍丹治一切火熱眼及翳膜胬肉爐甘石制一錢元明粉五分硼砂三分片腦一分上研極細末點眼局方密蒙花散治風氣攻眼昏暗眵淚羞明並暴赤腫痛羌活白蒺藜炒木賊密蒙花石決明各一兩菊花二兩上為細末每服二錢食後茶清調下遠志丸通治內外障清心明目益肝退翳車前白蒺藜炒去刺遠志水浸去心曬薑汁拌焙細辛各七錢半全蠍五枚蟬蛻一兩洗焙熟地茯神去木川芎人參茺蔚子蘆薈研琥珀生地蔓荊子各五錢上為細末煉蜜和丸梧子大每服五十丸空心用米飲下臨臥用菖蒲湯送下磨翳丸治眼生諸翳膜大效木賊黃連川芎穀精草當歸白芷赤芍蟬蛻荊芥防風羌活大黃獨活黃芩白菊花生地石膏煅龍退梔子青葙子蠶退甘草石決明煅上為細末米糊丸梧子大每服三十丸食後茶清下退翳丸治一切翳膜蟬蛻白菊花夜明砂車前連翹各五錢黃連一兩蛇蛻一兩上為末米泔煮肝搗爛糊丸梧子大每服三十丸薄荷湯下丹砂散治諸眼皆妙硼砂海螵蛸去殼爐甘石上好者煅童便淬七次飛過各一兩硃砂五錢用此則不黏上為細末磁瓶收貯臨用少加冰片研點極妙加味六味地黃丸懷生地酒製八兩茯苓乳拌曬乾山萸肉酒洗焙乾山藥各四兩牡丹皮酒洗炒澤瀉各三錢枸杞子焙乾菊花各六兩遼五味焙二兩半蒺藜炒去刺五兩
